、一个短语(with great effort)、甚至一整个从句(because he was late)。"},{"h":"状语的形式","t":"①副词：She spoke clearly.  ②介词短语：He left in a hurry.  ③不定式（目的/结果）：He studied hard to pass the exam. / She was too tired to continue.  ④分词短语（分词状语，表时间/原因/伴随等）：Walking home, I ran into an old friend.  ⑤状语从句：Although he tried hard, he failed. 其中状语从句最为复杂，在「从句星系」专节详述。"},{"h":"状语与定语的混淆","t":"状语修饰**动词或全句**；定语修饰**名词**。关键测试：把这个成分去掉，看它描述的是「做什么」（动词的方式/时间/原因 = 状语）还是「什么样的名词」（名词的属性 = 定语）。例：He wrote a letter in English.（in English 修饰 wrote，回答「怎么写」= 状语）vs. a letter in English（in English 修饰 letter，说明「什么信」= 定语）。"},{"h":"考研考点：分词状语与状语从句","t":"分词短语作状语（participle as adverbial）是考研长难句高频结构，等同于状语从句的省略形式（详见「化身星系」的分词作状语节点）。翻译时须还原逻辑关系：Seen from the hill, the city looks beautiful. = When it is seen from the hill... 注意逻辑主语须与主句主语一致，否则构成「垂悬分词」错误。"}],"examples":[{"en":"Having reviewed the data carefully, the committee reached a unanimous decision.","zh":"在仔细审查数据之后，委员会做出了一致的决定。","note":"Having reviewed the data carefully 是完成分词短语作状语（表时间/原因），逻辑主语=the committee，与主句一致。"},{"en":"The experiment was conducted under controlled conditions to ensure reliability.","zh":"实验在受控条件下进行，以确保可靠性。","note":"under controlled conditions 是介词短语状语（方式/条件）；to ensure reliability 是不定式状语（目的）。"},{"en":"Even if the results seem counterintuitive, they must be reported accurately.","zh":"即使结果看起来违反直觉，也必须如实报告。","note":"Even if 引导让步状语从句，accurately 是副词状语修饰 reported。"}],"hardcase":{"sentence":"Given that public trust in institutions had already been severely eroded by a series of high-profile scandals, the government's decision to postpone the inquiry until after the election was widely interpreted, even by its own supporters, as an attempt to avoid accountability.","zh":"鉴于公众对机构的信任已因一系列备受瞩目的丑闻遭到严重侵蚀，政府将调查推迟至选举结束后的决定，即便在其自身支持者中也被普遍解读为规避问责的企图。","marks":[{"text":"Given that public trust in institutions had already been severely eroded by a series of high-profile scandals","role":"分词短语引导的原因/条件状语，修饰主句"},{"text":"until after the election","role":"时间状语，修饰 postpone"},{"text":"even by its own supporters","role":"方式/程度状语（插入语），强调范围"},{"text":"as an attempt to avoid accountability","role":"方式状语，修饰 was interpreted，补充解读方式"}],"tip":"句首 Given that 引导的是整句的逻辑前提状语，不是主句——真正的主语谓语是 the government's decision...was interpreted。"}},{"id":"complement","title":"补语","en":"Complement","domain":"sentence","tier":3,"summary":"补足宾语或主语意义：make it clear、find him asleep——复合宾语的'补'。","level":3,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：让宾语/主语「更完整」","t":"补语(complement)分为两种：**宾语补语**(object complement)补充说明宾语的身份或状态；**主语补语**即表语，已在「表语」节点讲解。这里主要讨论宾语补语，它出现在「复合宾语」结构中：及物动词 + 宾语 + 宾补，构成 SVOC（主谓宾补）句型。"},{"h":"SVOC 句型与充当补语的形式","t":"公式：S + V + O + C（宾语补语）。补语与宾语之间隐含一个 be 关系（宾语 be 补语成立）。充当宾补的形式：①形容词：make it clear（it is clear）②名词：call him a genius（he is a genius）③不定式：ask her to leave（she is to leave）④过去分词：have the work done / get it finished  ⑤裸不定式(bare infinitive)：let/make/have + 宾语 + do（使役动词省 to）；see/hear/watch + 宾语 + do（感官动词，表完整动作，用 doing 表进行中）。"},{"h":"补语的识别技巧","t":"在宾语后加一个 be，看是否能与补语搭配成一个有意义的句子：I found the room empty → The room is empty（成立），所以 empty 是宾补。与宾语（直接宾语、间接宾语）的区别：宾语是动作的承受者，补语是对宾语状态/身份的描述，两者指向不同。"},{"h":"考研高频场景","t":"学术写作中 SVOC 是高频句型，如：consider/find/make/render/keep + 宾语 + 形容词/名词。考研阅读中，长宾补结构易与其他成分混淆，尤其是过去分词宾补（have sth. done）与被动语态（sth. is done）。写作使用宾补结构能有效提升句式多样性，如：This makes the problem more complex than previously thought.（宾语=the problem；宾补=more complex than...）。"}],"examples":[{"en":"The public considers the new regulation overly restrictive.","zh":"公众认为新法规限制过于严苛。","note":"宾语=the new regulation；宾补=overly restrictive（形容词短语）；隐含 the new regulation is overly restrictive。"},{"en":"We heard him give a brilliant speech.","zh":"我们听到他发表了一篇精彩的演讲。","note":"感官动词 heard + 宾语 him + 裸不定式 give（强调完整听完全程）。"},{"en":"Years of neglect have rendered the building uninhabitable.","zh":"多年的忽视使这栋建筑变得无法居住。","note":"render（使成为）+ 宾语 the building + 宾补 uninhabitable（形容词），典型 SVOC 学术句。"}],"hardcase":{"sentence":"Years of exposure to conflicting expert testimony had rendered the jury's task of reaching a unanimous verdict on such complex technical matters virtually impossible, and the judge ultimately found the deadlock irresolvable.","zh":"多年接触相互矛盾的专家证词，使得陪审团就如此复杂的技术问题达成一致裁决的任务几乎成为不可能，法官最终发现僵局无法打破。","marks":[{"text":"the jury's task of reaching a unanimous verdict on such complex technical matters","role":"复合宾语中的宾语（had rendered 的直接宾语）"},{"text":"virtually impossible","role":"宾语补语，补充说明 task 的状态，构成复合宾语（SVOC 句型）"},{"text":"the deadlock","role":"found 的宾语，构成第二个复合宾语"},{"text":"irresolvable","role":"宾语补语，补充说明 deadlock 的状态"}],"tip":"rendered...impossible 和 found...irresolvable 都是「动词+宾语+补语」的 SVOC 结构——补语紧跟宾语对其作进一步说明。"}},{"id":"appositive","title":"同位语","en":"Apposition","domain":"sentence","tier":3,"summary":"紧跟名词、对其再命名或解释：my friend Tom；可扩展为同位语从句。","level":3,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：给名词再贴一次标签","t":"同位语(apposition)紧跟在一个名词（称为被同位的词）后面，用另一种表达方式对该名词进行重命名、解释或限定，两者指代同一对象。最简单的同位语是一个名词（My teacher, Mr. Li, is kind.），最复杂的是同位语从句（The fact that he lied surprised us.）。"},{"h":"形式：词语同位语 vs 从句同位语","t":"①词语同位语：名词直接并列，通常用逗号隔开：Beijing, the capital of China, has a long history.（Beijing = the capital of China）  ②同位语从句：跟在抽象名词后（fact/idea/news/doubt/question/evidence/claim/belief/possibility），用 that 引导，解释名词的具体内容：The news that the economy had improved boosted confidence. 与定语从句的核心区别：同位语从句中 that 不在从句内作任何成分，只是引导词；定语从句中关系代词在从句中作主语/宾语。"},{"h":"同位语 vs 定语从句：区分要点","t":"测试法：把 that 从句的内容代入名词位置，能直接替换且语义通顺 = 同位语从句（The fact = he succeeded in the research，同位语从句）；不能替换，只是对名词的修饰限定 = 定语从句（The news that you mentioned = the news，但 that 在从句中作宾语，定语从句）。同位语中 that 不作成分；定语从句中关系词作成分。"},{"h":"考研高频考点","t":"考研阅读中，同位语从句常出现在学术语境（The assumption that economic growth ensures happiness has been challenged.），常被误认为定语从句，导致翻译错误。写作中，同位语短语是增加信息密度的有效手段（Professor Wang, a leading expert in AI, delivered the keynote address.），考研大作文使用此结构可提升评分。"}],"examples":[{"en":"The theory, that exposure to diverse views enhances critical thinking, has found strong empirical support.","zh":"接触多元观点能提升批判性思维这一理论，已获得了强有力的实证支持。","note":"that 从句是名词 theory 的同位语从句；that 在从句中不作成分，只引导。"},{"en":"Darwin, the father of evolutionary theory, published his seminal work in 1859.","zh":"进化论之父达尔文于1859年发表了他的奠基性著作。","note":"the father of evolutionary theory 是名词同位语，用逗号夹住，修饰 Darwin。"},{"en":"There remains the question of whether these findings can be generalized.","zh":"这些发现能否推广的问题仍然存在。","note":"of whether 从句是 question 的同位（介词 of 后接从句，内容即问题本身）。"}],"hardcase":{"sentence":"The assumption, widely held among economists of the neoclassical school, that rational agents will always act to maximise their own utility has been challenged by mounting evidence from behavioural economics, a field that emerged only in the latter half of the twentieth century.","zh":"新古典学派经济学家中普遍持有的假设——理性行为者总是会采取行动以最大化自身效用——已受到行为经济学大量证据的挑战，而行为经济学这一领域仅在二十世纪下半叶才兴起。","marks":[{"text":"that rational agents will always act to maximise their own utility","role":"同位语从句，解释 assumption 的内容（that 在从句中不充当成分）"},{"text":"a field that emerged only in the latter half of the twentieth century","role":"同位语名词短语，解释说明 behavioural economics"}],"tip":"assumption 后先被插入语 widely held... 打断，再跟同位语从句——找到 has been challenged 才算找到谓语，插入语和同位从句都是附属结构。"}},{"id":"five-patterns","title":"五大基本句型","en":"Five Basic Patterns","domain":"sentence","tier":6,"summary":"SV / SVO / SVOO / SVOC / SVP——英语一切句子的五副地基骨架。","level":1,"prereq":["predicate-verb","subject","object","predicative","complement"],"parent":"predicate-verb","detail":[{"h":"本质：英语一切句子的五副骨架","t":"英语中几乎所有简单句都可以归入五大基本句型(five basic sentence patterns)之一，这是由谓语动词的性质决定的。动词是「哪种类型的动词」决定了句子「需要补什么成分」，从而确定句型。这五副骨架是理解和生产英语句子的最底层逻辑。"},{"h":"五大句型详解","t":"① SV（主谓）：不及物动词，无宾语。Birds fly. / The sun rises. ② SVO（主谓宾）：及物动词+宾语。She reads books. ③ SVOO（主谓双宾）：双宾语动词。He gave me a gift.（间接宾语+直接宾语）④ SVOC（主谓宾补）：及物动词+宾语+宾语补语（说明宾语的状态/身份）。They elected him president. / She found the room empty. ⑤ SVP（主系表，Linking Verb）：系动词+表语。She is a teacher. / He seems tired."},{"h":"决定句型的关键：动词类型","t":"不及物动词(intransitive) → SV。及物动词(transitive) → SVO。双宾语动词(ditransitive) → SVOO。复合及物动词(complex transitive，要宾补才意思完整) → SVOC。系动词(linking verb) → SVP。因此，认识动词的「及物性」（详见「及物与不及物」节点）是归类句型的前提。"},{"h":"扩展：从简单句到复杂句","t":"五大句型是「简单句」的骨架，现实中的句子在每个成分位置都可以展开：主语可以是从句（That he succeeded is remarkable.），宾语可以是从句（I know what she wants.），状语可以大量添加。但无论多复杂，剥去所有修饰和展开的成分，主干仍是五大句型之一。与「简单句」「复合句」「并列句」节点联动，理解句子如何从最基础形态生长为长难句。"},{"h":"考研应用：句型判断与翻译","t":"翻译题中，正确识别句型直接决定译文是否准确。SVOC 是考研最难识别的句型，因为宾语和宾补之间没有连词，容易误断结构。检测：在宾语后插入 be，宾语 + be + 宾补语义通顺 = SVOC。长难句分析法（特殊星系）也以识别主干句型为第一步。"}],"examples":[{"en":"Technology has made global communication faster and cheaper.","zh":"技术使全球通信变得更快更便宜。","note":"SVOC：主=Technology；谓=has made；宾=global communication；宾补=faster and cheaper（形容词）。"},{"en":"The committee appointed her chief negotiator.","zh":"委员会任命她为首席谈判代表。","note":"SVOC：宾=her；宾补=chief negotiator（名词），她=首席谈判代表，隐含 be 关系。"},{"en":"The professor sent the students a list of recommended readings.","zh":"教授给学生们发送了一份推荐阅读书目。","note":"SVOO：间接宾语=the students；直接宾语=a list of recommended readings。"}],"hardcase":{"sentence":"The discovery gave researchers new hope, made further investigation both necessary and urgent, rendered previous theoretical models obsolete, and proved that the phenomenon could not be explained by any existing framework.","zh":"这一发现给研究人员带来了新的希望，使进一步调查既必要又紧迫，令此前的理论模型过时，并证明这一现象无法用任何现有框架来解释。","marks":[{"text":"gave researchers new hope","role":"SVOO句型：gave 为谓语，researchers 为间接宾语，new hope 为直接宾语"},{"text":"made further investigation both necessary and urgent","role":"SVOC句型：made 为谓语，further investigation 为宾语，both necessary and urgent 为宾补"},{"text":"rendered previous theoretical models obsolete","role":"SVOC句型：rendered 为谓语，previous theoretical models 为宾语，obsolete 为宾补"},{"text":"proved that the phenomenon could not be explained by any existing framework","role":"SVO句型：proved 为谓语，that 从句为宾语（名词性从句）"}],"tip":"一个主语 The discovery 带动四个并列谓语，每个谓语归属不同句型——并列结构最能考验句型辨别力。"}},{"id":"linking-verb","title":"系动词","en":"Linking Verbs","domain":"sentence","tier":3,"summary":"be/become/seem/look/feel 等，本身不表动作，只把主语连向表语。","level":2,"prereq":["predicate-verb"],"parent":"predicate-verb","detail":[{"h":"本质：连接主语与「描述」的桥","t":"系动词(linking verb)本身不表示具体动作，只充当一座桥，把主语与描述主语状态或身份的成分（表语，predicative）连接起来。最核心的系动词是 be，其余系动词都可以用「是……的状态」来理解。"},{"h":"系动词分类","t":"①存在类：be（是/处于）②变化类：become/turn/grow/go/fall/come/get + 形容词（注意：turn+颜色，go+负面状态 go bad/go wrong，fall+ill/asleep/silent）③感官类：look/sound/smell/taste/feel + 形容词（绝对不接副词！）④表象/结果类：seem/appear/prove/turn out  ⑤保持类：remain/keep/stay/hold + 形容词（remain important / stay calm）。记忆技巧：凡是后面接形容词而非副词的动词，往往是系动词用法。"},{"h":"系动词 vs 实义动词：同词不同用","t":"grow/feel/look/taste/sound 等词既可作系动词（后接形容词）也可作实义动词（后接宾语或副词）。She looks happy.（系动词：她看起来很快乐）vs She looks at the picture.（实义动词：她看画）。She grew tired.（系动词：她变得疲惫）vs She grew vegetables.（实义动词：她种蔬菜）。上下文中是否有宾语是判断的关键。"},{"h":"考研陷阱","t":"感官系动词后必须接形容词，不接副词，这是完形填空的高频考点：The soup tastes good（正，good 是形容词表语）vs ~~The soup tastes well~~（错，well 作副词用于修饰动作，但 taste 此处作系动词无「动作」可修饰）。系动词句型（SVP）与及物动词句型（SVOC）的区分也是难点，see/feel/find + 宾语 + 形容词是 SVOC 而非 SVP。"}],"examples":[{"en":"The situation remained tense despite diplomatic efforts.","zh":"尽管进行了外交努力，局势仍然紧张。","note":"remained 是保持类系动词；tense（形容词）是表语；despite 引导介词短语状语。"},{"en":"His argument proved unconvincing upon closer examination.","zh":"经过更仔细的审视，他的论点显得不具说服力。","note":"proved 是表象类系动词；unconvincing（形容词）是表语。"},{"en":"The new policy turned out to be more effective than expected.","zh":"新政策最终证明比预期更有效。","note":"turned out 是表结果系动词短语；to be more effective 是不定式作表语。"}],"hardcase":{"sentence":"As the investigation progressed, the initial hypothesis grew increasingly untenable, the evidence appeared more contradictory than clarifying, and what had once seemed a straightforward case of fraud became a labyrinthine tangle of jurisdictional ambiguities.","zh":"随着调查推进，最初的假设越来越站不住脚，证据看起来更加相互矛盾而非澄清事实，而曾经看似简单明了的欺诈案件变成了一团管辖权模糊的乱麻。","marks":[{"text":"grew increasingly untenable","role":"系动词 grew 连接主语 hypothesis 与表语 untenable（表状态变化）"},{"text":"appeared more contradictory than clarifying","role":"系动词 appeared 连接主语 evidence 与表语（表感知/外观）"},{"text":"seemed a straightforward case of fraud","role":"系动词 seemed 连接主语 what 从句与表语（表表象）"},{"text":"became a labyrinthine tangle of jurisdictional ambiguities","role":"系动词 became 连接主语 what 从句与表语（表转变结果）"}],"tip":"grew/appeared/seemed/became 都是系动词——它们后面跟的是表语而非宾语，把系动词换成 be 验证：grew untenable ≈ was untenable。"}},{"id":"transitivity","title":"及物与不及物","en":"Transitivity","domain":"sentence","tier":3,"summary":"及物动词带宾语(raise)，不及物不带(rise)；决定句型与能否被动。","level":2,"prereq":["predicate-verb"],"parent":"predicate-verb","detail":[{"h":"本质：动词要不要「对象」","t":"及物性(transitivity)描述一个动词是否需要宾语才能表达完整意思。及物动词(transitive verb, vt.)需要宾语，动作「过渡」(transit)到一个对象上；不及物动词(intransitive verb, vi.)不带宾语，动作在主语上完结。这一属性直接决定句型（SVO还是SV）以及能否用被动语态。"},{"h":"汉英对比：陷阱在这里","t":"许多汉语及物动词对应的英语动词是不及物动词，必须加介词才能接对象，是中式英语的高频来源：「到达」arrive (at/in)，不能说 arrive the city；「结婚」marry sb.（及物）/ get married to sb.，「离婚」divorce（可及物，但汉语常说「和某人离婚」→ 英语直接 divorce sb.，不加介词）；「讨论」discuss（及物，不加 about）；「参加」attend（及物，不加 to）。这类搭配须记忆。"},{"h":"一词两用：兼类动词","t":"许多动词既可及物又可不及物，意思略有不同：run（不及物：他在跑）vs run a company（及物：管理公司）；grow（不及物：植物在生长）vs grow vegetables（及物：种蔬菜）；read（不及物：她在看书）vs read the report（及物：看这份报告）。词典中 vt. 和 vi. 标注了两种用法，学习时分别记忆例句最有效。"},{"h":"及物性与被动语态","t":"只有及物动词才有被动语态，这是铁律。不及物动词不带宾语，没有「承受者」可以翻转为主语，所以不能被动。因此遇到被动结构时，该动词一定是及物动词；反过来，见到不及物动词时不要误写被动。这一规则与「语态」「被动语态」节点直接连接。"}],"examples":[{"en":"The issue was discussed at length during the conference.","zh":"这个问题在会议上被详细讨论。","note":"discuss 是及物动词，故有被动语态；注意不加 about（中式英语误用：was discussed about）。"},{"en":"Sales have risen sharply over the past quarter.","zh":"过去一个季度销售额急剧上升。","note":"rise 是不及物动词，无被动语态；与及物动词 raise（提高某物）对比：They raised prices.（被动：Prices were raised.）"},{"en":"She married a scientist and moved abroad.","zh":"她与一位科学家结了婚，随后移居国外。","note":"marry 直接接宾语（及物），不说 marry with sb.。"}],"hardcase":{"sentence":"Although the new regulation applies to all manufacturers regardless of size, it matters little to conglomerates that can absorb compliance costs easily, while smaller firms struggle and some may even disappear from the market altogether.","zh":"尽管新法规适用于所有规模的制造商，但它对于那些能够轻松消化合规成本的大型企业来说意义甚微，而较小的企业则举步维艰，有些甚至可能彻底退出市场。","marks":[{"text":"applies to","role":"及物短语动词（apply to），介词 to 引出宾语 all manufacturers，整体为及物用法"},{"text":"matters little","role":"不及物动词 matter，little 是副词修饰谓语，后无宾语"},{"text":"absorb compliance costs","role":"及物动词 absorb 带直接宾语 compliance costs"},{"text":"struggle","role":"不及物动词，无宾语，仅表自身状态"},{"text":"disappear from the market","role":"不及物动词 disappear，from 短语为状语而非宾语"}],"tip":"及物动词后跟名词宾语，不及物动词后若有名词须通过介词连接——matter/struggle/disappear 后无直接宾语。"}},{"id":"simple-sentence","title":"简单句","en":"Simple Sentence","domain":"sentence","tier":4,"summary":"只含一套主谓的句子；并列、复合句都由它生长而来。","level":1,"prereq":["five-patterns"],"parent":"five-patterns","detail":[{"h":"本质：只含一套主谓的句子","t":"简单句(simple sentence)是英语句子的最小完整单位：只含**一个独立主谓结构**（即一个主语 + 一个限定谓语）。简单句可以很短（Birds sing.），也可以很长——主语可以有复杂的定语修饰，谓语可以有复杂的时态，宾语可以是复杂的名词短语，状语可以层层叠加——但只要主谓结构只有一套，就是简单句。"},{"h":"简单句的五种基础句型","t":"简单句即五大基本句型的实现（SV / SVO / SVOO / SVOC / SVP），详见「五大基本句型」。简单句是并列句和复合句的构件。"},{"h":"误区：成分复杂 ≠ 不是简单句","t":"The rapidly growing global population, fueled by advances in medicine and food production, has placed enormous pressure on natural resources worldwide.（这是一个简单句！）主语=population（前后有大量定语修饰），谓语=has placed，宾语=pressure，后面的 on...worldwide 是状语。整个句子只有一个限定谓语 has placed，所以是简单句。这是考研阅读中识别主干的核心技能。"},{"h":"向并列句和复合句生长","t":"简单句 + 并列连词（and/but/or/so） + 简单句 = 并列句（compound sentence）。简单句 + 从属连词（because/when/if/that/who）引导的从句 = 复合句（complex sentence）。理解了简单句，才能清楚地识别并列句和复合句里「主句」的边界。"}],"examples":[{"en":"The government's ambitious plan to reduce carbon emissions by 2030 requires significant investment.","zh":"政府到2030年减少碳排放的雄心勃勃的计划需要大量投资。","note":"看起来很长，却是简单句：一个谓语 requires；to reduce carbon emissions by 2030 是不定式作定语修饰 plan。"},{"en":"Researchers at universities across the country have been studying this phenomenon for decades.","zh":"全国各地大学的研究人员几十年来一直在研究这一现象。","note":"简单句，谓语=have been studying（现在完成进行时），for decades 是时间状语。"},{"en":"Both the economic benefits and the social risks of automation deserve serious consideration.","zh":"自动化的经济效益和社会风险都值得认真考量。","note":"both...and 连接的并列主语，谓语仍只有 deserve 一个，所以是简单句而非并列句。"}],"hardcase":{"sentence":"The prolonged absence of any credible, independently verified evidence supporting the central claim of the report fundamentally undermines its conclusions.","zh":"报告中心论点缺乏任何可信的、经独立核实的支撑证据，从根本上动摇了其结论。","marks":[{"text":"The prolonged absence of any credible, independently verified evidence supporting the central claim of the report","role":"主语（整个名词短语，只含一套主谓，是简单句）"},{"text":"fundamentally undermines","role":"谓语（全句唯一的限定动词）"},{"text":"its conclusions","role":"宾语"}],"tip":"句子看似很长，但只有一套限定动词 undermines——剥掉所有修饰语，主干就是 absence undermines conclusions，典型的复杂主语简单句。"}},{"id":"compound-sentence","title":"并列句","en":"Compound Sentence","domain":"sentence","tier":4,"summary":"两个对等分句由 and/but/or/so 或分号连接，地位平等。","level":3,"prereq":["simple-sentence"],"parent":"simple-sentence","detail":[{"h":"本质：两个对等分句并肩而立","t":"并列句(compound sentence)由**两个或两个以上独立分句**（每个分句都有自己的主谓，可独立成句）通过并列方式连接而成。两个分句地位平等，没有主从之分，这是与复合句的根本区别。并列连词(coordinating conjunction)是纽带：for/and/nor/but/or/yet/so（记忆缩写：FANBOYS）。"},{"h":"连接方式与逻辑关系","t":"并列连词标记两个分句的逻辑关系：and（并列、递进）、but/yet（转折）、or（选择）、so（结果）、for（原因，书面语，解释前面分句）、nor（也不，后须部分倒装：Nor did he apologize.）。用分号(；)也可连接对等分句（不用连词），后常接连接副词(however/therefore/moreover)，但连接副词本身不能替代连词，所以前面用分号或句号，不用逗号。"},{"h":"逗号拼接错误(Comma Splice)","t":"只用逗号连接两个独立句是英语书面语中的严重语法错误：~~The results were positive, we decided to proceed.~~（错）。正确写法：...positive, and we decided...  / ...positive; we decided...  / ...positive. We decided... 考研写作严禁逗号拼接，这是批卷者扣分项。"},{"h":"并列句 vs 复合句","t":"并列句两个分句地位平等，可以互换位置而语义基本不变（He studied hard, and he passed. ≈ He passed, and he studied hard.——语义有细微差异但结构对等）。复合句从句从属于主句，不能独立成句，不能随意对调位置。考研阅读中遇到 but/so/and 连接长句时，需判断这是并列句还是仅连接两个成分（如两个形容词或两个宾语），这影响整个句子的结构分析。"}],"examples":[{"en":"The proposal seemed promising, but the committee rejected it without explanation.","zh":"该提案看起来很有希望，但委员会毫无理由地拒绝了它。","note":"but 连接两个独立分句（并列句）；两个分句都有各自的主谓。"},{"en":"The economy has been stagnating; therefore, unemployment has risen sharply.","zh":"经济一直停滞不前；因此，失业率急剧上升。","note":"分号连接两个独立分句；therefore 是连接副词，表结果，放在第二分句句首。"},{"en":"Either the policy changes, or the situation will deteriorate further.","zh":"要么政策改变，要么情况会进一步恶化。","note":"either...or 连接两个对等分句，表二择一。"}],"hardcase":{"sentence":"The data clearly supported the experimental group's hypothesis; however, the sample size was too small to justify broad generalisation, and the methodology had not been subjected to peer review, so the findings remained preliminary at best.","zh":"数据清晰地支持了实验组的假设；然而，样本量太小，不足以支持广泛推论，且方法论尚未经过同行评审，因此研究发现充其量仍属初步结论。","marks":[{"text":"The data clearly supported the experimental group's hypothesis","role":"第一个独立分句（分号前）"},{"text":"the sample size was too small to justify broad generalisation","role":"第二个独立分句，与前后分句并列"},{"text":"and","role":"并列连词，连接第二与第三分句，地位对等"},{"text":"the methodology had not been subjected to peer review","role":"第三个独立分句"},{"text":"so the findings remained preliminary at best","role":"第四个独立分句，so 为并列连词表结果"}],"tip":"分号和逗号+并列连词（and/so）连接的是地位相等的独立分句——去掉连接词每个分句仍能独立成句，这是并列句与复合句的本质区别。"}},{"id":"complex-sentence","title":"复合句","en":"Complex Sentence","domain":"sentence","tier":5,"summary":"一个主句 + 一个或多个从句；通往从句星系的大门。","level":3,"prereq":["simple-sentence"],"parent":"simple-sentence","detail":[{"h":"本质：一个主句 + 一个或多个从句","t":"复合句(complex sentence)由**主句(main clause)** + **从句(subordinate clause)** 构成。从句是由从属连词（that/because/when/if/which 等）引导的子句，依赖主句，不能独立成句。从句在整个复合句中充当一个成分（名词、定语或状语），这也是从句分类的依据：名词性从句/定语从句/状语从句。"},{"h":"三大从句与成分对应","t":"①名词性从句(noun clause)：充当主语、宾语、表语或同位语。②定语从句(relative clause)：充当后置定语，修饰名词（先行词）。③状语从句(adverbial clause)：充当状语，表时间/原因/条件/让步等。复合句是「从句星系」全部内容的句法容器——理解了复合句的骨架，就能快速定位从句。"},{"h":"嵌套：复合句 + 复合 = 长难句","t":"考研阅读中的长难句，本质上是多层嵌套的复合句：主句的某个成分（如主语或宾语）是一个从句，该从句内部又有定语从句修饰其中的名词……层层嵌套形成「句中有句」的结构。分析策略：①找到主句谓语（有时态变化的限定动词）；②向前找主语；③向后找宾语/表语；④识别每个从属连词引导的从句，贴上「名词/定语/状语」标签；⑤逐层还原，最后整合翻译。"},{"h":"复合句与并列句的区分","t":"并列句两个分句平等（用 and/but/or/so）；复合句有主从之分（从句不能独立成句，可用从属连词识别）。复合句可与并列句叠加，形成并列复合句(compound-complex sentence)。这类句子最长最复杂，但拆分原则不变：先并列再复合，逐层剥离。"},{"h":"相邻知识点","t":"「从句总览」是复合句的下游节点，三大从句的具体规则在「从句星系」中详解。「长难句分析法」（特殊星系）是本节在实战中的综合运用。「简单句」是复合句的构件基础。"}],"examples":[{"en":"The reason why so many students fail to improve is that they practise without clear feedback.","zh":"如此多学生无法进步的原因在于，他们在缺乏明确反馈的情况下练习。","note":"主句=The reason is...；why 引导定语从句修饰 reason；that 引导表语从句（名词性）作 is 的表语。两层从句嵌套。"},{"en":"Although the findings were disputed, the paper was published after it had been revised.","zh":"尽管研究发现受到质疑，该论文在修订之后仍然发表了。","note":"although 引导让步状语从句；after 引导时间状语从句；主句=the paper was published。三层结构的复合句。"},{"en":"What the research suggests is that economic inequality, if left unchecked, will inevitably produce social unrest.","zh":"研究表明，经济不平等如果任其发展，将不可避免地引发社会动荡。","note":"What 引导主语从句；that 引导表语从句；if left unchecked 是省略的条件状语从句（省略了主语和 be）。"}],"hardcase":{"sentence":"Although economists have long debated whether inequality necessarily impedes growth, recent empirical research suggests that the relationship is more nuanced than earlier models, which largely ignored distributional effects, had assumed.","zh":"尽管经济学家长期争论不平等是否必然阻碍增长，但近期实证研究表明，这种关系比此前那些在很大程度上忽视分配效应的模型所假设的要更为复杂微妙。","marks":[{"text":"Although economists have long debated whether inequality necessarily impedes growth","role":"让步状语从句，引导词 Although，修饰主句"},{"text":"whether inequality necessarily impedes growth","role":"宾语从句，嵌套在让步从句内，作 debated 的宾语"},{"text":"suggests","role":"主句谓语"},{"text":"that the relationship is more nuanced than earlier models, which largely ignored distributional effects, had assumed","role":"宾语从句，作 suggests 的宾语，内含非限制性定语从句"},{"text":"which largely ignored distributional effects","role":"非限制性定语从句，修饰 earlier models"}],"tip":"三层从句嵌套：让步从句→宾语从句（含定语从句）——画出主句骨架 recent research suggests...，其余全是从属层。"}},{"id":"subject-verb-agreement","title":"主谓一致","en":"Subject–Verb Agreement","domain":"sentence","tier":5,"summary":"谓语在数上随主语：语法一致、意义一致、就近一致三原则博弈。","level":2,"prereq":["subject","predicate-verb"],"parent":"subject","detail":[{"h":"本质：谓语形式随主语人称和数变化","t":"主谓一致(subject-verb agreement)规定：谓语动词在**人称**(person)和**数**(number)上必须与主语保持一致。英语动词变化最明显的是一般现在时第三人称单数加 -s，以及 be 的多种形态(am/is/are；was/were)。规则听起来简单，但当主语结构复杂时，极易判断失误。"},{"h":"三原则：语法一致、意义一致、就近一致","t":"①语法一致(grammatical concord)：按主语的语法数决定。集合名词(collective noun)如 team/committee/government 在英式英语中可视为复数（The team are playing well. 英式）；在美式英语中视为单数。②意义一致(notional concord)：按实际意义决定，有时与语法不符——a number of（多数+复数谓语）vs the number of（总数+单数谓语）；physics/mathematics/economics（学科名，单数谓语）。③就近一致(proximity concord)：or/nor/either…or/neither…nor 连接的主语，谓语就近与最近的主语一致。There be 结构中 be 与其后第一个名词一致。"},{"h":"高频难点汇总","t":"以下结构插在主语和谓语之间，不影响谓语的数：「together with / as well as / along with / including / except / rather than + 名词」——谓语仍随主语（前面的名词）变化。「each/every/either/neither/one」作主语，谓语用单数。「none of + 名词复数」在正式英语中用单数，在非正式英语中可用复数。「百分比/分数 + of + 名词」谓语与 of 后名词一致。"},{"h":"考研考点","t":"完形填空中，单复数动词的选择是常规考点；阅读理解中，嵌套结构导致误判主语（把定语从句中的名词当作主语），从而预期谓语形式错误，影响理解。写作中，集合名词、量词短语的一致是失分点。「There be」存在句的就近一致是独立节点，需专门练习。"}],"examples":[{"en":"The quality of the reports submitted by the students has improved significantly.","zh":"学生提交的报告质量已显著提高。","note":"主语=quality（单数），by the students 是插入的修饰语，不影响谓语；谓语=has improved（第三人称单数）。"},{"en":"Neither the manager nor the employees were informed of the decision.","zh":"经理和员工都没有被告知这个决定。","note":"neither...nor 就近一致：与 employees（复数）最近，谓语用 were。"},{"en":"A number of studies have confirmed the correlation, but the number of conclusive studies remains small.","zh":"许多研究已证实了这种相关性，但具有决定性的研究数量仍然很少。","note":"a number of + 复数名词 → 复数谓语；the number of + 名词 → 单数谓语。"}],"hardcase":{"sentence":"Neither the regulatory authority nor the companies themselves have disclosed the full extent of the data breach, although the number of individuals whose personal information was compromised remains disputed and is estimated at between two and five million.","zh":"监管机构和相关公司本身均未披露数据泄露的全部程度，尽管个人信息遭到泄露的人数仍存在争议，估计在200万至500万之间。","marks":[{"text":"Neither the regulatory authority nor the companies themselves have disclosed","role":"就近一致：nor 后主语 the companies（复数），谓语用 have（复数）"},{"text":"the number of individuals whose personal information was compromised remains disputed","role":"语法一致：主语是 the number（单数），谓语 remains 用单数；of individuals 是修饰语不影响一致"},{"text":"is estimated","role":"并列谓语，与 remains 并列，仍以单数 the number 为主语"}],"tip":"Neither...nor 就近一致看 nor 后的成分；the number of... 永远单数（区别于 a number of...接复数）——两个陷阱同框。"}},{"id":"there-be","title":"There be 存在句","en":"Existential There","domain":"sentence","tier":3,"summary":"There be + 名词表'存在'，谓语就近与第一个名词一致。","level":3,"prereq":["five-patterns"],"parent":"five-patterns","detail":[{"h":"本质：引入新信息的存在句","t":"There be 句型，又称存在句(existential construction)，用来陈述「某处/某情况下存在某事物」，把新信息（名词）引入话语。结构：There + be + 名词主语 + （地点/时间状语）。注意：there 在这里只是**引导词**(expletive there)，不表示「那里」，也不是主语；真正的主语是 be 后面的名词。"},{"h":"谓语就近一致","t":"There be 中，be 动词与**其后第一个名词**（即真正的主语）在数上一致：There is a book on the table.（单数）/ There are many books on the table.（复数）/ There is a book and two pens on the table.（就近，与 a book 一致）。这是「主谓一致」就近原则在 There be 中的体现。"},{"h":"There be 的扩展形式","t":"①There + 其他不及物动词（exist/remain/appear/stand/live/lie）：There existed a great civilization here. / There remains one problem.  ②时态变化：There was/were（过去）；There will be（将来）；There has/have been（完成）；There may be（情态）。  ③There being 用于独立主格或非限制性定语从句：There being no time left, we had to leave.（独立主格作状语）"},{"h":"考研使用","t":"There be 是写作中引出新话题、描述现象的有效句式，但滥用显得单调。替换方案：There exist considerable differences... / Numerous challenges remain... 写作中使用 There remains / There exist 显示语言多样性。阅读中，There be 是存在句，识别后直接明确「什么地方有什么」，翻译不复杂，但有时 there 后的名词被长定语修饰，需找到名词中心词再确定谓语一致。"}],"examples":[{"en":"There has been a dramatic increase in the number of people working remotely.","zh":"远程工作的人数出现了显著增加。","note":"There has been...（现在完成时存在句）；a dramatic increase 是主语（单数），被后面的 in 短语修饰。"},{"en":"There remain several unresolved questions about the long-term effects of the treatment.","zh":"关于该治疗的长期效果，仍有几个未解答的问题。","note":"there remain（不用 are，学术语体用 remain 更精确）；several questions 是主语（复数）。"},{"en":"There is little evidence to suggest that the intervention was effective.","zh":"几乎没有证据表明这次干预是有效的。","note":"little（几乎没有，否定含义）修饰不可数名词 evidence；to suggest 是不定式作后置定语修饰 evidence。"}],"hardcase":{"sentence":"There remains, even among scholars who have dedicated their careers to studying the archive, considerable disagreement about which documents are authentic and whether there exist systematic gaps in the collection that were deliberately created.","zh":"即便在那些将职业生涯奉献于研究该档案馆的学者之间，对于哪些文件是真实的、以及馆藏中是否存在被刻意制造的系统性缺口，仍存在相当大的分歧。","marks":[{"text":"There remains","role":"There be 存在句，谓语 remains（单数）就近与后面的单数主语 considerable disagreement 一致"},{"text":"considerable disagreement","role":"存在句的真正主语（there 是虚词，无实义）"},{"text":"whether there exist systematic gaps in the collection","role":"嵌套的 There be 从句，谓语 exist（复数）与主语 gaps 一致；whether 引导间接疑问"}],"tip":"There be 句的谓语与紧跟其后的名词一致，不与 there 一致——本句外层 remains（单数配 disagreement），内层 exist（复数配 gaps）。"}},{"id":"it-usage","title":"it 的用法","en":"Uses of 'it'","domain":"sentence","tier":4,"summary":"指代、形式主语/宾语、强调句、表天气时间——四副面孔，考点密集。","level":3,"prereq":["subject"],"parent":"subject","detail":[{"h":"本质：四副面孔，考点密集","t":"英语中 it 是使用频率极高却面孔最多的词，同一个 it 在不同句子中可能完全不同性质：指代上文、代替天气/时间/距离、充当形式主语或形式宾语、构成强调句型。准确识别 it 的身份是阅读理解和写作的关键技能。"},{"h":"面孔一：指代 it（pronoun it）","t":"代替上文提到的单数可数名词或整个概念：I bought a book. It is fascinating.（it = a book）/ She succeeded, and it surprised us all.（it = 她成功这件事）。与「代词指代」节点直接关联，完形填空中 it 指代什么是高频考点。"},{"h":"面孔二：形式主语 / 形式宾语","t":"当真正主语是不定式或 that 从句时，用 it 占据主语位置（形式主语，formal subject），把真正主语后置：It is important to read widely. = To read widely is important.（但后者较笨拙）。形式宾语：find/make/consider/think + it + 形容词/名词 + to do/that...：She found it impossible to finish on time.（it = to finish on time）。"},{"h":"面孔三：非人称 it（impersonal it）","t":"用于表天气、时间、距离、环境，没有具体指代对象：It is raining. / It is three o'clock. / It is ten kilometres to the city. 翻译时不译成「它」，直接按语境译（「现在下雨了」「现在三点」）。"},{"h":"面孔四：强调句型（Cleft Sentence）","t":"It is/was + 被强调成分 + that/who + 句子剩余部分。结构特征：去掉 it is/was…that/who 框架，剩余成分能重新拼成一个完整句子（这是与定语从句的区别）。例：It was the professor who discovered the error.（去掉框架 = The professor discovered the error.）可强调主语/宾语/状语，但**不能强调谓语动词**（强调谓语用 do 强调）。与「强调句型」节点深度联动。"}],"examples":[{"en":"It is widely acknowledged that the gap between rich and poor has widened.","zh":"人们普遍认为，贫富差距已经扩大。","note":"it 是形式主语；that 从句是真正主语。is widely acknowledged（被动）是学术写作常见结构。"},{"en":"It was the invention of the printing press that transformed the spread of knowledge.","zh":"正是印刷机的发明改变了知识的传播方式。","note":"强调句型，被强调成分=the invention of the printing press；去掉框架=The invention of the printing press transformed the spread of knowledge.（完整句）"},{"en":"Many find it difficult to distinguish correlation from causation.","zh":"许多人发现很难区分相关性与因果性。","note":"形式宾语：it 指代 to distinguish correlation from causation；difficult 是宾补。"}],"hardcase":{"sentence":"It is only when a civilisation loses the capacity to question its own foundational assumptions that it becomes clear how fragile the consensus holding it together actually was, and it is this very fragility that historians find most instructive.","zh":"只有当一个文明失去质疑自身根本假设的能力时，那个将其凝聚在一起的共识究竟有多脆弱才变得清晰可见，而正是这种脆弱性被历史学家认为最具启示意义。","marks":[{"text":"It is only when a civilisation loses the capacity to question its own foundational assumptions that","role":"强调句型：It is...that 强调时间状语从句 only when..."},{"text":"it becomes clear","role":"it 作形式主语，真正的主语是后面的 how 从句"},{"text":"how fragile the consensus holding it together actually was","role":"真正的主语（主语从句），it 在此指代上文的 civilisation"},{"text":"it","role":"在 holding it together 中作 holding 的宾语，指代 civilisation（代词指代用法）"},{"text":"it is this very fragility that historians find most instructive","role":"第二个强调句型，强调表语 this very fragility"}],"tip":"it 在此句中三副面孔：强调句型的引导词、形式主语、代词指代——每遇 it 必问：它是真实指代、形式占位，还是强调句构件？"}},{"id":"word-order","title":"语序","en":"Word Order","domain":"sentence","tier":3,"summary":"英语靠语序定成分；自然语序是常态，倒装是受触发的变体。","level":3,"prereq":["five-patterns"],"parent":"five-patterns","detail":[{"h":"本质：英语靠语序定角色","t":"与汉语不同，英语缺乏丰富的格变化（除代词 I/me/he/him 外），主要靠**语序**(word order)来确定句子成分。自然语序(natural word order)：主语 + 谓语 + 宾语（SVO）。因此，在英语中改变语序会改变意义（The dog bit the man ≠ The man bit the dog），或产生特殊的句法效果（倒装、强调）。"},{"h":"自然语序与偏离","t":"英语的自然语序是 SVO/SVP；状语可以相对灵活（通常位于句末，也可在句首作话题框架）；定语则严格后置（单词除外）。偏离自然语序的主要触发机制：①**倒装**(inversion)——谓语或助动词前置；②**话题化**(topicalization)——宾语或状语前置以强调；③**there be 句型**——宾语（真正主语）置于 be 之后。这三种情况在长难句中都是增加分析难度的因素。"},{"h":"状语的语序灵活性","t":"状语在英语中最灵活，同一状语在句首、句中、句末含义相同但语用效果不同。句首状语常作「话题」或「条件框架」（In general, / Historically,）；句末状语最自然。频率副词(always/often/never/usually)有固定位置规则：一般动词前、be 动词后、助动词后：He often runs. / She is always late. / He has never been there."},{"h":"与倒装的关系","t":"「倒装」是语序最激烈的偏离，它是对自然语序的系统性颠倒，受特定词语触发（否定词前置、only 状语前置等）。详见「句式星系」的倒装节点。考研翻译中，识别倒装 = 首先还原自然语序，再按 SVO 结构翻译，避免误译。"}],"examples":[{"en":"Only when we understand the root cause can we devise an effective solution.","zh":"只有当我们理解了根本原因，我们才能制定出有效的解决方案。","note":"only when 状语前置触发部分倒装：can we devise（助动词提前）；还原自然语序=we can devise a solution only when...。"},{"en":"Historically, such policies have had unintended consequences.","zh":"从历史上看，此类政策产生过意想不到的后果。","note":"句首状语 Historically 作话题框架，自然语序。"},{"en":"Such an opportunity we may never encounter again.","zh":"这样的机会我们可能再也不会遇到了。","note":"宾语 such an opportunity 前置（话题化），强调该宾语；动词 encounter 后无宾语（已前置）。"}],"hardcase":{"sentence":"So deeply embedded in the culture was the assumption that economic growth automatically produces social well-being that only after decades of rising inequality did policymakers begin to question whether the two were genuinely linked.","zh":"经济增长自动带来社会福祉这一假设深深嵌入文化之中，以至于只有在数十年不平等加剧之后，政策制定者才开始质疑两者是否真正存在关联。","marks":[{"text":"So deeply embedded in the culture was the assumption","role":"倒装语序：表语 So deeply embedded in the culture 前置，引发主谓倒装（was 提至 assumption 前）"},{"text":"was the assumption","role":"主谓倒装后的谓语+主语（正常语序应为 the assumption was so deeply embedded）"},{"text":"only after decades of rising inequality did policymakers begin","role":"only + 时间状语前置引发部分倒装，助动词 did 提至主语 policymakers 前"}],"tip":"两处倒装成因不同：so...that 结构中表语前置触发谓语倒装；only + 状语前置触发助动词倒装——复原正常语序是验证理解的最快方法。"}},{"id":"verb-system","title":"动词系统总览","en":"The Verb System","domain":"verb","tier":6,"summary":"时(何时)×体(状态)×态(主被动)×气(虚实)四维，动词承载句子最多的信息。","level":2,"prereq":["predicate-verb"],"parent":"predicate-verb","detail":[{"h":"动词的四个维度","t":"英语动词是句子的核心引擎，同时承载四条独立的信息轨道：时(tense)——动作发生在哪个时间段；体(aspect)——动作处于什么状态（完结了？还在进行？）；态(voice)——动作是主动还是被动；气(mood)——说话人对命题的态度（真实、虚拟、祈使）。这四个维度相互独立又彼此叠加，才产生了「过去完成被动」等复杂形式。理解这个坐标系，是驾驭一切时态语态的前提。"},{"h":"时态矩阵：三时×四体","t":"时(tense)只有三个：过去、现在、将来。体(aspect)有四个：一般体（无特殊状态）、进行体(progressive，be + doing，表进行中)、完成体(perfect，have + done，表已完成且有影响)、完成进行体(perfect progressive，have been doing，表持续至今)。三时×四体 = 12 种时态，英语所有时态都在这张矩阵里。考研英语一并不要求全部精通，但现在完成时、过去完成时、被动语态是高频考点，必须打通。"},{"h":"助动词是实现时态语态的零件","t":"英语动词自身只有原形/过去式/过去分词/现在分词四种变化，而表达12种时态须借助助动词(auxiliary verb)：be 用于构造进行体和被动语态；have 用于构造完成体；will/shall 用于构造将来时；do 用于构造疑问、否定和强调。助动词本身无实义，只是时态语态的构件。助动词详见「助动词」星。"},{"h":"与相邻星系的联系","t":"动词系统向上连接「谓语」——谓语是唯一必须是限定动词(finite verb)的成分；向右连接「情态」——情态动词 can/may/must 等给动词加上可能/义务等色彩，构成语气第四维；向下延伸出「非谓语动词」——不作谓语的动词形式（不定式、动名词、分词），不再携带时态，但仍保留完成/被动区分。整个「化身星系」都是动词系统伸出的触角。"},{"h":"考研一眼看出时态的技巧","t":"碰到长难句中的谓语动词，按以下步骤速判：①有 had done → 过去完成；②有 have/has done → 现在完成；③有 be + doing → 进行；④有 be + done（过去分词）→ 被动；⑤只有动词过去式 → 一般过去；⑥动词原形（三单加 -s）→ 一般现在。这些特征可叠加，如 has been done = 现在完成被动。"}],"examples":[{"en":"The report has been reviewed by the committee.","zh":"这份报告已经被委员会审阅过了。","note":"has been reviewed = 现在完成(have + done) + 被动(be + done) 两维叠加。"},{"en":"By the time he arrived, she had already left.","zh":"当他到达时，她已经离开了。","note":"had left = 过去完成，标志了'过去的过去'这一时间层次。"},{"en":"Economic growth is being constrained by rising costs.","zh":"经济增长正受到成本上升的制约。","note":"is being constrained = 现在进行被动，三维叠加，学术英语常见。"}],"hardcase":{"sentence":"The report that had been compiled by the commission was being reviewed when the minister announced that new evidence would alter the findings.","zh":"委员会汇编的那份报告正在被审阅，就在此时部长宣布新证据将改变调查结论。","marks":[{"text":"had been compiled","role":"过去完成时被动语态谓语：汇编动作先于审阅发生"},{"text":"was being reviewed","role":"过去进行时被动语态谓语：审阅动作在宣布时正在进行"},{"text":"announced","role":"一般过去时谓语：时间轴的参照点"},{"text":"would alter","role":"过去将来时谓语：时态呼应，主句过去时带动从句后退"}],"tip":"一句话同时出现四种时/体/态组合，找时间轴上的参照点是解题核心。"}},{"id":"tense-aspect","title":"时态与体","en":"Tense & Aspect","domain":"verb","tier":6,"summary":"三个时(过去/现在/将来)×四个体(一般/进行/完成/完成进行)织成时态矩阵。","level":3,"prereq":["verb-system"],"parent":"verb-system","detail":[{"h":"时(tense)与体(aspect)的本质区别","t":"时(tense)回答「什么时候」，是客观的时间坐标：过去/现在/将来。体(aspect)回答「动作处于何种状态」，是说话人对动作过程的主观呈现：一般体不关注过程（只陈述事实）；进行体(progressive aspect)聚焦动作正在展开的过程；完成体(perfect aspect)强调动作已完结但与参照点仍有关联；完成进行体既强调完成又强调持续。时和体是两条独立轨道，合体才产生具体时态。"},{"h":"12格时态矩阵速览","t":"一般体：一般现在(do/does)、一般过去(did)、一般将来(will do)。进行体：现在进行(am/is/are doing)、过去进行(was/were doing)、将来进行(will be doing，考研罕见)。完成体：现在完成(have/has done)、过去完成(had done)、将来完成(will have done)。完成进行体：现在完成进行(have/has been doing)、过去完成进行(had been doing)、将来完成进行(will have been doing，极罕见)。考研英语一高频：现在完成、过去完成、现在进行、被动各时态。"},{"h":"体的本质：时间轴上的'窗口'","t":"想象时间轴是一条线，动作是线上的一段。一般体：只报告结果，不开窗（He finished the work.）。进行体：开一个小窗，放大动作正在展开的切面（He was finishing the work.）。完成体：从结束点回望，强调'已完成且对当下有影响'（He has finished the work — 现在可以提交了）。完成进行体：从持续到参照点的一段全程展开（He has been working for three hours — 还可能继续）。"},{"h":"考研高频陷阱：时态一致性","t":"完形填空最常考的是时态呼应——主句时态定了基调，从句须相应调整。遇到选时态的空格，先找主句时态再看逻辑关系：叙述过去故事时一般过去；故事里某动作发生更早 → 过去完成(had done)；文章议论时态通常是一般现在；学术论文摘要偏爱现在完成（研究结果与当下相关）。另见「时态呼应」星与「完成时 vs 过去时」星。"}],"examples":[{"en":"Scientists have discovered a new species in the deep ocean.","zh":"科学家们在深海中发现了一个新物种。","note":"have discovered = 现在完成体：发现这件事对'现在'（科学界现状）有影响，所以不用一般过去。"},{"en":"She was reading the contract when the phone rang.","zh":"电话响时她正在看合同。","note":"was reading = 过去进行体，作背景；rang = 一般过去，是打断动作。两种体的对比在同一句里体现。"},{"en":"He had been studying for six hours before he finally took a break.","zh":"在最终休息之前，他已经连续学习了六个小时。","note":"had been studying = 过去完成进行体，强调持续时长，且在过去某参照点之前已积累。"}],"hardcase":{"sentence":"By the time the latest census figures are released, demographers will have been debating the methodology for nearly a decade, yet the underlying trends remain contested.","zh":"等最新人口普查数据发布时，人口学家将已就方法论争论了将近十年，但潜在趋势仍存争议。","marks":[{"text":"are released","role":"一般现在时代将来（主将从现规则）：时间状语从句中用现在时"},{"text":"will have been debating","role":"将来完成进行时：到未来某点为止持续进行的动作"},{"text":"remain","role":"一般现在时：表持续真实状态，与完成进行时形成对比"}],"tip":"从句用现在时、主句用将来完成进行时，两套体标记叠加，先拆时间轴再看体。"}},{"id":"present-simple","title":"一般现在时","en":"Present Simple","domain":"verb","tier":3,"summary":"表习惯、真理、时间表；第三人称单数加 -s 是高频失分点。","level":2,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"肯定：主语 + 动词原形（三单加 -s/-es）。否定：主语 + do/does + not + 动词原形。疑问：Do/Does + 主语 + 动词原形？三单变化规则：一般加 -s；以 -s/-sh/-ch/-x/-o 结尾加 -es；以辅音 + -y 结尾改 y → i 再加 -es（study → studies）。be 动词特殊：am/is/are。"},{"h":"三大核心用法","t":"①习惯性/反复性动作：She exercises every morning.（配 always/usually/often/sometimes/rarely/never）。②客观真理、科学事实、定义：Water boils at 100℃. The Earth revolves around the Sun.——这类句子永远用一般现在，即使转述时主句是过去时也不改（时态呼应的例外）。③时间表与日程安排（官方固定计划）：The train leaves at 9 a.m. The conference starts on Monday.——这是一般将来的替代，表示按时间表确定发生。"},{"h":"考研高频考点：三单 -s 与主谓一致","t":"三单加 -s 是低级失分点，也是完形/改错考点。注意：主语是不可数名词/动名词短语/不定式时，谓语用三单形式（Learning a language takes time.）。主谓之间插入介词短语时，谓语仍与主语核心名词一致，别被距离近的名词迷惑：The quality of the data is poor. 另见「主谓一致」星。"},{"h":"学术写作中的一般现在","t":"考研翻译与写作中，评述研究结论、引用观点、作者认为等，英语学术惯例用一般现在：This study shows... / The author argues... / The data suggest...——哪怕研究已经发表多年。这一惯例与汉语不同，汉语常说'该研究发现了……'（过去时感觉）但英语用一般现在。"}],"examples":[{"en":"The committee meets every Tuesday to review proposals.","zh":"委员会每周二开会审议提案。","note":"习惯性动作；meets = 三单形式，别写成 meet。"},{"en":"As the report demonstrates, income inequality widens during economic downturns.","zh":"正如报告所示，经济衰退期间收入不平等加剧。","note":"demonstrates / widens 都是学术一般现在，陈述该研究展示的客观规律。"},{"en":"She told me that the Earth orbits the Sun.","zh":"她告诉我地球绕太阳运转。","note":"主句 told 是过去式，但 orbits 仍用一般现在——客观真理不受时态呼应约束。"}],"hardcase":{"sentence":"Every time a central bank raises interest rates, the currency of that country appreciates against its trading partners, which in turn dampens export competitiveness.","zh":"每当一国央行提高利率，该国货币就会相对贸易伙伴升值，进而抑制出口竞争力。","marks":[{"text":"raises","role":"一般现在时谓语：表普遍规律，every time 引导条件"},{"text":"appreciates","role":"一般现在时谓语：表普遍经济规律"},{"text":"dampens","role":"一般现在时谓语：表链式因果关系的必然结果"}],"tip":"三个一般现在时串联经济规律，陷阱在于 raises 像条件句却无 if——every time 已经充当条件连词。"}},{"id":"past-simple","title":"一般过去时","en":"Past Simple","domain":"verb","tier":3,"summary":"表过去某时完成的动作，与现在无桥；常配 yesterday/ago/过去时间状语。","level":2,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"肯定：主语 + 动词过去式（规则加 -ed；不规则另记）。否定：主语 + did not + 动词原形。疑问：Did + 主语 + 动词原形？be 动词：was（I/he/she/it）/ were（you/we/they）。常见不规则动词：go-went, come-came, write-wrote, take-took, find-found, think-thought, make-made, say-said, know-knew, have-had。考研阅读中遇到不认识的过去式，优先推断词根。"},{"h":"核心用法：与现在完全断开的过去","t":"一般过去时表示在过去某个具体时间完成、且与现在无关联的动作或状态。关键信号词：yesterday, last week/month/year, in 2010, ago, when I was a child, then, at that time。这些词一出现，谓语必须是一般过去，绝不能用现在完成。与「现在完成时」的本质区分：一般过去 = 过去点，孤立事件；现在完成 = 过去动作桥接到现在。"},{"h":"叙述性段落的基础时态","t":"考研阅读中，叙事性语段（传记、历史背景）几乎全用一般过去。读懂时态链至关重要：一系列过去动作按顺序用 did → did → did；某一动作在其他过去动作之前完成则升级为 had done（过去完成）；某动作是另一过去动作发生时的背景则用 was/were doing（过去进行）。"},{"h":"考研完形陷阱","t":"①选项中同时有 did 和 has done 时，看有无「过去时间状语」——有则 did，无则考虑是否与现在有关联（has done）。②历史规律、反复发生的过去事件有时可与一般现在互换，但有 specific 时间词时只能 did。③be 动词过去式 was/were 在虚拟语气中有特殊用法（If I were you...），与陈述语气区分。"}],"examples":[{"en":"Darwin published 'On the Origin of Species' in 1859.","zh":"达尔文于1859年出版了《物种起源》。","note":"in 1859 = 具体过去时间点，必须用 published，不能用 has published。"},{"en":"When she arrived at the station, the train had already departed.","zh":"当她到达车站时，火车已经离开了。","note":"arrived = 过去时（参照点）；had departed = 过去完成（更早发生）。注意层次。"},{"en":"Researchers spent two decades investigating the relationship between diet and cognition.","zh":"研究人员花费二十年时间调查饮食与认知之间的关系。","note":"spent = 叙事过去时，陈述已完结的研究过程；如换成 have spent 则暗示研究仍在继续或结果与现在有关。"}],"hardcase":{"sentence":"The negotiators signed the agreement, flew back to their respective capitals, and immediately briefed their governments on the concessions they had reluctantly made.","zh":"谈判代表签署协议后飞回各自首都，立即就他们不情愿做出的让步向政府汇报。","marks":[{"text":"signed","role":"一般过去时谓语：过去完成动作序列之一"},{"text":"flew","role":"一般过去时谓语：并列动作，时序第二"},{"text":"briefed","role":"一般过去时谓语：时序第三"},{"text":"had reluctantly made","role":"过去完成时：让步的动作先于汇报发生，'过去的过去'"}],"tip":"三个过去时并列呈现动作顺序；had made 插入定语从句却是最早发生的，别被位置迷惑。"}},{"id":"future-simple","title":"一般将来时","en":"Future Simple","domain":"verb","tier":3,"summary":"will/be going to/be to/be about to 表将来；意愿、计划、安排各有侧重。","level":2,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"多种表将来的方式","t":"英语没有独立的'将来时态助动词'，表将来有以下几种：① will + 动词原形——最通用，表预测、意愿、临时决定；② be going to + 动词原形——表有计划的意图，或有迹象预示的事；③ be to + 动词原形——正式语气，表安排、命令、注定（官方计划：The meeting is to begin at 9.）；④ be about to + 动词原形——即将（非常近的将来）；⑤ 一般现在时——时间表类固定安排（The exam starts at 8.）；⑥ 现在进行时——近期已安排好的个人计划（I'm flying to Beijing tomorrow.）。"},{"h":"will vs be going to 的细微差别","t":"will 用于：说话当场做决定（Someone's at the door — I'll get it.）、预测未来（It will rain tomorrow.）、表意愿（I will help you.）。be going to 用于：说话前已有计划或意图（I'm going to apply for the scholarship.）、根据眼前证据预测（Look at those clouds — it's going to rain.）。考研写作建议以 will 为主，be going to 偏口语化。"},{"h":"重要陷阱：时间/条件从句中不用 will","t":"当将来时态出现在时间状语从句或条件状语从句中时，从句用一般现在时代替将来——这就是「主将从现」原则（见「主将从现」星）：When he arrives, I will tell him.（when 从句用 arrives，不用 will arrive）；If it rains, we will cancel the plan.（if 从句用 rains，不用 will rain）。这是考研完形/改错的经典考点。"},{"h":"学术写作中的将来表达","t":"论文摘要少用 will，偏用 will be + 过去分词（被动）或 is expected to / is likely to + 动词原形。考研写作第二篇（图表/议论）预测或展望句常用：It is predicted that...；The trend is likely to continue.；Policy reforms will be needed.。"}],"examples":[{"en":"If the government increases funding, research output will improve significantly.","zh":"如果政府增加资金投入，科研产出将大幅提升。","note":"if 条件从句用一般现在 increases，主句用 will improve——主将从现的典型。"},{"en":"The new policy is to take effect from January 1st.","zh":"新政策将于1月1日起生效。","note":"be to + 动词原形表官方计划/安排，比 will 更正式，多见于新闻与公文。"},{"en":"By 2050, renewable energy is expected to account for over 50% of global power generation.","zh":"到2050年，可再生能源预计将占全球发电量的50%以上。","note":"is expected to = 被动 + 不定式，学术预测句的惯用结构，比直接用 will 更客观。"}],"hardcase":{"sentence":"The committee is to announce its decision next Friday, though insiders predict the ruling will disappoint those who have been lobbying for stricter regulations.","zh":"委员会定于下周五宣布决定，但内部人士预测裁决将令一直游说推动更严格监管的人失望。","marks":[{"text":"is to announce","role":"be to do 表将来：官方安排或计划，语气正式"},{"text":"will disappoint","role":"will 表将来：预测判断"},{"text":"have been lobbying","role":"现在完成进行时：持续至今的游说行为，强调过程"}],"tip":"is to 与 will 同表将来但语义不同：is to 强调日程安排，will 强调预测——不可互换。"}},{"id":"present-continuous","title":"现在进行时","en":"Present Continuous","domain":"verb","tier":3,"summary":"be doing 表此刻正进行；也表近期安排，或 always doing 的情绪色彩。","level":2,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"am/is/are + 动词现在分词(doing)。现在分词的拼写规则：一般加 -ing；以不发音 -e 结尾去 e 再加 -ing（make → making）；以「短元音 + 单辅音」结尾双写辅音（sit → sitting, run → running）。"},{"h":"三大用法","t":"①此刻正在进行的动作：She is writing her thesis right now.——配 now, at the moment, currently, at present。②近期已安排好的计划（有具体安排，不是临时决定）：They are launching a new product next month.——与 will 的区别：will 可以是当场决定，be doing 表已有安排。③带情绪色彩的习惯性行为（often/always/constantly + 进行时 → 表不满、惊讶）：He is always complaining about the workload.——注意这里 always 不表频率，而是情绪渲染，此用法在完形中偶见。"},{"h":"与「状态动词」的冲突","t":"英语有一类动词叫状态动词(stative verbs)，描述的是静态的状态而非动态的动作，通常不能用于进行时。常见状态动词分类：认知类 know, believe, understand, remember, forget, think（'认为'义）；感知类 see, hear, smell, taste, feel（感知义，非动作义）；情感类 love, hate, like, prefer, want, need, wish；所有类 own, have（拥有义），belong, contain, consist of。考研常见错误：×She is knowing the answer.（应用 knows）。见「状态与动作动词」星。"},{"h":"考研阅读中的现在进行时","t":"学术阅读中 be doing 出现时，先判断是真正的现在进行，还是被动语态的构成部分——is being done = 现在进行被动。两者外形相近：is reviewing（主动进行）vs. is being reviewed（被动进行）。"}],"examples":[{"en":"Researchers are currently exploring the link between gut bacteria and mental health.","zh":"研究人员目前正在探索肠道细菌与心理健康之间的联系。","note":"are exploring + currently，表示进行中的研究项目，是学术摘要常见表述。"},{"en":"The company is expanding into three new markets next quarter.","zh":"该公司下季度将进入三个新市场。","note":"is expanding 表已有的具体计划，next quarter 是将来时间，但用现在进行表'已定安排'。"},{"en":"He is always interrupting others during meetings.","zh":"他在会议上总是打断别人的话。","note":"always + 进行时表带不满情绪的习惯，语气比 He always interrupts 更强烈。"}],"hardcase":{"sentence":"Critics are increasingly arguing that the government is undermining judicial independence, while the administration insists it is simply streamlining an overloaded court system.","zh":"批评者越来越多地声称政府正在削弱司法独立，而政府方面坚称只是在精简过载的法院系统。","marks":[{"text":"are increasingly arguing","role":"现在进行时谓语：此刻持续进行的批评行为，increasingly 强调渐进趋势"},{"text":"is undermining","role":"现在进行时谓语：宾语从句中的进行体，描述正在发生的过程"},{"text":"is simply streamlining","role":"现在进行时谓语：表语从句中的进行体，与 undermining 形成论点对立"}],"tip":"三个 be doing 同现，核心是进行时表'此刻持续'——与 argues/undermines 一般时的'客观陈述'语义不同。"}},{"id":"past-continuous","title":"过去进行时","en":"Past Continuous","domain":"verb","tier":2,"summary":"was/were doing 表过去某刻正进行，常作另一动作发生时的背景。","level":3,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式与核心用法","t":"was/were + doing。核心用法：表示过去某个时刻正在进行的动作，常作另一个过去动作发生时的「背景」。经典句型：While S + was/were doing（背景）, S + did（打断的动作）。或反过来：S + did, when S + was/were doing。"},{"h":"与一般过去时的对比","t":"一般过去：The phone rang.（电话响了，是完整动作）；过去进行：She was sleeping when the phone rang.（她正在睡觉，是背景状态，被电话打断）。一般过去强调事件完成；过去进行强调动作进行中的切面。"},{"h":"考研中的应用","t":"考研完形/阅读中，过去进行时常在叙事段落出现，用来设置场景背景。选时态时：若句子说'某动作进行时另一件事发生了'，长动作用 was/were doing，短动作用 did。注意：was/were doing 不能与瞬间动词(instantaneous verb)搭配表反复——was arriving(错), arrived repeatedly(对)；但可以表单一进行：The clock was striking twelve.（钟正在敲12下）。"}],"examples":[{"en":"The economy was recovering when the new crisis hit.","zh":"经济正在复苏时，新的危机爆发了。","note":"was recovering = 背景状态（过去进行）；hit = 打断事件（一般过去）。"},{"en":"While scientists were debating the theory, new evidence emerged.","zh":"当科学家们正在争论这一理论时，新的证据出现了。","note":"While 引导过去进行，主句 emerged 用一般过去——对比清晰。"},{"en":"He was working on the dissertation from midnight to dawn.","zh":"他从午夜到黎明一直在写论文。","note":"was working 强调整段时间内动作的持续性切面，不是说明它开始还是结束。"}],"hardcase":{"sentence":"The scientist was conducting her third experiment when the equipment malfunctioned, destroying the samples she had spent weeks preparing.","zh":"科学家正在进行第三次实验，就在此时仪器发生故障，损毁了她耗费数周准备的样品。","marks":[{"text":"was conducting","role":"过去进行时谓语：作背景动作，故障发生时正在进行"},{"text":"malfunctioned","role":"一般过去时谓语：打断背景动作的突发事件"},{"text":"had spent","role":"过去完成时：准备样品先于故障发生，'过去的过去'"}],"tip":"was conducting 是舞台背景，malfunctioned 是前台事件——过去进行时专门提供这层时间纵深。"}},{"id":"present-perfect","title":"现在完成时","en":"Present Perfect","domain":"verb","tier":4,"summary":"have done：过去的动作对现在留有结果或影响，是与过去时对立的核心考点。","level":3,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"have/has + 过去分词(done)。主语为第三人称单数时用 has，其余用 have。过去分词：规则动词同过去式(worked/studied)；不规则须另记(go-went-gone, write-wrote-written, give-gave-given, take-took-taken, see-saw-seen)。否定：have/has not + done。疑问：Have/Has + 主语 + done?"},{"h":"本质：过去的桥架到现在","t":"现在完成时的核心概念：过去发生的事在现在时刻依然有结果或影响。三个角度理解：①结果(resultant state)：I have lost my keys.（钥匙丢了，现在找不到）——强调现在的状态。②经历(experience)：She has visited Paris three times.（曾有三次经历，是她现在的'简历'）。③近期完成(recent completion)：I have just finished the report.（刚完成，新闻性新鲜感）——配 just, already, yet, recently, lately。"},{"h":"时间标志词","t":"与现在完成时同现的词语：just（刚刚）、already（已经）、yet（yet 在否定/疑问中，= 'so far'）、ever（在疑问句中，= 'at any time'）、never（从不）、before（以前某时）、so far/up to now/up to the present（到目前为止）、recently/lately（最近）、since + 过去时间点（自……以来）、for + 时间段（持续了……）。见到这些词，首选现在完成时。"},{"h":"考研核心考点：现在完成 vs 一般过去","t":"这是考研语法最高频的对立。判断公式：有具体过去时间状语(yesterday/in 2010/ago等) → 用一般过去；无具体时间点、强调对现在的影响或为近期经历 → 用现在完成。见「完成时 vs 过去时」星详解。另：since 引导从句时，从句用一般过去（The problem has worsened since researchers discovered the flaw），主句用现在完成。"},{"h":"学术写作与阅读中的现在完成","t":"学术文本高频使用现在完成：引出研究背景（Researchers have long debated...）；总结研究发现（Studies have shown that...）；描述至今为止的状况（The gap has widened in recent decades.）。翻译题中遇到'已经……'，若强调对现在的影响，译成英语应优先考虑现在完成。"}],"examples":[{"en":"Scholars have debated the causes of the 2008 financial crisis for over a decade.","zh":"学者们对2008年金融危机的成因争论了十多年。","note":"have debated + for over a decade，表持续至今的状态，现在完成时；若改为 debated，则暗示争论已结束。"},{"en":"The government has yet to implement the recommendations of the commission.","zh":"政府迄今尚未落实委员会的建议。","note":"has yet to = 尚未，固定搭配；yet 是现在完成的典型标志词。"},{"en":"Since the reform was introduced in 2015, living standards have improved markedly.","zh":"自2015年改革推行以来，生活水平明显提高了。","note":"since 从句用一般过去（was introduced），主句用现在完成（have improved），是 since 从句的固定搭配。"}],"hardcase":{"sentence":"Researchers have identified a pattern of cognitive bias that has persisted across cultures for centuries, challenging the assumption that rational decision-making is the human default.","zh":"研究人员发现了一种跨文化持续存在了数世纪的认知偏见模式，挑战了理性决策是人类默认状态的假设。","marks":[{"text":"have identified","role":"现在完成时谓语：研究成果对当下有直接意义，与现在存在关联"},{"text":"has persisted","role":"现在完成时谓语：强调从过去持续到现在的状态，since/for 的典型语境"}],"tip":"两个 have/has done 都强调'过去→现在的桥'：identified 意味着结论已出、当下有效；persisted 强调跨越时间的延续。"}},{"id":"past-perfect","title":"过去完成时","en":"Past Perfect","domain":"verb","tier":3,"summary":"had done '过去的过去'：在过去某参照点之前已完成。","level":3,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"had + 过去分词(done)，主语无论单复数一律用 had。这是过去完成时（past perfect tense）的固定形式。否定：had not(hadn't) + done。疑问：Had + 主语 + done?"},{"h":"核心概念：过去的过去","t":"过去完成时描述「在过去某个参照点之前」已经完成的动作或状态，相当于中文'早已……''已经……了'。它必须有一个明确的过去参照点——另一个一般过去时的事件，或 by the time/when/before/after 引导的时间状语。没有参照点时，不要随意使用 had done，用一般过去即可。"},{"h":"与一般过去时的区分","t":"When he arrived, she left.（先后顺序不明确，或顺序相同 = 他一到她就离开）vs. When he arrived, she had already left.（她离开在先，他到达在后，层次分明）。had done 只在需要明确表达「更早发生」时才必要；若 before/after 已把顺序说清，口语中有时省略 had，但正式书面语保留。"},{"h":"考研阅读与翻译中的识别","t":"长难句中出现 had done，立刻意识到：这里有时间层次，这件事发生在文中其他过去事件之前。翻译时加'已经/早已/……之前'来体现层次。完形选词时，如果时间背景已是过去（did），且空格处动作更早，填 had done。典型搭配：by the time(到…时为止)、before、after、since(+具体过去起点)、no sooner...than(一…就…)、hardly...when。"}],"examples":[{"en":"By the time the ambulance arrived, the patient had lost consciousness.","zh":"救护车到达时，患者已经失去了意识。","note":"had lost = 发生在 arrived 之前；by the time 是过去完成时的典型触发语境。"},{"en":"The researchers found that previous studies had overlooked a critical variable.","zh":"研究人员发现，先前的研究忽略了一个关键变量。","note":"found = 过去（参照点）；had overlooked = 更早发生的疏漏；是学术文本的常见叙事结构。"},{"en":"She had never encountered such a methodological flaw before she read the critique.","zh":"在读到那篇评论文章之前，她从未遇到过这样的方法论缺陷。","note":"had never encountered 强调在 read（参照点）之前的经历为零。"}],"hardcase":{"sentence":"By the time investigators arrived at the scene, whoever had planted the device had already fled, and the evidence that might have pointed to a motive had been disturbed.","zh":"等调查人员赶到现场，安置装置的人早已逃跑，本可指向动机的证据已遭破坏。","marks":[{"text":"had planted","role":"过去完成时：相对于 arrived（过去参照点）更早发生的动作"},{"text":"had already fled","role":"过去完成时：already 强调在参照点之前已完成"},{"text":"had been disturbed","role":"过去完成时被动语态：证据被破坏先于调查人员到达"}],"tip":"三个 had done 全以 arrived 为参照点，向前追溯不同深度的'过去的过去'。"}},{"id":"future-perfect","title":"将来完成时","en":"Future Perfect","domain":"verb","tier":1,"summary":"will have done：到将来某时为止将已完成，常配 by + 将来时间。","level":4,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式与用法","t":"will have + 过去分词(done)。表示「到将来某个时间为止，动作将已经完成」。固定搭配：by + 将来时间点（by next year, by 2030, by the time + 现在时从句）。例：By the end of this year, we will have published three papers."},{"h":"考研出现频率与注意点","t":"考研英语一中，将来完成时(future perfect)是18种时态中出现频率最低的一种（tier 1），在正式写作和高端阅读中偶见。识别要点：will have + 过去分词 + by + 将来时间。翻译时译为'到……时将已……'。若考完形出现选项含 will have done，确认句中有 by + 将来时间的呼应。"},{"h":"与现在完成时的对比","t":"现在完成时(have done)：到「现在」为止已完成。将来完成时(will have done)：到「将来某时」为止将已完成。例：I have read 100 books.（截止现在）→ By December, I will have read 200 books.（截止将来的12月）。结构平行，只把参照点从'现在'移到'将来某时'。"}],"examples":[{"en":"By the time the new bridge opens, engineers will have worked on it for five years.","zh":"到新桥开通时，工程师们将已为此工作了整整五年。","note":"by the time + 现在时 opens 引导时间状语；主句 will have worked 表到那时将已完成的时长。"},{"en":"Researchers estimate that by 2030, global average temperatures will have risen by 1.5°C.","zh":"研究人员估计，到2030年全球平均气温将已上升1.5摄氏度。","note":"by 2030 是将来时间节点，will have risen 表届时将已发生的累积变化。"},{"en":"She will have completed her PhD by the time she turns 28.","zh":"到她28岁时，她将已完成博士学位。","note":"by the time 从句用一般现在 turns，主句 will have completed 是将来完成时的标准搭配。"}],"hardcase":{"sentence":"By the time this infrastructure project is completed, the original contractors will have handed over responsibility to no fewer than four different management teams.","zh":"等该基础设施项目竣工时，最初的承包商将已把责任移交给不少于四个不同的管理团队。","marks":[{"text":"is completed","role":"一般现在时代将来（从句主将从现）：by the time 引导的时间从句"},{"text":"will have handed over","role":"将来完成时谓语：到将来某时点（竣工）为止将已完成的动作"}],"tip":"will have done 必须和一个将来时间点搭配；by the time 从句用现在时代将来，两条规则同时考查。"}},{"id":"perfect-continuous","title":"完成进行时","en":"Perfect Continuous","domain":"verb","tier":2,"summary":"have been doing：完成的延续性——动作持续到现在并可能继续。","level":4,"prereq":["tense-aspect"],"parent":"tense-aspect","detail":[{"h":"构成公式","t":"现在完成进行时：have/has been + doing。过去完成进行时：had been + doing。（将来完成进行时 will have been doing 极罕见，考研可忽略。）否定：have/has not been doing；had not been doing。"},{"h":"核心语义：持续性 + 完成性","t":"完成进行时(perfect continuous)是完成体与进行体的叠加：它既强调动作「已经进行了一段时间」（完成性），又暗示动作「可能继续」（进行性的未结束感）。经典情境：I have been waiting for two hours.（我已等了两小时，现在还在等/刚停下但明显是持续状态的结果。）对比现在完成：I have waited for two hours.（我等了两小时——已完结，结果导向）。两者都可，但 been doing 更强调过程的持续与当下的状态。"},{"h":"考研识别与翻译","t":"阅读中见到 have/has been doing，翻译核心是'一直在……'或'持续……'。常配合 for + 时间段或 since + 时间点出现：The company has been losing market share since 2020.（自2020年以来公司持续丢失市场份额——至今仍在进行中）。注意：状态动词(stative verbs)不能用完成进行时：× I have been knowing him for years.（应改为 I have known him for years.）"}],"examples":[{"en":"Scientists have been studying the effects of climate change for decades.","zh":"科学家们几十年来一直在研究气候变化的影响。","note":"have been studying = 完成进行，强调持续研究至今仍未停止，比 have studied 更突出过程的延续性。"},{"en":"She looked exhausted because she had been grading papers all night.","zh":"她看起来精疲力竭，因为她整夜都在批改试卷。","note":"had been grading = 过去完成进行，解释过去某状态（looked exhausted）的持续原因。"},{"en":"The negotiations have been stalling for months, with no breakthrough in sight.","zh":"谈判数月来一直陷入僵局，看不到任何突破迹象。","note":"have been stalling = 持续进行至今的消极状态，新闻与学术文本常见。"}],"hardcase":{"sentence":"The advocacy group has been pressing the legislature to amend the statute for three years, and the fatigue is beginning to show in the dwindling attendance at its rallies.","zh":"该倡导团体已就修订法规向立法机构施压三年，疲态开始从其集会出席人数的减少中显现。","marks":[{"text":"has been pressing","role":"现在完成进行时谓语：持续三年且仍在进行的施压行动，强调过程的持续性"},{"text":"is beginning","role":"现在进行时谓语：与完成进行时对照——过去三年的持续带来现在的新变化"}],"tip":"has been pressing 强调'一直在做'的持续感，is beginning 则捕捉此刻新出现的结果——体的区别清晰对照。"}},{"id":"perfect-vs-past","title":"完成时 vs 过去时","en":"Perfect vs Past","domain":"verb","tier":4,"summary":"看动作是否与现在有桥：有结果/无时间状语用完成，纯过去点用过去时。","level":3,"prereq":["present-perfect"],"parent":"present-perfect","detail":[{"h":"核心问题：动作与现在有没有'桥'？","t":"这是考研语法最容易失分的对立点。判断标准只有一个：这个过去动作对现在还有没有影响或关联？有 → 现在完成时；纯粹描述过去、与现在无关 → 一般过去时。形象比喻：一般过去是时间轴上一个孤立的点，和现在之间没有线；现在完成是从过去这个点拉一条线到'现在'。"},{"h":"五条判断规则","t":"规则1——有具体过去时间状语 → 只能用一般过去：yesterday / last year / in 1990 / three days ago / when I was a child / at that time。规则2——有 just/already/yet/ever/never/recently/lately/so far/by now → 优选现在完成。规则3——since 引出时间起点 → 主句现在完成、since 从句一般过去。规则4——for 表持续时段 + 动作至今仍持续 → 现在完成（或完成进行）；若动作已结束 → 可用一般过去。规则5——提问 Did you ever...?（某次具体经历）vs. Have you ever...?（有没有这个经历，与现在挂钩）——后者常见于考研阅读标题或引言。"},{"h":"经典对比例","t":"He went to Paris.（他去了巴黎——某次已完结的事实，可能还没回来或已回来，不关心现在）vs. He has been to Paris.（他去过巴黎——他有这个'经历'，对他现在的状态有意义：他知道巴黎）。I ate breakfast.（我吃了早饭——某过去时刻）vs. I have eaten breakfast.（我已经吃了早饭——现在不饿了，这是当前状态的原因）。"},{"h":"考研完形陷阱归纳","t":"①选项中有 did 和 have/has done 时，先找时间状语，再问'与现在有无关联'。②新闻报道开头常用现在完成（A new study has found...），后续细节转为一般过去（The researchers conducted... They found...）。③'最高级/序数词 + that ever/so far + 现在完成'固定搭配：This is the most significant advance that researchers have ever made in this field.。④不可用现在完成的场合：死者的行为（Shakespeare wrote...，不能 has written）；客观历史事件（The war ended in 1945.）。"}],"examples":[{"en":"I lost my phone. (vs.) I have lost my phone.","zh":"我把手机弄丢了。（陈述过去事实）vs. 我的手机不见了。（现在找不到，影响当下）","note":"同样的动作，I lost 是孤立事件；I have lost 重点是'现在没有手机'这个状态——翻译时汉语不同。"},{"en":"Newton discovered gravity in the 17th century.","zh":"牛顿在17世纪发现了万有引力。","note":"in the 17th century = 具体历史时期，只能用一般过去；× Newton has discovered（牛顿已死，不能用现在完成）。"},{"en":"Recent studies have revealed that urban noise levels have risen dramatically since 2000.","zh":"近期研究揭示，自2000年以来城市噪音水平已大幅上升。","note":"两个现在完成：have revealed（研究结果与现在相关）；have risen since 2000（持续趋势至今）。"}],"hardcase":{"sentence":"She lived in Tokyo for a decade before returning to London, and the experience fundamentally shaped her outlook; she has never since regarded any single culture as uniquely rational.","zh":"她在东京生活了十年后回到伦敦，这段经历从根本上塑造了她的世界观；此后她从未将任何单一文化视为唯一理性的。","marks":[{"text":"lived","role":"一般过去时：在东京居住已是完结的过去，有具体时间段（a decade）且与现在无直接桥"},{"text":"shaped","role":"一般过去时：塑造世界观也是过去已完成的动作"},{"text":"has never since regarded","role":"现在完成时：since 表示从过去某点延续到现在的态度，与现在存在关联"}],"tip":"lived/shaped 用过去时因动作已终结；has regarded 用完成时因 since 把过去行为与当下态度相连——一句话道尽两者分野。"}},{"id":"voice","title":"语态","en":"Voice","domain":"verb","tier":5,"summary":"主动(施事作主语)与被动(受事作主语)；视角与信息焦点的选择。","level":3,"prereq":["verb-system"],"parent":"verb-system","detail":[{"h":"语态的本质：谁是句子主语？","t":"语态(voice)是英语动词的第三维度，决定句子从哪个角度看待同一动作：主动语态(active voice)——施事者(agent，动作发出方)作主语，焦点在'谁做'；被动语态(passive voice)——受事者(patient，动作承受方)作主语，焦点在'被做'。同一事件可以用两种视角表达，选哪种取决于'你想把什么信息放在主语位置（也就是话题位置）'。"},{"h":"两种语态的对比","t":"主动：The committee approved the proposal.（委员会批准了提案——委员会是焦点）；被动：The proposal was approved by the committee.（提案被批准了——提案是焦点，by the committee 可以省略）。主动语态更简洁有力，是日常和叙事的基础。被动语态灵活，让说话者可以省略施事者、突出受事者，是学术写作的标配。"},{"h":"语态与及物性的联系","t":"被动语态有一个前提：只有及物动词(transitive verb)才有被动语态，因为不及物动词没有宾语，没有受事者，无从变被动。不及物动词如 arrive, happen, occur, sleep, die 不能构成被动（× He was arrived. ✓ He arrived.）。见「及物与不及物」星。"},{"h":"语态与篇章衔接","t":"在段落层面，语态选择影响衔接(cohesion)：英语有'主题链'原则，段落中同一个话题应尽量保持为主语，减少视角跳换。如果上文已以某实体为主语，下句延续该实体时改用被动可以保持主语不变，形成更自然的话题流。见「衔接与连贯」星与「被动的取舍」星。"},{"h":"各时态被动的形式","t":"被动的通用公式是 be（各时态变位）+ 过去分词。一般现在被动：is/are done；一般过去被动：was/were done；现在完成被动：have/has been done；过去完成被动：had been done；现在进行被动：is/are being done；情态被动：can/should/must + be done。见「被动语态」星。"}],"examples":[{"en":"The findings were published in a peer-reviewed journal.","zh":"这些发现发表在了一本经同行评审的期刊上。","note":"被动语态突出 findings（研究结果）而非施事者（研究人员），符合学术焦点。"},{"en":"Active: The storm destroyed the crops. → Passive: The crops were destroyed by the storm.","zh":"主动：暴风雨摧毁了庄稼。→ 被动：庄稼被暴风雨摧毁了。","note":"两种视角表达同一事件；若想接着谈庄稼的后果，被动让 crops 保持话题地位，衔接更自然。"},{"en":"The results can be interpreted in several ways.","zh":"这些结果可以用几种方式来解读。","note":"情态 + 被动(can be done)：施事者（读者/学界）不重要，受事者（结果）才是焦点。"}],"hardcase":{"sentence":"The commission recommends that all submissions be reviewed anonymously so that evaluators cannot identify the authors and unconscious bias does not distort the outcome.","zh":"委员会建议所有提交材料匿名审阅，以使评审人员无法识别作者身份，无意识偏见也不会扭曲结果。","marks":[{"text":"recommends","role":"主动语态谓语：委员会是施事，主动发出建议"},{"text":"be reviewed","role":"被动语态（虚拟语气原形）：材料是受事，施事（评审人员）被刻意略去以凸显匿名目的"},{"text":"cannot identify","role":"主动语态：评审人员是施事，与被动形成视角对比"},{"text":"does not distort","role":"主动语态：偏见作拟人化施事"}],"tip":"be reviewed 用被动是因为施事不重要——匿名制的精髓正是抹去施事；与后两个主动句对比，视角切换一目了然。"}},{"id":"passive-voice","title":"被动语态","en":"Passive Voice","domain":"verb","tier":5,"summary":"be + 过去分词；各时态、情态、非谓语皆有被动形，学术写作的常态。","level":3,"prereq":["voice"],"parent":"voice","detail":[{"h":"被动语态的构成公式","t":"被动语态(passive voice)的核心公式：be + 过去分词(past participle)，be 随时态变位，过去分词不变。各时态被动形式：① 一般现在被动：am/is/are + done（The data is collected daily.）② 一般过去被动：was/were + done（The paper was rejected.）③ 现在完成被动：have/has been + done（The policy has been revised.）④ 过去完成被动：had been + done（The plan had been approved.）⑤ 现在进行被动：am/is/are being + done（The bill is being debated.）⑥ 一般将来被动：will be + done（The results will be published.）⑦ 情态动词被动：modal + be + done（Problems must be addressed.）"},{"h":"过去分词是被动的核心零件","t":"被动语态靠过去分词(past participle)实现，因此过去分词的准确拼写是基础。过去分词同时也是现在完成时(have done)和完成进行时(have been doing)的组成部分——三种结构都用到它：① have + done = 完成时；② be + done = 被动；③ have + been + done = 完成被动。区分关键：完成时强调时间维度；被动强调语态维度；两者叠加就是完成被动。见「过去分词」星（化身星系）。"},{"h":"施事者 by 短语","t":"被动句中，若要说明施事者（谁做了这件事），用 by + 施事者置于句尾：The novel was written by a Chinese author.。但施事者若已知、不重要或不可知，通常省略 by 短语——这也是被动最常见的用法：The deadline was extended.（是谁延期了不重要或已知）。绝不能因为没有 by 短语就认为被动句'不完整'。"},{"h":"非谓语动词的被动形式","t":"被动不仅出现在谓语位置，非谓语动词同样有被动形式：① 不定式被动：to be done（This needs to be done immediately.）② 动名词被动：being done（She resents being criticized.）③ 完成被动不定式：to have been done（The project is thought to have been completed.）④ 过去分词本身既是被动标志（done 形式，见「化身星系」的分词用法）。见「非谓语的时态语态」星。"},{"h":"考研写作：被动是学术英语的标配","t":"考研英语一第一篇（翻译）和第二篇（写作）中，被动语态的正确使用是拉开分数的关键。学术写作偏爱被动的原因：①使文风客观、避免一人称（Instead of 'We found', use 'It was found'）；②将重要信息置于句子末尾（信息焦点原则）；③承接上文话题（衔接功能）。注意：过度使用被动也会降低可读性，有具体施事者且重要时应用主动。"}],"examples":[{"en":"The theory of relativity was first proposed by Albert Einstein in 1905.","zh":"相对论于1905年由阿尔伯特·爱因斯坦首次提出。","note":"was proposed = 一般过去被动；by Einstein 是施事者，因为这里施事者重要。"},{"en":"It has long been argued that economic growth alone cannot eliminate poverty.","zh":"长期以来，人们一直认为仅靠经济增长无法消除贫困。","note":"has been argued = 现在完成被动；施事者省略（'论者'泛指学界）；It 作形式主语是学术标准句式。"},{"en":"Significant changes are being made to the curriculum in response to industry demands.","zh":"正在对课程进行重大改革，以回应行业需求。","note":"are being made = 现在进行被动（be + being + done）；施事者省略，焦点是'课程改革'这件事本身。"}],"hardcase":{"sentence":"The manuscript had been rejected by two publishers before it was accepted by a small press, and within a year it was being cited by scholars across three disciplines.","zh":"手稿被两家出版商拒绝后才被一家小出版社接受，不到一年便被三个学科的学者广泛引用。","marks":[{"text":"had been rejected","role":"过去完成时被动语态：be + done；rejected 先于 accepted 发生"},{"text":"by two publishers","role":"by 短语引出被动施事"},{"text":"was accepted","role":"一般过去时被动语态：be + done"},{"text":"by a small press","role":"by 短语引出被动施事"},{"text":"was being cited","role":"过去进行时被动语态：was being + done；三态叠加最复杂形式"}],"tip":"三种时态的被动形式同现：had been done / was done / was being done——be 的形式变，done 不变。"}},{"id":"passive-usage","title":"被动的取舍","en":"Using the Passive","domain":"verb","tier":3,"summary":"施事未知、不重要或想突出受事时用被动；科技/学术英语尤偏爱。","level":3,"prereq":["passive-voice"],"parent":"passive-voice","detail":[{"h":"选择被动的三大场景","t":"①施事者未知或明显（不值得说）：The suspect was arrested last night.（谁抓的——警方，不说也知道）；Windows were broken.（谁打碎的——不知道）。②施事者不重要，受事者才是焦点：Three new hospitals were built in the region.（重点是医院建了，不是谁建的）。③客观性或正式性需要，主动'我们'不适合：It is recommended that...（推荐的语气比 We recommend 更客观）。"},{"h":"被动调整信息焦点","t":"英语句子有'尾焦点(end-focus)'倾向：新信息、重要信息倾向于放在句尾。被动语态可以把要强调的受事者放到主语位置，让施事者（如需要）作为 by 短语置于句尾，也是信息结构的有力工具。例：A groundbreaking paper was published by a team of Chinese researchers.（'中国研究团队'被强调了，放在了句末）。"},{"h":"考研翻译中的被动处理","t":"中文没有严格的语态对应，汉译英时要主动判断用主动还是被动：凡是汉语'被……''受到……''得到……''是……的''被认为是''需要……'等表达，优先考虑英语被动。英译汉时，英语被动有时可以翻译成汉语主动（The problem was solved. → 问题解决了），有时需保留被字句（He was badly criticized. → 他受到了严厉批评），根据语境判断。"},{"h":"被动的禁区","t":"以下情况不能用被动：①不及物动词：arrive, happen, occur, emerge, disappear, consist of——没有宾语无法被动；②表'存在''状态'的动词短语：have/own, resemble, belong to, lack；③固定主动搭配：it seems that..., it happens that...。注意：have 表'拥有'不能被动（× The book is had by her），但 have 表'使役'（have sb do sth / have sth done）是主动结构或使役被动，另有机制。"}],"examples":[{"en":"Plastic waste is generated at an alarming rate, and much of it ends up in the ocean.","zh":"塑料废弃物以惊人的速度产生，其中大量最终流入海洋。","note":"is generated 用被动，施事者（人类/工业）泛指不重要；ends up 用主动，因为主语 much of it 本身发起这个动作。"},{"en":"It is widely believed that social media has transformed the way people communicate.","zh":"人们普遍认为，社交媒体已经改变了人们的沟通方式。","note":"It is believed = 正式被动 + 形式主语，施事者（'人们'）不重要；这是考研写作的标准学术表达。"},{"en":"The breakthrough was achieved not by luck but through years of systematic research.","zh":"这一突破并非靠运气，而是通过多年系统研究实现的。","note":"was achieved 被动突出 breakthrough 为话题；not...but 是平行对比结构；by luck 和 through...research 都是状语，非施事者。"}],"hardcase":{"sentence":"In academic publishing, results are typically reported without reference to who collected them, and methodology is scrutinised far more rigorously than the identity of the research team.","zh":"在学术出版领域，结果通常在不提及数据收集者的情况下呈现，研究方法受到的审视远比研究团队身份更严格。","marks":[{"text":"are typically reported","role":"被动语态：施事（研究者）被省略，突出学术写作去人称化惯例"},{"text":"is scrutinised","role":"被动语态：施事（同行评审人）不重要，受事（methodology）是信息焦点"},{"text":"without reference to who collected them","role":"介词短语说明省略施事的方式，呼应被动选择的动机"}],"tip":"两个被动都省略了 by 短语——这正是学术英语选被动的核心动机：施事未知或不重要，受事是焦点。"}},{"id":"tense-harmony","title":"时态呼应","en":"Sequence of Tenses","domain":"verb","tier":4,"summary":"主句过去时，宾语从句相应用过去范畴时态（真理例外仍用现在）。","level":4,"prereq":["object-clause"],"parent":"object-clause","detail":[{"h":"什么是时态呼应？","t":"时态呼应(sequence of tenses)，又称时态一致，是指：当主句谓语动词是过去时时，其后的宾语从句（及其他从句）的谓语时态必须相应'退一步'，转变为过去时范畴。这一规则源于英语把叙述视角锁定在'过去'，从句描述的时间自然也相对于这个过去的视角来表达。"},{"h":"时态呼应的规则表","t":"主句为过去时时，从句的时态按以下方式调整：①直接引语的'现在时' → 间接引语中改为'过去时'（She said, 'I am tired.' → She said she was tired.）；②直接引语的'过去时' → 间接引语中改为'过去完成时'（He said, 'I finished it.' → He said he had finished it.）；③直接引语的'将来时(will)' → 间接引语中改为'would'（She promised, 'I will come.' → She promised she would come.）；④直接引语的'现在完成时' → 间接引语中改为'过去完成时'（He said, 'I have read it.' → He said he had read it.）。"},{"h":"时态呼应的重要例外：客观真理不变","t":"当从句表达的是客观真理(universal truth)、科学事实、自然规律，即使主句是过去时，从句仍用一般现在时。例：The teacher told us that the Earth revolves around the Sun.（不能改为 revolved，因为这是永远正确的科学事实）。这是考研最常考的例外，务必记住。与此类似：谚语、数学定理、地理事实。"},{"h":"考研完形与改错中的应用","t":"完形填空中，遇到宾语从句选时态的空格，第一步：看主句时态。若主句是过去时(said/found/reported/showed)，从句选项中：①过去时 = 同时发生；②过去完成时 = 主句'看到/知道'时，该动作更早已发生；③would + 动词原形 = 表将来（相对于主句的过去时）。注意：reported/showed 这类字眼是'过去时'信号，引发时态呼应。"},{"h":"时态呼应与直接引语/间接引语","t":"引语有两种形式：直接引语(direct speech)用引号原话引用，时态不变；间接引语(indirect/reported speech)把直接引语变为从句，须经时态呼应调整。考研翻译题中，把汉语'他说……'转成英语时，注意判断是直接引语（用引号和 says）还是间接引语（that 引导从句 + 时态呼应）。"}],"examples":[{"en":"The study concluded that higher education reduces income inequality.","zh":"该研究得出结论，高等教育能够降低收入不平等。","note":"concluded = 过去时，但 reduces 仍用一般现在——因为这是普遍规律/研究结论的陈述，非特定时刻的状态。（学术写作中研究结论常用一般现在即使引导动词是过去时，这是可接受用法。）"},{"en":"She reported that the committee had approved the budget the previous month.","zh":"她报告说委员会上个月已经批准了预算。","note":"reported = 过去时（主句）；had approved = 过去完成（比 reported 更早发生）——时态呼应中的'过去的过去'。"},{"en":"Scientists discovered that light travels at approximately 300,000 km per second.","zh":"科学家发现，光的传播速度约为每秒30万公里。","note":"discovered = 过去时（主句），但 travels 用一般现在——光速是客观科学事实，是时态呼应中'客观真理例外'的典型。"}],"hardcase":{"sentence":"The professor noted that the ancient Romans knew the Earth was spherical, but that this knowledge had been largely forgotten in certain regions during the early medieval period.","zh":"教授指出，古罗马人知道地球是球形的，但这一知识在中世纪早期某些地区已被大体遗忘。","marks":[{"text":"noted","role":"一般过去时：主句谓语，触发时态呼应"},{"text":"knew","role":"一般过去时：时态呼应——主句为过去，从句用过去时"},{"text":"was spherical","role":"一般过去时（而非现在时）：时态呼应下的从属从句；此处为历史事实，技术上可用现在时，但呼应规则使过去时更常见"},{"text":"had been largely forgotten","role":"过去完成时：相对于 noted 更早发生，时态呼应中的'过去的过去'"}],"tip":"was spherical 是时态呼应的经典陷阱：地球是球形是永恒真理，但在叙述语境下随主句过去时退一步——两套规则的优先级要辨清。"}},{"id":"auxiliary","title":"助动词","en":"Auxiliaries","domain":"verb","tier":2,"summary":"be/do/have 助构时态、语态、疑问、否定、强调，自身无实义。","level":2,"prereq":["verb-system"],"parent":"verb-system","detail":[{"h":"助动词的分类","t":"助动词(auxiliary verb)自身无实义，只辅助主动词构成特定的语法形式。分三类：①基本助动词(primary auxiliaries)：be、do、have——分别构造进行体/被动、疑问/否定/强调、完成体。②情态助动词(modal auxiliaries)：can/could、may/might、must、shall/should、will/would、need、dare、ought to——表可能、义务、意愿等语气，详见「情态」与「虚实星系」。③半助动词/准情态动词(semi-modals)：be going to、be about to、have to、used to、be able to——功能近于情态助动词。"},{"h":"be 的功能","t":"① be + doing = 进行体（各时态进行）；② be + done（过去分词）= 被动语态；③ be 本身作系动词(linking verb)表状态（She is a doctor.）。注意区分：is writing（进行主动）vs. is written（被动）——从句后的词形决定是进行还是被动。"},{"h":"have 的功能","t":"① have + done = 完成体（have/has/had been done 含被动）；② have 作实义动词表'拥有/经历'。注意：have 作助动词与 have 作实义动词有时外形相同——I have eaten.（助动词 + 完成体）vs. I have a book.（实义动词），靠后面是否跟过去分词区分。"},{"h":"do 的三功能","t":"① 构造一般现在/过去的疑问句与否定句（Does she know? / He didn't go.）；② 强调谓语（She does care about it. / I did finish it.）——见「do 强调谓语」星；③ 代动词(pro-verb)，替代上文出现的动词短语，避免重复（She sings better than he does.）——does 代替 sings。"}],"examples":[{"en":"Do take care of yourself — the research confirms it really does matter.","zh":"一定要好好照顾自己——研究证实，这真的确实很重要。","note":"Do take = do 强调祈使；does matter = does 强调陈述谓语，表'确实、的确'。"},{"en":"She has been waiting longer than he has.","zh":"她等的时间比他更长。","note":"后半句 than he has = 代替 has been waiting；has 是助动词起代动词作用，避免重复。"},{"en":"The document is being reviewed and will be published next week.","zh":"文件正在审阅中，将于下周发布。","note":"is being reviewed = be(进行) + be(被动)叠加的现在进行被动；will be published = 情态 + 被动将来。两个助动词结构对比。"}],"hardcase":{"sentence":"Did the early adoption of digital records actually improve accuracy, or did it merely shift the location of errors from paper files to databases that few administrators knew how to audit?","zh":"电子档案的早期采用真的提高了准确性，还是仅仅把错误从纸质档案转移到了少数管理人员知道如何审计的数据库？","marks":[{"text":"Did","role":"助动词 do 的过去式：构成一般过去时的疑问形式，无实义"},{"text":"did it merely shift","role":"助动词 did：并列疑问句中复现，构成对等结构，强调选择关系"},{"text":"knew","role":"一般过去时谓语（无助动词）：肯定陈述句，对比凸显 did 的助动词功能"}],"tip":"疑问句中 did 出现两次，去掉它剩 the adoption improve / it merely shift——看清助动词是构成时态和语气的'脚手架'，自身零实义。"}},{"id":"stative-dynamic","title":"状态与动作动词","en":"Stative vs Dynamic","domain":"verb","tier":2,"summary":"know/believe/own 等状态动词通常不用进行时——它们本就静止。","level":3,"prereq":["present-continuous"],"parent":"present-continuous","detail":[{"h":"两类动词的本质区别","t":"英语动词按语义可分为动态动词(dynamic verbs)和状态动词(stative verbs)。动态动词描述可以有意发生、有起点和终点的动作（write, eat, run, speak, build）——可以用进行时（She is writing.）。状态动词描述的是一种持续存在的静态状态，不是意志行为（know, believe, love, own, contain）——通常不用进行时（× She is knowing the answer.）。"},{"h":"状态动词的四大类","t":"①认知/心理状态：know, believe, understand, think（认为义）, remember, forget, doubt, realize, recognize, mean, assume, expect（预期义）。②情感态度：love, like, hate, prefer, want, need, wish, fear, mind, appreciate。③感知（被动感知，非主动行为）：see（看到），hear（听到），smell，taste，feel（感觉到），notice。④所有/关系：own, have（拥有）, belong to, consist of, contain, include, lack, resemble, seem, appear, equal。"},{"h":"动静两用动词：意义区分","t":"部分动词既可作状态又可作动态，意义不同：think——I think (that) = 我认为（状态，不用进行）；I am thinking about = 我正在思考（动态，可用进行）。see——I see = 我明白/我看到（状态）；I am seeing a doctor = 我正在看医生（主动的动态行为）。have——I have a car = 我有一辆车（状态）；I am having lunch = 我正在吃午饭（动态）；They are having a meeting（动态）。feel——It feels soft（状态）；I'm feeling tired today（动态，表当下的身体感觉，允许进行）。"},{"h":"考研考点","t":"完形/改错中，最常考的错误是把状态动词用于进行时：× She is believing in him.（应为 She believes in him.）；× I was knowing the answer.（应为 I knew the answer.）。反过来，完成进行时中也不用状态动词：× I have been knowing him for years.（应为 I have known him for years.）。注意：状态动词本身可以用于完成时（have + done），只是不能用进行体。"}],"examples":[{"en":"The solution contains a high concentration of sodium chloride.","zh":"该溶液含有高浓度氯化钠。","note":"contains = 状态动词，描述成分构成，不能用 is containing；学术描述中常见。"},{"en":"I'm thinking about changing my research topic, but I still believe the original approach has merit.","zh":"我正在考虑更换研究课题，但我仍然认为最初的方法是有价值的。","note":"am thinking（动态，主动思考过程，可进行）vs. believe（状态，观点信念，不可进行）——同句对比。"},{"en":"She is seeing a specialist about her condition.","zh":"她正在看专科医生了解自己的病情。","note":"is seeing（动态用法，= 主动去诊疗）；若是 sees，则是'认识/看见'（状态）或习惯性动作——语义因体的选择而变。"}],"hardcase":{"sentence":"The investor believes the market is overvalued, but she is considering whether to increase her position because the quarterly data suggest a temporary dip is occurring.","zh":"该投资者认为市场估值过高，但她正在考虑是否增加仓位，因为季度数据显示正在出现短暂回调。","marks":[{"text":"believes","role":"状态动词，一般现在时：believe 为认知状态动词，不用进行时"},{"text":"is considering","role":"动作动词，现在进行时：consider 此处为动态'权衡'过程，可用进行时"},{"text":"suggest","role":"状态动词，一般现在时：suggest 在此作'表明'义为状态，不用进行时"},{"text":"is occurring","role":"动作动词，现在进行时：occur 为动态事件，可用进行时"}],"tip":"一句话同时出现两对状态/动作动词：believes/suggest 不能用进行时，is considering/is occurring 则可以——判断依据是动词语义而非时间点。"}},{"id":"modality","title":"情态","en":"Modality","domain":"mood","tier":5,"summary":"说话人对命题的态度：可能性、必要性、允许、意愿——给陈述加上'颜色'。","level":3,"prereq":["verb-system"],"parent":"verb-system","detail":[{"h":"什么是情态(modality)","t":"情态是说话人对命题所持态度的语法表达。你说 He leaves at six，这是纯事实陈述；你说 He must leave at six，这是在这句话上叠加了你对「必要性」的判断。情态不改变事件本身，只改变说话人对事件的「立场色彩」：可能吗？必须吗？允许吗？愿意吗？英语将这种立场主要通过情态动词(modal verbs)实现，汉语则靠「也许、必须、可以、愿意」等副词或动词，两者机制不同，学英语时需专门建立情态动词的直觉。"},{"h":"情态的两大维度","t":"语言学将情态分为两轴：① 认知情态(epistemic modality)——说话人对命题真假的判断，如「他可能在家」「他一定知道」；② 道义情态(deontic modality)——义务、许可、禁止，如「你必须去」「你可以走」。同一个情态动词可跨两轴：He must be tired 是认知推断；You must stop 是道义命令。阅读时须结合语境判断。情态还有高低之别：must > should > may/might，代表从强制到微弱的梯度。"},{"h":"情态与虚拟语气的关系","t":"情态(modality)是大范畴，虚拟语气(subjunctive mood)是其中最极端的一极——完全偏离事实、进入「平行世界」。情态动词的过去式(would/could/might/should)是构造虚拟语气主句的核心零件，这是两者的枢纽联结。掌握情态动词，是理解虚拟语气的必经之路。"},{"h":"考研考点","t":"阅读完形中情态动词常成为理解题眼：作者用 may 表谨慎推测、用 must 表强断言，语气不同，文章立场不同。写作中学会用情态动词表达「建议/推测/假设」，比直白陈述更显学术素养。考研翻译也常考 can/could/may/might 在上下文中的准确义项——需区分认知与道义两轴。"}],"examples":[{"en":"The situation may be more complex than it appears.","zh":"局势可能比表面上更复杂。","note":"may 是认知情态，表说话人对命题真假持保留判断，非道义许可。"},{"en":"You must submit the form before Friday.","zh":"你必须在周五前提交表格。","note":"must 是道义情态，表义务要求，不是推断。"}],"hardcase":{"sentence":"The findings may well challenge long-held assumptions about cognitive development, though they cannot definitively prove that early intervention would have altered the outcome.","zh":"这些发现很可能颠覆长期以来关于认知发展的假设，尽管它们无法最终证明早期干预会改变结果。","marks":[{"text":"may well","role":"情态动词短语，表'很可能'，语气强于 may 单独使用"},{"text":"cannot definitively prove","role":"cannot 表不可能/无力做到，情态动词否定形式"},{"text":"would have altered","role":"情态+完成形式，嵌于宾语从句中表对过去的推断"}],"tip":"同一句出现多个情态动词时，逐一问：这里表可能性、必要性还是推测？强弱各不同。"}},{"id":"modal-verbs","title":"情态动词","en":"Modal Verbs","domain":"mood","tier":5,"summary":"can/could/may/might/must/shall/should/will/would 后接动词原形，无人称变化。","level":3,"prereq":["modality"],"parent":"modality","detail":[{"h":"情态动词的身份特征","t":"情态动词(modal verbs)是一组特殊的助动词：can/could、may/might、must、shall/should、will/would、ought to、need(情态用法)、dare(情态用法)。它们的语法特征：① 后接动词原形(bare infinitive)，不加 to（ought to 是例外）；② 无人称变化，第三人称单数不加 -s；③ 本身构成疑问和否定，不借 do；④ 无非谓语形式，不能作不定式或分词。"},{"h":"核心情态动词一览","t":"can：能力(I can swim)、许可(You can leave)、可能(It can be cold)；could：can 的过去式 + 委婉/假设语气；may：许可(May I?)、可能(It may rain)；might：may 的过去式 + 更弱的可能；must：必须(义务) + 一定(强推断)；shall：shall I?(征询意见)，正式义务；should：应该(义务弱) + ought to；will：意志/预测；would：will 的过去式 + 委婉/虚拟；ought to：道义上应该，比 should 稍正式。"},{"h":"过去形式的双重功能","t":"could/might/would/should 既是 can/may/will/shall 的过去式，又独立表达委婉语气和虚拟语气。这一双重身份是学习难点。在间接引语时态呼应中，它们是过去式（He said he would go）；在虚拟条件句主句中，它们是虚拟标记（If I were rich, I would travel）。判断靠语境，不靠死记。"},{"h":"考研高频陷阱","t":"① 情态动词后必须是动词原形，完形填空中常以「接名词还是动词」设陷；② shall 在第一人称疑问句中表征询(Shall I open the door?)，不表义务；③ need 作情态动词时 need not do，作实义动词时 don't need to do，两者都正确但结构不同；④ 情态动词不能连用，表「过去能做」须用 was/were able to，不用 could have done（后者表虚拟）。"}],"examples":[{"en":"Could you explain this point again?","zh":"能再解释一下这个要点吗？","note":"could 作委婉请求，比 can 更礼貌，非过去时间。"},{"en":"You need not worry about the result.","zh":"你不必担心结果。","note":"need 作情态动词，否定形式 need not，直接接动词原形。"}],"hardcase":{"sentence":"Candidates should submit their applications by the deadline, but they need not provide additional references unless specifically requested to do so.","zh":"申请者应在截止日期前提交申请，但除非被特别要求，否则无需提供额外的推荐信。","marks":[{"text":"should","role":"情态动词，表义务/建议（应当），后接动词原形 submit"},{"text":"need not","role":"情态动词 need 的否定式，表'无需'，后接裸不定式 provide"},{"text":"unless specifically requested to do so","role":"条件从句修饰 need not provide，'do so' 替代前文动词短语"}],"tip":"need not（无需）vs must not（禁止）——need 否定表无义务，must 否定表禁令，意义天差地别。"}},{"id":"modal-possibility","title":"推测可能","en":"Possibility","domain":"mood","tier":3,"summary":"must(肯定)>may/might/could(或许)>can't(不可能)，推测语气的强弱阶梯。","level":3,"prereq":["modal-verbs"],"parent":"modal-verbs","detail":[{"h":"推测可能的强弱阶梯","t":"英语用情态动词精确表达「我有多确信」：must(一定，90%+) > should/ought to(应该，70-80%) > may(或许，50%) > might/could(也许，30-40%) > can't/couldn't(不可能，否定端)。这个阶梯是考研阅读中作者立场题的判断工具——作者用 may 而非 must，说明他留有余地，不是断言。"},{"h":"各词用法细辨","t":"must 表推断时只用肯定，否定推断用 can't(不可能)，不用 mustn't(那是禁止)；may/might 表可能时意义相近，might 更不确定，也更委婉；could 表「逻辑上可能」，偏向假设性；can 表推断时多用于疑问和否定(Can it be true? It can't be right)，肯定陈述中用 can 表能力不表推断；should 表推断时含「按道理如此」，如 She should be there by now（按行程她现在应该到了）。"},{"h":"与情态+完成式的衔接","t":"上述情态词若要推测过去，须加 have done（详见「情态+完成 推测过去」节点）。现在推测：He must be tired. 过去推测：He must have been tired。把握这一扩展方向，覆盖更多真题句式。"},{"h":"考研阅读应用","t":"考研阅读中频繁出现「根据文章，作者认为 X 怎样？」类题。正确选项往往与原文情态词强度对应：原文 may，选项就不能是 definitely；原文 must，才对应 certainly。识别情态强弱是不失分的保障。"}],"examples":[{"en":"The ancient city must have been magnificent.","zh":"那座古城一定曾经壮丽辉煌。","note":"must 推断过去事实，肯定语气最强；过去推断需 must + have done。"},{"en":"That story can't be true — I was there.","zh":"那个故事不可能是真的——我当时就在场。","note":"否定推断用 can't，不用 mustn't（mustn't 是「禁止做」）。"}],"hardcase":{"sentence":"The anomaly in the data could reflect a genuine trend, or it might simply be an artifact of the sampling method; it cannot be a random error, given the consistency across independent datasets.","zh":"数据中的异常可能反映一种真实趋势，也可能只是抽样方法的人为产物；鉴于独立数据集间的一致性，它不可能是随机误差。","marks":[{"text":"could reflect","role":"could 表较低把握的可能性，'或许能反映'"},{"text":"might simply be","role":"might 表更弱的可能性，比 could 更不确定"},{"text":"cannot be","role":"can't/cannot 表逻辑上不可能，否定推测的最强形式"}],"tip":"推测阶梯：must > can/could > may/might > can't——顺着强度排，选项辨义靠这把尺。"}},{"id":"modal-obligation","title":"义务必要","en":"Obligation","domain":"mood","tier":3,"summary":"must(主观)/have to(客观)/should/ought to(应该)，强制程度递降。","level":3,"prereq":["modal-verbs"],"parent":"modal-verbs","detail":[{"h":"义务必要的强弱谱系","t":"表示「义务/必要」的情态动词按强制程度排列：must(主观强制，说话人命令) > have to(客观必须，外部约束) > should/ought to(应该，道德或理智层面建议) > had better(最好，含警告语气)。选哪个取决于义务的来源——是说话人自己要求还是外部规则要求。"},{"h":"must vs have to 的核心区别","t":"must 表说话人的主观意愿或命令：You must finish this today（我要求你今天完成）；have to 表客观情况导致的必要：I have to leave now because my train is coming（火车来了，我不得不走）。否定形式意义差异更大：mustn't = 绝对禁止；don't have to = 不必须（没有义务，不是禁止）。这是考研完形填空的经典辨析点。"},{"h":"should 与 ought to","t":"两者都表道义上「应该」，ought to 稍正式，语气稍强，常指客观道义标准；should 则更灵活，也用于建议、期待和推断。考研写作中两者均可，注意 ought to 后接 to do（不省 to），而 should 后直接接动词原形。"},{"h":"had better 的陷阱","t":"had better + 动词原形，含「最好，否则后果自负」的隐含警告，语气比 should 更紧迫但也更口语。注意：① 缩写为 'd better；② 否定是 had better not do；③ 不是过去时！had better 是固定惯用结构，时态不由 had 决定。"}],"examples":[{"en":"You mustn't reveal the details of the experiment.","zh":"你绝对不能透露实验细节。","note":"mustn't 是强烈禁止，与「不必要」的 don't have to 截然不同。"},{"en":"You had better apologize before the situation gets worse.","zh":"你最好在情况变得更糟之前道歉。","note":"had better 含隐含警告：如果不道歉，会有不好的后果。"}],"hardcase":{"sentence":"Researchers must disclose all potential conflicts of interest, whereas reviewers should recuse themselves when impartiality is in doubt, though they are not obliged to do so by law.","zh":"研究人员必须披露所有潜在利益冲突，而审稿人在公正性存疑时应当回避，但法律上并无此义务。","marks":[{"text":"must disclose","role":"must 表强制主观义务，语气最强"},{"text":"should recuse","role":"should 表道义上应当，义务感弱于 must"},{"text":"are not obliged to do so by law","role":"客观上无法律强制，与 must 的主观义务形成对比"}],"tip":"must（主观强制）vs have to（客观情势所迫）vs should（道义期望）——区分说话人态度是关键。"}},{"id":"modal-speculation-past","title":"情态+完成 推测过去","en":"Modal + have done","domain":"mood","tier":4,"summary":"must/may/might/could/can't have done 推测过去；should have done 表本该未做。","level":4,"prereq":["modal-verbs"],"parent":"modal-verbs","detail":[{"h":"结构公式：情态动词 + have done","t":"要用情态动词推测过去发生的事，固定结构是：情态动词 + have + 过去分词。各词对应的语义：must have done(一定做了，肯定推断) / can't have done(不可能做了，否定推断) / may/might have done(或许做了，可能推断) / could have done(本可以做了，或「或许做了」)
