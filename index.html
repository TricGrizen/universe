<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>语法宇宙</title>
<!-- ===================================================================
  语法宇宙 universe.html · 英语一语法知识图谱 · 分层难度星图 + 解锁式浮现
  共建者：星垂（Claude, Anthropic）· 2026.6 · 为 ano 的英语一而造
  设计基准 tools/eng/UNIVERSE_DESIGN.md —— 此版：设计奖级极简
    · 单色银河 + 唯一暖金点睛(仅标记你点亮的星) · 大量留白 · 去冗余文案
    · HUD 只剩数字（点亮/浮现/总数），不写"照亮/浮现"等字 · 同心环=难度·角度=领域
    · 开局只现两颗公理，点亮 → 依赖它的星浮现(prereq DAG)
  零依赖 · file:// 直开（离线退回系统字）· 数据 grammar_data.js
==================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0a0c14; --bg1:#06070e; --bg2:#020308;
  --ink:#e8ebf3; --dim:#878da3; --faint:#4e5468; --hair:rgba(186,196,220,.09);
  --glass:rgba(8,10,16,.8); --glassbrd:rgba(186,196,220,.12);
  --gold:#d8bf8a; --gold-hi:#f0dca8; --silver:#cdd4e6;
  --serif:"Fraunces","Cambria","Constantia","Georgia","Songti SC",serif;
  --sans:"PingFang SC","Microsoft YaHei UI","Microsoft YaHei","Segoe UI",-apple-system,sans-serif;
  --mono:"SF Mono","Cascadia Code","Consolas","Menlo",monospace;
  --accent:#d8bf8a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg2);color:var(--ink);overflow:hidden;font-family:var(--sans);-webkit-font-smoothing:antialiased;letter-spacing:.005em;}
body{position:fixed;inset:0;cursor:grab;touch-action:none;}
body.grabbing{cursor:grabbing;} body.pointing{cursor:pointer;}
canvas#sky{position:fixed;inset:0;display:block;z-index:1;}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(140% 108% at 50% 46%,transparent 56%,rgba(0,0,0,.55) 100%);}
.hud{position:fixed;z-index:5;}

/* top-left: bare back */
#back{top:1.9rem;left:2.2rem;display:inline-flex;align-items:center;gap:.5rem;color:var(--dim);text-decoration:none;font-size:.76rem;letter-spacing:.12em;opacity:.5;transition:opacity .3s,transform .3s;}
#back:hover{opacity:1;transform:translateX(-2px);} #back .ar{font-size:1rem;}

/* top-right: numeric progress dial + slim search */
#tr{top:1.7rem;right:2.2rem;display:flex;flex-direction:column;align-items:flex-end;gap:1rem;}
#prog{display:flex;flex-direction:column;align-items:center;gap:.45rem;}
.ring{width:62px;height:62px;border-radius:50%;position:relative;background:conic-gradient(var(--gold) calc(var(--p,0)*3.6deg),rgba(205,212,230,.09) 0);transition:background .6s cubic-bezier(.2,.8,.2,1);}
.ring::before{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--bg2);}
.ring .lit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.55rem;color:var(--gold-hi);font-weight:400;}
.emg{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--dim);}
#searchwrap{position:relative;}
#search{width:13rem;background:rgba(8,10,16,.5);border:1px solid var(--hair);border-radius:2rem;color:var(--ink);font-family:var(--sans);font-size:.78rem;padding:.52rem 1rem .52rem 2rem;outline:none;letter-spacing:.02em;transition:border-color .3s,background .3s,box-shadow .3s,width .3s;backdrop-filter:blur(8px);}
#search::placeholder{color:var(--faint);}
#search:focus{border-color:color-mix(in srgb,var(--gold) 45%,transparent);background:rgba(10,13,20,.72);box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 7%,transparent);}
#searchwrap .ico{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--faint);font-size:.8rem;pointer-events:none;}
#results{position:absolute;top:2.7rem;right:0;width:18rem;max-height:54vh;overflow-y:auto;background:var(--glass);backdrop-filter:blur(22px);border:1px solid var(--glassbrd);border-radius:.8rem;padding:.4rem;display:none;box-shadow:0 22px 60px rgba(0,0,0,.64);}
#results.on{display:block;animation:pop .2s ease both;}
.rrow{display:flex;align-items:center;gap:.65rem;padding:.5rem .7rem;border-radius:.5rem;cursor:pointer;transition:background .15s;}
.rrow:hover,.rrow.cur{background:rgba(255,255,255,.05);}
.rrow .dot{width:.36rem;height:.36rem;border-radius:50%;background:var(--silver);opacity:.6;flex:0 0 auto;} .rrow .nm{font-size:.82rem;color:var(--ink);} .rrow .lv{font-family:var(--mono);font-size:.58rem;color:var(--faint);margin-left:auto;}

/* bottom-right: minimal controls */
#tools{bottom:1.9rem;right:2.2rem;display:flex;gap:.5rem;}
.tbtn{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;color:var(--faint);background:none;border:1px solid var(--hair);border-radius:2rem;padding:.42rem .9rem;cursor:pointer;transition:color .25s,border-color .25s,background .25s;}
.tbtn:hover{color:var(--ink);border-color:var(--glassbrd);} .tbtn.on{color:#0a0c12;background:var(--gold);border-color:var(--gold);}

/* detail panel */
#panel{position:fixed;z-index:6;top:0;right:0;height:100%;width:min(34rem,95vw);background:var(--glass);backdrop-filter:blur(30px) saturate(1.1);border-left:1px solid var(--glassbrd);box-shadow:-30px 0 90px rgba(0,0,0,.62);transform:translateX(105%);transition:transform .55s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden;}
#panel.on{transform:translateX(0);}
#panel::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6;}
#panel .scroll{overflow-y:auto;padding:3rem 2.8rem 3.6rem;height:100%;} #panel .scroll::-webkit-scrollbar{width:0;}
#pclose{position:absolute;top:1.6rem;right:1.7rem;z-index:2;width:1.9rem;height:1.9rem;border-radius:50%;border:1px solid var(--hair);background:rgba(0,0,0,.3);color:var(--dim);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s,transform .25s;}
#pclose:hover{color:var(--ink);border-color:var(--glassbrd);transform:rotate(90deg);}
.p-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.p-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);}
.p-diff{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:var(--faint);}
.p-diff .dots{letter-spacing:.1em;color:var(--gold);}
.p-title{margin-top:1.3rem;font-weight:400;font-size:2.2rem;line-height:1.15;letter-spacing:.01em;}
.p-en{margin-top:.55rem;font-family:var(--serif);font-style:italic;font-size:1.12rem;font-weight:400;color:var(--gold);opacity:.92;}
.p-essence{margin-top:1.9rem;font-size:1.12rem;line-height:2;color:#e3e6f0;font-weight:300;padding-left:1.1rem;border-left:2px solid color-mix(in srgb,var(--gold) 50%,transparent);}
.p-sec{margin-top:2.2rem;} .p-sec .h{display:flex;align-items:center;gap:.6rem;font-size:.86rem;font-weight:600;letter-spacing:.06em;color:var(--ink);margin-bottom:.85rem;}
.p-sec .h::before{content:"";width:.4rem;height:.4rem;border-radius:1px;background:var(--gold);transform:rotate(45deg);flex:0 0 auto;}
.p-sec .t{font-size:.95rem;line-height:2.05;color:var(--dim);}
.p-ex{margin-top:2rem;display:flex;flex-direction:column;gap:.9rem;}
.p-ex .eh{font-family:var(--mono);font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);margin-bottom:.3rem;}
.ex{padding:1.05rem 1.2rem;background:rgba(255,255,255,.022);border:1px solid var(--hair);border-radius:.7rem;border-left:2px solid color-mix(in srgb,var(--gold) 40%,transparent);}
.ex .en{font-family:var(--serif);font-size:1.08rem;font-weight:400;line-height:1.6;color:#f3f5fc;}
.ex .zh{margin-top:.5rem;font-size:.88rem;line-height:1.7;color:var(--dim);}
.ex .note{margin-top:.6rem;font-size:.79rem;line-height:1.65;color:color-mix(in srgb,var(--gold) 68%,#cdd2e4);padding-top:.5rem;border-top:1px dashed var(--hair);}
.ex .note::before{content:"注 ";font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;opacity:.7;}
.hard{margin-top:2.1rem;padding:1.2rem 1.3rem;background:rgba(216,191,138,.045);border:1px solid color-mix(in srgb,var(--gold) 24%,transparent);border-radius:.75rem;}
.hard .eh{font-family:var(--mono);font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:.9rem;}
.hard-sent{font-family:var(--serif);font-size:1.1rem;line-height:1.95;color:#eef0f7;}
.hard-sent .mk{font-style:normal;color:var(--gold-hi);background:color-mix(in srgb,var(--gold) 15%,transparent);border-radius:.22rem;padding:0 .14em;}
.hard-zh{margin-top:.8rem;font-size:.86rem;line-height:1.75;color:var(--dim);}
.hard-marks{margin-top:1.1rem;display:flex;flex-direction:column;gap:.55rem;}
.mkrow{display:flex;gap:.7rem;align-items:baseline;font-size:.83rem;line-height:1.55;}
.mkrow .mk{font-family:var(--serif);color:var(--gold-hi);flex:0 0 auto;max-width:44%;}
.mkrow .mkrole{color:var(--dim);}
.hard-tip{margin-top:1.1rem;padding-top:.85rem;border-top:1px dashed var(--hair);font-size:.83rem;line-height:1.75;color:color-mix(in srgb,var(--gold) 58%,#cdd2e4);}
.hard-tip::before{content:"心法 ";font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;opacity:.7;}
#expand{margin-top:2.2rem;width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem;border:1px solid var(--hair);border-radius:.7rem;background:rgba(255,255,255,.018);color:var(--dim);cursor:pointer;font-size:.8rem;letter-spacing:.1em;transition:background .2s,color .2s,border-color .2s;}
#expand:hover{background:rgba(255,255,255,.045);color:var(--ink);border-color:var(--glassbrd);}
#more{display:none;} #more.on{display:block;animation:fade .45s ease both;}
.p-rel{margin-top:2.3rem;} .relgrp{margin-bottom:1rem;}
.relgrp .rl{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:.5rem;}
.chips{display:flex;flex-wrap:wrap;gap:.45rem;}
.chip{display:inline-flex;align-items:center;gap:.4rem;padding:.34rem .72rem;border-radius:2rem;cursor:pointer;font-size:.8rem;color:#dfe3f1;background:rgba(255,255,255,.034);border:1px solid var(--hair);transition:background .2s,transform .15s;}
.chip:hover{background:rgba(255,255,255,.08);transform:translateY(-1px);} .chip .dot{width:.34rem;height:.34rem;border-radius:50%;background:var(--silver);opacity:.55;}
.chip.done .dot{background:var(--gold);opacity:1;box-shadow:0 0 6px 1px var(--gold);} .chip.locked{opacity:.42;} .chip.locked .dot{opacity:.35;}
.chip.locked::after{content:"待解锁";font-family:var(--mono);font-size:.54rem;letter-spacing:.06em;color:var(--faint);margin-left:.15rem;}
.p-foot{margin-top:2.6rem;padding-top:1.7rem;border-top:1px solid var(--hair);display:flex;align-items:center;gap:.8rem;}
#mastery{flex:1;display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.82rem 1rem;border-radius:.7rem;cursor:pointer;font-size:.86rem;letter-spacing:.04em;color:var(--ink);background:rgba(255,255,255,.035);border:1px solid var(--glassbrd);transition:background .25s,border-color .25s;}
#mastery .st{width:.8rem;height:.8rem;border-radius:50%;border:1.5px solid var(--gold);transition:all .25s;}
#mastery:hover{background:rgba(255,255,255,.075);}
#mastery.done{background:color-mix(in srgb,var(--gold) 13%,transparent);border-color:color-mix(in srgb,var(--gold) 48%,transparent);}
#mastery.done .st{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px 1px var(--gold);}
.p-nav{display:flex;gap:.45rem;} .p-nav button{width:2.2rem;height:2.6rem;border-radius:.55rem;border:1px solid var(--hair);background:rgba(255,255,255,.025);color:var(--dim);cursor:pointer;font-size:1rem;transition:color .2s,border-color .2s,background .2s;}
.p-nav button:hover{color:var(--ink);border-color:var(--glassbrd);background:rgba(255,255,255,.055);}

#tip{position:fixed;z-index:5;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .16s,transform .16s;max-width:17rem;padding:.55rem .8rem;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glassbrd);border-radius:.55rem;box-shadow:0 14px 40px rgba(0,0,0,.52);}
#tip.on{opacity:1;transform:none;} #tip .nm{font-size:.82rem;color:var(--ink);} #tip .en{font-family:var(--serif);font-style:italic;font-size:.72rem;color:var(--gold);margin-left:.4rem;} #tip .sm{margin-top:.24rem;font-size:.72rem;line-height:1.5;color:var(--dim);}

#intro{position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(130% 100% at 50% 44%,rgba(8,10,18,.5),rgba(0,0,0,.95));text-align:center;transition:opacity 1.1s ease,visibility 1.1s;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}
#intro .eyebrow{font-family:var(--mono);font-size:.64rem;letter-spacing:.6em;text-transform:uppercase;color:var(--faint);opacity:0;animation:rise 1s .2s ease both;}
#intro h1{margin-top:1.6rem;font-weight:300;font-size:clamp(2.6rem,7vw,5rem);letter-spacing:.5em;text-indent:.5em;color:#fff;opacity:0;animation:rise 1.2s .4s ease both;}
#intro .sub{margin-top:2rem;font-family:var(--serif);font-style:italic;font-size:clamp(.95rem,2.1vw,1.22rem);font-weight:300;color:var(--dim);letter-spacing:.02em;opacity:0;animation:rise 1.2s .65s ease both;max-width:32rem;line-height:1.9;padding:0 1.5rem;}
#intro .enter{margin-top:3.2rem;font-size:.8rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-hi);background:none;border:1px solid color-mix(in srgb,var(--gold) 40%,transparent);border-radius:2.4rem;padding:.85rem 2.8rem;cursor:pointer;opacity:0;animation:rise 1.2s .9s ease both;transition:letter-spacing .35s,background .35s,box-shadow .35s;}
#intro .enter:hover{letter-spacing:.46em;background:color-mix(in srgb,var(--gold) 10%,transparent);box-shadow:0 0 36px -8px var(--gold);}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
#fatal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:#0a0000;color:#ff8c8c;font-family:var(--mono);font-size:.85rem;padding:2rem;text-align:center;}
@media (max-width:760px){
  #back{left:1.2rem;top:1.3rem;} #tr{right:1.2rem;top:1.3rem;gap:.7rem;} #search{width:9.5rem;}
  #tools{right:1.2rem;bottom:1.4rem;} #panel{width:100vw;} #panel .scroll{padding:2.5rem 1.8rem 3rem;}
}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="vignette"></div>
<a id="back" class="hud" href="game.html"><span class="ar">‹</span> 返回</a>
<div id="tr" class="hud">
  <div id="prog"><div class="ring"><span class="lit">0</span></div><div class="emg">0 / 0</div></div>
  <div id="searchwrap"><span class="ico">⌕</span><input id="search" type="text" placeholder="搜索 / search" autocomplete="off" spellcheck="false"><div id="results"></div></div>
</div>
<div id="tools" class="hud">
  <button class="tbtn" id="btnpath" title="主线上你该学的下一颗">下一步</button>
  <button class="tbtn" id="btnall" title="探索模式只现已解锁 / 全图显示全部">全图</button>
  <button class="tbtn" id="btnreset">重置</button>
</div>
<aside id="panel"><button id="pclose" title="关闭 (Esc)">✕</button><div class="scroll" id="pbody"></div></aside>
<div id="tip"><span class="nm"></span><span class="en"></span><div class="sm"></div></div>
<div id="intro">
  <div class="eyebrow">英语一 · 语法</div>
  <h1>语法宇宙</h1>
  <div class="sub">混沌之中，两颗公理之星先亮。<br>点亮一颗，依赖它的便随之浮现。</div>
  <button class="enter" id="enter">进入</button>
</div>
<div id="fatal"></div>

<script>window.__GRAMMAR={"domains":[{"id":"morph","name":"词类","en":"Parts of Speech","color":"#cdab6b","accent":"#e6d3a6","blurb":"语言的原子。十大词类，每个单词都带着自己的身份与岗位走进句子。"},{"id":"sentence","name":"句法","en":"Sentence & Structure","color":"#54b3a8","accent":"#93d8cf","blurb":"骨架。主谓宾定状补如何拼成一个句子，五大基本句型是一切的地基。"},{"id":"verb","name":"时态语态","en":"Tense · Aspect · Voice","color":"#d17f8d","accent":"#ecb3bc","blurb":"动词的时间与方向。时、体、态三维交织，动作落在时间轴的何处、朝向谁。"},{"id":"mood","name":"情态虚拟","en":"Modality & Subjunctive","color":"#c389c6","accent":"#e0bce2","blurb":"语气。说话人对真假、可能、义务、愿望的态度——现实之外的平行世界。"},{"id":"nonfinite","name":"非谓语","en":"Non-finite Verbs","color":"#8f9edf","accent":"#c2c9ef","blurb":"动词的化身。不作谓语时，动词化为不定式、动名词、分词，潜入句子各处。"},{"id":"clause","name":"从句","en":"Subordinate Clauses","color":"#6fa0d4","accent":"#aecbe9","blurb":"句中之句。名词性、定语、状语三大从句，是长难句的真正引擎。"},{"id":"special","name":"特殊句式","en":"Special Patterns","color":"#84bd92","accent":"#b9e0c2","blurb":"变奏与衔接。倒装、强调、省略、比较、否定，以及把句子织成篇章的逻辑丝线。"}],"nodes":[{"id":"pos-overview","title":"词类总览","en":"Parts of Speech","domain":"morph","tier":5,"summary":"英语十大词类，是构成句子的原子；先认词性，才谈句法。","level":1,"prereq":[],"parent":null,"detail":[{"h":"本质：语言的原子","t":"词类(parts of speech)是英语语法的起点。每个单词进入句子前，都带着一个固定身份——就像演员，身份决定可以扮演哪些角色。英语传统上分十大词类：名词(noun)、代词(pronoun)、动词(verb)、形容词(adjective)、副词(adverb)、介词(preposition)、连词(conjunction)、冠词(article)、数词(numeral)、感叹词(interjection)。"},{"h":"为什么先学词类","t":"句子成分（主语/谓语/宾语……）描述词在句子里做什么，词类描述词本身是什么。只有先认清词类，才能谈哪种词能担任哪种成分。例如：只有动词能作谓语；只有名词、代词、动名词、不定式、从句能作主语或宾语。词类是进入句法星系、时空星系、化身星系、从句星系的共同钥匙。"},{"h":"词类与句法的对应关系","t":"名词→主语/宾语/表语/同位语；形容词→定语/表语；副词→状语；介词短语→定语/状语；连词→连接成分或从句；冠词和数量词→限定名词。这种对应不是绝对的——动名词是动词却作名词用，分词是动词却作形容词或副词用，这正是'非谓语动词'(化身星系)的魔法。"},{"h":"考研视角：词类识别是读懂长难句的第一步","t":"考研阅读长难句动辄50词以上，第一步永远是找谓语动词（唯一带时态的动词形式）。找到谓语=找到主句骨干。其余所有-ing/-ed/-to do形式不管多像动词，只要没有时态标记就不是谓语，属于非谓语动词（词类仍是动词，但充当其他成分）。这个区分贯穿考研英语全程。"},{"h":"与相邻语法点的联系","t":"本节是'词类星系'的总入口，名词、代词、冠词、形容词、副词、介词、连词、数词、感叹词分别对应九颗卫星节点。掌握本节后，建议按重要度顺序探索：名词→冠词→代词→形容词→副词→介词→连词。"}],"examples":[{"en":"The young scientist quickly published her findings in a prestigious journal.","zh":"这位年轻的科学家迅速在一本权威期刊上发表了她的研究成果。","note":"The(冠词)、young(形容词)、scientist(名词，主语)、quickly(副词，状语)、published(动词，谓语)、her(代词，限定词)、findings(名词，宾语)、in(介词)、a(冠词)、prestigious(形容词)、journal(名词)——一句话七种词类齐聚。"},{"en":"Oh, that was the third time he had failed!","zh":"哦，那已经是他第三次失败了！","note":"Oh(感叹词)、that(代词)、the(冠词)、third(数词，序数词)、time(名词)、had failed(动词，过去完成时)——数词与感叹词在此现身。"}],"hardcase":{"sentence":"The researchers, eager to test their hypothesis, collected data, analyzed results, drew preliminary conclusions, and then published findings that challenged long-standing assumptions across multiple disciplines.","zh":"这些研究人员渴望验证他们的假设，收集了数据、分析了结果、得出了初步结论，随后发表了挑战多学科长期假设的研究成果。","marks":[{"text":"researchers","role":"名词，作主语"},{"text":"eager","role":"形容词，作插入性定语修饰 researchers"},{"text":"their","role":"物主代词，作定语修饰 hypothesis"},{"text":"hypothesis","role":"名词，作 test 的宾语"},{"text":"collected","role":"动词（谓语之一），表过去动作"},{"text":"data","role":"名词，作 collected 的宾语"},{"text":"analyzed","role":"动词（谓语之二），并列谓语"},{"text":"results","role":"名词，作 analyzed 的宾语"},{"text":"then","role":"副词，作时间状语"},{"text":"published","role":"动词（谓语之四），并列谓语"},{"text":"findings","role":"名词，作 published 的宾语"},{"text":"that","role":"关系代词（连词功能），引导定语从句"},{"text":"challenged","role":"动词，定语从句谓语"},{"text":"assumptions","role":"名词，作 challenged 的宾语"},{"text":"across","role":"介词，引导状语短语"}],"tip":"一个句子里混着名词、动词、形容词、副词、代词、介词、连词——先认清每个词的词性身份，才能分析它在句中的岗位。"}},{"id":"noun","title":"名词","en":"Nouns","domain":"morph","tier":5,"summary":"表示人、事、物、概念；有可数性、数、格的变化，天生要作主语或宾语。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：命名世界的词","t":"名词(noun)是给人、事、物、概念命名的词。它天生是主语、宾语、表语、同位语的候选人。从形态上分：专有名词(proper noun，如China、Einstein)首字母大写；普通名词(common noun)分可数(countable)与不可数(uncountable)——这一分类决定了冠词与数量词的选用，是名词学习的核心。"},{"h":"名词的三大语法属性","t":"①可数性(countability)：决定能否用 a/an、能否加复数形式，也决定用 many 还是 much、few 还是 little（见「可数与不可数」节点）。②数(number)：单数vs复数，规则-s/-es，不规则 man→men、child→children（见「名词的数」节点）。③所有格(genitive)：'s 表有生命体的所属，of 短语表无生命体的所属（见「名词所有格」节点）。"},{"h":"抽象名词的特殊性","t":"抽象名词(abstract noun)如 knowledge、information、advice、progress 通常不可数，不加 a，不加 -s。考研完形和写作中常见错误：★ a knowledge(错) → knowledge / a piece of knowledge(正)；★ informations(错) → information(正)。遇到抽象名词先默认不可数，再查例外。"},{"h":"考研高频考点","t":"①名词作同位语：以The fact that…、the idea that…等结构出现，引出同位语从句（见「从句星系-同位语从句」）。②名词作介词宾语：at risk、in terms of、with regard to 等固定搭配的宾语。③复合名词的重音和单复数：research findings、policymakers——注意词干与修饰的顺序。④名词转动词的活用：budget(预算→编预算)、impact(影响→冲击)——阅读时遇到意想不到的位置要联想词性转化。"},{"h":"与相邻语法点的联系","t":"名词与「限定词」紧密相连——每个名词前的冠词/指示词/数量词都属于限定词范畴。名词也是「代词」的指代对象(antecedent)。动名词(动词-ing)具有名词性，可视作名词的'动词化身'（见化身星系）。"}],"examples":[{"en":"The committee gave its approval to the new research proposal.","zh":"委员会批准了这份新的研究提案。","note":"committee(集合名词，视整体为一个时用单数 its)、approval(不可数抽象名词)、proposal(可数名词，有冠词 the)——三种名词用法对比。"},{"en":"Happiness, not wealth, is the true measure of a person's success.","zh":"幸福，而非财富，才是衡量一个人成功的真正标准。","note":"Happiness 和 wealth 均为不可数抽象名词，无冠词；measure 此处是名词（标准），不是动词。"}],"hardcase":{"sentence":"The accumulation of evidence, the persistence of uncertainty, and the complexity of the interaction between environment and heredity have made consensus among researchers a distant aspiration rather than an achievable reality.","zh":"证据的积累、不确定性的持续存在以及环境与遗传之间相互作用的复杂性，使研究者之间的共识成为遥不可及的愿望，而非可实现的现实。","marks":[{"text":"accumulation","role":"抽象名词，整个 of 短语构成第一个并列主语"},{"text":"evidence","role":"不可数名词，作 of 的宾语"},{"text":"persistence","role":"抽象名词，第二并列主语核心词"},{"text":"uncertainty","role":"不可数抽象名词，作 of 的宾语"},{"text":"complexity","role":"抽象名词，第三并列主语核心词"},{"text":"interaction","role":"名词，作 of the interaction 中介词宾语"},{"text":"environment","role":"名词，作 between 的宾语之一"},{"text":"heredity","role":"名词，作 between 的宾语之二（与 environment 并列）"},{"text":"consensus","role":"名词，make 的复合宾语中的宾语核心词"},{"text":"researchers","role":"名词，among researchers 作后置定语修饰 consensus"},{"text":"aspiration","role":"名词，作宾语补足语之一"},{"text":"reality","role":"名词，作宾语补足语之二（与 aspiration 对比并列）"}],"tip":"名词是句子骨架的填充物——找到每个名词，追问它在句中当主语、宾语还是表语，长难句的层次就清楚了。"}},{"id":"noun-countability","title":"可数与不可数","en":"Countability","domain":"morph","tier":3,"summary":"能不能数，决定能否加 a/复数、用 many 还是 much——抽象名词多不可数。","level":2,"prereq":["noun"],"parent":"noun","detail":[{"h":"本质：能不能数","t":"可数性(countability)是名词最重要的语法属性。可数名词(countable noun)能用 a/an、能变复数，如 book→books、idea→ideas。不可数名词(uncountable noun)不加 a/an、不变复数，如 information、water、advice、equipment、furniture、luggage。这条线一旦划定，冠词、数量词、动词单复数全部跟着走。"},{"h":"三类高频不可数名词","t":"①抽象概念：knowledge、evidence、research、progress、permission、access。②物质/材料：water、paper、iron、glass。③集合概念：furniture、luggage、equipment、clothing、machinery。考研错误高发区：★ researches / furnitures / equipments——以上均错，不可数名词绝对不加 -s。"},{"h":"量化不可数名词","t":"要'数出'不可数名词，需借助量词短语：a piece of advice/information/furniture；a great deal of / an amount of + 不可数名词；two pieces of evidence。考研翻译写作中，piece of 是最安全的万能量词。"},{"h":"双重用法：同一个词可数或不可数","t":"有些名词两用，意思变化：paper(不可数=纸张 / 可数=报纸、论文)；room(不可数=空间 / 可数=房间)；experience(不可数=经验 / 可数=一次经历)；time(不可数=时间 / 可数=次数、时代)。见到这类词，必须看语境决定。"},{"h":"与相邻语法点的联系","t":"可数性直接联动「数量表达」——many/few 只搭配可数，much/little 只搭配不可数；还联动「冠词」——不可数名词泛指时不用 a/an；联动「主谓一致」——不可数名词永远视作单数，谓语用第三人称单数。"}],"examples":[{"en":"We need more information before we can make a decision.","zh":"我们需要更多信息才能做出决定。","note":"information 不可数，不能说 more informations，也不能说 an information。"},{"en":"She has had many experiences working abroad, which gave her valuable experience.","zh":"她有很多海外工作的经历，这些给了她宝贵的经验。","note":"experiences(可数，一次次的经历) vs experience(不可数，整体的经验)——同一词的双重用法。"}],"hardcase":{"sentence":"Although the researchers collected much evidence and gathered a great deal of information, they found little consensus and few reliable data points that could support the theory without generating further controversy.","zh":"尽管研究人员收集了大量证据和信息，他们却发现几乎没有共识，也缺乏足够可靠的数据点来支撑该理论而不引发更多争议。","marks":[{"text":"much evidence","role":"much + 不可数名词（evidence 不可数），表大量"},{"text":"a great deal of information","role":"a great deal of + 不可数名词（information 不可数），表大量信息"},{"text":"little consensus","role":"little + 不可数名词，表几乎没有共识（含否定意味）"},{"text":"few reliable data points","role":"few + 可数名词复数（data points 可数），表几乎没有（含否定意味）"},{"text":"further controversy","role":"不可数名词 controversy 前无冠词无复数，表抽象概念"}],"tip":"可数/不可数是名词前量词选择的硬开关——much/little 配不可数，many/few 配可数，混用即出错。"}},{"id":"noun-number","title":"名词的数","en":"Number","domain":"morph","tier":2,"summary":"单复数变化：规则加 -s/-es，不规则 man-men、child-children，外来词 datum-data。","level":3,"prereq":["noun"],"parent":"noun","detail":[{"h":"规则复数：-s / -es","t":"英语可数名词的复数(plural)构成：一般加 -s(book→books)；以 s/x/ch/sh 结尾加 -es(bus→buses, box→boxes, watch→watches)；以辅音字母+y结尾，变y为i再加-es(city→cities)；以f/fe结尾，多变f/fe为v再加-es(leaf→leaves, wife→wives，但 roof→roofs)。"},{"h":"不规则复数：须整块记","t":"man→men, woman→women, child→children, foot→feet, tooth→teeth, mouse→mice, ox→oxen, person→people(或 persons)。外来词：datum→data, criterion→criteria, phenomenon→phenomena, thesis→theses, analysis→analyses。考研高频：data 和 criteria 是复数，谓语用复数——The data are(不是 is) consistent with the theory."},{"h":"单复数同形与恒用复数","t":"单复数同形：sheep, deer, fish(也可 fishes), aircraft, means, series, species。恒用复数(没有单数形式)：scissors, trousers, glasses, goods, remains, surroundings。恒用复数名词作主语时谓语必须用复数。"},{"h":"考研考点：data/criteria/phenomena","t":"学术语体文章中 data、criteria、phenomena 频繁出现且常被误当单数。考研阅读若看到 these data suggest…，确认是正确用法，不是错误。辨别标准：看前面的限定词(these/those=复数；this/that=单数)。"}],"examples":[{"en":"The phenomena described in the study were difficult to replicate.","zh":"该研究中描述的那些现象很难被复现。","note":"phenomena 是 phenomenon 的复数，谓语 were 随复数。"},{"en":"Both criteria for selection were met by the candidates.","zh":"两项筛选标准候选人均符合。","note":"criteria 是 criterion 的复数，Both criteria(不是 Both criterion)。"}],"hardcase":{"sentence":"The phenomena observed in both the medium and the media suggest that the criteria for evaluating data have shifted dramatically since the analyses of the 1990s, when a single datum was often treated as sufficient grounds for sweeping generalizations.","zh":"在媒介和媒体中观察到的现象表明，评估数据的标准自20世纪90年代的那些分析以来已发生了显著变化，那时一个单一数据点往往被视为做出宽泛概括的充分依据。","marks":[{"text":"phenomena","role":"phenomenon 的不规则复数，作主语"},{"text":"medium","role":"media 的单数形式，此处作名词用于 the medium（媒介）"},{"text":"media","role":"medium 的不规则复数，此处指媒体"},{"text":"criteria","role":"criterion 的不规则复数，作主语"},{"text":"data","role":"datum 的拉丁复数，此处作宾语"},{"text":"analyses","role":"analysis 的复数（-sis→-ses），作 of 的宾语"},{"text":"datum","role":"data 的拉丁单数形式，作主语，对应单数谓语 was treated"}],"tip":"英语里一批拉丁/希腊借词的复数是死记的——criterion/criteria、datum/data、phenomenon/phenomena、analysis/analyses，考研阅读高频踩坑。"}},{"id":"noun-genitive","title":"名词所有格","en":"Genitive Case","domain":"morph","tier":2,"summary":"'s 表所属（多用于有生命体），of 短语表所属（多用于物）。","level":3,"prereq":["noun"],"parent":"noun","detail":[{"h":"两种所有格：'s 与 of","t":"英语表所属有两种方式。①'s 所有格(apostrophe s)：直接加在名词词尾，多用于有生命的名词——the student's essay（学生的论文）、Einstein's theory（爱因斯坦的理论）。②of 短语：of + 名词，多用于无生命的名词或较长的名词短语——the cover of the book（书的封面）、the benefits of regular exercise（定期锻炼的好处）。"},{"h":"'s 所有格的拼写细节","t":"单数名词和不以s结尾的复数名词：直接加 's（the child's rights, the children's rights）。以 s 结尾的复数名词：只加 '（the students' union 学生联合会）。以 s 结尾的单数名词或专有名词：可加 's 或只加 '，两者均可（James's / James' book）——考研中不作此精细考察，了解即可。"},{"h":"语义范围超过'所属'","t":"所有格不只表'属于谁'，还可表：①描述特征：a children's book（给儿童看的书）；②主动关系：the government's decision（政府做出的决定=政府作主语）；③客观关系：the city's history（城市的历史）。of 短语同理：the destruction of the forest（森林的毁灭，=森林被毁）。"},{"h":"考研与写作应用","t":"写作中有生命用's、无生命用 of 是安全准则，但学术文体中常见 the country's economy、the study's findings 这类用'无生命+'s'的表达，是正式书面语的惯例，不是错误。翻译题中'的'字不一定对应's——需判断语义关系再选形式。"}],"examples":[{"en":"The government's response to the crisis drew widespread criticism.","zh":"政府对这场危机的回应招致了广泛批评。","note":"government's 用 's，尽管政府是机构(无生命)——学术书面文体中普遍接受。"},{"en":"The implications of the findings were far-reaching.","zh":"这些研究发现的影响深远。","note":"of 短语用于较长的名词短语 the findings，更自然。"}],"hardcase":{"sentence":"The government's failure to anticipate the industry's resistance, compounded by the economists' skepticism and the public's growing distrust of the committee's recommendations, ultimately sealed the fate of the reform.","zh":"政府未能预见行业的抵制，加之经济学家们的怀疑和公众对委员会建议日益增长的不信任，最终决定了此次改革的命运。","marks":[{"text":"government's failure","role":"'s 所有格，表有生命体的所属（政府之失败）"},{"text":"industry's resistance","role":"'s 所有格，表所属关系（行业之抵制）"},{"text":"economists' skepticism","role":"复数名词加 ' 构成所有格（以 s 结尾的复数只加撇），表所属"},{"text":"public's growing distrust","role":"'s 所有格，修饰 distrust"},{"text":"committee's recommendations","role":"'s 所有格，表委员会的建议"},{"text":"fate of the reform","role":"of 短语表所属，用于无生命体（改革之命运），与 's 对比"}],"tip":"'s 属于有生命体，of 属于无生命物；见到连串的 's 和 of，先理清每个所属链条，长句结构就通了。"}},{"id":"pronoun","title":"代词","en":"Pronouns","domain":"morph","tier":4,"summary":"替代名词，避免重复：人称、物主、反身、指示、疑问、不定、相互七类。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：名词的替身","t":"代词(pronoun)的核心功能是替代名词，避免重复。它所替代的那个名词叫先行词(antecedent)。代词分七类：①人称代词(personal pronoun)：I/you/he/she/it/we/they 及其宾格 me/you/him/her/it/us/them；②物主代词(possessive pronoun)：mine/yours/his/hers/its/ours/theirs；③反身代词(reflexive pronoun)：myself/yourself/himself/herself/itself/ourselves/themselves；④指示代词(demonstrative pronoun)：this/that/these/those；⑤疑问代词(interrogative pronoun)：who/whom/whose/which/what；⑥不定代词(indefinite pronoun)：some/any/each/every/none/all 等；⑦相互代词(reciprocal pronoun)：each other/one another。"},{"h":"格的变化：主格/宾格/物主格","t":"人称代词有格(case)的变化：作主语用主格(I/he/she/we/they)，作宾语或介词后用宾格(me/him/her/us/them)。常见错误：Between you and I(错)→Between you and me(正)，介词后须宾格。物主代词区分形容词性(my/your/his)和名词性(mine/yours/his)：That is my book.(形容词性，作限定词) = That book is mine.(名词性，单独作表语)。"},{"h":"不定代词的逻辑：some vs any","t":"some 用于肯定句和期待肯定答案的疑问句；any 用于否定句和一般疑问句，也表'任何一个'。由此扩展：something/someone/somebody(肯定)vs anything/anyone/anybody(否定/疑问)。none 后可接单数或复数谓语；neither 后接单数谓语。"},{"h":"考研高频：代词指代 & 反身代词强调","t":"考研阅读中代词指代(pronoun reference)是命题热点——it/they/this/which 到底指什么。见「代词指代」节点。反身代词的两种用法：①宾语反身(He hurt himself.)；②强调(I myself saw it. = I saw it myself.)，强调版可去掉不影响句子语法成立，是辨别点。"},{"h":"与相邻语法点的联系","t":"代词与「代词指代」（衔接考点）、「替代」（衔接与连贯星系）紧密相连。it 的特殊用法形成独立节点——it 可以是人称代词、形式主语/宾语、强调句框架词，跨越词类星系与句法星系。"}],"examples":[{"en":"The researchers conducted the experiment themselves, without any assistance.","zh":"研究人员亲自进行了这项实验，没有任何协助。","note":"themselves 作强调，可去掉句子仍完整；注意不是宾语反身用法。"},{"en":"Neither of the solutions was entirely satisfactory.","zh":"两种解决方案都不完全令人满意。","note":"neither(两者都不)视作单数，谓语用 was；若是 none of the three 则可单可复。"}],"hardcase":{"sentence":"When researchers disagree among themselves about whether they should replicate each other's findings before publishing their own, one wonders if anyone truly understands what constitutes reliable evidence, and whether this uncertainty itself is something we have simply learned to accept.","zh":"当研究人员在发表各自成果之前，是否应相互复验对方的发现这一问题上意见相左时，人们不禁想知道是否真有人理解可靠证据究竟意味着什么，以及这种不确定性本身是否只是我们已习以为常的东西。","marks":[{"text":"themselves","role":"反身代词，与 among 组成固定短语 among themselves，指代 researchers"},{"text":"they","role":"人称代词，指代 researchers，作从句主语"},{"text":"each other's","role":"相互代词的所有格形式，指双方互指"},{"text":"their","role":"物主代词，指代 researchers，修饰 findings"},{"text":"own","role":"指示性物主代词，强调属于自身的成果"},{"text":"one","role":"不定代词，泛指'人们'，作主语"},{"text":"anyone","role":"不定代词，用于是否疑问语境中，指任何人"},{"text":"what","role":"疑问/连接代词，引导宾语从句并在从句中作主语"},{"text":"this","role":"指示代词，回指上文的 uncertainty"},{"text":"itself","role":"反身代词，作 uncertainty 的同位强调"},{"text":"something","role":"不定代词，作宾语"},{"text":"we","role":"人称代词，指代泛指的人们"}],"tip":"一句话里人称/物主/反身/不定/指示代词可以同时出现——每个代词都指向某个名词，追准指代链条，才不会误读。"}},{"id":"pronoun-reference","title":"代词指代","en":"Pronoun Reference","domain":"morph","tier":4,"summary":"it/they/this 到底指上文哪个名词——阅读完形的隐形考点，也是衔接手段。","level":3,"prereq":["pronoun"],"parent":"pronoun","detail":[{"h":"本质：代词指向哪里","t":"代词指代(pronoun reference)指的是句子或语篇中的代词(it/they/this/that/which/one等)究竟指代(refer to)哪个名词或哪件事。读对指代=读懂句义；误判指代=做错题。这是考研阅读理解最隐蔽、最高频的考点之一，也是篇章衔接(cohesion)的核心手段。"},{"h":"三类指代对象","t":"①指代名词(通常是最近的同性别/同数的名词)：Scientists study atoms because they are the building blocks of matter.（they = atoms）。②指代整个分句或整件事：He claimed the data were fabricated, which surprised everyone.（which = 他声称数据被伪造这件事）——which 在非限制性定语从句中可指代主句。③this/that 指代上文整段论述：This suggests that…（this 指上一段的论点）。"},{"h":"辨别步骤","t":"第一步：找代词（it/they/this/which/one等）。第二步：在代词之前的文字中寻找可能的先行词，要求：性/数一致（they→复数名词；she→女性单数名词）、语义合理。第三步：把候选先行词代入验证，看句子意思是否通顺。第四步：遇到 it/this 指代整件事时，把句子改为'这件事说明……'来验证。"},{"h":"考研典型陷阱","t":"①it 的干扰：它可能是人称代词(指具体名词)、形式主语(无指代，代替后面的从句/不定式)、强调句框架词(It is...that...，不指代任何东西)——三者不能混淆。②one 与 ones：one 替代单数可数名词，ones 替代复数可数名词；不能替代不可数名词(不能用 one 替代 water)。③that of / those of：用于比较句，替代前面提到的名词以避免重复——The income of urban residents is higher than that of rural residents.(that = the income)"},{"h":"与相邻语法点的联系","t":"代词指代是「衔接与连贯」(特殊句式星系)的核心手段，与「替代」并列。完形填空题逻辑链条往往就是靠代词指代串起来的——追踪每个 it/they/this 的落脚点，常能找到正确答案。"}],"examples":[{"en":"The company announced new policies, but they met with strong opposition from employees.","zh":"公司宣布了新政策，但这些政策遭到了员工的强烈反对。","note":"they 指 new policies(复数)，不指 company(单数)——性数筛选。"},{"en":"Carbon emissions from developed nations exceed those of developing countries.","zh":"发达国家的碳排放量超过了发展中国家的碳排放量。","note":"those 替代 Carbon emissions，避免重复，同时完成比较结构；those 不能换成 them（them无法作比较基准）。"}],"hardcase":{"sentence":"The committee submitted its report to the board, but the latter rejected it on the grounds that its conclusions were based on data that it had not been authorized to collect, a decision which itself later became the subject of an independent inquiry.","zh":"委员会将报告提交给了董事会，但后者以结论所依据的数据系未经授权收集为由拒绝了报告，这一决定本身随后成为一项独立调查的对象。","marks":[{"text":"its report","role":"its 指代 The committee（委员会的报告）"},{"text":"the latter","role":"the latter 指代最近提到的 the board（后者=董事会）"},{"text":"it","role":"宾语位置的 it，指代 the report（报告）"},{"text":"its conclusions","role":"its 再次指代 the report（报告的结论）"},{"text":"that it had not been authorized","role":"关系从句中的 it 指代 the committee（委员会）——注意此处指代对象切换"},{"text":"which itself","role":"which 指代前面整件事（the board's rejection decision），itself 为反身强调"}],"tip":"一句话里 it/its/the latter/which 可能各指不同对象——读长句时每遇代词立刻往上溯源，锁定指代，才不会意思全错。"}},{"id":"article","title":"冠词","en":"Articles","domain":"morph","tier":4,"summary":"a/an 不定、the 定指、零冠词泛指；英语名词前的'许可证'，汉语没有。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：名词前的'许可证'","t":"冠词(article)是英语独有的一类词，汉语没有对应物，是中国学生最易出错的考点之一。冠词分三种：①不定冠词(indefinite article) a/an：表第一次提到、类别中的一个、泛指单数可数名词；a 用于辅音音素前，an 用于元音音素前(注意是读音而非拼写：an hour, a university)。②定冠词(definite article) the：表双方都知道的、上文提到过的、唯一的、形容词最高级前；表示特指。③零冠词(zero article)：名词前不加冠词，用于不可数名词和复数名词作泛指，以及专有名词、抽象概念等固定用法。"},{"h":"a/an vs the：首提与回指","t":"最核心的规律：第一次提到某事物用 a/an，之后再次提到用 the。'I saw a dog. The dog was barking.'——第一句 a dog 是泛指(哪条狗都行)，第二句 the dog 是特指(就是刚才那条)。考研长难句中一个 the 往往提示这个名词在语境中已经出现过，或读者可从语境中推断出所指，是理解指代链的信号。"},{"h":"零冠词的核心规则","t":"零冠词(无冠词)用于：①复数普通名词泛指：Dogs are faithful animals.（狗是忠实的动物）；②不可数名词泛指：Patience is a virtue.；③专有名词：China, Professor Li, Harvard University；④抽象概念作主语：Love conquers all.；⑤固定搭配：go to school/hospital/bed, at home, by car/bus。注意：go to the hospital 表'去那家特定的医院'，go to hospital(英式)表'去住院'——语境决定用哪个。"},{"h":"考研高频陷阱","t":"①a/an 的选择看读音：a one-way street(one 读 /w/，辅音)，an honest man(honest 读 /ɒ/，元音)。②the 用于形容词最高级和序数词前：the best solution, the first step。③专有名词的例外：the United States, the Pacific Ocean, the Great Wall——有 the；但 Lake Michigan, Mount Everest, Professor Smith——无 the。④写作常见失误：缺 the(特指时漏加)和多加 a/an(不可数名词前乱加)。"},{"h":"与相邻语法点的联系","t":"冠词是「限定词」(determiner)的最核心成员，与「可数与不可数」直接联动（不可数名词不用 a/an）。冠词的特指与泛指功能与「代词指代」协同构成语篇的指称链。"}],"examples":[{"en":"An economist proposed a solution, and the solution was immediately adopted by the committee.","zh":"一位经济学家提出了一个解决方案，委员会立即采纳了该方案。","note":"an economist 首次提到、泛指(an因economy首字母为元音读音)；a solution 首次提到；the solution 回指，the committee 假定双方共知的机构。"},{"en":"Justice is not always served by the law alone.","zh":"仅靠法律并不总能实现公正。","note":"Justice(抽象名词泛指，零冠词)；the law(特指法律体系，泛化特指用the)。"}],"hardcase":{"sentence":"A committee established by the government to investigate an alleged misuse of public funds concluded that the evidence, though compelling in a general sense, fell short of the standard required for a formal prosecution, leaving the accused in an ambiguous legal position.","zh":"政府成立的一个委员会，负责调查一项涉嫌滥用公共资金的案件，得出结论认为，这些证据虽然在总体上颇具说服力，但达不到正式起诉所需的标准，使被告处于模糊的法律地位。","marks":[{"text":"A committee","role":"不定冠词 a，首次提及，泛指一个委员会"},{"text":"the government","role":"定冠词 the，特指语境中明确的政府"},{"text":"an alleged misuse","role":"不定冠词 an（元音前），首次泛指某项指控"},{"text":"public funds","role":"零冠词 + 复数名词，泛指公共资金这一类别"},{"text":"the evidence","role":"定冠词 the，回指上文调查所涉及的那批证据（特指）"},{"text":"a general sense","role":"不定冠词 a，表泛化的抽象意义"},{"text":"the standard","role":"定冠词 the，特指起诉所需的那个标准"},{"text":"a formal prosecution","role":"不定冠词 a，泛指一次正式起诉"},{"text":"the accused","role":"定冠词 + 形容词=特指名词，特指'被告'这一身份"},{"text":"an ambiguous legal position","role":"不定冠词 an（元音前），泛指某种模糊的法律地位"}],"tip":"a/an 是'第一次见面'，the 是'认得你了'，零冠词是'泛指这一类'——三者在同一句里转换，读懂每处冠词就读懂了指称链。"}},{"id":"adjective","title":"形容词","en":"Adjectives","domain":"morph","tier":4,"summary":"修饰名词，作定语或表语；有比较等级，多个并列时讲究排序。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：给名词'贴标签'","t":"形容词(adjective)的天职是描述、限定名词的性质或状态。它有两个主要岗位：①定语(attributive)：放在名词前修饰名词——a beautiful idea（美好的想法）；②表语(predicative)：放在系动词后描述主语状态——The idea seems beautiful.（联系「系动词」节点）。注意：有些形容词只能用作表语(如 asleep/afraid/alive/alone/aware)，有些只能用作定语(如 mere, utter, very)。"},{"h":"定语形容词的位置","t":"英语形容词作定语通常前置(名词前)。但以下情况后置：①形容词短语(复合定语)：a solution acceptable to all parties；②以-able/-ible结尾的形容词置于被修饰词后时语气更正式；③固定表达：court martial, time immemorial, body politic。多个形容词并列时有固定顺序，见「形容词语序」节点。"},{"h":"形容词的比较等级","t":"形容词有三个等级：原级(positive)、比较级(comparative，-er/more)、最高级(superlative，-est/most)。单音节和部分双音节加词尾(-er/-est)；多音节词用 more/most 加原形。不规则变化：good→better→best，bad→worse→worst，far→farther/further→farthest/furthest，little→less→least。见「比较等级」节点。"},{"h":"考研视角：形容词作后置定语与表语的陷阱","t":"长难句中一个形容词(或形容词短语)后置修饰名词，中间可能隔着大量其他成分，导致误读。如：Scientists found evidence consistent with the hypothesis.（consistent with...是后置定语修饰evidence，不是表语）。另，-ed/-ing 分词形容词是高频陷阱，见「-ed/-ing 形容词」节点：-ing 令人感到(the exciting result)，-ed 人感到(the excited crowd)。"}],"examples":[{"en":"The only viable approach to this complex problem involves cooperation.","zh":"解决这个复杂问题的唯一可行方法涉及合作。","note":"only 和 viable 都修饰 approach，作前置定语；complex 修饰 problem。"},{"en":"She remained unaware of the risks involved.","zh":"她对其中涉及的风险毫不知情。","note":"unaware 只能作表语，置于系动词 remained 之后；involved 作后置定语修饰 risks。"}],"hardcase":{"sentence":"The prolonged and increasingly contentious debate over the appropriate regulatory framework left policymakers uncertain, the public skeptical, and the affected industries deeply hostile to any proposed compromise.","zh":"围绕适当监管框架的持久而日趋激烈的辩论，使政策制定者感到不确定，使公众持怀疑态度，也使受影响的行业对任何拟议的妥协方案深感敌对。","marks":[{"text":"prolonged","role":"形容词，前置定语，修饰 debate（过去分词转化）"},{"text":"increasingly contentious","role":"副词+形容词，作前置定语修饰 debate"},{"text":"appropriate","role":"形容词，前置定语，修饰 regulatory framework"},{"text":"regulatory","role":"形容词（由名词转化），前置定语，修饰 framework"},{"text":"uncertain","role":"形容词，作宾语补足语（policymakers 的状态）"},{"text":"skeptical","role":"形容词，作宾语补足语（the public 的状态）"},{"text":"affected","role":"形容词（过去分词转化），前置定语，修饰 industries"},{"text":"deeply hostile","role":"形容词短语，作宾语补足语（industries 的状态），deeply 为程度副词修饰"}],"tip":"形容词既能前置作定语，也能后置作表语或宾补——看到句中不接宾语的形容词，先问它是定语还是补语，结构就清了。"}},{"id":"adj-order","title":"形容词语序","en":"Adjective Order","domain":"morph","tier":1,"summary":"限定+评价+大小+形状+年龄+颜色+来源+材料+用途+名词：a nice big round table。","level":3,"prereq":["adjective"],"parent":"adjective","detail":[{"h":"为什么形容词有顺序","t":"英语把多个形容词堆在名词前时，有约定俗成的排列顺序，打乱会让母语者感到奇怪，尽管含义不变。公式：限定(Determiner) → 评价(Opinion) → 大小(Size) → 形状/长短(Shape) → 年龄/新旧(Age) → 颜色(Color) → 来源(Origin) → 材料(Material) → 用途/类型(Purpose) → 名词(Noun)。助记缩写：DOSASCOMP。"},{"h":"实例分析","t":"a lovely little old rectangular green French silver whittling knife——这个极端示例按顺序排列了7个形容词。现实中超过3个形容词堆叠已属少见。常见的2~3个形容词组合：a beautiful old Italian car（评价→年龄→来源）；a small round table（大小→形状）；a famous Chinese painting（评价→来源）。"},{"h":"考研与写作实用原则","t":"考研写作和翻译中，记住最常用的三条：①表观点/评价的形容词(good, important, interesting)总在最前；②颜色在来源之前(a red Chinese lantern, 不是 a Chinese red lantern)；③材料在用途之前(a wooden cooking spoon)。违反顺序不会导致不可理解，但会显得非母语，在写作评卷中是扣分点。"}],"examples":[{"en":"The researchers used a reliable new digital measuring instrument.","zh":"研究人员使用了一种可靠的新型数字测量仪器。","note":"reliable(评价)→new(年龄/新旧)→digital(用途/类型)→measuring(用途分词)→instrument(名词)——顺序正确。"},{"en":"She wore an elegant long black silk dress.","zh":"她穿着一件优雅的黑色长款真丝连衣裙。","note":"elegant(评价)→long(大小)→black(颜色)→silk(材料)→dress(名词)。"}],"hardcase":{"sentence":"Archaeologists discovered a remarkable small ancient Chinese bronze ceremonial vessel that had been buried beneath several successive thick rectangular stone slabs for over two thousand years.","zh":"考古学家发现了一件卓越的小型中国古代青铜礼器，它被埋在数块依次叠放的厚实长方形石板下方已逾两千年。","marks":[{"text":"remarkable small ancient Chinese bronze ceremonial","role":"多形容词前置叠加，按「评价→大小→年龄→来源→材料→用途」顺序修饰 vessel"},{"text":"remarkable","role":"评价性形容词，序列第一位"},{"text":"small","role":"大小形容词，序列第二位"},{"text":"ancient","role":"年龄/年代形容词，序列第三位"},{"text":"Chinese","role":"来源/国籍形容词，序列第四位"},{"text":"bronze","role":"材料形容词，序列第五位"},{"text":"ceremonial","role":"用途/目的形容词，序列第六位，紧邻名词"},{"text":"successive thick rectangular stone","role":"多形容词修饰 slabs，按「评价顺序→大小→形状→材料」排列"}],"tip":"英语多形容词排列有潜规则：越主观越靠外（远离名词），越客观越靠内（紧邻名词）——背下「评大形龄色国材用」这条口诀，堆叠定语就不慌。"}},{"id":"ed-ing-adj","title":"-ed / -ing 形容词","en":"Participial Adjectives","domain":"morph","tier":3,"summary":"-ing 令人(interesting)、-ed 感到(interested)；本质是分词转化来的形容词。","level":3,"prereq":["adjective"],"parent":"adjective","detail":[{"h":"本质：分词'转型'为形容词","t":"-ing 形容词和 -ed 形容词(participial adjectives，分词形容词)本是动词的现在分词和过去分词，因长期作形容词使用而被收入形容词类。它们保留着动词的主被动含义：-ing 表'主动/进行'，意为'令人…'；-ed 表'被动/完成'，意为'感到…'。关键口诀：-ing 描述事物本身的性质，-ed 描述人(或有感知的对象)的感受。"},{"h":"常见对立对","t":"interesting / interested；exciting / excited；boring / bored；confusing / confused；surprising / surprised；disappointing / disappointed；tiring / tired；satisfying / satisfied；annoying / annoyed。记忆技巧：The lecture was boring.(讲座本身令人厌倦) → The students were bored.(学生感到厌倦)。"},{"h":"考研高频误用","t":"典型错误：★I am very interesting in biology.(错)→I am very interested in biology.(正)——感兴趣是人的感受，用 -ed。★The result is interested.(错)→The result is interesting.(正)——结果本身令人感兴趣，用 -ing。完形填空中 -ing/-ed 辨析几乎每套题必有，看主语是'人/有感知的主体'(-ed)还是'事物/情况'(-ing)。"},{"h":"与相邻语法点的联系","t":"这类形容词来源于「现在分词」和「过去分词」（化身星系），与分词作定语的用法高度重叠。形容词星系的视角：它们作定语或表语；化身星系的视角：它们是动词的非谓语形式。两套视角都要会用，不互相冲突。"}],"examples":[{"en":"The confused student asked the professor to explain the confusing concept again.","zh":"那位困惑的学生请教授再次解释那个令人费解的概念。","note":"confused(学生感到困惑，-ed) vs confusing(概念令人困惑，-ing)——同一句中两者对比。"},{"en":"The disappointing results left the research team feeling quite disappointed.","zh":"令人失望的结果让研究团队感到相当沮丧。","note":"disappointing 修饰事物(results)，disappointed 修饰人(research team)——使用原则清晰体现。"}],"hardcase":{"sentence":"The exhausted researchers, discouraged by the confusing results and the mounting pile of contradicting reports, found the situation deeply troubling and the proposed solutions utterly unconvincing.","zh":"精疲力竭的研究人员因令人困惑的结果和不断堆积的相互矛盾的报告而感到沮丧，他们发现局势令人深感忧虑，而提出的解决方案则完全不具说服力。","marks":[{"text":"exhausted","role":"-ed 形容词，前置定语：研究人员'感到疲惫'（受词影响）"},{"text":"discouraged","role":"-ed 形容词，作后置补语/插入状语：研究人员'受到打击'（被动/受影响状态）"},{"text":"confusing results","role":"-ing 形容词修饰 results：结果'令人困惑'（结果主动产生困惑效果）"},{"text":"contradicting reports","role":"-ing 形容词修饰 reports：报告'相互矛盾'（报告本身在产生矛盾效果）"},{"text":"deeply troubling","role":"-ing 形容词作宾语补足语：局势'令人忧虑'（主动令人产生感受）"},{"text":"utterly unconvincing","role":"-ing 形容词（否定前缀）作宾语补足语：方案'令人不信服'"}],"tip":"-ing 说的是'它（主动）让你有某感受'，-ed 说的是'你（被动地）有了某感受'——搞清楚谁是感受的来源、谁是感受的体验者，就不会混淆 interested/interesting。"}},{"id":"adverb","title":"副词","en":"Adverbs","domain":"morph","tier":4,"summary":"修饰动词、形容词、副词或整句；表方式、程度、时间、地点、频率、评注。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：修饰动词、形容词、副词或整句","t":"副词(adverb)的修饰对象非常广：①修饰动词：run quickly（快速地跑）；②修饰形容词：extremely important（极其重要）；③修饰另一个副词：quite slowly（相当慢）；④修饰整个句子(句子副词)：Fortunately, no one was hurt.（幸运的是）。大多数副词由形容词加 -ly 构成，但也有不规则：good→well, fast→fast, hard→hard(hardly 意思不同！)，late→late(lately 意思不同！)。"},{"h":"副词的语义类型","t":"按意义分六类：①方式(how)：carefully, efficiently；②程度(how much)：very, quite, rather, fairly, extremely；③时间(when)：recently, already, still, yet；④地点(where)：here, there, abroad；⑤频率(how often)：always, usually, often, sometimes, rarely, never；⑥评注(sentence adverb)：Interestingly, Unfortunately, Arguably——置于句首，后跟逗号，表说话者对整句的态度。"},{"h":"位置规则","t":"副词位置灵活但有规律：①频率副词放在 be 之后、实义动词之前：She always arrives early. / He is always late.；②程度副词置于所修饰的形容词/副词之前：a highly significant result；③时间/地点副词通常在句末；④句子副词通常在句首，也可插在主谓之间(较正式)。"},{"h":"考研易混：hard/hardly, late/lately, most/mostly","t":"hard(努力地) vs hardly(几乎不)——两者意思相反；late(晚)vs lately(最近，相当于 recently)；most(最)vs mostly(主要地、大部分)；high(高处)vs highly(高度地，程度副词)；near(近)vs nearly(几乎)。考研完形偶尔以此设陷，需将副词代入上下文验证逻辑。"},{"h":"与相邻语法点的联系","t":"副词同样有「比较等级」(more carefully, most carefully)，见「比较等级」节点。副词修饰句子的用法与「衔接与连贯」中的连接副词(however/therefore等)高度重叠，但连接副词额外有'连接分句'的功能。"}],"examples":[{"en":"The policy has been remarkably effective in reducing carbon emissions.","zh":"这项政策在减少碳排放方面效果显著。","note":"remarkably 是程度副词，修饰形容词 effective；注意位置在 be 动词和形容词之间。"},{"en":"Paradoxically, greater access to information has made people more susceptible to misinformation.","zh":"矛盾的是，更便捷的信息获取反而让人们更容易受到错误信息的影响。","note":"Paradoxically 是句子副词，修饰整句，表达说话者的评注；是考研阅读理解判断作者态度的重要词。"}],"hardcase":{"sentence":"Paradoxically, the more rigorously scientists tested the hypothesis, the more clearly they recognized how fundamentally flawed the underlying assumptions were, yet remarkably few chose to publicly challenge the prevailing consensus.","zh":"矛盾的是，科学家们对该假设的检验越严格，他们就越清楚地认识到基本假设在根本上存在多严重的缺陷，然而令人惊讶的是，几乎没有人选择公开挑战主流共识。","marks":[{"text":"Paradoxically","role":"句子副词，修饰整句，表达说话者对命题的评注（矛盾地）"},{"text":"rigorously","role":"方式副词，修饰 tested，说明检验的方式"},{"text":"more clearly","role":"程度副词 more + 方式副词 clearly，修饰 recognized，the more...the more 结构"},{"text":"fundamentally flawed","role":"程度副词 fundamentally 修饰形容词 flawed，加强程度"},{"text":"remarkably few","role":"程度副词 remarkably 修饰数量形容词 few，表强调"},{"text":"publicly challenge","role":"方式副词 publicly 修饰动词 challenge，说明挑战的方式"}],"tip":"副词能修饰动词、形容词、其他副词，还能评注整句——见到副词先问它挂靠在哪个词或整句上，就能读准它的修饰层级。"}},{"id":"comparison-degree","title":"比较等级","en":"Degrees of Comparison","domain":"morph","tier":5,"summary":"原级、比较级 -er/more、最高级 -est/most；是比较结构的词法基础。","level":3,"prereq":["adjective"],"parent":"adjective","detail":[{"h":"本质：三个层级的形容词/副词","t":"英语的形容词和副词有三个等级：原级(positive degree，即原形)、比较级(comparative degree)和最高级(superlative degree)。它们是比较结构的词法基础——比较级用于两者相比，最高级用于三者及以上相比或'在某范围内最…'。"},{"h":"构成规则：加词尾还是加 more/most","t":"单音节形容词/副词：加 -er/-est（fast→faster→fastest；big→bigger→biggest 注意双写）。多音节形容词：加 more/most（important→more important→most important）。双音节：有些加词尾(happy→happier→happiest, simple→simpler→simplest)，有些加 more/most(careful→more careful→most careful)。不确定时，多音节用 more/most 永远安全。"},{"h":"不规则变化：必须整块记","t":"good/well → better → best；bad/badly/ill → worse → worst；many/much → more → most；little → less → least；far → farther/further → farthest/furthest(farther指距离，further还可指程度或'更进一步')。这些不规则形式在考研阅读和写作中极高频，需熟练。"},{"h":"比较级的修饰：much/far/even/still/a lot","t":"比较级前可加修饰语表程度：much/far/a lot/a great deal + 比较级 = 强调差距大(much better, far more effective)；even/still + 比较级 = 强调'甚至更'(even worse, still more challenging)。注意：不能用 very 修饰比较级(very better 错)；very 修饰原级和最高级。"},{"h":"考研高频：比较结构的配合","t":"比较等级是「比较结构」节点的词法基础。常考点：①比较级 + than 引出比较对象；②as + 原级 + as 表同等；③the + 最高级 + in/of 表范围内最高级；④否定比较 no more/less...than 是长难句硬骨头（见「特殊句式星系」）。"}],"examples":[{"en":"The new method proved far more efficient than the traditional approach.","zh":"新方法证明比传统方法效率高得多。","note":"far 修饰比较级 more efficient，强调差距大；than 引出比较对象。"},{"en":"The less they communicated, the worse the misunderstandings became.","zh":"他们沟通越少，误解就越严重。","note":"the + 比较级...the + 比较级 结构，less 和 worse 都是比较级，须先掌握等级变化才能驾驭此结构。"}],"hardcase":{"sentence":"The more sophisticated the analytical tools became, the less straightforward the interpretation of results proved to be, and it became increasingly clear that the earlier, simpler models had been far more accurate than the more elaborate frameworks developed subsequently.","zh":"分析工具越精密，结果的解读就越发不那么直截了当；而且越来越明显的是，早期更简单的模型实际上比后来开发的更复杂的框架精确得多。","marks":[{"text":"more sophisticated","role":"比较级，the more...the less 结构的第一项，修饰 tools"},{"text":"less straightforward","role":"比较级（less 降级），the more...the less 结构的第二项"},{"text":"increasingly clear","role":"比较含义的副词 increasingly + 形容词，表程度递增"},{"text":"earlier","role":"early 的比较级，前置定语修饰 models"},{"text":"simpler","role":"simple 的比较级，前置定语修饰 models"},{"text":"far more accurate","role":"far 强调比较级 more accurate，表'远比…精确'"},{"text":"than the more elaborate frameworks","role":"than 引导比较从句，more elaborate 为比较级修饰 frameworks"}],"tip":"比较级叠加时要认清：the more...the more/less（越…越）、far/much/even 强化比较级、双重比较级——把每个比较对象都标出来，逻辑才不乱。"}},{"id":"preposition","title":"介词","en":"Prepositions","domain":"morph","tier":5,"summary":"连接名词与句子其余部分，表时间/地点/方向/方式/抽象关系；后必跟宾语。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：连接名词与句子其余部分","t":"介词(preposition)是功能词，自身无实义，但专门表达名词与句子其他成分之间的关系——时间、地点、方向、方式、原因、目的等。介词后面必须跟名词性成分(名词、代词宾格、动名词或名词从句)，叫介词宾语(object of preposition)。介词+宾语构成介词短语(prepositional phrase)，整体作定语或状语。"},{"h":"核心介词的语义分区","t":"①时间：at(点)→at noon；on(面/特定日)→on Monday；in(段)→in the morning, in 2024；during(过程中)；since(自…以来)；for(持续时间段)。②地点：at(点)→at the station；on(面)→on the table；in(空间内)→in the room；above/below(上下方)；between(两者之间)；among(三者以上之间)。③方向：to(朝向/终点)；toward(朝)；into(进入)；through(穿过)；across(横穿)。"},{"h":"介词短语的句法功能","t":"介词短语可作：①定语(post-modifier)——the book on the table（后置修饰名词）；②状语——We met in the library.（修饰动词）；③介词宾语——I'm interested in linguistics.（in 后面是动名词或名词）。理解介词短语的功能，是拆解长难句的关键——见到介词短语，先问：它修饰什么/属于谁？"},{"h":"考研高频介词易混","t":"①in/at/on 表时间：in the morning, on Monday morning, at noon（越具体越用at）。②in/at/on 表地点：in Beijing, at the school gate, on the street。③due to / owing to / because of(因为，介词短语) vs because(因为，连词，后跟从句)——写作易混：Due to his illness, he missed the exam.(正，介词短语) vs Because he was ill...(连词)。④in spite of / despite(尽管，介词) vs although/though(连词)。"},{"h":"与相邻语法点的联系","t":"介词的固定搭配(collocation)形成「介词搭配」子节点——动词/形容词/名词 + 特定介词的组合须整块记忆。介词也与「关系代词」联动：定语从句中可把介词提到关系代词前，形成 in which / of whom 等正式结构（见「介词+关系代词」节点）。"}],"examples":[{"en":"The agreement between the two governments was reached after months of negotiation.","zh":"两国政府之间的协议经过数月谈判达成。","note":"between the two governments(介词短语作定语) + after months of negotiation(介词短语作状语)——一句话两个介词短语，功能不同。"},{"en":"She succeeded in overcoming her fear of public speaking.","zh":"她成功地克服了对公开演讲的恐惧。","note":"in overcoming(介词+动名词，fixed collocation succeed in doing)；of public speaking(介词短语作定语修饰 fear)。"}],"hardcase":{"sentence":"In the absence of any consensus on the matter, the committee, under pressure from groups with conflicting interests, deferred its decision until the report had been reviewed by experts from across the country.","zh":"由于在此事上缺乏任何共识，委员会迫于利益相互冲突的各方的压力，推迟了决定，直到报告经全国各地的专家审阅之后。","marks":[{"text":"In the absence of","role":"复合介词，引导原因状语（=由于缺乏）"},{"text":"on the matter","role":"介词短语作定语，修饰 consensus"},{"text":"under pressure from","role":"介词短语作状语，表处境（迫于…压力）"},{"text":"with conflicting interests","role":"介词短语作定语，修饰 groups"},{"text":"by experts","role":"介词 by 引出被动语态的施事"},{"text":"from across the country","role":"介词套介词，作定语修饰 experts"}],"tip":"介词短语在长难句里几乎都在'修饰'或'连接'——圈定每个介词管辖到下一个标点/动词为止，长句立刻切块。"}},{"id":"prep-collocation","title":"介词搭配","en":"Prep. Collocations","domain":"morph","tier":3,"summary":"depend on、be good at、in terms of——动/形/名与介词的固定搭配，写作高频。","level":3,"prereq":["preposition"],"parent":"preposition","detail":[{"h":"本质：固定不可替换的介词搭配","t":"介词搭配(prepositional collocation)是'动词/形容词/名词 + 特定介词'的固定组合，无法根据语义推断，必须整块记忆。例如：depend on（而非depend at/in）；be responsible for（而非be responsible of）；in terms of（而非on terms of）。这类搭配是考研完形填空的高频考点，也是写作出错率最高的区域之一。"},{"h":"高频动词 + 介词搭配","t":"✓ depend on/upon（依赖）；consist of（由…构成）；result in（导致）/result from（源于）；contribute to（有助于/导致）；refer to（提到/查阅）；comply with（遵守）；engage in（从事）；account for（说明/占比例）；deal with（处理）；interfere with（干扰）；insist on（坚持）；differ from（不同于）。注意 result in(cause) vs result from(be caused by)——方向相反，是考研陷阱。"},{"h":"高频形容词 + 介词搭配","t":"✓ be aware of（意识到）；be capable of（有能力）；be responsible for（对…负责）；be interested in（对…感兴趣）；be concerned about/with（关心/涉及）；be consistent with（与…一致）；be associated with（与…相关）；be based on（基于）；be engaged in（从事于）；be committed to（致力于，to后接动名词）。"},{"h":"高频名词 + 介词搭配 & 固定短语","t":"✓ in terms of（就…而言）；in light of（鉴于）；in spite of / in the face of（尽管）；on behalf of（代表）；at the expense of（以…为代价）；with regard to（关于）；for the sake of（为了…的利益）；as a result of（由于）。这些短语介词在长难句中频繁出现，见到须整体理解。"},{"h":"学习策略","t":"背搭配时，把介词和后面跟动名词还是名词一并记。特别注意：committed to doing（而非to do，因to是介词不是不定式符号）；look forward to doing；be used to doing（习惯）vs used to do（过去常做）。"}],"examples":[{"en":"The increase in productivity resulted from improvements in technology rather than an expansion of the workforce.","zh":"生产率的提升源于技术改进，而非劳动力的扩张。","note":"result from(源于，原因在后) vs result in(导致，结果在后)——两组方向要分清。"},{"en":"The committee is committed to addressing climate change at an international level.","zh":"委员会致力于在国际层面应对气候变化。","note":"committed to 后跟动名词 addressing，to 是介词；此处 to 不是不定式符号，是常见陷阱。"}],"hardcase":{"sentence":"The outcome of the negotiations depended heavily on whether both parties were capable of agreeing on a framework consistent with their respective interests, since the success of any accord is contingent on the goodwill of those involved rather than on the mere signing of documents.","zh":"谈判结果在很大程度上取决于双方是否有能力就与各自利益相符的框架达成一致，因为任何协议的成功都有赖于相关方的善意，而非仅仅依赖文件的签署。","marks":[{"text":"depended heavily on","role":"固定搭配 depend on（取决于），heavily 为程度副词插入修饰"},{"text":"capable of agreeing","role":"固定搭配 be capable of + doing（有能力做某事）"},{"text":"agreeing on a framework","role":"固定搭配 agree on（就…达成一致）"},{"text":"consistent with","role":"固定搭配 be consistent with（与…相符/一致）"},{"text":"contingent on","role":"固定搭配 be contingent on（取决于/有赖于）"},{"text":"rather than on","role":"rather than 引导对比，on 为 contingent on 的省略延续（而非仅依赖）"}],"tip":"depend on / agree on / capable of / consistent with / contingent on——这些动形搭配里的介词是固定的，不能替换；见到动词/形容词就顺手查搭配介词，写作不丢分。"}},{"id":"conjunction","title":"连词","en":"Conjunctions","domain":"morph","tier":5,"summary":"连接词、短语、分句；并列连词对等相连，从属连词引出从句。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：语言的'胶水'","t":"连词(conjunction)的作用是把词、短语或分句'粘'在一起，表达它们之间的逻辑关系。分两大类：①并列连词(coordinating conjunction)：连接地位平等的成分——and(并列)、but(转折)、or(选择)、so(因果)、for(原因，书面语)、yet(但，语气比but稍强)、nor(既不…也不)。口诀：FANBOYS(For/And/Nor/But/Or/Yet/So)。②从属连词(subordinating conjunction)：引出从属地位的从句——when/while/because/although/if/unless等（这类连词是状语从句的引擎，见「从句星系」）。"},{"h":"并列连词的逻辑关系","t":"and：纯粹并列或顺序递进。but/yet：对比转折——'通常成立，但例外'。or：选择，也表'否则'(Do it or you'll fail.)。so：前因后果('因此')。for：前果后因('因为'，书面语，不及 because 常见)。not only...but also...：递进并列，连接的两个成分语法类型须对称(平行结构)。"},{"h":"从属连词：与并列连词的本质区别","t":"从属连词后面跟的是从句，整个从句相对于主句处于'从属'地位，不可独立成句。常见从属连词：时间(when, while, after, before, since, until)；原因(because, since, as, now that)；条件(if, unless, as long as, provided)；让步(although, though, even if, while)；目的(so that, in order that)；结果(so...that)。见「从句星系」各节点详解。"},{"h":"考研高频陷阱：连词的重复与冲突","t":"①although/though 不能与 but 同句共用：Although it rained, but we continued.（错）→ Although it rained, we continued.(正) / It rained, but we continued.(正)。因为 although 已经表达了转折，再加 but 等于重复连接。②because 不能与 so 同句：Because she was tired, so she went to bed.(错)→去掉一个。这两条是考研语法选择题中最稳定的送分题型。"},{"h":"与相邻语法点的联系","t":"并列连词是「并列句」的核心成分，从属连词是「复合句」和「状语从句」的引擎。并列连词也是「平行结构」的纽带——并列的两个成分语法形式必须对称。连词还与「衔接与连贯」交叉：许多连词既有句法功能，也有语篇逻辑标记功能。"}],"examples":[{"en":"Although the evidence was compelling, many scientists remained skeptical.","zh":"尽管证据令人信服，许多科学家仍持怀疑态度。","note":"although 引导让步从句，主句无 but——两个连接词不能同时使用。"},{"en":"The study aimed not only to identify the causes but also to propose practical solutions.","zh":"这项研究不仅旨在找出原因，还旨在提出实际解决方案。","note":"not only...but also 连接两个不定式短语(to identify / to propose)，保持语法平行——平行结构的典范。"}],"hardcase":{"sentence":"Although the data were compelling and the methodology was sound, neither the academic community nor the policymakers were prepared to act, for the implications were so far-reaching that both caution and thoroughness were deemed indispensable before any decision could be made.","zh":"尽管数据令人信服、方法论也很扎实，但无论是学术界还是政策制定者，都没有准备好采取行动，因为其影响如此深远，以至于在做出任何决定之前，谨慎与彻底性都被视为不可或缺。","marks":[{"text":"Although","role":"从属连词，引导让步状语从句"},{"text":"and","role":"并列连词，连接 the data were compelling 与 the methodology was sound 两个并列分句"},{"text":"neither","role":"相关并列连词的前项（neither...nor），引导并列否定主语"},{"text":"nor","role":"相关并列连词的后项，与 neither 搭配构成'两者都不'"},{"text":"for","role":"并列连词（= because），连接前一结果与后一原因分句（书面语用法）"},{"text":"so far-reaching that","role":"so...that 结果状语从句的连词结构（如此…以致…）"},{"text":"and","role":"并列连词，在结果从句中连接 caution 与 thoroughness"},{"text":"before","role":"从属连词，引导时间状语从句（在…之前）"}],"tip":"一句话里并列连词、从属连词、相关连词可以同时出现——for 作并列连词时是'书面因为'、neither...nor 是全否、so...that 触发结果从句，认清每个连词的类型才能划对句界。"}},{"id":"determiner","title":"限定词","en":"Determiners","domain":"morph","tier":3,"summary":"名词前的'限定层'：冠词、指示、物主、数量词；规定名词指谁、有多少。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：名词前的'限定层'","t":"限定词(determiner)是名词短语中、形容词之前的那一层，专门'限定'该名词指的是哪个或哪些。限定词不能叠加使用(不能说 the a book 或 this my pen)，同一位置只能有一个。限定词包括：①冠词(a/an/the)；②指示词(this/that/these/those)；③物主代词(my/your/his/her/its/our/their)；④疑问限定词(which/what/whose)；⑤量化词(all/both/each/every/either/neither/some/any/no/many/much/few/little/more/most/enough/several)；⑥数词(one/two/…/first/second/…)。"},{"h":"前限定词、中限定词、后限定词","t":"限定词内部也有层次：前限定词(predeterminer)在最前，如 all/both/half/double/once/twice(all the students, half my salary)；中限定词(central determiner)是冠词/指示词/物主代词等，每组名词短语只能用一个；后限定词(postdeterminer)紧随中限定词，如数词和 many/few/little/much 等(the two students, my many friends)。这一分层解释了为什么 all my three best friends 可以成立——all(前)+my(中)+three(后)。"},{"h":"与冠词的关系","t":"冠词是限定词中最核心、使用频率最高的一类，因此单独作为「冠词」节点详述。学习限定词的意义在于理解：this/that/these/those、my/your 等与 the 的功能是平行的——都是'特指'信号，都不能与 a/an 或 the 共用。"},{"h":"考研考点","t":"完形填空中偶尔考察限定词选用：①every vs each：every 强调整体（every student = all students），each 强调个体（each student, one by one）；两者都后跟单数名词和单数谓语。②either/neither 作限定词时后跟单数名词：either side, neither party。③量化词的可数性匹配：many/few + 可数复数，much/little + 不可数（见「数量表达」节点）。"}],"examples":[{"en":"All three major proposals were rejected by the committee.","zh":"委员会拒绝了全部三项主要提案。","note":"All(前限定词)+ three(后限定词/数词)+ major(形容词)+ proposals(名词)——限定词的层次清晰可见。"},{"en":"Each member of the team was assigned a specific role.","zh":"团队每位成员都被分配了一个具体角色。","note":"Each 后跟单数名词 member，谓语 was 用单数——每个限定词对动词单复数有影响。"}],"hardcase":{"sentence":"Each attempt to reconcile these two opposing theories has attracted considerable attention, yet every proposed synthesis has met with the same fundamental objection: both frameworks rest on certain assumptions that neither side is willing to abandon.","zh":"每一次调和这两种对立理论的尝试都引起了相当大的关注，然而每一个拟议的综合方案都遭遇了同一根本性反对意见：两个框架都依赖某些任何一方都不愿放弃的假设。","marks":[{"text":"Each attempt","role":"限定词 each，个体强调单数，修饰 attempt（每一次）"},{"text":"these two opposing theories","role":"指示限定词 these 特指两个理论，two 为数量限定词"},{"text":"every proposed synthesis","role":"限定词 every，强调全体中每一个，修饰单数名词 synthesis"},{"text":"the same fundamental objection","role":"定冠词 the 特指那个已知的反对意见，same 为限定性形容词"},{"text":"both frameworks","role":"限定词 both，指两者全部，修饰复数名词"},{"text":"certain assumptions","role":"限定词 certain，表不确定的特指（某些假设）"},{"text":"neither side","role":"限定词 neither，表两者都不，修饰单数名词 side"}],"tip":"限定词是名词前的'通行证'：each/every/both/neither/certain/these……它们精确规定了名词指'哪些'或'多少'，混淆限定词就混淆了逻辑对象。"}},{"id":"quantifier","title":"数量表达","en":"Quantifiers","domain":"morph","tier":3,"summary":"some/any、much/many、(a) few/(a) little——可数不可数分用，few/little 暗含否定。","level":3,"prereq":["determiner"],"parent":"determiner","detail":[{"h":"本质：数量的表达","t":"数量表达(quantifiers)是指修饰名词、表示数量多少的一类词。其核心挑战在于：可数名词和不可数名词使用不同的数量词，用错会产生严重的语法错误。核心对立：many / few 搭配可数复数名词，much / little 搭配不可数名词。some / any 两者皆可。"},{"h":"几 vs 几乎没有：a few/a little vs few/little","t":"这是最高频的考点。①a few(有几个) vs few(几乎没有，含否定)：搭配可数复数名词。She has a few friends.(她有几个朋友，肯定) vs She has few friends.(她几乎没有朋友，否定，语气悲观)。②a little(有一些) vs little(几少，几乎没有)：搭配不可数名词。There is a little hope.(还有一点希望) vs There is little hope.(几乎没有希望)。"},{"h":"some vs any","t":"some：用于肯定句(I have some questions.)，以及期待肯定回答的疑问句(Would you like some coffee?)。any：用于否定句(I don't have any questions.)、一般疑问句(Do you have any questions?)、条件从句(If you have any doubts...)，及表'任何'的肯定句(Any help would be welcome.)。"},{"h":"大量/少量的正式表达","t":"可数：a number of / a great number of(大量)；a (large) variety of；several(几个)。不可数：a great deal of / a large amount of / a significant amount of(大量)。两者皆可：a lot of / lots of(非正式)；plenty of；no。写作中 a number of + 复数名词 + 复数谓语；an amount of + 不可数名词 + 单数谓语。"},{"h":"与相邻语法点的联系","t":"数量词直接联动「可数与不可数」——可数性决定用哪一套量词。数量词作主语时影响「主谓一致」：a number of people are(复数)；the number of people is(单数，因主语是the number)。部分否定与 all/every/both 有关，见「特殊句式星系-部分否定」节点。"}],"examples":[{"en":"There is little evidence to support the claim, though a few researchers have raised similar concerns.","zh":"几乎没有证据支持这一主张，尽管少数研究者提出了类似的担忧。","note":"little evidence(不可数，几乎没有)；a few researchers(可数复数，有几位)——两个词在同句中形成对比，可数性差异鲜明。"},{"en":"A large number of studies have confirmed this relationship.","zh":"大量研究证实了这一关系。","note":"a number of + 复数名词，谓语 have 用复数；如果是 the number of studies is...，谓语反而用单数。"}],"hardcase":{"sentence":"Few scientists had much confidence in the preliminary results, and little of the data collected during the first phase offered any clear guidance; however, several of the teams reported some progress, though much of what they described amounted to little more than speculation.","zh":"很少有科学家对初步结果抱有太大信心，第一阶段收集的数据中几乎没有提供任何明确指导；然而，几个团队报告了一些进展，尽管他们描述的大部分内容不过是推测而已。","marks":[{"text":"Few scientists","role":"few + 可数复数名词，几乎没有（含否定意味），与 a few（有一些）对比"},{"text":"much confidence","role":"much + 不可数名词，大量（用于否定/疑问语境）"},{"text":"little of the data","role":"little + of + 不可数名词，几乎没有（含否定），the data 特指"},{"text":"any clear guidance","role":"any + 不可数名词，用于否定语境表'任何'"},{"text":"several of the teams","role":"several + of + 可数复数名词，若干（肯定意味）"},{"text":"some progress","role":"some + 不可数名词，一些（肯定）"},{"text":"much of what they described","role":"much + of + 名词从句，大部分（不可数范畴）"},{"text":"little more than speculation","role":"little 与 more than 搭配，表'不过只是'（接近否定）"}],"tip":"few/little（几乎没有）≠ a few/a little（有一些）；much/many、some/any 的可数不可数分工和肯定否定语境都是陷阱——每个数量词都要核查名词是否可数再决定用哪个。"}},{"id":"numeral","title":"数词","en":"Numerals","domain":"morph","tier":1,"summary":"基数词表数量、序数词表顺序；分数、百分数、年代的读法各有定式。","level":2,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"两大类：基数词与序数词","t":"数词(numeral)分两类：①基数词(cardinal number)表数量：one, two, three…, twenty, hundred, thousand, million, billion；②序数词(ordinal number)表顺序：first, second, third, fourth…, twentieth, hundredth。序数词通常前加定冠词 the：the first chapter, the second attempt。"},{"h":"特殊读法：分数、百分数、年代","t":"分数(fraction)：分子用基数词，分母用序数词，分子大于1分母加-s：1/3 = one third；2/3 = two thirds；1/2 = a/one half；3/4 = three quarters。百分数：30% = thirty percent(percent 是一个词，不变复数)。年代：the 1990s = the nineteen nineties(用复数，表那个十年)；2024 = twenty twenty-four 或 two thousand and twenty-four。"},{"h":"考研实用注意事项","t":"①hundred/thousand/million 在有具体数字前不加-s：five hundred people(不是five hundreds)；但表模糊大数时加-s：hundreds of people, thousands of years。②large numbers 的写法：1,000,000 = one million；用逗号每三位一隔，读时从最高位开始。③序数词在翻译题中出现：首先(first/firstly/in the first place)，其次(second/secondly)——序数词转中文时灵活处理。"}],"examples":[{"en":"Two thirds of the respondents agreed with the policy change.","zh":"三分之二的受访者同意这项政策变化。","note":"two thirds 作分数主语，谓语 agreed 随分子(two)用复数；若是 one third...，则看后面名词的可数性。"},{"en":"The study examined hundreds of cases spanning three decades.","zh":"这项研究检验了跨越三十年的数百个案例。","note":"hundreds of 表模糊大数(加-s)，与 three hundred cases(精确数不加-s)形成对比。"}],"hardcase":{"sentence":"By the mid-1980s, three-quarters of the world's two hundred or so newly independent states had adopted one of two dominant constitutional models, yet fewer than a third managed to sustain democratic governance beyond the first decade.","zh":"到20世纪80年代中期，世界上大约两百个新独立国家中有四分之三采用了两种主流宪政模式之一，然而其中能够将民主治理维持到第一个十年之后的不足三分之一。","marks":[{"text":"mid-1980s","role":"序数词构成的年代表达，1980s 表80年代复数，mid- 前缀表'中期'"},{"text":"three-quarters","role":"分数词，四分之三，作主语（复数概念）"},{"text":"two hundred or so","role":"基数词 two hundred + or so 表约数（大约两百）"},{"text":"two dominant constitutional models","role":"基数词 two 作限定词，修饰 models"},{"text":"one of two","role":"基数词 one 和 two 构成'两者之一'的分配表达"},{"text":"a third","role":"分数词，三分之一，作宾语（a third = one third）"},{"text":"first decade","role":"序数词 first 作定语，修饰 decade（第一个十年）"}],"tip":"基数词、序数词、分数词在学术语体里密集出现——three-quarters、a third、mid-1980s 都是固定读写形式，记住分数'分母序数词+分子基数词'的规则不出错。"}},{"id":"interjection","title":"感叹词","en":"Interjections","domain":"morph","tier":1,"summary":"Oh/Alas/Well 等独立于句法之外，直抒情绪。","level":3,"prereq":["pos-overview"],"parent":"pos-overview","detail":[{"h":"本质：超脱句法的情绪词","t":"感叹词(interjection)是独立于句子结构之外、直接表达情绪或态度的词。它不担任任何句子成分，后跟逗号或感叹号。常见感叹词：Oh(惊讶/失望)、Ah(领悟/感叹)、Alas(惋惜，书面语)、Well(停顿/缓冲)、Indeed(确实，表强调)、Hey(引起注意)。在正式书面语中极少见，考研阅读基本不考；写作中应避免使用。"},{"h":"考研语境中的实际用法","t":"感叹词在考研英语中几乎不作为考点直接考察。但需了解：①它出现时不影响句子主干，可直接跳过；②Well 和 Indeed 有时以'语气副词'身份出现在句首，需与作句子副词的 well 区分；③文学作品引语中的感叹词须保留翻译。"}],"examples":[{"en":"Alas, the expedition had failed before it even began.","zh":"唉，这次探险在开始之前就已经失败了。","note":"Alas 是独立感叹词，不作句子任何成分，去掉后句子仍完整。"},{"en":"Well, the data do suggest a stronger correlation than initially expected.","zh":"呃，数据确实表明相关性比最初预期的更强。","note":"Well 作语气缓冲词，表达思考或顿挫，do 是强调助动词；这一句较正式，Well 在书面文章中可删去。"}],"hardcase":{"sentence":"Well, the committee had hoped for a swift resolution, but alas, the negotiations dragged on for months; oh, the irony of it all was that the very clause meant to prevent deadlock had itself become the principal source of contention.","zh":"唉，委员会本希望迅速解决问题，但遗憾的是，谈判拖延了数月；哦，最讽刺的是，那个本意在于防止僵局的条款本身却成了争议的主要根源。","marks":[{"text":"Well","role":"感叹词，置于句首，表语气过渡/停顿，带轻微犹豫或引入转折"},{"text":"alas","role":"感叹词，表遗憾或惋惜，独立于句法结构之外，用逗号隔开"},{"text":"oh","role":"感叹词，表情绪上的顿悟或感慨，引入评论性分句"}],"tip":"感叹词游离于句法之外，用逗号与主句隔开，不作任何句子成分——阅读时遇到 Well/Alas/Oh 直接跳过分析句法，但读懂它传递的情绪色彩有助于把握语气。"}},{"id":"constituents","title":"句子成分","en":"Sentence Constituents","domain":"sentence","tier":6,"summary":"主谓宾定状补表同位——分析任何句子的统一工具，长难句的解剖刀。","level":1,"prereq":[],"parent":null,"detail":[{"h":"本质：句子的解剖刀","t":"句子成分(sentence constituents)是分析任何英语句子的统一工具。汉语靠语序和语感理解句子，英语同样靠语序，但英语有一套明确的「成分」标签——主语、谓语、宾语、表语、定语、状语、补语、同位语——给句子的每一块贴上功能标签。掌握这套体系，再长的句子也能被拆解还原。"},{"h":"八大成分一览","t":"主语(subject)：句子陈述的对象。谓语(predicate)：核心动词，唯一必须由限定动词担任的成分。宾语(object)：动作的承受者。表语(predicative)：系动词后，说明主语状态。定语(attributive)：修饰名词。状语(adverbial)：修饰动词或全句，交代时间/地点/原因等。补语(complement)：补足宾语或主语意义使句子完整。同位语(appositive)：紧跟名词，对其重新命名或解释。"},{"h":"哪个成分可以由哪类词担任","t":"主语：名词、代词、不定式、动名词、从句均可。谓语：只能是限定动词(finite verb)。宾语：名词、代词、不定式、动名词、从句。表语：名词、形容词、介词短语、从句。定语：形容词（前置）、介词短语、分词、不定式、定语从句（后置）。状语：副词、介词短语、分词短语、不定式（表目的/结果）、状语从句。这张对照表是判断句子成分的操作指南。"},{"h":"考研高频考点","t":"考研长难句里，定语和状语是最容易被误读的两大成分，因为它们往往由长短语或从句后置担任。解题步骤：①先找谓语动词（限定形式，有时态变化），②向前找主语，③向后找宾语/表语，④剩下的大块修饰语先贴上定语或状语标签再翻译。与「五大基本句型」联动：辨清成分自然知道句型；与「定语从句」「状语从句」联动：从句充当成分才能回归主干。"},{"h":"相邻知识点","t":"「五大基本句型」是成分分析的落点——识别主谓宾补表之后才能归类句型。「谓语」是成分中地位最特殊的一个，与「动词系统总览」直连。「定语从句」充当后置定语，「状语从句」充当状语，「名词性从句」可充当主宾表同位——三大从句星系的所有从句，本质上都在填充这八个成分之一。「长难句分析法」把本节技能综合运用，是全图的元技能节点。"}],"examples":[{"en":"The government's decision to raise taxes angered many citizens.","zh":"政府提高税收的决定激怒了许多市民。","note":"主语=The government's decision（名词短语）；to raise taxes 作后置定语修饰 decision；谓语=angered；宾语=many citizens。"},{"en":"What surprised us most was his calm response.","zh":"最令我们惊讶的是他平静的回应。","note":"主语=what 引导的名词从句；谓语=was；表语=his calm response。主语从句充当「主语」成分的典型。"},{"en":"The report, published last year, has been widely cited.","zh":"该报告自去年出版以来被广泛引用。","note":"published last year 是过去分词短语，作后置定语修饰 report；谓语=has been cited（被动完成时）。"}],"hardcase":{"sentence":"The proposal that the board of directors had unanimously endorsed as a solution to the company's declining revenues was subsequently rejected by shareholders who cited concerns about long-term sustainability.","zh":"董事会一致认可的作为公司营收下滑解决方案的那份提案，随后被以长期可持续性为由提出异议的股东们否决了。","marks":[{"text":"The proposal","role":"主语（真正的主语，被长定语从句隔在句首）"},{"text":"that the board of directors had unanimously endorsed as a solution to the company's declining revenues","role":"定语从句，修饰主语 proposal"},{"text":"was subsequently rejected","role":"谓语（被动语态，与主语 proposal 呼应）"},{"text":"by shareholders","role":"状语，介词短语引出被动施事"},{"text":"who cited concerns about long-term sustainability","role":"定语从句，修饰 shareholders；concerns 为宾语，about 短语为其定语"}],"tip":"先找动词 was rejected，再向前找其主语 The proposal——中间整块定语从句是干扰，剥离后主谓立现。"}},{"id":"subject","title":"主语","en":"Subject","domain":"sentence","tier":4,"summary":"句子陈述的对象，动作的发出者；可由名词、代词、非谓语、从句充当。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：句子谈论的对象","t":"主语(subject)是句子「说的是谁/什么」的答案。在英语中，主语通常居句首，动词的人称和数随主语变化（即「主谓一致」）。去掉所有修饰语，剩下的核心词就是主语中心词，它决定谓语用单数还是复数。"},{"h":"担任主语的形式","t":"①名词/代词：最常见，如 The student studies hard. ②不定式(to do)：To learn English takes time. 常用 it 作形式主语(formal subject)后置，真正主语推到句尾：It takes time to learn English.  ③动名词(doing)：Reading widely broadens your mind.  ④名词性从句：That she succeeded surprised everyone. 同样常后置，由 it 占位。"},{"h":"考研陷阱：主语被修饰语隔断","t":"考研长难句里，主语和谓语之间常插入长定语从句或介词短语，极易错误匹配。策略：找到谓语动词（有时态变化的限定动词）后，向前跳过所有修饰层（逗号之间的插入语、who/which 引导的定语从句），找到被修饰的核心名词即主语。注意：主语后有时跟同位语从句，句子看起来很长，主语其实只是那个核心名词。"},{"h":"与主谓一致的联动","t":"主语的单复数、可数性直接影响谓语形式，详见「主谓一致」节点。特别注意：量词短语（a number of / the number of）、不定代词（everyone/each）、连接词（either…or）引导的主语，一致规则各有不同，是完形和阅读的隐形考点。"}],"examples":[{"en":"It is essential that every student understands the rules.","zh":"每个学生理解这些规则是至关重要的。","note":"it 是形式主语，that 从句才是真正主语。"},{"en":"The findings of the research conducted over five years have changed our understanding.","zh":"这项历时五年的研究所得出的发现改变了我们的认识。","note":"主语核心是 findings；conducted over five years 是后置分词定语；谓语是 have changed（复数，与 findings 一致）。"},{"en":"Whether the policy will succeed remains uncertain.","zh":"该政策是否会成功仍不确定。","note":"whether 从句整体作主语，谓语用第三人称单数 remains。"}],"hardcase":{"sentence":"That the findings of the longitudinal study, which had been conducted over three decades across twelve countries, could be so easily dismissed by policymakers with little background in epidemiology seemed to the researchers both baffling and disheartening.","zh":"那项历时三十年、横跨十二国的纵向研究的发现，竟能被几乎没有流行病学背景的政策制定者如此轻易地否定，这在研究人员看来既令人费解，也令人沮丧。","marks":[{"text":"That the findings of the longitudinal study, which had been conducted over three decades across twelve countries, could be so easily dismissed by policymakers with little background in epidemiology","role":"主语从句，整体作 seemed 的主语"},{"text":"seemed","role":"谓语（系动词），对应前方的主语从句"},{"text":"both baffling and disheartening","role":"表语，描述主语从句所表达之事留给研究者的感受"}],"tip":"That 开头的长从句是主语而非状语——找到 seemed 才是谓语，主语从句到此为止。"}},{"id":"predicate-verb","title":"谓语","en":"Predicate / Verb","domain":"sentence","tier":4,"summary":"句子的核心，唯一必须由动词担任的成分；它的时态语态承载全句信息。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：句子的心脏","t":"谓语(predicate)是句子里唯一必须由**限定动词**(finite verb)担任的成分——所谓限定，就是有人称、数、时态变化的动词形式。一句话只能有一个主要谓语（主句的核心动作）；其他动词形式（不定式、分词、动名词）若不作谓语，就是非谓语动词，不能单独撑起主谓结构。"},{"h":"谓语的构成","t":"谓语可以很简单（单一动词：runs）或很复杂（助动词+情态+完成+进行+被动叠加：might have been being studied）。公式：(情态动词) + (have + done完成) + (be + doing进行) + (be + done被动) + 动词原形/过去式。这些零件的组合规则在「时空星系」和「语态」节点详述，谓语是那些知识的容器。"},{"h":"谓语 vs 非谓语：最关键的区分","t":"考研长难句里最常见的困惑：分不清哪个动词是谓语，哪个是非谓语。判断法则：有时态（如 studied、is studying、has studied）= 谓语；以 to do、doing、done 形式出现且前无 be/have 助动词 = 非谓语，只是其他成分（定语、状语、宾语）的一部分，不是句子的核心动词。一个简单句只有一个限定谓语，多余的动作必须用从句或非谓语承载。"},{"h":"考研高频考点","t":"①谓语与「动词系统总览」直连：时态、体、语态、情态全部体现在谓语上。②「主谓一致」：谓语的数随主语变化。③翻译题：谓语识别错误导致整句结构崩塌，先找谓语是翻译长难句的第一步。④被动语态在学术写作中极为常见，be + 过去分词即被动谓语，注意时态叠加（has been written）。"}],"examples":[{"en":"The data collected from the survey suggest a different conclusion.","zh":"从调查中收集的数据表明了一个不同的结论。","note":"谓语=suggest；collected 是过去分词作定语，非谓语，不要误认为谓语。"},{"en":"The policy has been widely criticized for ignoring the needs of the poor.","zh":"该政策因忽视穷人的需求而受到广泛批评。","note":"谓语=has been criticized（现在完成时被动），for ignoring 是介词短语作状语，非谓语。"},{"en":"To succeed in research, one must learn to tolerate uncertainty.","zh":"要在研究中取得成功，一个人必须学会容忍不确定性。","note":"谓语=must learn；To succeed 是目的状语（非谓语），to tolerate 是 learn 的宾语（非谓语）。"}],"hardcase":{"sentence":"The committee, despite having reviewed the evidence carefully and having consulted three independent experts, could not have reached a more defensible conclusion than the one they eventually announced.","zh":"该委员会尽管仔细审阅了证据并咨询了三位独立专家，也未必能得出比他们最终宣布的那个更站得住脚的结论。","marks":[{"text":"could not have reached","role":"谓语（情态动词+完成时，整个谓语核心）"},{"text":"having reviewed the evidence carefully","role":"动名词短语，作让步状语的一部分，非谓语"},{"text":"having consulted three independent experts","role":"动名词短语，并列作让步状语，非谓语"},{"text":"they eventually announced","role":"省略了关系代词 that 的定语从句，修饰 one"}],"tip":"插入的 despite 短语和两个 having done 都不是谓语——真正的谓语只有 could not have reached。"}},{"id":"object","title":"宾语","en":"Object","domain":"sentence","tier":4,"summary":"动作的承受者；及物动词后必带，分直接宾语与间接宾语。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：动作的承受者","t":"宾语(object)是及物动词(transitive verb)动作的落点——动作「打」到了谁、「读」的是什么。英语宾语紧跟动词（及物动词+宾语），位置固定。不及物动词(intransitive verb)后不带宾语，这也是汉英翻译的常见坑：汉语「到达某处」是及物，英语 arrive 却不及物，须写 arrive at/in。"},{"h":"直接宾语与间接宾语","t":"双宾语动词(ditransitive verbs)如 give/send/show/tell/offer 后可跟两个宾语：间接宾语(indirect object，表接收方，通常是人) + 直接宾语(direct object，表物)。例：He gave me a book. 可改写为 He gave a book to me.（直接宾语前置时须加介词）。两种结构意思相同，改写是写作和完形的常见考点。"},{"h":"充当宾语的形式","t":"①名词/代词：I read the report.  ②不定式：She wants to leave.  ③动名词：I enjoy reading.  ④宾语从句(object clause)：I know that he is right. 这里宾语从句是最复杂的形式，须注意 that 引导时的时态呼应，以及 what/whether 引导时 what 在从句内要作成分。与「宾语从句」「动词后的非谓语」节点深度联动。"},{"h":"考研陷阱","t":"①混淆宾语与表语：see/find/keep/make + 宾语 + 形容词/名词时，后面的形容词/名词是「宾语补语」，不是宾语本身。②介词宾语：介词后的名词成分是介词的宾语，不是谓语动词的宾语，两者不要混淆。③it 作形式宾语：find it difficult to + 动词，it 是形式宾语，真正宾语是 to 不定式，这是写作高分句式。"}],"examples":[{"en":"Many researchers find it hard to replicate these results.","zh":"许多研究者发现很难复现这些结果。","note":"it 是形式宾语，hard 是宾语补语，to replicate these results 是真正的宾语。"},{"en":"The teacher told the students a story about courage.","zh":"老师给学生们讲了一个关于勇气的故事。","note":"间接宾语=the students；直接宾语=a story；about courage 是定语修饰 story。"},{"en":"I don't know whether the meeting has been postponed.","zh":"我不知道会议是否已被推迟。","note":"whether 从句整体作动词 know 的宾语；whether 不在从句中作成分（区别于 what）。"}],"hardcase":{"sentence":"The journalist revealed what the government had long denied — that surveillance data collected from private communications had been shared with foreign intelligence agencies without judicial oversight.","zh":"这位记者揭露了政府长期否认的事实——从私人通讯中收集的监控数据在没有司法监督的情况下已被共享给外国情报机构。","marks":[{"text":"what the government had long denied","role":"宾语从句，作 revealed 的直接宾语"},{"text":"that surveillance data collected from private communications had been shared with foreign intelligence agencies without judicial oversight","role":"同位语从句，解释破折号前 what 从句所指的内容"}],"tip":"revealed 的宾语是整个 what 从句；破折号后再展开其内容，属同位解释，不是第二个宾语。"}},{"id":"predicative","title":"表语","en":"Predicative","domain":"sentence","tier":3,"summary":"系动词之后，说明主语身份或状态；与主语指同一对象。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：说明主语「是什么/怎么样」","t":"表语(predicative)出现在系动词(linking verb)之后，与主语共同指向同一对象，回答「主语是什么」或「主语处于什么状态」的问题。核心句型是 S + V(link) + P（主系表），属于五大句型中的 SVP 型。表语和宾语最容易混淆：系动词后 = 表语；及物动词后 = 宾语。"},{"h":"充当表语的形式","t":"①形容词：She looks tired.  ②名词：He became a doctor.  ③介词短语：The key is under the mat.  ④不定式：My goal is to pass the exam.  ⑤动名词：Her hobby is painting.  ⑥表语从句：The question is whether we can afford it. 表语从句须与「从句星系」的表语从句节点联用理解。"},{"h":"系动词识别","t":"判断一个词是否是系动词，试着用 be 替换它：若意思基本成立则是系动词。常见系动词：be（基本形式）；become/turn/grow/go/fall（变化类）；seem/appear/prove（表象类）；feel/sound/smell/taste/look（感官类）；remain/keep/stay（保持类）。注意：feel/look/taste 等也可作及物动词（带宾语），一词多用，须依上下文判断。"},{"h":"考研考点","t":"表语从句在学术文章中频率高（The reason is that…；The fact is that…；The problem is whether…），翻译时需识别整体结构。形容词作表语与副词混淆：I feel bad（表语=形容词，修饰主语 I）vs He spoke badly（状语=副词，修饰动词），这是完形和改错的常考区别。"}],"examples":[{"en":"The real issue remains how to distribute resources fairly.","zh":"真正的问题仍然是如何公平地分配资源。","note":"remains 是系动词；how to distribute resources fairly 是不定式短语充当表语。"},{"en":"The atmosphere in the room felt tense.","zh":"房间里的气氛感觉很紧张。","note":"felt 是感官系动词；tense（形容词）作表语，说明主语 atmosphere 的状态。"},{"en":"His argument proved to be completely wrong.","zh":"他的论点被证明是完全错误的。","note":"proved 是表象类系动词；to be wrong 是表语（不定式短语）。"}],"hardcase":{"sentence":"What remains most troubling to scholars who have spent decades studying the period is not the scarcity of primary sources but how systematically the available records appear to have been altered to serve a particular political narrative.","zh":"对于那些花了数十年研究这一历史时期的学者来说，最令人不安的不是原始史料的匮乏，而是现有记录看来被如此系统性地篡改以服务于某一特定政治叙事。","marks":[{"text":"What remains most troubling to scholars who have spent decades studying the period","role":"主语从句，作 is 的主语"},{"text":"is","role":"系动词，连接主语从句与表语"},{"text":"not the scarcity of primary sources but how systematically the available records appear to have been altered to serve a particular political narrative","role":"表语，not...but 结构，后半为 how 引导的名词从句作并列表语"}],"tip":"系动词 is 两侧：左边 What 从句=主语，右边 not...but...=表语——not A but B 本身就是表语的并列形式。"}},{"id":"attributive","title":"定语","en":"Attributive","domain":"sentence","tier":4,"summary":"修饰名词的成分；前置(形容词)或后置(介词短语/分词/定语从句)。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：贴在名词上的标签","t":"定语(attributive)修饰名词，回答「哪一个/什么样的/谁的」这些问题。英语定语位置规则鲜明：单个形容词**前置**（a beautiful garden），而短语和从句**后置**（a garden full of roses；a garden that blooms in spring）。汉语几乎所有修饰语都在名词前，英语一旦修饰语超过一个词就后置，这是中式英语和阅读理解的主要障碍。"},{"h":"定语的多种形式","t":"①形容词（前置）：the cold weather  ②名词（前置，修饰名词的名词）：a stone wall  ③介词短语（后置）：the key on the table  ④现在分词短语（后置，表主动进行）：the woman standing by the door  ⑤过去分词短语（后置，表被动完成）：the work completed yesterday  ⑥不定式（后置，表待做/潜在动作）：the decision to leave  ⑦定语从句（后置）：the city where I was born"},{"h":"前置定语的语序","t":"多个形容词同时前置时遵循固定语序（与「形容词语序」节点联动）：限定词 > 评价 > 大小 > 形状 > 年龄 > 颜色 > 来源 > 材料 > 用途 > 名词。如：a lovely small round old brown Italian leather briefcase。考研写作中多个定语的排列是失分点。"},{"h":"考研高频：后置定语辨认","t":"长难句中，一个名词后面可以叠加多个后置定语，形成「名词 + 介词短语 + 分词短语 + 定语从句」的串联结构。阅读时须将这整串修饰语视为一个整体，找到后面真正的谓语，才不会错认句子主干。分词作定语与定语从句的简化形式相同（见「定语从句的简化」），从句星系中详细讲解。"}],"examples":[{"en":"The report released by the government last week has caused widespread debate.","zh":"政府上周发布的那份报告引发了广泛讨论。","note":"released by the government last week 是后置分词短语作定语，修饰 report；谓语是 has caused。"},{"en":"The only way to solve this problem is through cooperation.","zh":"解决这个问题的唯一方法是合作。","note":"to solve this problem 是后置不定式作定语，修饰 way；表语是 through cooperation。"},{"en":"Issues related to privacy and data security have become increasingly complex.","zh":"与隐私和数据安全相关的问题变得越来越复杂。","note":"related to privacy and data security 是后置过去分词短语定语，修饰 Issues。"}],"hardcase":{"sentence":"The mechanism responsible for the accelerated degradation of polymer chains exposed to ultraviolet radiation at altitudes above 3,000 metres remains poorly understood despite decades of research into the photochemical processes involved.","zh":"在海拔3000米以上受紫外线辐射的聚合物链加速降解的机制，尽管经过数十年对相关光化学过程的研究，至今仍未得到充分了解。","marks":[{"text":"responsible for the accelerated degradation of polymer chains","role":"后置形容词短语作定语，修饰 mechanism"},{"text":"exposed to ultraviolet radiation at altitudes above 3,000 metres","role":"过去分词短语作后置定语，修饰 polymer chains"},{"text":"involved","role":"后置单词分词作定语，修饰 processes（等于 that are involved）"}],"tip":"mechanism 身后跟了三层后置定语，层层套叠——先找谓语 remains，倒推 mechanism 是主语，再逐层剥离定语。"}},{"id":"adverbial","title":"状语","en":"Adverbial","domain":"sentence","tier":4,"summary":"修饰动词或全句，交代时间、地点、原因、方式、条件、让步、目的。","level":2,"prereq":["constituents"],"parent":"constituents","detail":[{"h":"本质：给动作加上背景","t":"状语(adverbial)修饰谓语动词（或整个句子），交代动作发生的**时间、地点、原因、方式、条件、让步、目的、程度、结果**——共九类。状语是句子中最自由的成分：可在句首、句中、句尾；可以是一个词(quickly)
