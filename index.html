导的从句（When [he was] young, he showed great promise.）；③不定式省略：用 to 代替整个不定式短语（She wanted to leave, but he asked her not to [leave].）；④比较结构中的省略：than/as...as 从句常省略重复的动词（She runs faster than he [runs].）"},{"h":"考研翻译中的还原","t":"省略在英文中频繁出现，翻译时必须补全被省略成分，使汉语表达完整自然。步骤：①识别省略点（并列连词、从属连词后、to 后）；②从前文找被省略成分；③补入并翻译。注意：中文一般不照搬省略，需显化。"},{"h":"考研陷阱","t":"①when/while 从句省略主语+be 后，主语必须与主句主语一致，否则为悬垂修饰语(dangling modifier)，是语法错误题考点；②to 代替整个不定式时，to 之后务必不再加动词；③比较从句省略时注意主动/被动，如 more quickly than expected = more quickly than it was expected，被省略的是 it was。"}],"examples":[{"en":"Some students prefer online learning while others [prefer] traditional classrooms.","zh":"一些学生偏爱在线学习，而另一些则偏爱传统课堂。","note":"并列结构省略谓语 prefer；while 两侧对比，是平行结构(parallelism)与省略的交叉点。"},{"en":"When faced with ethical dilemmas, scientists must weigh short-term gains against long-term consequences.","zh":"面对伦理困境时，科学家必须权衡短期收益与长期后果。","note":"when 从句省略 they are；they 与主句主语 scientists 一致，省略合法。"},{"en":"The committee approved the proposal, though reluctantly [doing so].","zh":"委员会批准了该提案，尽管是勉强为之。","note":"though 从句省略重复谓语；副词 reluctantly 作整个省略句的状语，翻译时补出「为之」。"}],"hardcase":{"sentence":"Some economists advocate raising the interest rate immediately, while others argue that doing so would be premature and that a wait-and-see approach, though imperfect, is preferable.","zh":"一些经济学家主张立即提高利率，而另一些人则认为这样做为时尚早，并认为观望策略——尽管并不完美——是更可取的。","marks":[{"text":"while others argue","role":"others 后省略了 advocate（动词），由前文语境补全"},{"text":"doing so would be premature","role":"doing so 替代上文 raising the interest rate immediately，省略具体内容"},{"text":"though imperfect","role":"省略主语和系动词（though it is imperfect），让步状语从句的常见省略形式"}],"tip":"省略靠上下文还原：先找省略位置，再从前文补全被省略的成分。"}},{"id":"parenthesis","title":"插入语","en":"Parenthesis","domain":"special","tier":3,"summary":"用逗号/破折号/括号插入的补充、评注或语气成分，分析时可先剥离。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质与识别","t":"插入语(parenthesis)是嵌入句子主干之中、与主干在语法上没有直接依附关系的成分，用来补充说明、评论或转折。识别标志：两侧有逗号、破折号或括号。去掉插入语，主句仍完整。"},{"h":"常见形式","t":"①副词/副词短语：however, therefore, in fact, of course, indeed, needless to say, to be honest, so to speak；②分词短语：generally speaking, strictly speaking, broadly speaking, judging from...；③独立主格/小句：so I believe, I think, if anything, as it were, what is more, what is worse；④完整插入句：it should be noted that, as has been pointed out。"},{"h":"长难句中的插入语","t":"长难句分析法(long-sentence)的重要步骤之一就是「识别并剥离插入语」。插入语嵌在主语与谓语之间时，最容易打断主干识别。遇到两侧有破折号或双逗号的成分，先括起来忽略，找主干再处理插入语的意思。"},{"h":"翻译与写作","t":"翻译：插入语通常单独处理，译为「（……）」括号内容或置于相关名词后作说明。写作：however, therefore, in addition 置句中可打破单调的句首起词，提升文章连贯性(cohesion)。"}],"examples":[{"en":"The experiment, as the authors themselves acknowledge, has several methodological limitations.","zh":"该实验——正如作者们自己承认的——存在若干方法论上的局限性。","note":"as the authors themselves acknowledge 是插入性状语从句，去掉后主句 The experiment has... 完整。"},{"en":"Globalization has, in many respects, created unprecedented opportunities for developing nations.","zh":"在许多方面，全球化为发展中国家创造了前所未有的机遇。","note":"in many respects 是插入的介词短语，嵌在助动词与主动词之间；翻译时移至句首更自然。"},{"en":"This approach — however innovative it may appear — cannot solve the underlying structural problems.","zh":"这种方法——无论看起来多么创新——都无法解决深层的结构性问题。","note":"破折号框住让步插入语 however innovative it may appear；however + adj. 是让步结构，注意与连接副词 however 区分。"}],"hardcase":{"sentence":"The treaty — negotiated in secret over a period of eighteen months and ratified only after considerable domestic opposition had been overcome — nonetheless failed to prevent the outbreak of hostilities within a decade.","zh":"这项条约——经过十八个月的秘密谈判、在相当大的国内阻力被克服之后才得以批准——尽管如此，仍未能阻止十年内敌对行动的爆发。","marks":[{"text":"negotiated in secret over a period of eighteen months and ratified only after considerable domestic opposition had been overcome","role":"破折号之间的插入语，补充说明主语 The treaty 的背景，分析时可整体跳过"},{"text":"—","role":"破折号标记插入语边界，起到隔离与强调的句法作用"},{"text":"nonetheless failed to prevent the outbreak of hostilities within a decade","role":"主句谓语，nonetheless 为插入的转折副词，强化语气对比"}],"tip":"遇到破折号或括号，先读主干（跳过插入部分），再把插入语填回理解细节。"}},{"id":"negation","title":"否定","en":"Negation","domain":"special","tier":4,"summary":"全部否定、部分否定、双重否定、否定转移、含蓄否定——位置一变意义全变。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质与分类","t":"否定(negation)是将命题反转或限制的语法操作。英语否定分两层：①句子否定(sentence negation)——否定整个命题，通常由 not 附着于谓语助动词实现；②成分否定(constituent negation)——只否定某一成分（no/not a/never+名词；not...but）。理解否定的辖域(scope)是避免误解的核心。"},{"h":"否定词类型","t":"主要否定词：not, no, never, none, neither, nor, nothing, nobody, nowhere, no one；半否定（限制性）：hardly, scarcely, barely, seldom, rarely, few, little, at no time, in no way；隐性否定（否定语义不含否定词）：fail to, refuse to, be reluctant to, be absent from, lack, miss, deny, prevent, prohibit, forbid。隐性否定在翻译时须译出否定语气。"},{"h":"否定辖域的重要性","t":"Not 的位置决定否定辖域：①Not + 全句谓语 = 整个命题否定；②Not + 某成分 = 只否定该成分（Not all scientists agree. ≠ No scientists agree.）；③否定转移(transferred negation)——形式上否定主句谓语，语义否定宾语从句(object-clause)（I don't think he is right. = I think he is not right.）。"},{"h":"考研陷阱汇总","t":"①部分否定陷阱：not all/every/both/always 是部分否定，不是全部否定（详见节点 partial-negation）；②隐性否定误读：fail to = not succeed in，翻译若漏否定意义则失分；③双重否定=强烈肯定（详见 double-negative）；④选项中用否定替换肯定或反向推断时，须分清是同义改写还是逻辑相反。"}],"examples":[{"en":"The report fails to address the most critical issue: the long-term environmental impact.","zh":"该报告未能解决最关键的问题：长期环境影响。","note":"fail to = 隐性否定，翻译须体现「未能」；直译 address 为「处理/论及」均可。"},{"en":"Nowhere in the literature is there a satisfactory explanation for this phenomenon.","zh":"在相关文献中，对这一现象没有令人满意的解释。","note":"Nowhere 置首，部分倒装：is there；否定词前置倒装(negative-fronting)与否定的交叉。"},{"en":"Not every technological innovation leads to social progress; some create new forms of inequality.","zh":"并非每一项技术创新都能带来社会进步；有些反而创造了新的不平等形式。","note":"Not every 是部分否定，译为「并非每一…都」；semicolon 后给出反例，强化论点。"}],"hardcase":{"sentence":"It is not that the government lacked the resources to address the crisis; rather, it had neither the political will to allocate them effectively nor any coherent strategy for doing so.","zh":"并非政府缺乏应对危机的资源；确切地说，它既没有有效调配这些资源的政治意愿，也没有任何连贯的策略来这样做。","marks":[{"text":"It is not that the government lacked the resources","role":"It is not that... 句型，否定的是后面的从句命题，而非 it"},{"text":"neither the political will to allocate them effectively nor any coherent strategy","role":"neither...nor 全部否定，并列否定两个名词短语"},{"text":"for doing so","role":"for + 动名词，doing so 替代 allocating them effectively，避免重复"}],"tip":"It is not that 否定的是整个命题；neither...nor 否定两者，注意区分全部否定与部分否定。"}},{"id":"partial-negation","title":"部分否定","en":"Partial Negation","domain":"special","tier":3,"summary":"not + all/every/both/always = '并非都'，而非'都不'，考研经典陷阱。","level":5,"prereq":["negation"],"parent":"negation","detail":[{"h":"本质","t":"部分否定(partial negation)指 not 与全称量词(数量词 quantifiers)结合，否定的是「全部」而非「每一个都不」。公式：not + all/every/both/always/entirely/quite/altogether/necessarily = 「并非全部/并非总是」，属于部分真。"},{"h":"常见配对","t":"not all = 并非所有（有些不）；not every = 并非每个；not both = 并非两者都（只有其中一个）；not always = 并非总是；not entirely/quite/altogether = 并非完全；not necessarily = 不一定。全称否定须用 none/no/never/neither：No scientist agrees（所有科学家都不同意）vs. Not all scientists agree（并非所有科学家都同意）。"},{"h":"考研陷阱","t":"阅读选项中将 not all...（部分否定）替换为 no...（全称否定），是最常见的错误选项构造方式。做题时看到 not + 全称量词，立即标记为「部分否定」，绝不等同于「全部否定」。翻译中须准确体现「并非…都…」而非「…都不」。"}],"examples":[{"en":"Not all the evidence supports the hypothesis proposed by the research team.","zh":"并非所有证据都支持该研究团队提出的假说。","note":"Not all 部分否定：有些证据支持，有些不支持；若为全称否定则用 None of the evidence。"},{"en":"Technological advancement does not always correlate with improvements in human well-being.","zh":"技术进步并不总是与人类福祉的提升相关。","note":"not always 部分否定时间维度；陷阱选项可能写成 never correlates，改变为全称否定，语义错误。"},{"en":"Both theories cannot be correct simultaneously.","zh":"两种理论不可能同时都是正确的。","note":"cannot + both = not both，部分否定：至少有一个不正确；与 Neither theory is correct（全称否定）形成对比。"}],"hardcase":{"sentence":"Not all of the assumptions that underpin the dominant paradigm in cognitive science have been subjected to the same rigorous empirical scrutiny, and not every challenge to those assumptions has been taken seriously by the mainstream.","zh":"支撑认知科学主流范式的假设并非都经过了同样严格的实证审查，对这些假设的挑战也并非每一项都得到了主流的认真对待。","marks":[{"text":"Not all of the assumptions","role":"not all = 部分否定，意为'并非所有'，而非'全都不'"},{"text":"not every challenge to those assumptions has been taken seriously","role":"not every = 部分否定，意为'并非每一项挑战'，而非'没有任何挑战'"},{"text":"that underpin the dominant paradigm in cognitive science","role":"定语从句修饰 assumptions，that 作从句主语"}],"tip":"not all / not every / not always = 部分否定（并非全部），切勿误读为全部否定（全都不）。"}},{"id":"transferred-negation","title":"否定转移","en":"Transferred Negation","domain":"special","tier":3,"summary":"think/believe/suppose 的否定形式上否定主句、意义上否定从句：I don't think he is right。","level":5,"prereq":["negation"],"parent":"negation","detail":[{"h":"本质","t":"否定转移(transferred negation)指否定词形式上附着于主句谓语，但逻辑语义否定的是宾语从句(object-clause)的内容。汉语表达与否定所在位置相同，英语则习惯将否定「转移上去」。"},{"h":"触发动词","t":"触发否定转移的主句谓语动词通常是表「认为/期待/感知」的动词：think, believe, suppose, expect, imagine, reckon, feel, seem, appear, fancy。公式：主语 + don't/doesn't/didn't + think/believe... + that 从句（从句本身无 not）= 主语认为…不…。"},{"h":"翻译策略","t":"读到 don't think/believe/expect 时，将否定意义归入从句再翻译。例：I don't think this approach is effective. → 我认为这种方法是无效的（不是「我不认为…」）。汉语「我不认为」也是习惯表达，但在精确翻译中须还原否定的逻辑位置。"},{"h":"考研出题点","t":"①阅读理解：选项用 He doesn't believe... 与原文 He believes...not 互换，是正确同义改写；②翻译：否定转移误译会导致语义相反；③识别边界：appear/seem 也可否定转移（It doesn't seem that... = It seems that...not...）。"}],"examples":[{"en":"Many economists don't believe that protectionist policies can sustain long-term growth.","zh":"许多经济学家认为，贸易保护主义政策无法维持长期增长。","note":"否定转移：don't believe = believe...cannot；翻译时否定落在 can sustain 上，不落在 believe 上。"},{"en":"I don't suppose the committee will reach a consensus by Friday.","zh":"我认为委员会到周五不会达成共识。","note":"don't suppose = suppose...not；suppose 是否定转移的常见动词，口语中尤其高频。"},{"en":"She didn't expect that the review process would take so long.","zh":"她以为审核过程不会花这么长时间。","note":"否定转移：didn't expect = expected...not；汉语「以为不会」自然还原了被转移的否定。"}],"hardcase":{"sentence":"I don't believe that the proposed merger will necessarily benefit shareholders in the long run, particularly given the volatility of the current market environment.","zh":"我不认为这次拟议的合并从长远来看必然会使股东受益，尤其是考虑到当前市场环境的不稳定性。","marks":[{"text":"I don't believe","role":"否定转移：形式上否定主句谓语 believe，实际上否定的是 that 从句的命题"},{"text":"that the proposed merger will necessarily benefit shareholders in the long run","role":"宾语从句，是真正被否定的内容（= I believe that it will not necessarily benefit）"},{"text":"necessarily","role":"副词 necessarily 与转移否定配合，产生部分否定含义：并非必然"}],"tip":"think/believe/suppose 的否定看似否定主句，实则否定从句；翻译时把否定移到从句中。"}},{"id":"double-negative","title":"双重否定","en":"Double Negative","domain":"special","tier":2,"summary":"两个否定相消表肯定，语气更强：not...without、nobody...not。","level":5,"prereq":["negation"],"parent":"negation","detail":[{"h":"本质","t":"双重否定(double negation)指在同一结构中使用两个否定成分，逻辑上互相抵消，形成比单纯肯定更强烈的肯定语气，带有「非…不可/必定…」的语气强调。公式：否定词 + 否定词/否定前缀 → 强肯定。"},{"h":"常见结构","t":"① not...without：He never speaks without making people laugh. = 他说话必然让人发笑；② not...unless：Nothing changes unless action is taken. = 只有采取行动才能改变；③ not...un-前缀词：The achievement is not unimportant. = 该成就相当重要；④ can't...too：You can't be too careful. = 越谨慎越好/再谨慎也不为过。"},{"h":"翻译策略与写作应用","t":"翻译：识别两个否定成分→转为强肯定译文，加「必然/非…不可/相当/无不」等语气词。写作：not...without 和 not...un- 结构是提升句式变化的手段，使用时注意两个否定必须在同一逻辑域内，避免歧义。"}],"examples":[{"en":"No major scientific breakthrough occurs without decades of incremental research.","zh":"没有哪项重大科学突破不是经过数十年的渐进研究才得以实现的。","note":"no...without = 必然通过；双重否定强调「突破必然依赖积累」，语气强于肯定陈述。"},{"en":"The implications of this finding are not insignificant for future policy decisions.","zh":"这一发现的意义对未来政策决策来说相当重大。","note":"not insignificant = quite significant；not + un- 前缀是低调强调的书面惯用法（litotes 曲折陈述）。"},{"en":"You cannot be too thorough when reviewing primary sources for historical research.","zh":"核查历史研究的原始资料时，再仔细也不为过。","note":"can't...too = 越…越好；固定表达，直译「不能太」是错误理解，须识别为双重否定套式。"}],"hardcase":{"sentence":"There is no major reform in the history of democratic governance that has not been accompanied by fierce resistance from those whose entrenched interests it threatened to displace.","zh":"在民主治理史上，没有一项重大改革不曾伴随着来自那些既得利益受到威胁者的激烈抵制。","marks":[{"text":"There is no major reform","role":"以 no 引起否定，构成双重否定的第一重"},{"text":"that has not been accompanied by fierce resistance","role":"定语从句中再次否定（has not），双重否定合力表达强肯定：每项改革都必然遭遇抵制"},{"text":"whose entrenched interests it threatened to displace","role":"whose 引导定语从句修饰 those，it 指代 the reform"}],"tip":"no...not = 双重否定表强肯定，改写为 every...has been accompanied 意思等同但语气更强。"}},{"id":"comparative-structures","title":"比较结构","en":"Comparative Structures","domain":"special","tier":5,"summary":"than/as...as/the more...the more/no more...than，考研长难句的逻辑硬骨头。","level":5,"prereq":["special-overview","comparison-degree"],"parent":"special-overview","detail":[{"h":"比较结构的本质与体系","t":"比较结构(comparative structures)建立在比较等级(comparison-degree)的形态变化（原级/比较级/最高级）之上，通过专用连接词将两个或多个对象的性质、数量、程度进行对比。英语比较结构语义丰富，句法多变，是考研阅读、翻译的高频难点。整体分为：等量比较(as...as)、不等量比较(more...than / -er...than)、倍数比较、递进比较(the more...the more)、限制性比较(no more...than 等)。"},{"h":"等量比较 as...as","t":"结构：as + 原级形容词/副词 + as + 比较基准。否定：not as/so...as = 不如…那么。变体：①twice/three times as...as = 两倍/三倍于；②as many/much as + 数字 = 多达…（强调数量之多）；③as...as possible/as...as one can = 尽可能…。陷阱：as many as 中的 many 与被比较名词的可数性须一致；as much as 修饰不可数名词或金额。"},{"h":"不等量比较 more...than","t":"结构：more/adj.-er + than + 基准；than 引导比较从句，从句常省略重复成分(ellipsis)。特殊含义：①more A than B（A 和 B 是名词/形容词时）= 与其说是 B，不如说是 A——这是高频误读点。例：She is more a teacher than a researcher. = 她与其说是研究者，不如说是教师。②no more...than = 和…一样不（两者都不）；③not more...than = 不超过…程度上不如。翻译时 more...than 的「二元对比语义」须细辨。"},{"h":"倍数比较与数量比较","t":"倍数表达法：① N times as...as（首选）：This building is three times as tall as that one.；② N times + 比较级 + than（也可接受）：three times taller than。注意：N times 时整倍数用 as...as 更精确，避免产生歧义。数量强调：as many as 500 people（多达 500 人）/ as little as 10% （仅仅 10%）。"},{"h":"no more/less...than 的逻辑","t":"这是最复杂的比较结构，须逻辑拆解：①no more...than = not...any more than（A 和 B 同等地不）：A whale is no more a fish than a horse is.（鲸鱼不是鱼，正如马不是鱼——两者都不是）；②no less...than = 和…一样多/不亚于；③not more...than = 不超过，程度上不如（A ≤ B）；④not less...than = 不低于（A ≥ B）。与 the more...the more(节点)的递进比较性质不同，no more...than 是否定比较的精确限定。"},{"h":"与相邻节点的联系","t":"比较结构(tier 5)的形态基础来自比较等级(comparison-degree)；than/as 从句内常发生省略(ellipsis)；the more...the more 是独立节点，递进比较；no more...than 等也有专属节点(no-more-than)。长难句分析法(long-sentence)处理比较结构时，须先找到两个比较项，再看连接词类型，才能准确翻译。"}],"examples":[{"en":"The consequences of inaction are more devastating than most policymakers are willing to admit.","zh":"不作为的后果比大多数决策者愿意承认的要严重得多。","note":"more...than 比较；than 从句省略 are willing to admit 的宾语，是省略(ellipsis)与比较结构的交叉点。"},{"en":"This policy is more a political gesture than a practical solution to the housing shortage.","zh":"与其说这项政策是解决住房短缺的实际方案，不如说它是一种政治姿态。","note":"more A than B 二元对比语义：不是「比 B 更 A」而是「与其说 B 不如说 A」；此结构是翻译高频误读点。"},{"en":"A robot is no more capable of genuine emotion than a calculator is capable of love.","zh":"机器人拥有真实情感，正如计算器能够去爱一样——两者皆不可能。","note":"no more...than 双重否定比较：两者同等地不具备该能力；翻译须体现「A 如同 B 一样不」的对等否定。"}],"hardcase":{"sentence":"The long-term costs of inaction are far greater than those of implementing even the most ambitious climate policy currently under discussion, a conclusion that more economists now accept than did a decade ago.","zh":"不作为的长期代价远远大于推行当前讨论中哪怕最雄心勃勃的气候政策的代价，而接受这一结论的经济学家如今比十年前更多。","marks":[{"text":"far greater than those of implementing even the most ambitious climate policy currently under discussion","role":"比较结构 greater than，those 替代 the long-term costs 避免重复"},{"text":"those of implementing","role":"those = the long-term costs，of 短语限定比较对象，保持平行"},{"text":"more economists now accept than did a decade ago","role":"比较从句省略重复成分，than 后倒装（did = accepted this conclusion）"}],"tip":"比较结构须保证两端可比：先找 than/as 两侧对应的成分，再用 those/that 确认替代是否正确。"}},{"id":"the-more-the-more","title":"the more...the more","en":"Correlative Comparatives","domain":"special","tier":3,"summary":"'越…越…'，两个比较级各领一分句：The harder you work, the luckier you get。","level":5,"prereq":["comparative-structures"],"parent":"comparative-structures","detail":[{"h":"本质与结构","t":"the more...the more 结构(递进比较)表示「越…越…」的比例递进关系。结构：The + 比较级(+主语+谓语), the + 比较级(+主语+谓语)。两个分句都是倒装形式——比较级提前，主谓跟随。省略规则：若主语相同且与主句一致，可省略从句主谓；副词比较级置首时助动词也可省。"},{"h":"省略与变体","t":"完整形式：The more carefully you read, the better you understand. 省略形式：The more, the better.（越多越好）。变体：①The + 比较级形容词 + 名词 + 主谓（The more data we collect, the more reliable our conclusions become.）；②两个分句时态可不同（条件-结果）。注意：第一个 the 引导的是条件/原因，第二个 the 引导的是结果。"},{"h":"翻译要点与考研应用","t":"翻译：先翻第一分句（越…），再翻第二分句（越…）；若省略主谓，依据上下文补出。写作：the more...the more 是标准的议论文递进句式，适合分析因果或趋势。考研真题翻译中此结构较多，注意比较级对应的原级形容词/副词还原。"}],"examples":[{"en":"The more deeply researchers investigate the causes of poverty, the more complex the problem appears.","zh":"研究者对贫困成因研究得越深入，这一问题就显得越复杂。","note":"两个分句均有主谓；比较级 more deeply / more complex 分别置首，主谓跟随，非完全倒装。"},{"en":"The fewer restrictions placed on scientific inquiry, the greater the likelihood of unexpected discoveries.","zh":"对科学探究施加的限制越少，出现意外发现的可能性就越大。","note":"fewer 和 greater 都是比较级；前分句省略谓语（placed 是分词作后置定语修饰 restrictions）。"},{"en":"The more a culture emphasizes individualism, the less social cohesion it tends to exhibit.","zh":"一种文化越强调个人主义，其社会凝聚力往往就越低。","note":"两个 the 分句有共同倾向词 tends，第二分句 tends 省略（移入前一分句）；是观点表达的典型递进句。"}],"hardcase":{"sentence":"The more closely researchers examined the relationship between socioeconomic status and educational attainment, the more apparent it became that structural barriers, rather than individual ability, were the primary determinants of academic success.","zh":"研究者对社会经济地位与教育成就之间关系的审视越深入，就越清楚地发现，结构性障碍而非个人能力，才是学业成功的主要决定因素。","marks":[{"text":"The more closely researchers examined","role":"the + 比较级引导状语分句，表'越…'的条件一端"},{"text":"the more apparent it became","role":"the + 比较级引导主句结果一端，it 为形式主语"},{"text":"that structural barriers, rather than individual ability, were the primary determinants of academic success","role":"真正主语从句，it 的真实内容；rather than 插入对比"}],"tip":"the more...the more 中，第一个 the 分句是条件/原因，第二个是结果；两端时态须对应。"}},{"id":"no-more-than","title":"no more...than 等","en":"Negative Comparison","domain":"special","tier":3,"summary":"no more...than（两者都不）、not so much...as（与其…不如），否定+比较的难句。","level":5,"prereq":["comparative-structures"],"parent":"comparative-structures","detail":[{"h":"四种限制性比较辨析","t":"no more...than / no less...than / not more...than / not less...than 是比较结构中语义最精细的一组。核心区分：no = 「同等地」（否定双方）；not = 「不超过/不低于」（单向限定）。"},{"h":"逐一释义","t":"① no more A than B：A 不是 A，B 也不是 A（等同否定）；② no less A than B：A 是 A，B 也是 A（等同肯定，不亚于）；③ not more A than B：A 程度 ≤ B（A 不超过 B 的程度）；④ not less A than B：A 程度 ≥ B（A 不低于 B 的程度）。记忆法：no 开头→两者等量对待；not 开头→单向数量/程度上限或下限。"},{"h":"考研应用","t":"翻译题中出现 no more than 时须拆解逻辑：先确认是 no 还是 not，再还原两个比较项的真实关系。阅读理解选项中 no less than 常译为「不少于」或「相当于」，须区别于 not less than（单纯数量下限）。写作中慎用此类精密结构，除非确定语义。"}],"examples":[{"en":"Blaming individuals for systemic problems is no more effective than treating symptoms while ignoring the underlying disease.","zh":"将系统性问题归咎于个人，与对症治疗而忽视根本疾病一样无效。","note":"no more effective than：两者同等无效；no more A than B 的正典用法，翻译须体现「A 和 B 同样不…」。"},{"en":"The economic benefits of the project are no less significant than its environmental costs.","zh":"该项目的经济效益丝毫不逊于其环境成本。","note":"no less significant than：两者同等重要；强调「经济效益的重要性」与「环境成本」处于同等量级。"},{"en":"The new regulation will affect not more than 5 percent of all businesses.","zh":"新法规的影响将不超过所有企业的5%。","note":"not more than = 上限限定（≤5%）；与 no more than（同等逻辑否定）完全不同，须严格区分。"}],"hardcase":{"sentence":"The so-called reform package was no more a genuine attempt to address structural inequality than a coat of paint applied to a crumbling facade is a solution to the building's deteriorating foundations.","zh":"这个所谓的改革方案不是真正解决结构性不平等的尝试，正如在摇摇欲坠的外墙上涂一层油漆不是解决建筑地基恶化问题的办法一样。","marks":[{"text":"no more a genuine attempt to address structural inequality than","role":"no more...than 结构：否定前者，同时以 than 引出类比，表'两者都不是'"},{"text":"a coat of paint applied to a crumbling facade is a solution to the building's deteriorating foundations","role":"than 后的比较基准，通过荒谬类比强化前项的否定"},{"text":"applied to a crumbling facade","role":"过去分词短语作后置定语修饰 a coat of paint"}],"tip":"A is no more B than C is D = A 不是 B，正如 C 不是 D 一样；两端同时被否定，通过类比说理。"}},{"id":"parallelism","title":"平行结构","en":"Parallelism","domain":"special","tier":4,"summary":"并列连词连接的成分须语法对称：词对词、短语对短语、从句对从句。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质","t":"平行结构(parallelism)要求用并列连词(conjunction)连接的成分在语法形式上保持一致：同为名词、同为不定式、同为动名词、同为从句等。平行结构既是语法规则，也是修辞手段，能使表达有节奏感和力量感。"},{"h":"并列连词的平行要求","t":"and, but, or, nor, not only...but also, both...and, either...or, neither...nor, whether...or 连接的成分须形式平行。常见违例：①混用不定式和动名词（to read and writing → to read and to write 或 reading and writing）；②混用名词和从句（his intelligence and that he works hard → his intelligence and his diligence）；③相关连词两侧不平行（not only studied but also his exercise → not only studied but also exercised）。"},{"h":"长句中的平行","t":"长难句分析法(long-sentence)中，遇到并列结构须找「第一个并列项」作模板，推断后续省略成分。多层嵌套并列时，先确定并列连词，再检查各项语法形式。翻译时平行成分须译出对称感。"},{"h":"写作中的平行","t":"考研写作中三点式列举（First...Second...Third... / not only...but also...and also...）、排比（The more..., the more...）和对比（While X is...Y is...）均属平行结构应用。注意：平行不是重复，各项须有实质内容差异。"}],"examples":[{"en":"The research team aims to identify the causes, analyze the patterns, and propose practical solutions.","zh":"研究团队旨在识别原因、分析规律并提出切实可行的解决方案。","note":"三个不定式 to identify, analyze, propose 平行；第二三项省略 to，是省略(ellipsis)与平行结构的结合。"},{"en":"Not only does economic inequality undermine social cohesion, but it also diminishes political participation.","zh":"经济不平等不仅损害社会凝聚力，而且削弱政治参与。","note":"not only...but also 相关连词；两侧须平行：does...undermine 对应 diminishes（均为动词短语），not only 后倒装。"},{"en":"The ideal leader is one who listens carefully, decides wisely, and communicates transparently.","zh":"理想的领导者是一个能够认真倾听、明智决策并透明沟通的人。","note":"定语从句内三个动词短语平行：listens, decides, communicates；副词各异，展示平行中的变化。"}],"hardcase":{"sentence":"The commission recommended restructuring the regulatory framework, overhauling the enforcement mechanisms, and establishing an independent oversight body with sufficient authority to impose meaningful sanctions.","zh":"委员会建议对监管框架进行重组、对执法机制进行全面整顿，并建立一个具有足够权力以施加有实质意义制裁的独立监督机构。","marks":[{"text":"restructuring the regulatory framework, overhauling the enforcement mechanisms, and establishing an independent oversight body","role":"三个动名词短语构成平行结构，同作 recommended 的宾语，词性与句法功能完全对称"},{"text":"restructuring","role":"平行结构第一项：动名词"},{"text":"overhauling","role":"平行结构第二项：动名词，与第一项对称"},{"text":"establishing","role":"平行结构第三项：动名词，and 连接前两项与此项"}],"tip":"并列连词连接的成分须词性一致、句法对称；找到第一项确定形式，检验后续各项是否匹配。"}},{"id":"cohesion","title":"衔接与连贯","en":"Cohesion","domain":"special","tier":5,"summary":"把句子织成篇章的丝线：指代、替代、省略、连接词、词汇衔接，阅读完形的命门。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质与重要性","t":"衔接与连贯(cohesion and coherence)是语篇层面的语法：衔接(cohesion)指通过语言手段将句子连接成语篇的形式机制；连贯(coherence)指语篇在意义和逻辑上的内在一致性。考研阅读理解的段落关系、翻译的整体通顺、写作的逻辑层次，全部依赖衔接与连贯机制。"},{"h":"衔接的五大机制","t":"①引用/替代(substitution)——用代词(pronoun-reference)或 do/so/one 替代前文成分，见节点 substitution；②省略(ellipsis)——删去可推断成分，见节点 ellipsis；③连接(conjunction)——连接副词(conjunctive-adverbs)和逻辑关系词(logical-connectors)显式标示语义关系；④词汇衔接——同义词、上下义词、反义词、重复词（例：problem→difficulty→challenge 构成语义链）；⑤指称(reference)——定冠词 the、指示词 this/that/these/those、数量词(quantifiers) such 等前指或后指。"},{"h":"连贯的逻辑维度","t":"连贯要求段落具有清晰的逻辑骨架：①时间顺序（first, then, subsequently, finally）；②因果（because, therefore, consequently, as a result）；③对比/让步（however, although, nevertheless, by contrast）；④递进（furthermore, moreover, in addition, what is more）；⑤例证（for instance, specifically, as illustrated by）。识别这些关系是阅读理解中「段落逻辑题/作者意图题」的核心能力。"},{"h":"词汇衔接的考研价值","t":"阅读理解中作者用同义词链指向同一概念时，选项中的同义替换正是词汇衔接的逆用——识别作者原词 → 找选项中的同义词。翻译中须保持同一实体的称呼一致（切忌前后用不同译名指同一事物）。写作中词汇衔接手段避免单词重复：用代词、上义词、同义词交替出现。"},{"h":"衔接失误的常见错误","t":"①代词指代不明（pronoun-reference 模糊）：it/they 指代歧义；②连接词误用（because 与 so 同时使用造成逻辑双重）；③省略造成歧义（省略主语后读者无法判断谁执行动作）；④段落间缺乏逻辑连接词，论点跳跃。写作评分中「逻辑连贯性」是重要维度，须在每段开头和段落之间明确标示逻辑关系。"}],"examples":[{"en":"Economic growth has slowed; however, employment rates have remained surprisingly stable.","zh":"经济增长放缓；然而，就业率却出乎意料地保持稳定。","note":"however 是连接副词(conjunctive-adverb)，标示对比关系；分号前后构成让步-转折的衔接链。"},{"en":"Scientists have identified three key factors. These factors interact in complex ways that are not yet fully understood.","zh":"科学家们已识别出三个关键因素。这些因素以尚未被完全理解的复杂方式相互作用。","note":"These factors 是指称衔接（重复+指示词 these），将第二句与第一句锚定；是阅读中同义替换识别的基础。"},{"en":"The policy has been criticized for ignoring short-term costs. Furthermore, it fails to address the structural inequalities that perpetuate poverty.","zh":"该政策因忽视短期成本而受到批评。此外，它未能解决使贫困持续的结构性不平等问题。","note":"Furthermore 标示递进关系；it 替代 the policy（代词衔接）；fails to 是隐性否定(negation)。"}],"hardcase":{"sentence":"Governments across the region have proposed various measures to curb carbon emissions; however, the effectiveness of such measures depends not only on domestic policy but also on the degree to which neighboring countries are willing to coordinate their efforts, and this remains deeply uncertain.","zh":"该地区各国政府提出了多种减少碳排放的措施；然而，这些措施的有效性不仅取决于国内政策，还取决于邻国在多大程度上愿意协调各自的努力，而这一点仍存在极大的不确定性。","marks":[{"text":"such measures","role":"such + 名词作替代性指代，回指上文 various measures，实现词汇衔接"},{"text":"however","role":"连接副词，标记转折逻辑关系，前用分号隔开，是篇章衔接的路标"},{"text":"this remains deeply uncertain","role":"this 指代整个前文所述情况（各国协调意愿），实现篇章照应，收束全句"}],"tip":"衔接靠三类手段：连接词（however）、替代（such measures）、指代（this）；阅读时沿这三条线追踪逻辑。"}},{"id":"conjunctive-adverbs","title":"连接副词","en":"Conjunctive Adverbs","domain":"special","tier":4,"summary":"however/therefore/moreover/thus/nevertheless，逻辑信号词，前用分号或句号。","level":5,"prereq":["cohesion"],"parent":"cohesion","detail":[{"h":"本质与功能","t":"连接副词(conjunctive adverbs)是既充当副词又起连接作用的词，置于分句或句子之间，标示前后句的逻辑语义关系。与从属连词(因果/让步状语从句)不同，连接副词两侧的分句在语法上是独立的（常用分号或句号分隔），连接副词本身不引导从句。"},{"h":"分类与常见词","t":"①递进/补充：furthermore, moreover, in addition, additionally, what is more, besides；②转折/对比：however, nevertheless, nonetheless, yet, by contrast, on the other hand, conversely；③因果：therefore, consequently, thus, hence, as a result, accordingly；④例证：for instance, for example, specifically, namely；⑤总结：in conclusion, in short, in brief, to sum up, overall；⑥时序：subsequently, meanwhile, previously, ultimately。"},{"h":"标点规则","t":"连接副词置句首时，后接逗号（However, the results were inconclusive.）；置句中时前后均有逗号（The results were, however, inconclusive.）；若用于连接两个独立分句，前用分号（The data is limited; however, the trend is clear.）。错误用法：用逗号连接两个独立句子时只放连接副词而不加分号，会造成「逗号黏合错误(comma splice)」。"},{"h":"考研应用","t":"阅读理解中连接副词是判断段落逻辑的路标，尤其是 however/nevertheless（转折）和 therefore/consequently（因果）。翻译中须将其语义准确传达，不可省略。写作中合理使用可使论点层次清晰；但注意避免滥用 firstly/secondly/finally，应与逻辑关系词(logical-connectors)搭配使用。"}],"examples":[{"en":"The initial hypothesis seemed plausible; however, subsequent experiments failed to replicate the results.","zh":"最初的假说看似合理；然而，后续实验未能重现这些结果。","note":"however 标示转折，前用分号；是阅读理解「作者态度转变」的典型句式。"},{"en":"Biodiversity loss threatens ecosystem stability; consequently, it poses long-term risks to human food security.","zh":"生物多样性丧失威胁生态系统稳定；因此，它对人类粮食安全构成长期风险。","note":"consequently 标示因果，前用分号；注意它是副词不是连词，两侧须各有完整独立句。"},{"en":"Traditional media have declined in circulation; nevertheless, their role in setting the public agenda remains significant.","zh":"传统媒体的发行量有所下降；尽管如此，它们在设定公共议题方面的作用仍然重要。","note":"nevertheless 标示让步转折（强于 however 的语气）；注意与 although（从属连词）的区别：although 引导从句，nevertheless 连接独立句。"}],"hardcase":{"sentence":"The initial trial produced inconclusive results; nevertheless, the research team pressed on, arguing that the methodology had been sound and that a larger sample size would, in all likelihood, yield more definitive findings.","zh":"初次试验产生了不确定的结果；尽管如此，研究团队仍坚持推进，认为研究方法是严谨的，并且更大的样本量极有可能产生更明确的发现。","marks":[{"text":"nevertheless","role":"连接副词，置于分号之后，标记让步转折关系；前分句为条件/背景，后分句为反预期结果"},{"text":"; nevertheless,","role":"分号 + 连接副词的标准搭配，连接两个独立分句"},{"text":"in all likelihood","role":"插入性副词短语，作程度评注，表'极有可能'"}],"tip":"连接副词（however/nevertheless/therefore）前必须用分号或句号，不能只用逗号连接两个独立分句。"}},{"id":"logical-connectors","title":"逻辑关系词","en":"Logical Connectors","domain":"special","tier":4,"summary":"表转折/因果/递进/对比/举例/总结的词语，是读懂篇章逻辑走向的路标。","level":5,"prereq":["cohesion"],"parent":"cohesion","detail":[{"h":"本质与范围","t":"逻辑关系词(logical connectors)是涵盖连词、连接副词、介词短语等一切用于标示逻辑语义关系的语言手段的总称，比连接副词范围更广。理解逻辑关系词是阅读理解段落题、翻译、写作的共同基础能力。"},{"h":"六大逻辑关系","t":"①因果：because, since, as, for（连词）；therefore, thus, hence, consequently（连接副词）；due to, owing to, as a result of（介词短语）。②转折/让步：although, though, even though, whereas, while（连词）；however, nevertheless, yet（连接副词）；despite, in spite of（介词短语）。③递进：and, not only...but also；furthermore, moreover；in addition to（介词）。④条件：if, unless, provided that, as long as。⑤对比：while, whereas；by contrast, on the other hand。⑥例证/说明：for example, for instance, such as, namely, that is（i.e.）, in other words。"},{"h":"阅读中的逻辑词信号","t":"逻辑关系词是阅读理解中最重要的路标：①转折词后（however/but/yet）通常是作者真实立场或段落主旨；②因果词（therefore/because）标示论证链，答题时沿着因果方向找；③让步词（although/despite）后面往往是考点；④递进词（moreover/furthermore）后接的是对论点的强化，出题优先级较低。"},{"h":"考研写作逻辑层次","t":"议论文三段式的逻辑关系词布局建议：引入段用转折（However, this view overlooks...）；主体段内部用因果（Because...therefore...）和递进（Moreover...）；结尾段用总结（In conclusion, it is evident that...）。不同关系词避免重复，如已用 however 则下次用 nevertheless 或 yet。"}],"examples":[{"en":"Although the economy grew rapidly in the early phase, the benefits were unevenly distributed, thereby exacerbating social inequality.","zh":"尽管经济在早期阶段快速增长，但收益分配不均，从而加剧了社会不平等。","note":"Although 让步连词 + thereby 因果连接副词；两种逻辑关系词在同一句中配合，是翻译中须分层理解的结构。"},{"en":"Despite rapid urbanization, rural communities have preserved many traditional practices; moreover, some of these practices have gained renewed interest among urban populations.","zh":"尽管城市化进程迅速，农村社区仍保留了许多传统习俗；此外，其中一些习俗在城市人口中重新引起了兴趣。","note":"despite（让步介词）+ moreover（递进连接副词）；注意 despite 后接名词短语，not despite of。"},{"en":"The findings are significant not because they confirm existing theories, but because they challenge fundamental assumptions in the field.","zh":"这些发现的重要性不在于它们印证了现有理论，而在于它们挑战了该领域的基本假设。","note":"not because...but because 是对比性因果结构，强调真正原因；是翻译中要保留「重心在 but because 后」的语感。"}],"hardcase":{"sentence":"Although the evidence for a causal link remains disputed, it is nonetheless suggestive; moreover, the consistent pattern across multiple independent studies lends considerable weight to the hypothesis that environmental factors, rather than genetic predisposition alone, account for the observed variation.","zh":"尽管因果联系的证据仍有争议，但它仍具有一定的启示性；此外，多项独立研究的一致模式为以下假说提供了相当大的支持：环境因素而非单纯的遗传倾向，才是所观察到的差异的原因。","marks":[{"text":"Although","role":"让步连词，引导让步状语从句，逻辑信号：尽管…"},{"text":"nonetheless","role":"转折副词，强化让步后的肯定，逻辑信号：尽管如此，仍然"},{"text":"moreover","role":"递进连接副词，逻辑信号：此外，引出补充支撑论据"},{"text":"rather than genetic predisposition alone","role":"对比结构，排除竞争解释，强调真正原因"}],"tip":"顺着逻辑词走：although 让步→nonetheless 转折→moreover 递进；逻辑路线图清晰，长句不再难。"}},{"id":"substitution","title":"替代","en":"Substitution","domain":"special","tier":2,"summary":"用 one(s)/do so/such/that of 替代上文成分，避免重复又保持衔接。","level":5,"prereq":["cohesion"],"parent":"cohesion","detail":[{"h":"本质","t":"替代(substitution)是衔接与连贯(cohesion)机制之一：用一个较短的语言形式替换前文已出现的较长成分，避免重复、保持语篇紧凑。与省略(ellipsis)不同，替代是用替代词填入，而非空缺。"},{"h":"三类替代","t":"①名词替代：one/ones 替代可数名词（I need a pen; do you have one?）；②动词替代：do so / do the same 替代动词短语（She studied hard, and so did he. / He promised to help, and he did so.）；③分句替代：so/not 替代整个从句（I hope so. / I'm afraid not. / I think so.）。代词指代(pronoun-reference)是替代的最广形式：it/they/this/that 等指回前文名词。"},{"h":"考研应用","t":"①阅读：识别替代词指回的对象是理解句意的基础，尤其 it/they 的指代歧义是出题点；②翻译：替代词须在译文中显化为其所指代的内容，不能将 one/so 直译（例：so 不译「如此」，要译出被替代的动词短语）；③写作：合理使用 so/not/do so 替代，可使文章简洁连贯。"}],"examples":[{"en":"Some analysts predicted an economic downturn; others did not, but subsequent events proved the former right.","zh":"一些分析师预测了经济下行；另一些没有，但随后的事件证明前者是正确的。","note":"did not 替代动词短语 predict an economic downturn（省略宾语）；the former 指代前文提到的第一组，是代词指代(pronoun-reference)的应用。"},{"en":"The committee was asked whether additional funding was needed. The chair said she believed so.","zh":"委员会被询问是否需要额外资金。主席说她认为是这样的。","note":"so 替代整个从句 additional funding was needed；believe so 是分句替代的常见形式，翻译须显化被替代内容。"},{"en":"The original proposal was rejected, and a revised one was submitted two weeks later.","zh":"最初的提案被否决，两周后提交了修订版。","note":"one 替代 proposal（名词替代）；a revised one = a revised proposal，是阅读中词汇替代识别的简单例子。"}],"hardcase":{"sentence":"The committee's proposal was far more detailed than that of any previous administration, yet the one submitted by the opposition coalition was, if anything, even more so.","zh":"委员会的提案比任何前届政府的提案都详尽得多，然而，反对派联盟提交的那份提案若有差别的话，甚至更为如此。","marks":[{"text":"than that of any previous administration","role":"that 替代 the committee's proposal，避免重复，维持比较对象的语法平行"},{"text":"the one submitted by the opposition coalition","role":"one 替代上文 proposal，submitted 为后置分词定语"},{"text":"even more so","role":"so 替代上文形容词 detailed，more so 表'更加如此'，是典型的副词性替代"}],"tip":"that/those 替代可数不可数名词短语，one/ones 替代可数名词，do so/be so 替代谓语或形容词。"}},{"id":"punctuation-syntax","title":"标点的句法","en":"Punctuation as Syntax","domain":"special","tier":2,"summary":"分号连接对等分句、冒号引出解释、破折号插入或强调——标点也是语法。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"标点的句法功能","t":"标点的句法(punctuation syntax)指标点符号在英语中承担的句法和语义功能，而非仅仅停顿标记。正确解读标点是准确理解长难句的重要途径，翻译题中标点携带的结构信息不可忽视。"},{"h":"核心标点功能速查","t":"①逗号(,)：分隔非限制性定语从句/插入语(parenthesis)、并列成分、状语置首；②分号(;)：连接两个独立分句（语义相关），连接副词前常用分号；③冒号(:)：引出解释、列举或直接引语；④破折号(--)：强调或扩展（可替代括号），也可框住插入语；⑤括号()：补充非必要信息；⑥引号\"\"：直接引语或学术性「术语」。"},{"h":"翻译实战应用","t":"遇到长句先扫描标点：①两个破折号或双逗号之间=插入语(parenthesis)，先剥离；②分号=前后独立，分别翻译再合并；③冒号=前是总后是分，或前是结论后是解释；④逗号前若有 which=非限制性定语从句，单独译为「，而…」或「，它…」。"}],"examples":[{"en":"The study — which involved over 10,000 participants across twelve countries — represents the largest investigation of its kind.","zh":"这项研究——涉及十二个国家逾万名参与者——是同类研究中规模最大的。","note":"破折号框住非限制性定语从句作插入语；去掉后主句 The study represents... 完整，翻译时插入语可译为破折号内容。"},{"en":"Three factors determine economic growth: capital accumulation, technological innovation, and institutional quality.","zh":"决定经济增长的有三个因素：资本积累、技术创新和制度质量。","note":"冒号引出列举，前句是总，后句是分；翻译时冒号保留，列举成分形成平行结构(parallelism)。"},{"en":"Correlation does not imply causation; yet, this confusion pervades popular science writing.","zh":"相关不等于因果；然而，这种混淆在大众科学写作中普遍存在。","note":"分号连接两个独立分句；yet 是连接副词，标示转折；翻译须保留分号或用句号断开，不可用逗号。"}],"hardcase":{"sentence":"The report identified three systemic failures: inadequate oversight of financial institutions, the absence of any meaningful early-warning mechanism, and — most critically — a regulatory culture so entrenched in deference to industry lobbying that reform had become virtually inconceivable.","zh":"报告确认了三项系统性失职：对金融机构监管不足、缺乏任何有实质意义的早期预警机制，以及——最关键的是——一种对行业游说如此根深蒂固地顺从的监管文化，以致改革几乎已无从设想。","marks":[{"text":":","role":"冒号引出三项列举内容，前面是总括句，冒号后是解释/列举"},{"text":"— most critically —","role":"双破折号夹住插入性评注 most critically，强调第三项的重要性"},{"text":"so entrenched in deference to industry lobbying that reform had become virtually inconceivable","role":"so...that 结果状语从句，修饰 a regulatory culture"}],"tip":"冒号=引出，分号=对等，破折号=插入或强调；读标点如读路标，结构一目了然。"}},{"id":"long-sentence","title":"长难句分析法","en":"Parsing Long Sentences","domain":"special","tier":6,"summary":"找主干→剥从句与非谓语→理逻辑词→还原修饰；贯通全图的元技能。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质与挑战","t":"长难句分析法(long-sentence analysis)是整合本星系所有节点的实战综合能力。考研英语长句通常超过40词，嵌套多层从句、非谓语动词(non-finite verbs)、插入语、比较结构和倒装，主干被修饰层层包裹。核心挑战：找到唯一的主语-谓语-宾语/表语骨架，同时理清修饰层级。"},{"h":"四步分析法","t":"第一步：找主干——扫描句子，识别主谓语。标志：①找唯一不在从句/非谓语结构内的有限动词(finite verb)；②排除由 that/which/who/when/where/because/if/although 引导的所有从句内的动词；③排除 to do/doing/done 等非谓语动词(non-finite verbs)；④插入语(parenthesis)——两逗号或破折号间——整体括起，先不看。第二步：剥从句与非谓语——标注每个从句的功能（主/表/宾/定/状）和每个非谓语短语的功能（定语/状语/宾补）。第三步：理逻辑词——识别连接副词(conjunctive-adverbs)、逻辑关系词(logical-connectors)，明确各层关系（因果/转折/递进/条件）。第四步：还原修饰，整体翻译——从主干开始，由内到外逐层将修饰成分插入，组成完整汉语句子；注意句子成分(constituents)的汉语语序调整。"},{"h":"定语从句与非谓语的剥离技巧","t":"定语从句以关系词(that/which/who/whom/whose/where/when)引导，修饰先行词，整体括起后先行词+主干可独立成句。非谓语动词短语(participating in..., to achieve..., having completed...)作状语时，常紧靠主句首部或尾部，先剥离，再翻译为「…时/…后/为了…」。非谓语作定语时，是对名词的修饰，与先行词一起括起。"},{"h":"倒装与省略的还原","t":"长句中出现倒装(inversion)时，先还原为正常语序（特别是否定词前置倒装和条件句倒装），再分析成分。省略(ellipsis)发生在并列结构或比较从句时，需补出被省略成分再翻译。比较结构(comparative-structures)中的 than/as 从句常大量省略，要找前文对应成分。"},{"h":"实战示范：一句全解析","t":"原句：Not until scientists had discovered that certain proteins could fold into multiple stable configurations did they begin to question the long-held assumption that protein structure was uniquely determined by its amino acid sequence. 分析：①否定词 Not until 置首→主句部分倒装，did they begin 是主句谓语，they 是主语；②Not until...had discovered...是时间从句，内含宾语从句（that certain proteins could fold...）；③主句的宾语从句：to question the assumption that...（assumption 后接同位语从句 that protein structure was...）；④还原主干：Scientists began to question the assumption. 翻译：直到科学家们发现某些蛋白质能折叠为多种稳定构型，他们才开始质疑那个长期持有的假设——蛋白质结构由其氨基酸序列唯一决定。"},{"h":"与全星系节点的整合","t":"长难句分析法(tier 6)是本星系的终极应用节点：需综合运用倒装(inversion)识别、定语从句/强调句型(cleft-sentence)区分、省略(ellipsis)补全、插入语(parenthesis)剥离、比较结构(comparative-structures)还原、否定(negation)辖域判断，以及衔接与连贯(cohesion)的词汇层理解。句子成分(constituents)分析是整个方法的锚点。"}],"examples":[{"en":"What the researchers found was not that artificial intelligence could replace human creativity, but that it could augment human capabilities in ways that were previously unimaginable.","zh":"研究者们发现的不是人工智能能够替代人类创造力，而是它能以此前难以想象的方式增强人类的能力。","note":"主干：What...found was...（主语是 what 名词从句）；not that...but that... 是并列对比结构；that it could augment...中 in ways that were... 是定语从句修饰 ways。"},{"en":"The assumption, which had shaped scientific thinking for over a century and which had been incorporated into every major textbook, was overturned by a single experiment conducted in an obscure laboratory.","zh":"这一假设——已塑造科学思维逾百年且被纳入每一本主要教科书——被一个名不见经传的实验室所做的单个实验推翻了。","note":"主干：The assumption was overturned by a single experiment. 两个 which 引导的非限制性定语从句作插入语；conducted in...是过去分词短语作后置定语修饰 experiment。"},{"en":"So entrenched was the belief that economic growth inevitably leads to greater equality that policymakers across the political spectrum failed to anticipate the dramatic rise in inequality that characterized the late twentieth century.","zh":"「经济增长必然带来更大平等」这一信念根深蒂固，以至于政治光谱各端的决策者都未能预见二十世纪末为特征的不平等急剧攀升。","note":"So + adj. 置首完全倒装：was the belief 是主谓；that 引出同位语从句 (economic growth leads...)；so...that 引出结果从句；结果从句内 that characterized... 是定语从句修饰 rise。四层嵌套结构，是典型长难句。"}],"hardcase":{"sentence":"What distinguishes the most resilient democratic institutions from those that have succumbed to authoritarian backsliding is not merely the formal design of constitutional checks and balances, which any competent constitutional lawyer can draft, but rather the degree to which citizens, having internalized democratic norms over generations, are willing to defend those institutions even when doing so conflicts with their immediate partisan interests.","zh":"将最具韧性的民主制度与那些已屈服于威权倒退的制度区分开来的，不仅仅是宪政制衡的正式设计——任何称职的宪法律师都能起草这些——而是公民在多大程度上愿意捍卫这些制度，即便这样做与他们眼前的党派利益相冲突，而这种意愿是经过几代人对民主规范的内化才形成的。","marks":[{"text":"What distinguishes the most resilient democratic institutions from those that have succumbed to authoritarian backsliding","role":"主干：what 引导的名词性从句作主语，what = the thing that"},{"text":"is not merely the formal design of constitutional checks and balances","role":"主干谓语 is + 表语，not merely...but rather 构成转折对比"},{"text":"which any competent constitutional lawyer can draft","role":"非限制性定语从句，插入补充说明 formal design，分析时可括号跳过"},{"text":"having internalized democratic norms over generations","role":"独立主格/分词短语作状语，逻辑主语 citizens，表先于主句动作完成的原因"},{"text":"even when doing so conflicts with their immediate partisan interests","role":"even when 引导让步状语从句，doing so = defending those institutions"}],"tip":"拆解步：①找谓语 is，②找主语（what 从句），③找表语（not merely...but rather...the degree to which...），④剥离插入从句 which 和分词短语 having，⑤最后读让步从句 even when。"}}],"edges":[{"from":"noun","to":"pos-overview","type":"part_of","note":"名词是十大词类之一"},{"from":"pronoun","to":"pos-overview","type":"part_of","note":"代词是十大词类之一"},{"from":"article","to":"pos-overview","type":"part_of","note":"冠词是十大词类之一"},{"from":"adjective","to":"pos-overview","type":"part_of","note":"形容词是十大词类之一"},{"from":"adverb","to":"pos-overview","type":"part_of","note":"副词是十大词类之一"},{"from":"preposition","to":"pos-overview","type":"part_of","note":"介词是十大词类之一"},{"from":"conjunction","to":"pos-overview","type":"part_of","note":"连词是十大词类之一"},{"from":"numeral","to":"pos-overview","type":"part_of","note":"数词是十大词类之一"},{"from":"interjection","to":"pos-overview","type":"part_of","note":"感叹词是十大词类之一"},{"from":"noun-countability","to":"noun","type":"part_of","note":"可数性是名词的核心属性"},{"from":"noun-number","to":"noun","type":"part_of","note":"数的变化属于名词"},{"from":"noun-genitive","to":"noun","type":"part_of","note":"所有格是名词的格变化"},{"from":"noun-countability","to":"quantifier","type":"relates","note":"可数与否决定用 many/much、few/little"},{"from":"pronoun-reference","to":"pronoun","type":"part_of","note":"指代是代词的核心功能"},{"from":"pronoun-reference","to":"cohesion","type":"relates","note":"代词指代是篇章衔接的主要手段"},{"from":"article","to":"determiner","type":"is_a","note":"冠词是最典型的限定词"},{"from":"determiner","to":"noun","type":"relates","note":"限定词专为限定名词而存在"},{"from":"quantifier","to":"determiner","type":"is_a","note":"数量词是限定词的一类"},{"from":"adj-order","to":"adjective","type":"part_of","note":"多形容词的排列顺序规则"},{"from":"ed-ing-adj","to":"adjective","type":"is_a","note":"分词形容词是形容词的特殊一类"},{"from":"ed-ing-adj","to":"present-participle","type":"relates","note":"-ing 形容词源自现在分词"},{"from":"ed-ing-adj","to":"past-participle","type":"relates","note":"-ed 形容词源自过去分词"},{"from":"comparison-degree","to":"adjective","type":"part_of","note":"形容词有比较等级变化"},{"from":"comparison-degree","to":"adverb","type":"part_of","note":"副词同样有比较等级"},{"from":"comparison-degree","to":"comparative-structures","type":"requires","note":"比较结构以比较等级为词法基础"},{"from":"prep-collocation","to":"preposition","type":"part_of","note":"固定搭配是介词学习的重点"},{"from":"preposition","to":"prep-plus-relative","type":"relates","note":"介词可与关系代词组合提前"},{"from":"conjunction","to":"compound-sentence","type":"requires","note":"并列连词构成并列句"},{"from":"conjunction","to":"complex-sentence","type":"requires","note":"从属连词构成复合句"},{"from":"conjunction","to":"adverbial-clause","type":"requires","note":"从属连词引导状语从句"},{"from":"conjunction","to":"parallelism","type":"relates","note":"并列连词是平行结构的纽带"},{"from":"subject","to":"constituents","type":"part_of","note":"主语是句子成分之一"},{"from":"predicate-verb","to":"constituents","type":"part_of","note":"谓语是句子成分之一"},{"from":"object","to":"constituents","type":"part_of","note":"宾语是句子成分之一"},{"from":"predicative","to":"constituents","type":"part_of","note":"表语是句子成分之一"},{"from":"attributive","to":"constituents","type":"part_of","note":"定语是句子成分之一"},{"from":"adverbial","to":"constituents","type":"part_of","note":"状语是句子成分之一"},{"from":"complement","to":"constituents","type":"part_of","note":"补语是句子成分之一"},{"from":"appositive","to":"constituents","type":"part_of","note":"同位语是句子成分之一"},{"from":"constituents","to":"five-patterns","type":"requires","note":"辨认成分才能归入五大句型"},{"from":"subject","to":"five-patterns","type":"relates","note":"主语是五大句型的必备项"},{"from":"predicate-verb","to":"five-patterns","type":"relates","note":"谓语动词类型决定句型"},{"from":"predicative","to":"linking-verb","type":"requires","note":"表语须由系动词引出"},{"from":"linking-verb","to":"five-patterns","type":"part_of","note":"主系表(SVP)是五大句型之一"},{"from":"transitivity","to":"object","type":"requires","note":"及物性决定能否带宾语"},{"from":"transitivity","to":"passive-voice","type":"requires","note":"只有及物动词才有被动语态"},{"from":"complement","to":"bare-infinitive","type":"relates","note":"复合宾语补语常用不带 to 的不定式"},{"from":"appositive","to":"appositive-clause","type":"relates","note":"同位语可扩展为同位语从句"},{"from":"predicate-verb","to":"verb-system","type":"requires","note":"谓语的全部信息由动词系统承载"},{"from":"simple-sentence","to":"five-patterns","type":"requires","note":"简单句即五大句型的实现"},{"from":"compound-sentence","to":"simple-sentence","type":"part_of","note":"并列句由对等的简单句构成"},{"from":"complex-sentence","to":"simple-sentence","type":"part_of","note":"复合句=主句+从句，主句是简单句"},{"from":"complex-sentence","to":"clause-overview","type":"requires","note":"复合句通往三大从句"},{"from":"subject-verb-agreement","to":"subject","type":"requires","note":"一致取决于主语的数"},{"from":"subject-verb-agreement","to":"predicate-verb","type":"requires","note":"一致体现在谓语的形式"},{"from":"there-be","to":"subject-verb-agreement","type":"relates","note":"There be 遵就近一致"},{"from":"there-be","to":"five-patterns","type":"relates","note":"There be 是存在句的特殊句型"},{"from":"quantifier","to":"subject-verb-agreement","type":"relates","note":"数量词主语影响谓语单复数"},{"from":"it-usage","to":"subject-clause","type":"relates","note":"it 作形式主语代替主语从句"},{"from":"it-usage","to":"cleft-sentence","type":"requires","note":"强调句型以 it 为框架词"},{"from":"it-usage","to":"infinitive-functions","type":"relates","note":"it 作形式主语代替不定式"},{"from":"word-order","to":"inversion","type":"contrast","note":"倒装是对自然语序的偏离"},{"from":"word-order","to":"five-patterns","type":"relates","note":"英语靠语序确定成分"},{"from":"tense-aspect","to":"verb-system","type":"part_of","note":"时与体是动词系统的两维"},{"from":"voice","to":"verb-system","type":"part_of","note":"语态是动词系统的一维"},{"from":"modality","to":"verb-system","type":"part_of","note":"情态(语气)是动词系统的一维"},{"from":"auxiliary","to":"verb-system","type":"relates","note":"助动词是构建时态语态的零件"},{"from":"present-simple","to":"tense-aspect","type":"part_of","note":"一般现在时是时态矩阵一格"},{"from":"past-simple","to":"tense-aspect","type":"part_of","note":"一般过去时是时态矩阵一格"},{"from":"future-simple","to":"tense-aspect","type":"part_of","note":"一般将来时是时态矩阵一格"},{"from":"present-continuous","to":"tense-aspect","type":"part_of","note":"现在进行时是时态矩阵一格"},{"from":"past-continuous","to":"tense-aspect","type":"part_of","note":"过去进行时是时态矩阵一格"},{"from":"present-perfect","to":"tense-aspect","type":"part_of","note":"现在完成时是时态矩阵一格"},{"from":"past-perfect","to":"tense-aspect","type":"part_of","note":"过去完成时是时态矩阵一格"},{"from":"future-perfect","to":"te "use strict";
(function(){

function fatal(m){const f=$("#fatal");f.style.display="flex";f.textContent="加载失败："+m;console.error(m);}

const DATA=window.__GRAMMAR;

/* ---------- data ---------- */
const DOMAINS=DATA.domains, NODES=DATA.nodes, EDGES=DATA.edges;

const AXIOMS=new Set(DATA.axioms||[]);
const DById={}; DOMAINS.forEach((d,i)=>{d._i=i;DById[d.id]=d;});
const NById={}; NODES.forEach(n=>NById[n.id]=n);
const adj={}; NODES.forEach(n=>adj[n.id]=new Set());
const edgeList=[]; EDGES.forEach(e=>{ if(NById[e.from]&&NById[e.to]){adj[e.from].add(e.to);adj[e.to].add(e.from);edgeList.push(e);} });
const REL={requires:"需先掌握",is_a:"上位 / 是一种",part_of:"构成 / 组成",contrast:"易混 · 对比",relates:"相关"};

/* ---------- monochrome palette: silver stars, gold accent only on YOUR progress ---------- */
const SILVER=[205,212,230], WHITE=[245,247,252], GOLD=[216,191,138], GOLD_HI=[240,220,168], DUST=[120,130,158], INK=[232,235,243];
function rgba(c,a){return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")";}

    <h2 class="p-title">${esc(n.title)}</h2><div class="p-en">${esc(n.en)}</div>
    <div class="p-essence">${esc(n.summary)}</div>
    ${coreHtml}${hardHtml}${ex0}
    ${hasMore?`<button id="expand">展开深入 · 形式 / 陷阱 / 辨析 / 连线 ▾</button><div id="more">${moreDet}${moreExBlock}${rel?`<div class="p-rel"><div class="eh" style="font-family:var(--mono);font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:1rem">逻辑连线 · related</div>${rel}</div>`:""}</div>`:""}
    <div class="p-foot"><div id="mastery" class="${isMas?"done":""}"><span class="st"></span>${isMas?"已点亮":"点亮此星"}</div>
      <div class="p-nav"><button data-step="-1">‹</button><button data-step="1">›</button></div></div>`;
  pbody.scrollTop=0;
  const exb=$("#expand");if(exb)exb.addEventListener("click",()=>{$("#more").classList.add("on");exb.style.display="none";});
  $("#mastery").addEventListener("click",()=>toggleMaster(n.id));
  $$("#pbody .chip").forEach(c=>c.addEventListener("click",()=>selectNode(c.dataset.go)));
  $$("#pbody .p-nav button").forEach(b=>b.addEventListener("click",()=>stepLevel(n,+b.dataset.step)));
}
function stepLevel(n,dir){const sib=NODES.filter(x=>x.level===n.level&&isOpen(x.id)).sort((a,b)=>a._ang-b._ang);if(!sib.length)return;let i=sib.findIndex(x=>x.id===n.id);i=(i+dir+sib.length)%sib.length;selectNode(sib[i].id);}

/* ---------- mastery / numeric progress ---------- */
const prog=$("#prog");
function saveMaster(){localStorage.setItem("ky_universe_mastered_v3",JSON.stringify([...mastered]));}
function toggleMaster(id){if(mastered.has(id))mastered.delete(id);else mastered.add(id);saveMaster();applyReveal(true);recompHL();updateProgress();if(selected===id)renderPanel(NById[id],DById[NById[id].domain]);}
function updateProgress(){const m=mastered.size,rv=discovery?revealed.size:NODES.length;prog.style.setProperty("--p",(m/NODES.length*100));prog.querySelector(".lit").textContent=m;prog.querySelector(".emg").textContent=rv+" / "+NODES.length;}

/* ---------- search ---------- */
const search=$("#search"),results=$("#results");let curRes=[],curIdx=-1;
function doSearch(q){q=q.trim().toLowerCase();if(!q){results.classList.remove("on");return;}
  curRes=NODES.map(n=>{let s=0;const t=n.title.toLowerCase(),e=(n.en||"").toLowerCase(),sm=(n.summary||"").toLowerCase();if(t.includes(q))s+=10;if(e.includes(q))s+=6;if(sm.includes(q))s+=2;if(t.startsWith(q)||e.startsWith(q))s+=5;return{n,s};}).filter(x=>x.s>0).sort((a,b)=>b.s-a.s||b.n.tier-a.n.tier).slice(0,9).map(x=>x.n);curIdx=-1;
  results.innerHTML=curRes.map(n=>{const ln=LEVELNAMES[n.level]||{zh:""};return `<div class="rrow" data-go="${n.id}"><span class="dot"></span><span class="nm">${esc(n.title)}</span><span class="lv">${ln.zh}</span></div>`;}).join("")||`<div class="rrow" style="cursor:default;color:var(--faint)">无匹配</div>`;
  results.classList.add("on");$$("#results .rrow[data-go]").forEach(r=>r.addEventListener("click",()=>{selectNode(r.dataset.go);closeSearch();}));}
function closeSearch(){results.classList.remove("on");search.blur();}
search.addEventListener("input",()=>doSearch(search.value));
search.addEventListener("focus",()=>{if(search.value)doSearch(search.value);});
search.addEventListener("keydown",e=>{if(e.key==="Escape"){search.value="";closeSearch();}else if(e.key==="ArrowDown"||e.key==="ArrowUp"){e.preventDefault();if(!curRes.length)return;curIdx=(curIdx+(e.key==="ArrowDown"?1:-1)+curRes.length)%curRes.length;$$("#results .rrow").forEach((r,i)=>r.classList.toggle("cur",i===curIdx));}else if(e.key==="Enter"){const p=curIdx>=0?curRes[curIdx]:curRes[0];if(p){selectNode(p.id);closeSearch();}}});
document.addEventListener("click",e=>{if(!e.target.closest("#searchwrap"))results.classList.remove("on");});

/* ---------- tools ---------- */
$("#btnall").addEventListener("click",()=>{discovery=!discovery;$("#btnall").classList.toggle("on",!discovery);$("#btnall").textContent=discovery?"全图":"探索";applyReveal(false);recompHL();updateProgress();});
$("#btnreset").addEventListener("click",()=>{tgt.x=0;tgt.y=0;tgt.s=baseS;tgt.on=true;closePanel();});
$("#btnpath").addEventListener("click",()=>{let nx=ROUTE.find(id=>isOpen(id)&&!mastered.has(id))||ROUTE.find(id=>!mastered.has(id))||ROUTE[0];if(nx)selectNode(nx);});

/* ---------- keys ---------- */
addEventListener("keydown",e=>{if(e.key==="Escape"){if(panel.classList.contains("on"))closePanel();}else if((e.key==="/"||e.key==="f")&&document.activeElement!==search){e.preventDefault();search.focus();}});
$("#enter").addEventListener("click",()=>$("#intro").classList.add("gone"));
addEventListener("keydown",e=>{if(e.key==="Enter"&&!$("#intro").classList.contains("gone")&&document.activeElement!==search)$("#intro").classList.add("gone");});
const backEl=$("#back");backEl.addEventListener("click",e=>{if(history.length>1){e.preventDefault();history.back();}});
if(location.protocol!=="file:"&&!document.referrer)backEl.style.display="none";

/* ---------- boot ---------- */
updateProgress();
requestAnimationFrame(frame);
const qp=new URLSearchParams(location.search),qn=qp.get("node");
if(qp.has("all")){discovery=false;$("#btnall").classList.add("on");$("#btnall").textContent="探索";applyReveal(false);updateProgress();}
if(qp.has("enter")||qn)$("#intro").classList.add("gone");
if(qn&&NById[qn])setTimeout(()=>selectNode(qn),300);
})();
</script>
</body>
</html>
