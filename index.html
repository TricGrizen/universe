/ should have done(本应该做却没做，含遗憾批评) / needn't have done(本不必做却做了，含浪费之意)。"},{"h":"should have done —— 考研最高频","t":"should have done 表「本应该做但实际没有做」，含遗憾或批评语气：You should have called me（你本该给我打电话的，但你没有）。这是考研阅读、翻译、完形的高频句式，也是写作拉分点。needn't have done = 做了但其实没必要。两者都带评价语气，须区分清楚。"},{"h":"could have done 的双重语义","t":"could have done 有两个用法：① 「本来可以做但没做」（= 能力的虚拟，表遗憾或批评）：He could have won if he'd tried harder；② 「当时或许做了」（= 过去可能的推断，较少见）。语境是唯一判断标准——看前后是否有条件句或遗憾意味。"},{"h":"与时态星系的联结","t":"「情态 + have done」借用了现在完成时(have + done)的结构来指向过去，这是它的语法来源。情态动词本身无时态，无法直接加过去时间标记，于是通过 have done 的完成义来回望过去。这一机制也在虚拟语气主句中出现(would have done)，是整个情态-虚拟系统的核心骨架之一。"}],"examples":[{"en":"She should have prepared more thoroughly for the interview.","zh":"她本该为面试做更充分的准备的（但她没有）。","note":"should have done 点明「未做之事」，含遗憾批评，是高分翻译写作句式。"},{"en":"The package must have been delayed in customs.","zh":"包裹一定是在海关被延误了。","note":"must have done 对过去事件做出肯定推断，被动式 have been done。"}],"hardcase":{"sentence":"The early manuscripts could not have survived without the monks' meticulous preservation efforts; indeed, some scholars believe the original text may have been altered by a later copyist who should have known better.","zh":"若无僧侣们一丝不苟的保护工作，早期手稿不可能留存至今；确实，一些学者认为原文可能被后来一位本该更加审慎的抄写员篡改过。","marks":[{"text":"could not have survived","role":"could not have done 表对过去的否定推测：过去不可能发生"},{"text":"may have been altered","role":"may have done 表对过去的肯定推测：过去也许发生了"},{"text":"should have known","role":"should have done 表过去本该做却未做，含批评意味"}],"tip":"情态+完成式是推测过去的固定句式：must/may/might/could/can't have done，各有强弱；should have done 单独表'本该'。"}},{"id":"subjunctive","title":"虚拟语气","en":"Subjunctive Mood","domain":"mood","tier":6,"summary":"谈与事实相反、不确定或主观愿望的'平行世界'，考研语法第一难点。","level":4,"prereq":["modality"],"parent":"modality","detail":[{"h":"虚拟语气的本质：偏离事实的平行世界","t":"虚拟语气(subjunctive mood)是说话人明知陈述内容与事实相反、或表达愿望假设时，对动词时态做特殊处理的语法手段。英语虚拟语气的核心逻辑：用「过去」的形式表达「非现实」的内容。这不是真正的时间后退，而是一种语法信号：这里说的不是真实发生的事。汉语表达非现实多靠词汇(「假如」「要是」「但愿」)，英语则在动词形式上留下痕迹。"},{"h":"虚拟语气的三大场景","t":"① 条件虚拟句(if 引导，与事实相反的假设)；② 情感/意愿虚拟(wish/as if/as though 等)；③ 建议要求虚拟(suggest/demand 等 + that + 动词原形)。三类在形式上有所不同，但都共享同一个核心思路：时态退一步 = 偏离现实。"},{"h":"时态退一步的总原则","t":"与现在相反 → 从句用过去时(were/did)，主句用 would/could/might + do；与过去相反 → 从句用过去完成时(had done)，主句用 would/could/might + have done；与将来相反/可能性极低 → 从句用 were to do 或 should do，主句用 would/could/might + do。这个「退一步」原则贯穿全部虚拟语气，是记忆的钥匙。"},{"h":"与情态动词的关系","t":"虚拟语气的主句几乎总是借助情态动词的过去形式(would/could/should/might)来实现。这是虚拟语气与情态动词星系之间的枢纽。反过来说：一看到主句有 would do 或 would have done，就要警觉这可能是虚拟语气。情态动词的过去式在此不表过去，而表「非现实」。"},{"h":"考研考点总览","t":"考研英语一历年均考虚拟语气：完形填空中辨别真实条件句与虚拟条件句；阅读长难句中识别含 if-inversion(Were/Had 提前)的倒装虚拟；翻译题中准确还原 would have done 的「本来会…」含义；写作中用 If I were to...、Had it not been for... 等高级句式拉分。是考研英语语法第一难点，值得系统攻克。"}],"examples":[{"en":"If I were a bird, I would fly to you.","zh":"如果我是一只鸟，我就会飞到你身边。","note":"与现在相反：从句 were(不用 was，虚拟 were 通用于所有人称)，主句 would do。"},{"en":"If he had taken my advice, he would not have failed.","zh":"如果他当时接受了我的建议，他就不会失败了。","note":"与过去相反：从句 had done，主句 would have done，双双后退一步。"}],"hardcase":{"sentence":"It is vital that every member of the committee be informed of the decision before the announcement is made, lest dissent arise from a perceived lack of transparency.","zh":"委员会每位成员必须在公告发布前获悉这一决定，以防因感知到的透明度不足而产生异议，这至关重要。","marks":[{"text":"It is vital that","role":"触发虚拟语气的形容词框架，后接动词原形"},{"text":"every member of the committee be informed","role":"虚拟语气：be 保持原形（不随主语变为 is）"},{"text":"lest dissent arise","role":"lest 引导目的从句，谓语用动词原形 arise 表虚拟"}],"tip":"虚拟语气的标志是动词'不变形'：无论主语是谁，一律用原形——与陈述语气的人称变化截然不同。"}},{"id":"conditional-unreal","title":"虚拟条件句","en":"Unreal Conditionals","domain":"mood","tier":6,"summary":"if 引导：与现在/过去/将来事实相反，各有固定的时态退一步公式。","level":4,"prereq":["subjunctive","condition-clause"],"parent":"subjunctive","detail":[{"h":"真实条件句 vs 虚拟条件句","t":"条件状语从句(条件状语从句节点)有两类：真实条件句(real conditional)表示有可能发生的事，遵「主将从现」：If it rains, I will stay home；虚拟条件句(unreal conditional)表示与事实相反或极不可能，需「时态退一步」：If it rained, I would stay home（实际上天气晴好）。区分二者是完形填空的核心考点。"},{"h":"三类虚拟条件句公式表","t":"与现在相反：If + 主语 + did/were, 主语 + would/could/might + do。例：If she knew the answer, she would tell us.（她其实不知道）\n与过去相反：If + 主语 + had done, 主语 + would/could/might + have done。例：If he had studied harder, he would have passed.（他当时没努力）\n与将来相反(极小可能)：If + 主语 + were to do / should do, 主语 + would/could/might + do。例：If the sun were to rise in the west, I would give up.（这当然不会发生）\n注意：be 动词在虚拟从句中一律用 were，不论人称，不用 was（口语中 was 常见，但正式书面须用 were）。"},{"h":"注意主句情态词的选择","t":"主句情态词不一定是 would，可以是 could(能力角度)、might(可能性较低)、should(义务角度)，视语义需要选择。如：If you helped me, I could finish earlier.（能力）If they had left earlier, they might have caught the train.（可能）"},{"h":"考研翻译高频句","t":"考研翻译中虚拟条件句的汉译难点在于还原「与事实相反」的语气：would have done 要译为「本来会…」「就会…了」而非「将会…」。同时注意 if 省略倒装变体(Had they..., If-inversion)，不要看到 Had 开头就误以为是一般过去完成时疑问句。"}],"examples":[{"en":"If I were in your position, I would handle it differently.","zh":"如果我处在你的位置，我会采取不同的处理方式。","note":"与现在相反：I were(虚拟，不用 am/was)，would handle(原形)。"},{"en":"If the policy had been implemented earlier, thousands of lives could have been saved.","zh":"如果这项政策早些实施，数千条生命本可以得救。","note":"与过去相反：had been implemented, could have been saved(被动式)。"}],"hardcase":{"sentence":"If the policy had been implemented a decade earlier, thousands of patients would not have lost access to the treatment that could have saved their lives.","zh":"如果这项政策早十年实施，数千名患者就不会丧失获得那种或许能救命的治疗的机会。","marks":[{"text":"If the policy had been implemented","role":"与过去事实相反的虚拟条件句：if 从句用过去完成时 had been done"},{"text":"would not have lost","role":"主句用 would have done，表与过去相反的结果"},{"text":"could have saved","role":"定语从句内的情态+完成形式，表对过去的推测性描述"}],"tip":"与过去相反：if + had done（从句）→ would/could have done（主句）——两个完成形式对称出现，认准即可。"}},{"id":"mixed-conditional","title":"混合虚拟","en":"Mixed Conditionals","domain":"mood","tier":3,"summary":"条件与结果分属不同时间：过去的假设导致现在的结果，时态各依其时。","level":5,"prereq":["conditional-unreal"],"parent":"conditional-unreal","detail":[{"h":"混合虚拟的本质","t":"混合虚拟(mixed conditional)是指 if 从句与主句所指时间不同的虚拟条件句。最常见类型：从句谈过去的假设(had done)，主句谈对现在的影响(would do)。逻辑是：「如果当时(过去)做了/没做，那么现在就会/不会…」。这是最贴近真实推理的虚拟形式，也是考研高分句式。"},{"h":"公式与结构","t":"最常见混合型：If + 主语 + had done(过去), 主语 + would + do(现在)。例：If he had taken the job in Beijing, he would be living there now.（过去没接受那份工作 → 现在没住在北京）\n反向混合(现在条件→过去结果，较少见)：If + 主语 + were/did(现在), 主语 + would have done(过去)。例：If she were a native speaker, she would have understood the joke immediately.（她不是母语者 → 当时没理解那个笑话）"},{"h":"识别技巧","t":"读句子时先定位主句和 if 从句，分别判断各自时间框架：从句有 had done → 指过去；主句有 would be / would do → 指现在。两者时间不同 = 混合虚拟。常有时间状语辅助：now, today, still 等出现在主句，yesterday, at that time, last year 出现在从句。"},{"h":"考研应用","t":"混合虚拟在考研阅读长难句中出现频率中等，但在翻译题中是重点：要分别翻译两个分句的时间层，不能将全句都处理为过去或都处理为现在。写作中能写出混合虚拟句，是语法成熟的显著标志。"}],"examples":[{"en":"If she had chosen a different career, she might not be struggling now.","zh":"如果她当初选择了不同的职业，她现在可能就不会如此挣扎了。","note":"had chosen 指过去决定，might not be struggling 指现在状态：典型混合虚拟。"},{"en":"If you were more disciplined, you would have finished the project by now.","zh":"如果你更自律一些，到现在你早就完成这个项目了。","note":"反向混合：现在的性格假设(were)→ 对过去结果的推断(would have finished)。"}],"hardcase":{"sentence":"If he had taken the position in Geneva as initially offered, he would now be leading one of the most influential international agencies rather than languishing in an underfunded domestic role.","zh":"如果他当初接受了最初提供的日内瓦职位，他现在就会领导一个最具影响力的国际机构，而不是在一个资金匮乏的国内职位上蹉跎。","marks":[{"text":"If he had taken","role":"if 从句：过去完成时，表与过去事实相反的假设（他当时没接受）"},{"text":"he would now be leading","role":"主句：would + 动词原形，now 点明时间轴落在现在，表与现在相反的结果"},{"text":"rather than languishing","role":"rather than 后接现在分词，对比现实中正在发生的情况"}],"tip":"混合虚拟的时间轴是关键：从句（had done）管过去的假设，主句（would do）管现在的结果，now 是识别信号。"}},{"id":"if-inversion","title":"虚拟的省略与倒装","en":"Conditional Inversion","domain":"mood","tier":4,"summary":"省略 if，把 were/had/should 提到主语前：Were I you... = If I were you...。","level":5,"prereq":["conditional-unreal"],"parent":"conditional-unreal","detail":[{"h":"什么是虚拟条件句的省略倒装","t":"在正式书面英语中，虚拟条件句可以省略 if，将 were/had/should 提到主语之前，形成部分倒装(partial inversion)。这种结构在考研阅读和翻译中频繁出现，外观像疑问句，实为省略 if 的条件句，必须识别。"},{"h":"三种倒装形式","t":"与现在相反(were 提前)：Were I you = If I were you；Were it not for her help = If it were not for her help\n与过去相反(had 提前)：Had he known = If he had known；Had it not been for = If it had not been for\n与将来相反(should 提前)：Should you need help = If you should need help\n规律：把助词(were/had/should)移到句首，删掉 if，其余不变。"},{"h":"与倒装节点的关联","t":"这一结构属于「部分倒装(partial inversion)」——只有助动词前移，主语和谓语主体保持原位。它是倒装星系(倒装节点)在虚拟语气中的具体应用。两者联动学习效率更高：见到 Were/Had/Should 置句首，且后面没有问号，立刻判定为虚拟倒装条件句。"},{"h":"考研翻译真题陷阱","t":"Had it not been for the government's intervention, the economy would have collapsed.（要不是政府的干预，经济早就崩溃了。）这类句子在翻译题中完整出现过。陷阱：① 不要把 Had it not been for... 误读为过去完成时一般疑问句；② 翻译时要还原「如果没有…，那么就会…」的虚拟语气；③ 注意 but for / were it not for / had it not been for 三个同义结构可互换，都表「要不是…」。"}],"examples":[{"en":"Were the government to relax these regulations, businesses would flourish.","zh":"如果政府放宽这些法规，企业就会蓬勃发展。","note":"Were... to do 是与将来相反的倒装虚拟，were 置句首，去掉了 if。"},{"en":"Had she arrived ten minutes earlier, she would have caught the flight.","zh":"如果她早十分钟到，她就赶上那趟航班了。","note":"Had + 主语 + done，过去虚拟的标准倒装，等于 If she had arrived...。"}],"hardcase":{"sentence":"Had the board been apprised of the financial irregularities at an earlier stage, it would undoubtedly have intervened; were the same situation to arise today, the outcome would likely be no different.","zh":"若董事会早些阶段获悉财务违规情况，其必定已经介入；如果今天同样的情况再次出现，结果也很可能不会有所不同。","marks":[{"text":"Had the board been apprised","role":"省略 if，Had 提前作部分倒装，等于 If the board had been apprised（与过去相反）"},{"text":"would undoubtedly have intervened","role":"与过去相反虚拟的主句：would have done"},{"text":"were the same situation to arise","role":"省略 if，Were 提前，表与将来相反/不可能的假设：were + 主语 + to do"}],"tip":"倒装虚拟三公式：Had + 主 + done（过去）、Were + 主 + to do（将来）、Should + 主 + do（可能但不确定）——见到这三者首位，立刻还原成 if 从句。"}},{"id":"wish-clause","title":"wish 虚拟","en":"Wishes","domain":"mood","tier":3,"summary":"wish 后从句表难以实现的愿望：现在用过去、过去用过去完成、将来用 would。","level":4,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"wish 后接虚拟从句的逻辑","t":"wish 表达说话人认为「难以实现」的愿望，因此后接从句必须用虚拟语气。这与 hope(hope 接真实可能)形成对比：I hope it will rain tomorrow(天气不确定，有可能)；I wish it would rain tomorrow(几乎不可能下雨，或表遗憾)。记住：wish 的宾语从句永远是虚拟，时态退一步。"},{"h":"三类时间的公式","t":"对现在的遗憾：wish + 主语 + did/were。例：I wish I knew the answer.（我现在其实不知道）\n对过去的遗憾：wish + 主语 + had done。例：I wish I had studied harder.（过去没努力，表后悔）\n对将来的愿望(难以实现)：wish + 主语 + would/could do。例：I wish you would stop complaining.（希望你别抱怨了，但你大概不会）\n规律：与虚拟条件句 if 从句一致——现在退过去时、过去退过去完成时、将来用 would。"},{"h":"wish vs if only","t":"if only 与 wish 意义相近，都表强烈遗憾或愿望，但情感更强烈、更感叹。时态规则完全相同：If only I had listened to you!（要是我当时听了你的话就好了！）可单独成句，感叹意味极强。考研写作或翻译中见到 if only，按 wish 的虚拟规则处理即可。"},{"h":"考研完形与翻译","t":"完形填空中 wish 后空格常考时态选择：「I wish I ___ (know) the answer at that time」→ 填 had known（过去遗憾）。翻译中要把 wish 从句译出虚拟语气的「遗憾」感：「I wish things were different」不能直译为「我希望事情不同」，而应是「要是情况能不一样就好了」。"}],"examples":[{"en":"I wish I could speak three languages fluently.","zh":"要是我能流利地说三种语言就好了。","note":"对现在能力的遗憾，could 是 can 的虚拟形式，表「其实做不到」。"},{"en":"She wishes she had taken better care of her health.","zh":"她后悔自己当时没有好好爱惜身体。","note":"对过去行为的遗憾，had taken(过去完成虚拟)，翻译出「后悔」感。"}],"hardcase":{"sentence":"She wishes she had pursued a career in research when the opportunity presented itself, and she now wishes that her institution would invest in more collaborative projects.","zh":"她希望当年机会来临时自己曾投身研究事业，她现在也希望所在机构能投入更多合作项目。","marks":[{"text":"wishes she had pursued","role":"wish + 过去完成时：表对过去的遗憾，事实是她当时没有追求研究事业"},{"text":"when the opportunity presented itself","role":"时间状语从句，用一般过去时界定过去的时间点"},{"text":"wishes that her institution would invest","role":"wish + would do：表对将来的期望，带有说话人对他人行为的期许或不满"}],"tip":"wish 后时态三档：过去时（对现在遗憾）、过去完成时（对过去遗憾）、would do（对将来期望/不满）——时态一档一档往回推。"}},{"id":"as-if-clause","title":"as if 虚拟","en":"As If / As Though","domain":"mood","tier":2,"summary":"as if 后接虚拟表'看似而非实'，时态后退一步表与事实相反。","level":4,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"as if / as though 的功能","t":"as if 和 as though 引导方式状语从句，表示「好像/似乎…但实际并非如此」。它们后面接虚拟语气，是因为所描述的情景与实际不符。He talks as if he knew everything.（他说话的样子好像他什么都知道似的——其实他未必知道）。当说话人认为后面的情景是真实的，则不用虚拟，直接用陈述语气：He looks as if he is tired.（他看起来累了，说话人认为他确实累了）。"},{"h":"虚拟与非虚拟的选择","t":"是否用虚拟，取决于说话人对从句内容的判断：说话人认为「不真实/不可能」→ 虚拟(时态退一步)；说话人认为「可能真实」→ 陈述语气(正常时态)。这个选择考验语境理解能力，是完形填空与阅读的微妙考点。"},{"h":"时态规则","t":"对现在不真实的描述：as if + 过去时(did/were)。He acts as if he were the boss.（其实他不是老板）\n对过去不真实的描述：as if + 过去完成时(had done)。She talks about it as if she had been there.（其实她当时不在场）\n规律与 wish 相同：现在情况退过去时，过去情况退过去完成时。"},{"h":"与定语从句 as 的区分","t":"as if / as though 是方式状语连词，与「as 引导定语从句」(as is known)是完全不同的结构。见到 as if，直接识别为方式从句+虚拟，不要与关系代词 as 混淆。两者在考研长难句中常被混淆，务必区分语法功能。"}],"examples":[{"en":"He speaks about climate change as if it were not a serious threat.","zh":"他谈论气候变化的口吻好像它根本不是一个严重威胁似的。","note":"as if + were，说话人认为气候变化确实是严重威胁，从句与事实相反。"},{"en":"She described the event as if she had witnessed it herself.","zh":"她描述那个事件，好像是她亲眼目睹的一样。","note":"对过去情况的不真实描述，as if + had done。"}],"hardcase":{"sentence":"The director spoke as if the merger had already been finalized, even though the negotiating parties had yet to reach agreement on the key financial terms.","zh":"总监说话时好像合并已经尘埃落定，尽管谈判各方在关键财务条款上尚未达成一致。","marks":[{"text":"as if the merger had already been finalized","role":"as if 后接过去完成时，表与说话时刻之前相反的虚拟情形（事实：合并未完成）"},{"text":"had yet to reach agreement","role":"had yet to do 表到那时为止尚未完成，与主句 as if 的虚拟形成事实对照"}],"tip":"as if 的时态判断：与现在相反用过去时，与更早时刻相反用过去完成时——看的是'相对于主句动作，虚拟的事件在哪个时间层'。"}},{"id":"subjunctive-demand","title":"建议要求虚拟","en":"Mandative Subjunctive","domain":"mood","tier":4,"summary":"suggest/demand/insist/order/require + that + (should) do，用动词原形。","level":4,"prereq":["subjunctive","object-clause"],"parent":"subjunctive","detail":[{"h":"建议要求虚拟的触发词","t":"一类特定动词表达「建议、要求、命令、坚持、提议」等含义，其后的 that 从句须用虚拟语气，形式为「(should) + 动词原形」。should 可以省略，动词原形保留——这是美式英语的标准用法(也称「虚拟式」mandative subjunctive)；英式英语更倾向保留 should。高频触发词：suggest(建议)、demand(要求)、insist(坚持)、recommend(推荐)、require(要求)、request(请求)、order(命令)、propose(提议)、urge(敦促)、advise(建议)。"},{"h":"结构形式","t":"触发动词 + that + 主语 + (should) + 动词原形（不加时态、不加人称变化）。例：The doctor suggested that he (should) take a rest.（无论他是第三人称 he，也不加 takes；无论主句是过去时，从句仍用原形，不受时态呼应约束）。这条规则与普通宾语从句的时态呼应规则相抵触，是重点陷阱。"},{"h":"陷阱：suggest 的两个用法","t":"suggest 有两个不同含义：① 「建议」→ that 从句用(should) do：The report suggests that the company restructure its operations.（建议公司重组）② 「表明/暗示」→ that 从句用正常陈述语气：The data suggests that the population is growing.（数据表明人口在增长）。考研完形与阅读中 suggest 引导的从句时态，往往是区分这两个含义的考点。"},{"h":"与宾语从句的关系","t":"建议要求虚拟本质是宾语从句(宾语从句节点)的特殊情况。宾语从句通常遵时态呼应，但这类触发词后的从句是例外——无论主句时态如何，从句永远用(should) + 动词原形。记住这条例外，可以避免完形填空中将过去时主句的 that 从句也改为过去时的错误。"}],"examples":[{"en":"The committee demanded that the report be submitted within 24 hours.","zh":"委员会要求在24小时内提交报告。","note":"be submitted 是动词原形的被动式，demanded 过去时但从句不变 → (should) be done。"},{"en":"Her advisor recommended that she apply for the scholarship.","zh":"她的导师建议她申请奖学金。","note":"recommended 过去时，apply 仍用原形，无时态呼应，无第三人称 -s。"}],"hardcase":{"sentence":"The ethics committee insisted that all participating researchers sign a confidentiality agreement and that any sensitive data be anonymized prior to publication.","zh":"伦理委员会坚持要求所有参与研究人员签署保密协议，并要求所有敏感数据在发表前予以匿名化处理。","marks":[{"text":"insisted that","role":"insist 属于'建议要求'动词，触发后接从句中的虚拟语气"},{"text":"all participating researchers sign","role":"虚拟语气：sign 用动词原形，不因主语复数而改变形式"},{"text":"any sensitive data be anonymized","role":"第二个 that 从句，被动虚拟语气：be + 过去分词，be 保持原形"}],"tip":"建议要求类动词（suggest/demand/insist/require/order）+ that 从句，谓语一律用动词原形或 should + 原形——should 可省。"}},{"id":"subjunctive-adj","title":"形容词后虚拟","en":"It is necessary that...","domain":"mood","tier":3,"summary":"It is necessary/essential/important that + (should) do——表主观必要。","level":4,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"形容词后虚拟的结构","t":"当句子结构为「It is + 形容词 + that 从句」时，若该形容词表达「必要、重要、紧迫、奇怪」等主观评价，that 从句须用虚拟语气：(should) + 动词原形。常见形容词：necessary(必要的)、essential(不可缺的)、important(重要的)、vital(至关重要的)、urgent(紧迫的)、advisable(明智的)、strange(奇怪的)、surprising(令人惊讶的)。"},{"h":"公式","t":"It is + 形容词 + that + 主语 + (should) + 动词原形。例：It is necessary that every student (should) submit the assignment on time.（submit 不加 -s，should 可省略）。与建议要求虚拟(subjunctive-demand)的触发机制类似，只是主语换成了形容词评价性结构，而非动词。"},{"h":"与主语从句的关系","t":"这类结构以 it 作形式主语，真正的主语是 that 从句（主语从句节点）。因此它是主语从句的虚拟语气特例：正常主语从句：It is obvious that he is right.（正常陈述）；虚拟主语从句：It is vital that he be present.（be 是原形，虚拟）。掌握形式主语 it 的用法，有助于正确识别和还原句子结构。"},{"h":"考研写作高分句型","t":"It is essential that the government (should) take immediate action to address climate change.（政府有必要立即采取行动应对气候变化。）这类句式在考研大作文中是加分句型，结构清晰、语气书面正式。注意：写作中 should 可保留使句子更明显，不省略也对。"}],"examples":[{"en":"It is vital that the team leader be informed of all decisions.","zh":"团队领导有必要知晓所有决定。","note":"be informed 是原形被动，形容词 vital 触发虚拟，should 已省略。"},{"en":"It is strange that she should say such a thing.","zh":"她居然说出这样的话，真是奇怪。","note":"strange 后保留 should，含「竟然」语气，表惊讶与评价。"}],"hardcase":{"sentence":"It is imperative that the revised protocol be submitted to the regulatory authority no later than thirty days before the trial is scheduled to commence.","zh":"修订后的方案必须在试验预定开始前不少于三十天提交至监管机构，这是强制性要求。","marks":[{"text":"It is imperative that","role":"形容词 imperative（强制的）触发后接从句的虚拟语气，it 作形式主语"},{"text":"the revised protocol be submitted","role":"虚拟语气被动式：be 保持原形，不写 is submitted"},{"text":"no later than thirty days before","role":"复合介词短语作时间状语，修饰 be submitted"}],"tip":"It is + 形容词（necessary/essential/important/imperative/vital）+ that 从句——认准这个框架，后面的原形动词就是虚拟语气的信号。"}},{"id":"it-is-time","title":"It's time 虚拟","en":"It's (high) time","domain":"mood","tier":2,"summary":"It's (high) time + 主语 + 过去时：'早该做了'，含轻微责备。","level":4,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"结构与含义","t":"It is time (that) + 主语 + 过去时动词。这个结构表示「早该…了」，含轻微责备或催促语气，暗示事情本该早发生而未发生。例：It is time we left.（我们该走了）；It is high time you started taking your health seriously.（你早该开始认真对待自己的健康了，high time 语气更重）。注意：这里的过去时不表过去，而是虚拟语气的标志，表示「此刻理应发生而尚未发生」。"},{"h":"两种变体","t":"① It is time + to do：表一般的「是…的时候了」，无虚拟，无责备：It is time to go.（该走了，中性说法）② It is time (that) + 主语 + 过去时：有责备语气，暗含「你/我们其实还没做」：It's time you apologized to her.（你早该向她道歉了——你还没道歉）两者形式相近，语气和含义有别，完形填空常考辨析。"},{"h":"高频表达","t":"It is high time / about time + 主语 + 过去时：高 time / about time 语气比 time 更强，责备更明显。例：It is about time the authorities addressed this issue.（当局早该处理这个问题了，含批评意味）。这类句式在考研阅读语境中常出现于批评性文章，读到时注意体会作者的批评立场。"}],"examples":[{"en":"It is high time this country invested more in public education.","zh":"这个国家早就该加大对公共教育的投入了。","note":"high time + 过去时 invested，强烈责备语气，暗示至今尚未充分投入。"},{"en":"It is time we reconsidered our approach to urban planning.","zh":"我们该重新审视城市规划方案了。","note":"time + 过去时 reconsidered，催促语气，尚未重新审视。"}],"hardcase":{"sentence":"It is high time policymakers acknowledged the structural causes of inequality rather than continuing to address only the symptoms.","zh":"政策制定者早该正视不平等的结构性根源，而不是继续只治标不治本。","marks":[{"text":"It is high time","role":"固定虚拟句型，high time 比 time 语气更强，含'早该……了'的责备意味"},{"text":"policymakers acknowledged","role":"It is time 后接主语 + 过去时，虚拟语气：acknowledged 用过去时但含义对应现在/将来"},{"text":"rather than continuing to address","role":"rather than 后接动名词，对比实际上一直在做的事，强化批评语气"}],"tip":"It's (high) time + 主语 + 过去式——过去式动词不表过去，而是标志虚拟：'本该在此刻做而未做'。"}},{"id":"would-rather","title":"would rather 虚拟","en":"Would Rather","domain":"mood","tier":2,"summary":"would rather + 主语 + 过去时（虚拟）表宁愿对方做/不做某事。","level":4,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"would rather 的两种用法","t":"① would rather + 动词原形：表说话人自己的偏好，「宁愿做…」：I would rather stay home.（不涉及虚拟语气，后接原形）② would rather + 主语 + 过去时(虚拟)：表「宁愿对方做/不做某事」，含虚拟意味：I would rather you stayed home.（我希望你留在家，但你也许不会）。第二种是考研语法点——注意 that 常省略，直接接另一主语+过去时。"},{"h":"虚拟用法的时态规则","t":"would rather + 主语 + 过去时(对现在或将来的偏好)：I would rather you didn't come tomorrow.（明天你最好别来）would rather + 主语 + had done(对过去的遗憾/偏好)：I would rather you had told me the truth.（你当时要是告诉我实情就好了）规律与 wish 的时态规则完全平行——现在愿望用过去时，过去遗憾用过去完成时。"},{"h":"would sooner / had rather","t":"与 would rather 意义相近的表达：would sooner do(宁愿做，偏正式)；had rather(古英语残留，现代英语少见)。考研中主要考 would rather，偶见 would sooner。两者语法规则相同。"},{"h":"陷阱：第一种用法不是虚拟","t":"I would rather do A than do B 中，后接的是动词原形，不是虚拟语气；两个原形动词并列，表偏好比较。只有当 would rather 后出现「另一主语 + 过去时」时，才是虚拟语气结构。完形填空中注意判断后面是否有独立主语。"}],"examples":[{"en":"I would rather you consulted a doctor instead of self-medicating.","zh":"我宁愿你去看医生，而不是自行用药。","note":"consulted 是过去时虚拟，表对他人的偏好，实际上对方可能还没去看。"},{"en":"She would rather have stayed in her hometown than moved to the capital.","zh":"她宁愿留在家乡，也不愿搬到首都去。","note":"would rather have done than done：对过去选择的遗憾，两个 done 并列。"}],"hardcase":{"sentence":"The professor would rather her graduate students spent more time engaging with primary sources than relying on secondary literature for their theoretical frameworks.","zh":"这位教授宁愿她的研究生花更多时间研读原始文献，而不是在理论框架上依赖二手文献。","marks":[{"text":"would rather her graduate students spent","role":"would rather + 从句主语 + 过去时：虚拟语气表说话人对他人行为的偏好（对现在/将来）"},{"text":"than relying on secondary literature","role":"than 引出对比项，用动名词 relying，与 spent 对应的另一个选项"}],"tip":"would rather do（自己想做）vs would rather + 主语 + 过去时（希望别人做）——主语不同，结构完全不同，后者是虚拟。"}},{"id":"imperative","title":"祈使语气","en":"Imperative Mood","domain":"mood","tier":2,"summary":"省略主语 you，动词原形开头，发命令、请求、建议；加 do 强调。","level":3,"prereq":["modality"],"parent":"modality","detail":[{"h":"祈使语气的形式","t":"祈使语气(imperative mood)用于发出命令、请求、建议、禁止、邀请。形式：省略主语 you，动词用原形开头。例：Close the door.（关门）；Please sit down.（请坐）；Don't touch it.（别碰它）。加 do 强调诚恳或急切：Do come in.（快请进来！）；Do be careful.（一定要小心！）"},{"h":"否定形式","t":"祈使句否定形式为 Don't / Do not + 动词原形，don't 更口语，do not 更正式。例：Don't worry about it.；Do not distribute this document without permission.（请勿在未经许可的情况下发送此文件）。注意：从不用 No + 动词原形作句子（No smoking 是名词短语，不是祈使句）。"},{"h":"Let 引导的祈使句","t":"第一人称和第三人称的祈使可借助 let 实现：Let me/us + 动词原形：Let me explain.（让我来解释）；Let us begin.（我们开始吧，= Let's begin）；Let him try.（让他试试）。Let's 是「说话人+听话人」共同行动的邀请，Let him 是命令/允许第三方做事。"},{"h":"与情态的关系及考研应用","t":"祈使语气表意愿与命令，是情态(modality)的道义维度在句法层面的直接表达，与 must/should 等道义情态动词形成对比——情态动词用陈述式传达义务，祈使语气则直接用动词形式实现命令。考研写作中，议论文建议段可用 Let us...等邀请式祈使句作为呼吁结尾，比 We should... 更有感召力。"}],"examples":[{"en":"Do take the opportunity while you still can.","zh":"趁现在还有机会，一定要抓住它。","note":"do 加强语气，表殷切叮嘱，比 Take it 更诚恳。"},{"en":"Let us not forget the lessons learned from history.","zh":"让我们不要忘记历史的教训。","note":"Let us + 否定原形，呼吁式祈使，写作结尾的高分表达。"}],"hardcase":{"sentence":"Bear in mind that correlation does not imply causation, and do not allow the apparent elegance of a model to override the obligation to test its predictions rigorously.","zh":"牢记相关性不等于因果关系，切勿让模型表面上的优雅凌驾于严格检验其预测的义务之上。","marks":[{"text":"Bear in mind","role":"祈使句，省略主语 you，动词原形开头，发出告诫"},{"text":"do not allow","role":"祈使句否定形式：do not + 动词原形，加 do 是祈使否定的固定结构"},{"text":"to override the obligation to test","role":"allow 的宾语补语为 to do（不定式），其中嵌套另一个 to do 作 obligation 的定语"}],"tip":"祈使句的两个关键：肯定式直接用原形（Bear），否定式用 do not + 原形（do not allow）——别把 do not 误当强调句的 do。"}},{"id":"subjunctive-set","title":"其它虚拟定式","en":"Other Subjunctive","domain":"mood","tier":3,"summary":"lest/for fear that + (should) do、but for（要不是）、if only（但愿）等固定虚拟。","level":5,"prereq":["subjunctive"],"parent":"subjunctive","detail":[{"h":"lest / for fear that —— 目的从句中的虚拟","t":"lest 和 for fear that 表「以防、唯恐」，后接虚拟从句，用 (should) + 动词原形。例：He spoke quietly lest he (should) wake the baby.（他轻声说话，以免吵醒孩子）；She took notes for fear that she (should) forget the key points.（她做笔记，以防忘掉要点）。lest 是较正式的书面词，考研阅读中可见，should 通常保留。"},{"h":"but for / without ——「要不是」结构","t":"but for + 名词/代词（等于 if it were not for / if it had not been for），引出假设条件，主句用虚拟语气。例：But for your help, I could not have finished.（要不是你的帮忙，我不可能完成）= If it had not been for your help...。without 有相同用法：Without water, nothing could survive.（没有水，一切都无法存活）。这类结构是不用 if 却表达虚拟条件的常见方式，考研翻译中频繁出现。"},{"h":"if only —— 强烈遗憾","t":"if only 等于语气更强的 wish，表「要是…就好了」。时态规则与 wish 完全相同：现在遗憾用过去时，过去遗憾用过去完成时。If only I had more time!（要是我有更多时间就好了）；If only she had told me sooner!（要是她早点告诉我就好了！）可单独成感叹句，考研中译英时若原文有「要是…就好了」，优先考虑 if only 或 wish 结构。"},{"h":"as long as / suppose / supposing / provided ——真实条件的边界","t":"这些连词引导真实条件时，从句用正常时态：As long as you try, you will improve.（只要你努力，就会进步）。但若语境暗示说话人认为条件不可能实现，可搭配虚拟。Suppose you were given a second chance, what would you do?（假设你有第二次机会，你会怎么做？）Suppose 后接虚拟语气，将假设推向非现实境地。"},{"h":"考研高频总结","t":"这些固定虚拟结构分散在阅读各处，需整体记忆：but for / without / if not for + N → 主句虚拟主句；lest / for fear that → (should) do；if only → wish 的强化；suppose/supposing 后可接虚拟。它们是虚拟语气在固定搭配层面的延伸，考研翻译、完形均有涉及。"}],"examples":[{"en":"But for the quick action of the paramedics, the patient would not have survived.","zh":"要不是急救人员迅速行动，这名患者不可能活下来。","note":"but for = if it had not been for，主句 would not have survived 是过去虚拟。"},{"en":"He rehearsed his speech repeatedly lest he should forget his lines.","zh":"他反复排练演讲，唯恐忘记台词。","note":"lest + should do，目的从句虚拟，should 在正式书面中常保留。"}],"hardcase":{"sentence":"But for the last-minute intervention of the appeals court, the legislation would have taken effect immediately; the advocates took every precaution lest the ruling be overturned on procedural grounds.","zh":"若非上诉法院在最后时刻介入，该立法本会立即生效；倡导者采取了一切预防措施，唯恐裁决因程序问题被推翻。","marks":[{"text":"But for the last-minute intervention","role":"but for 引导虚拟条件（要不是……），等于 if it had not been for，省略 if 从句"},{"text":"would have taken effect","role":"主句用 would have done，与 but for 共同构成与过去相反的虚拟语气"},{"text":"lest the ruling be overturned","role":"lest 引导目的从句，谓语用动词原形 be overturned 表虚拟（以防……）"}],"tip":"but for = if it had not been for（过去）/ if it were not for（现在）；lest 后接原形——两者都是固定虚拟触发器，认形式即知结构。"}},{"id":"nonfinite-overview","title":"非谓语动词总览","en":"Non-finite Verbs","domain":"nonfinite","tier":6,"summary":"不作谓语的动词形式：不定式、动名词、分词；考研长难句的命脉。","level":3,"prereq":["verb-system"],"parent":"verb-system","detail":[{"h":"化身的本质","t":"动词有两种身份：作谓语时，它是句子的发动机，承载时态、语态、人称；不作谓语时，它就「化身」为名词、形容词或副词，潜入句子各处打工——这就是非谓语动词(non-finite verb)。三大化身：不定式(infinitive) to do、动名词(gerund) doing、分词(participle) doing/done。一个句子里只能有一个谓语动词；凡多出来的动词，必须以非谓语形式出现。"},{"h":"三者的基本分工","t":"不定式 to do：保留「将要发生」「目的」「具体一次」的色彩，像名词也像副词，最灵活。动名词 doing：完全名词化，强调「行为本身」作为一件事，没有时间倾向。现在分词 doing：保留动词的进行感与主动性，主要作定语和状语。过去分词 done：标志被动或完成，同样作定语和状语。"},{"h":"核心判断主线：逻辑主语 + 主动/被动","t":"选哪种非谓语，只需问两个问题：①这个动作由谁发出（逻辑主语是谁）？②逻辑主语对动作是「做」还是「被做」？主动 → doing；被动 → done。这条主线贯穿全部非谓语考点，请在每个具体节点里都用它来检验。"},{"h":"考研长难句中的伪装","t":"考研英语一的长句里，非谓语常伪装成主干成分：一串 doing 可能是动名词主语，也可能是分词定语或状语；一个 done 可能是谓语的被动，也可能是分词。析句时先找唯一的谓语动词（有时态变化的那个），其余的 doing/done/to do 一律是非谓语。与「长难句分析法」「定语从句的简化」「状语从句」关系最密切。"},{"h":"与相邻星系的联系","t":"非谓语动词横跨句法星系（充当各种成分）、时空星系（被动语态、完成时的零件）和从句星系（定语从句简化 = 分词定语，状语从句省略 = 分词状语）。学完本星系，再看长难句分析法才真正打通。"}],"examples":[{"en":"Seeing the results, the researcher felt relieved.","zh":"看到结果后，研究员松了口气。","note":"Seeing 的逻辑主语 = the researcher，主动进行，用现在分词作状语。"},{"en":"Exhausted by the long journey, the delegates finally arrived.","zh":"经过长途跋涉精疲力竭，代表们终于抵达。","note":"Exhausted 的逻辑主语 = the delegates，被动完成，用过去分词作状语。"},{"en":"To understand the issue, one must read the original text.","zh":"要理解这个问题，就必须读原文。","note":"To understand 作目的状语，逻辑主语 = one，主动，to do 表目的。"}],"hardcase":{"sentence":"To understand how language shapes thought, one must first recognize that mastering its non-finite forms—infinitives, gerunds, and participles—is not merely a grammatical exercise but a cognitive one, demanding sustained attention from anyone seeking to read academic prose with genuine comprehension.","zh":"要理解语言如何塑造思维，首先必须认识到，掌握其非谓语形式——不定式、动名词和分词——不仅仅是一种语法练习，更是一种认知练习，它要求任何寻求真正理解学术散文的人持续专注。","marks":[{"text":"To understand how language shapes thought","role":"不定式短语作目的状语，逻辑主语为全句主语 one，主动式"},{"text":"mastering its non-finite forms—infinitives, gerunds, and participles—","role":"动名词短语作主语（that 从句的主语），逻辑主语泛指，主动式"},{"text":"seeking to read academic prose with genuine comprehension","role":"现在分词短语作后置定语，修饰 anyone，逻辑主语为 anyone，主动式"},{"text":"to read academic prose with genuine comprehension","role":"不定式作 seeking 的宾语，逻辑主语为 anyone，主动式"}],"tip":"非谓语总览句：同一句中不定式、动名词、分词并存，先找谓语 must recognize，其余动词形式均为非谓语，按逻辑主语逐个归位。"}},{"id":"infinitive","title":"不定式","en":"Infinitive","domain":"nonfinite","tier":5,"summary":"to do：保留动词性又能作主宾表定状补，最灵活的非谓语。","level":3,"prereq":["nonfinite-overview"],"parent":"nonfinite-overview","detail":[{"h":"本质：最像动词的名词/副词","t":"不定式(infinitive) = to + 动词原形。之所以叫「不定」，是因为它不受人称和时态限制，但它保留了动词的全部动作感——可以带自己的宾语，也可以被副词修饰。它的「不定」让它极为灵活，能作名词，也能作形容词或副词。"},{"h":"形式全览","t":"一般式：to do（与主句动作同时或之后）。完成式：to have done（先于主句动作）。进行式：to be doing（与主句动作同时进行，且强调进行中）。被动式：to be done（逻辑主语承受动作）。完成被动：to have been done（先于主句且被动）。"},{"h":"在句子里能充当什么","t":"主语：To make mistakes is human（常后置 → It is human to make mistakes）。宾语：I want to leave。表语：His dream is to travel。定语（后置，含「待做」意味）：the ability to adapt。状语（目的最常见）：She studied hard to pass。补语：We asked him to stay。"},{"h":"考研高频陷阱","t":"①不定式作定语修饰名词时，常含「尚未实现」的将来色彩，与现在分词作定语（正在发生）截然不同：the problem to solve（有待解决）vs the problem being solved（正在解决中）。②逻辑主语不同：感官动词主动句后用 bare infinitive（see him run），被动后还原 to（he was seen to run）——to 重新出现，考研经典考点。③it 作形式主语代替不定式主语时，与「it 的用法」及「主语从句」形成一族考点。"},{"h":"与相邻节点的联系","t":"与「动名词」对比：to do 倾向「将要做/具体一次」，doing 倾向「已做过/泛指行为」，see → 动名词 vs 不定式节点详列。与「不定式的功能」：每项功能的详细展开。与「不带 to 的不定式」：使役/感官动词的特殊变体。"}],"examples":[{"en":"It is easier to criticize than to create.","zh":"批评比创造容易。","note":"it 作形式主语，两个 to do 才是真主语；to criticize 与 to create 并列对比。"},{"en":"She was seen to leave the building at midnight.","zh":"有人看到她午夜离开大楼。","note":"感官动词被动时 to 重新出现（主动：saw her leave → 被动：was seen to leave）。"},{"en":"He needs a mentor to guide him through the process.","zh":"他需要一位导师来引导他完成这个过程。","note":"to guide 作后置定语修饰 mentor，含「待发生」之意，逻辑主语是 mentor。"}],"hardcase":{"sentence":"The commission's decision to defer the vote, widely seen as an attempt to avoid controversy, proved to be a miscalculation that only served to deepen the divisions it had sought to bridge.","zh":"委员会推迟投票的决定——被广泛视为一种回避争议的尝试——被证明是一次误判，这次误判只是进一步加深了它本想弥合的分歧。","marks":[{"text":"to defer the vote","role":"不定式作后置定语，修饰名词 decision，逻辑主语为 the commission，主动式"},{"text":"to avoid controversy","role":"不定式作后置定语，修饰名词 attempt，逻辑主语泛指，主动式"},{"text":"to be a miscalculation","role":"不定式与系动词 proved 构成谓语的一部分（proved to be 固定结构），作表语，逻辑主语为该决定，主动式"},{"text":"to deepen the divisions","role":"不定式作目的状语（only served to），逻辑主语为该决定，主动式"},{"text":"to bridge","role":"不定式作后置定语，修饰 the divisions，逻辑主语为 it（委员会），主动式"}],"tip":"一句五个 to do，层层后置——每个不定式找它修饰的名词（或充当的成分）再定性，不要统一当目的状语。"}},{"id":"infinitive-functions","title":"不定式的功能","en":"Infinitive Functions","domain":"nonfinite","tier":3,"summary":"作主语(常用 it 形式主语)、宾语、表语、定语(待做)、状语(目的/结果)。","level":4,"prereq":["infinitive"],"parent":"infinitive","detail":[{"h":"一览：不定式能充当的六种成分","t":"不定式兼具名词性和副词性，因此比动名词能作的成分更多：主语、宾语、表语（名词性用法）；定语、状语（形容词/副词性用法）；补语（在复合宾语里）。"},{"h":"作主语——it 形式主语是标配","t":"To learn a language takes time 在口语里没问题，但书面英语更常用 it 作形式主语，将不定式推后：It takes time to learn a language。这与「it 的用法」中「形式主语」用法直接挂钩，考研阅读高频。"},{"h":"作定语——后置且含「待做」色彩","t":"不定式作定语必须后置，且几乎总是暗示「尚未完成」：the first person to arrive（第一个到的人，arrive 尚发生于陈述时刻之后），a good book to read（一本好读的书）。注意其中 book 是 read 的逻辑宾语，不是主语。"},{"h":"作状语——目的、结果、原因","t":"目的（最常见）：I came here to see you。结果（常与 only 连用，往往出乎意料）：He worked hard only to fail again（结果却再次失败）。原因（在感叹句和形容词之后）：I am glad to hear the news；He must be a fool to say that。"},{"h":"作补语（宾补）","t":"ask/want/tell/force/allow/advise + 宾语 + to do：They asked him to leave。注意逻辑主语是宾语 him，动作 leave 由 him 发出，主动用 to do；若受事，用 to be done：They want the work to be finished by Friday。"}],"examples":[{"en":"The committee was the last to agree to the proposal.","zh":"委员会是最后一个同意该提案的。","note":"to agree 作后置定语修饰 the last（先行词），含「事后才同意」的时序意味。"},{"en":"She rushed to the hospital only to find that he had already left.","zh":"她赶到医院，结果发现他已经离开了。","note":"only to find 表出乎意料的结果，是固定用法，考研完形常见。"},{"en":"It is crucial for students to develop critical thinking skills.","zh":"对学生而言，培养批判性思维能力至关重要。","note":"it 形式主语；for students 是 to develop 的逻辑主语，用 for 引出。"}],"hardcase":{"sentence":"It remains for the courts to decide whether the right to be heard in one's native language is sufficiently fundamental to warrant constitutional protection, a question too consequential to be left to administrative discretion alone.","zh":"法院仍需裁定，以母语被倾听的权利是否足够基本，从而值得受到宪法保护——这是一个太过重要、不能仅留给行政自由裁量权的问题。","marks":[{"text":"for the courts to decide","role":"不定式短语（for + 宾语 + to do）作形式主语 It 的真实主语，逻辑主语为 the courts，主动式"},{"text":"to be heard in one's native language","role":"不定式作后置定语，修饰 the right，逻辑主语为 one（当事人），被动式"},{"text":"to warrant constitutional protection","role":"不定式作结果状语（sufficiently...to），逻辑主语与形容词 fundamental 的主语一致，主动式"},{"text":"to be left to administrative discretion alone","role":"不定式作结果状语（too...to），逻辑主语与 consequential 修饰对象 question 一致，被动式"}],"tip":"不定式五功能集于一句：形式主语、定语（待做义）、结果状语（too...to / enough...to）——按句子骨架逐一剥离。"}},{"id":"bare-infinitive","title":"不带 to 的不定式","en":"Bare Infinitive","domain":"nonfinite","tier":3,"summary":"使役 make/let/have 与感官 see/hear/watch + 宾语 + do（省 to）。","level":4,"prereq":["infinitive"],"parent":"infinitive","detail":[{"h":"什么是不带 to 的不定式","t":"在某些特定结构中，不定式省去 to，直接用动词原形(bare infinitive)。这不是随意省略，而是固定句型决定的。掌握触发场景是关键。"},{"h":"使役动词：make / let / have","t":"make sb do（强迫某人做）、let sb do（让某人做）、have sb do（让/叫某人做）——这三者后接 bare infinitive。被动时 make 的 to 会重现：She was made to work overtime（与不定式被动用法呼应）。let 和 have 的被动通常改用其他表达。"},{"h":"感官动词：see / hear / watch / notice / feel","t":"感官动词 + 宾语 + do（完整动作）或 + doing（进行中/强调持续）：I saw him cross the road（看到他整个过马路过程）vs I saw him crossing the road（看到他正在过马路的一刻）。被动时 to 重现：He was seen to cross the road。这是主动/被动配对考点，考研写作/翻译必考。"},{"h":"其他固定搭配","t":"had better / would rather / would sooner + do；help sb (to) do（to 可省可留）；cannot but do、cannot help but do（只能/不得不）。这些在考研完形和阅读中偶见，能识别即可。"},{"h":"与「补语」的联系","t":"复合宾语结构（句子成分星系中的「补语」）：make/let/have/see/hear + 宾语 + bare infinitive，正是五大句型 SVOC 的一种实现。补语与宾语之间是「逻辑谓宾关系」：宾语是动作的逻辑主语，判断用 do 还是 doing/done 同样靠「主动 vs 被动」这条主线。"}],"examples":[{"en":"The teacher made the students rewrite their essays.","zh":"老师让学生重新写了一遍作文。","note":"make sb do：students 是逻辑主语，主动，bare infinitive rewrite。"},{"en":"I heard her singing in the next room.","zh":"我听到她在隔壁房间唱歌。","note":"hear + 宾语 + doing：强调进行中，现在分词；若用 sing（bare infinitive）则强调完整动作。"},{"en":"He was heard to say that the project would be cancelled.","zh":"据闻他说这个项目将被取消。","note":"hear 被动 → to 重现：was heard to say，这是感官动词被动形式的经典考点。"}],"hardcase":{"sentence":"Watching the negotiators let the deadline pass without reaching any agreement made observers wonder whether either side truly wanted the talks to succeed, or simply needed the other to be seen to fail first.","zh":"看着谈判代表们任由截止日期过去却未达成任何协议，观察人士不禁想知道，双方是否真的希望谈判成功，还是只需要对方先被看到失败。","marks":[{"text":"Watching the negotiators let the deadline pass","role":"动名词短语作主语；其中 let...pass 为感官/使役结构：let + 宾语 the deadline + 裸不定式 pass（省略 to），逻辑主语为 the negotiators，主动式"},{"text":"let the deadline pass","role":"使役动词 let + 宾语 + 裸不定式，pass 省略 to，逻辑主语为 the deadline，主动式"},{"text":"to succeed","role":"带 to 的不定式作 wanted 的宾补，the talks 为其逻辑主语，主动式"},{"text":"to be seen to fail first","role":"不定式短语作 needed 的宾补，the other 为逻辑主语，被动式；内嵌 to fail 为感官动词 seen 后的不定式"}],"tip":"裸不定式只出现在使役（make/let/have）和感官（see/hear/watch）后；其他 to do 保留 to——本句 let...pass 对比 needed...to be seen to fail，差异一目了然。"}},{"id":"gerund","title":"动名词","en":"Gerund","domain":"nonfinite","tier":5,"summary":"doing 作名词用：主、宾、表、介词宾语；动词性名词，可带自己的宾语。","level":3,"prereq":["nonfinite-overview"],"parent":"nonfinite-overview","detail":[{"h":"本质：动词穿上名词的衣服","t":"动名词(gerund) = 动词原形 + -ing，但它在句中充当名词。与名词的区别在于：它保留动词性，可以带宾语、被副词修饰。与现在分词形式相同，区分靠句法成分：作名词成分的是动名词，作定语/状语的是现在分词。"},{"h":"能充当的成分","t":"主语：Reading widely broadens one's perspective。宾语：She enjoys travelling。表语：Seeing is believing。介词宾语（最高频）：He is good at solving problems；She insisted on being heard。这四处中，「介词宾语」是考研最高频考点——介词后只能跟名词性成分，动名词是首选。"},{"h":"动名词的逻辑主语","t":"动名词的「做这件事的人」是它的逻辑主语。若逻辑主语不是句子主语，则须用「所有格/宾格 + doing」来明确：I insisted on his/him leaving early（由他来早点离开）。正式书面语用所有格（his），口语用宾格（him）。"},{"h":"动名词的被动与完成形式","t":"主动：doing。被动：being done（She complained about being ignored）。完成主动：having done（He denied having made the mistake）。完成被动：having been done（She was proud of having been selected）。注意：被动动名词里，动作的承受者正是句子主语，符合「逻辑主语对动作是被动」的判断主线。"},{"h":"与「动名词 vs 不定式」「名词」的联系","t":"动名词与不定式的竞争是考研最细密的考点，见专节。与名词星系的联系：动名词可以接冠词、可数时也可以加复数，但更多时候它是不可数的，作泛指（Smoking is harmful）。"}],"examples":[{"en":"Being misunderstood is one of the greatest frustrations in communication.","zh":"被误解是沟通中最大的挫败感之一。","note":"Being misunderstood = 被动动名词作主语；逻辑主语未明示，泛指任何人。"},{"en":"The government denied having concealed the information from the public.","zh":"政府否认曾向公众隐瞒该信息。","note":"having concealed = 完成主动动名词，表动作早于主句动词 denied 发生。"},{"en":"There is no point in pretending that the problem does not exist.","zh":"假装问题不存在毫无意义。","note":"介词 in 后接动名词；There is no point in doing sth 是固定表达，考研写作实用。"}],"hardcase":{"sentence":"Insisting on reframing every policy dispute as a moral failing, rather than acknowledging the structural constraints that limit what any government can realistically achieve, has made constructive dialogue all but impossible.","zh":"坚持将每一项政策争端重新定性为道德失败，而不是承认限制任何政府现实上所能实现之事的结构性约束，使建设性对话几乎不可能实现。","marks":[{"text":"Insisting on reframing every policy dispute as a moral failing","role":"动名词短语作主语，逻辑主语泛指（主语省略），主动式；reframing 是 on 的宾语（动名词作介词宾语）"},{"text":"reframing every policy dispute as a moral failing","role":"动名词作介词 on 的宾语，逻辑主语同上，主动式"},{"text":"acknowledging the structural constraints that limit what any government can realistically achieve","role":"动名词作 rather than 后的并列成分（与 Insisting 对比），逻辑主语同上，主动式"}],"tip":"动名词作主语时谓语用单数（has made）；insist on doing 中 on 是介词，后跟动名词而非不定式——这是动名词与不定式选择的经典陷阱。"}},{"id":"gerund-vs-infinitive","title":"动名词 vs 不定式","en":"Gerund vs Infinitive","domain":"nonfinite","tier":5,"summary":"remember/forget/stop/try/regret 接 doing(已做)还是 to do(将做)意义迥异。","level":4,"prereq":["gerund"],"parent":"gerund","detail":[{"h":"两者的根本语义差","t":"这是非谓语最核心的意义区分。动名词 doing 把动作当作「一件已存在的事/行为本身」来谈，有「已发生」或「泛指习惯」的色彩；不定式 to do 把动作视为「将要发生的/具体的目的」，有「未然」和「前瞻」色彩。记住这个直觉，下面所有细节都是它的展开。"},{"h":"意义不同的关键动词（考研必记）","t":"remember + doing：记得做过（动作在记得之前已发生）→ I remember locking the door（我记得锁了门）。remember + to do：记得要去做（动作在记得之后还未发生）→ Remember to lock the door（记得去锁门）。forget 同理：forgot doing（忘了曾做过）/ forget to do（忘了去做）。stop + doing：停止正在做的事（stop talking）。stop + to do：停下来去做另一件事（stop to think，停下来想想）——to do 是目的状语，不是 stop 的宾语！regret + doing：后悔做过。regret + to do（后接 say/inform 等）：遗憾地（I regret to say...）。try + doing：试着做做看。try + to do：努力去做（尽力但未必成功）。"},{"h":"两者意义相近但动词不同","t":"like/love/hate/prefer + doing（习惯性喜好）或 + to do（具体一次）；go on + doing（继续做同一件事）或 + to do（继续去做另一件事）；mean + doing（意味着，= involve）或 + to do（打算，= intend）。这些在完形填空的选项辨析中高频出现。"},{"h":"考研阅读陷阱：stop to do 误解","t":"stop to do 里，to do 是目的状语（表「去做什么」），stop 本身无宾语，stop 是不及物动词用法。若说 stop doing，doing 才是 stop 的宾语。这个区别在阅读中读错会导致对句意的完全误解，务必在脑中过一遍。"},{"h":"与「动词后的非谓语」的关系","t":"有的动词只能接 doing（avoid/enjoy/finish/mind/deny/consider/suggest），有的只能接 to do（decide/want/hope/refuse/manage），有的两者皆可（见上文意义不同者及意义相近者）。这三类由「动词后的非谓语」节点系统整理。"}],"examples":[{"en":"I remember meeting her at a conference years ago.","zh":"我记得多年前在一次会议上见过她。","note":"remember + doing：动作（meeting）发生在 remember 之前，已成事实。"},{"en":"Please remember to submit your application before the deadline.","zh":"请记得在截止日期前提交申请。","note":"remember + to do：动作（submit）尚未发生，需要去完成。"},{"en":"He stopped smoking and started to exercise regularly.","zh":"他戒了烟，开始定期锻炼。","note":"stop + doing（停止吸烟这个行为本身）；started + to do（开始去做锻炼这件事）。"}],"hardcase":{"sentence":"She regretted telling him the truth so bluntly, yet she also knew that she would regret failing to tell it at all if the opportunity were lost; she stopped to consider the difference between regretting having spoken and regretting not having spoken.","zh":"她后悔如此直接地告诉了他真相，但她也知道，如果机会错过，她会后悔根本没有说；她停下来思考后悔已说与后悔未说之间的区别。","marks":[{"text":"regretted telling him the truth so bluntly","role":"regret + doing：后悔做过的事（已做），telling 为动名词作宾语，逻辑主语为 she，主动式"},{"text":"failing to tell it at all","role":"regret + doing 变体：fail to tell 整体动名词化，failing 作宾语，逻辑主语为 she，主动式"},{"text":"stopped to consider","role":"stop + to do：停下来去做另一件事（目的），to consider 为不定式作目的状语，逻辑主语为 she，主动式"},{"text":"regretting having spoken","role":"动名词 regretting 作介词 between 的宾语；having spoken 为动名词的完成式，表先于主句的动作，逻辑主语为 she，主动式"},{"text":"regretting not having spoken","role":"并列动名词作介词 between 的第二个宾语；否定式完成动名词，逻辑主语为 she，主动式"}],"tip":"regret doing（后悔已做）vs regret to do（遗憾地要做），stop doing（停止做）vs stop to do（停下来去做）——本句把四种对比全部激活，读懂时态层次是关键。"}},{"id":"verb-complementation","title":"动词后的非谓语","en":"Verb Complementation","domain":"nonfinite","tier":4,"summary":"哪些动词后只接 doing、只接 to do、或两者皆可——需成块记忆。","level":4,"prereq":["gerund-vs-infinitive"],"parent":"gerund-vs-infinitive","detail":[{"h":"为什么需要成块记忆","t":"有些动词只接动名词，有些只接不定式，有些两者皆可但意义不同，这不是语法规律能完全推导的，是英语词汇本身的「内置选择」。考研完形和翻译都会测这个。"},{"h":"只接动名词 doing 的动词","t":"记忆口诀：避免/完成/享受/介意/否认/考虑/建议/推迟/放弃/逃避。对应：avoid、finish、enjoy、mind、deny、consider、suggest、delay/postpone、give up、escape。这些动词的共性：动作已是「一件事」或必须先存在。"},{"h":"只接不定式 to do 的动词","t":"记忆口诀：决定/想要/希望/拒绝/设法/答应/假装/要求/学会/计划。对应：decide、want、hope、refuse、manage、promise、pretend、demand、learn、plan。这些动词的共性：指向未来的意图或实现。"},{"h":"两者皆可但意义改变","t":"见「动名词 vs 不定式」节点中 remember/forget/stop/try/regret/mean/go on 等。此外：begin/start/continue + doing 或 + to do，意义基本相同（进行时态下习惯用 to do，避免两个 -ing 连用：is starting to rain，不说 is starting raining）。"},{"h":"介词后固定跟动名词","t":"任何介词（in/on/at/by/for/without/after/before/to 作介词时）后面的动词必须用动名词，这是铁律：be good at swimming；without saying a word；by working harder。注意 look forward to doing（to 是介词，不是不定式符号），object to doing 同理——这是完形高频陷阱。"}],"examples":[{"en":"She managed to finish the report despite numerous interruptions.","zh":"尽管受到多次打扰，她还是设法完成了报告。","note":"manage 只接 to do，含「最终成功做到」义；never say managed doing。"},{"en":"He is looking forward to starting his new job next week.","zh":"他期待下周开始新工作。","note":"look forward to 中 to 是介词，后必须跟动名词 starting，是高频陷阱。"},{"en":"The committee suggested postponing the vote until more information was available.","zh":"委员会建议推迟投票，直到获得更多信息。","note":"suggest 只接动名词；postponing = delay doing，同类型动词。"}],"hardcase":{"sentence":"The board considered adopting the proposal outright but ultimately decided to postpone implementing it until an independent panel had finished reviewing the data on which the decision was to be based.","zh":"董事会考虑过直接采纳该提案，但最终决定推迟实施，直到独立小组完成对该决定所依据数据的审查。","marks":[{"text":"considered adopting the proposal outright","role":"consider 只接动名词：adopting 作宾语，逻辑主语为 the board，主动式"},{"text":"decided to postpone","role":"decide 只接不定式：to postpone 作宾语，逻辑主语为 the board，主动式"},{"text":"postpone implementing it","role":"postpone 只接动名词：implementing 作宾语，逻辑主语为 the board，主动式"},{"text":"finished reviewing the data","role":"finish 只接动名词：reviewing 作宾语，逻辑主语为 the panel，主动式"},{"text":"to be based","role":"be to 结构中的不定式，表计划/安排；被动式，逻辑主语为 the decision"}],"tip":"consider/postpone/finish 后只接 doing；decide/plan 后只接 to do——遇到 decided to postpone doing 是双层嵌套，内层仍是 doing。"}},{"id":"present-participle","title":"现在分词","en":"Present Participle","domain":"nonfinite","tier":5,"summary":"doing 表主动/进行：作定语、状语、补语、表语，长难句的高频伪装。","level":4,"prereq":["nonfinite-overview"],"parent":"nonfinite-overview","detail":[{"h":"本质：主动 + 进行","t":"现在分词(present participle) = 动词 -ing 形式，作非谓语时始终传递「主动」和「进行/持续」的语义色彩。它不是时态，而是动词在化身为定语或状语时的外衣。核心判断：逻辑主语对这个动作是「主动发出的」→ 用 doing。"},{"h":"形式上与动名词完全相同，靠句法区分","t":"作名词成分（主/宾/表）= 动名词。作修饰成分（定语/状语）= 现在分词。例：Running is good for health（主语，动名词）；The running water（定语，分词）；Running along the street, he waved to me（状语，分词）。"},{"h":"与 -ed 形容词(-ed/-ing 形容词)的联系","t":"interesting/boring/exciting 等 -ing 形容词源自现在分词，描述「使人感到」某种感受（令人感兴趣/无聊/兴奋）；interested/bored/excited 等 -ed 形容词源自过去分词，描述「人本身感到」（感到有兴趣/无聊/兴奋）。这是词类星系「-ed/-ing 形容词」节点的核心，与本节点直接相连。"},{"h":"在谓语中的身份","t":"在时空星系中，现在分词是进行体 be doing 的零件（She is running）。但在化身星系里，它脱离了 be，独立作定语或状语。与「现在完成时」「被动语态」无关——那些是 done 的地盘。"},{"h":"考研重点：与过去分词的对比","t":"the rising costs（上涨的成本，成本自己在上涨，主动）vs the risen costs（已上涨的成本，强调结果）；a developing country（发展中国家，主动进行）vs a developed country（发达国家，被动完成）。这对 doing/done 对比是阅读理解词汇题的经典出处。"}],"examples":[{"en":"A growing number of researchers are questioning the established paradigm.","zh":"越来越多的研究者正在质疑既有范式。","note":"growing 作定语，表「正在增长」，主动进行；established 为过去分词，表被动完成。"},{"en":"The scientist stood at the window, staring at the city lights below.","zh":"科学家站在窗边，凝视着下面城市的灯火。","note":"staring 现在分词作伴随状语，逻辑主语 = the scientist，主动进行。"},{"en":"Conditions permitting, the expedition will set off tomorrow.","zh":"如果条件允许，探险队明天将出发。","note":"Conditions permitting = 独立主格（conditions 是 permitting 自己的逻辑主语）。"}],"hardcase":{"sentence":"Lacking the institutional support necessary to sustain a prolonged campaign, the reform movement found itself increasingly relying on social media, thereby reaching audiences that traditional lobbying had consistently failed to mobilize.","zh":"由于缺乏维持持久运动所必需的制度支持，改革运动发现自己越来越依赖社交媒体，从而接触到传统游说一贯未能动员的受众。","marks":[{"text":"Lacking the institutional support necessary to sustain a prolonged campaign","role":"现在分词短语作原因状语，置于句首，逻辑主语与主句主语 the reform movement 一致，主动式"},{"text":"relying on social media","role":"现在分词短语作宾语补足语（find itself doing），逻辑主语为 the reform movement，主动式"},{"text":"thereby reaching audiences","role":"现在分词短语作结果状语（thereby 引出），逻辑主语为 the reform movement，主动式"},{"text":"to sustain a prolonged campaign","role":"不定式作后置定语，修饰 support，逻辑主语泛指，主动式"}],"tip":"句首现在分词短语表原因（因为缺乏），句尾 thereby + 现在分词表结果——两个位置意义不同，逻辑主语都须和主句主语一致。"}},{"id":"past-participle","title":"过去分词","en":"Past Participle","domain":"nonfinite","tier":5,"summary":"done 表被动/完成：作定语、状语、补语、表语，也是完成时与被动的零件。","level":4,"prereq":["nonfinite-overview"],"parent":"nonfinite-overview","detail":[{"h":"本质：被动 + 完成","t":"过去分词(past participle) = 动词 -ed 形式（不规则动词另计），作非谓语时传递「被动」和「完成」的语义色彩。核心判断：逻辑主语对动作是「被做的」→ 用 done。这与现在分词恰好互补，两者组成「主动 vs 被动」这对最重要的非谓语选择。"},{"h":"多重身份：谓语零件 OR 非谓语","t":"过去分词是两大时态/语态结构的零件：①现在完成时 have done（时空星系）；②被动语态 be done（时空星系）。作非谓语时，它脱离了 have/be，独立充当定语或状语，功能属于化身星系。"},{"h":"作定语","t":"单个过去分词前置修饰名词：a broken window（被打破的窗）。短语后置：the issue discussed at the meeting（会上讨论的议题）。两者均等价于相应的定语从句：which was discussed at the meeting。"},{"h":"作状语","t":"过去分词短语作状语，表时间、原因、条件、让步等，等价于状语从句：Surprised by the question, she hesitated（= Because she was surprised by the question）。逻辑主语必须是主句主语，否则构成垂悬分词错误（详见「垂悬分词」节点）。"},{"h":"与被动语态、-ed 形容词的联系","t":"过去分词是「被动语态」的核心构件：be + done。与词类星系的「-ed/-ing 形容词」直接相连：-ed 形容词（tired/interested/excited）均源自过去分词，表人对动作的被动感受。"}],"examples":[{"en":"The results obtained from the experiment were unexpected.","zh":"从实验中获得的结果出乎意料。","note":"obtained 过去分词作后置定语修饰 results；results 是 obtain 的被动承受方，主动 → done。"},{"en":"Faced with mounting pressure, the official resigned.","zh":"面对越来越大的压力，该官员辞职了。","note":"Faced 作原因状语；逻辑主语 = the official，被动（被动面对压力）→ 用 done。"},{"en":"Given the complexity of the issue, a quick solution seems unlikely.","zh":"考虑到问题的复杂性，快速解决方案似乎不太可能。","note":"Given 已近乎固定用法，作条件/考虑状语，逻辑主语为泛指主语。"}],"hardcase":{"sentence":"Stripped of its original context and repackaged for a global audience accustomed to simplified narratives, the footage, once considered a definitive record of the event, was rendered almost unrecognizable.","zh":"在被剥离原始语境、并为习惯于简化叙事的全球受众重新包装之后，这段影像——曾被视为该事件的权威记录——变得几乎无法辨认。","marks":[{"text":"Stripped of its original context and repackaged for a global audience","role":"过去分词短语（两个并列）作原因/条件状语，置于句首，逻辑主语与主句主语 the footage 一致，被动式"},{"text":"accustomed to simplified narratives","role":"过去分词短语作后置定语，修饰 audience，逻辑主语为 audience，被动式（已形成的习惯）"},{"text":"considered a definitive record of the event","role":"过去分词短语（省略 being）作后置定语，修饰 the footage（once considered = once it was considered），被动式"}],"tip":"过去分词作状语时表被动，逻辑主语须与主句主语一致（footage 被剥离）；作后置定语时等于被动定语从句（footage that was once considered...）。"}},{"id":"participle-attributive","title":"分词作定语","en":"Participle as Attributive","domain":"nonfinite","tier":3,"summary":"the falling leaves / the fallen leaves——单个前置、短语后置，等于定语从句的浓缩。","level":4,"prereq":["present-participle","past-participle"],"parent":"present-participle","detail":[{"h":"分词定语 = 定语从句的浓缩版","t":"分词作定语（participle as attributive）本质是定语从句(relative clause)省略关系词 + be 动词后的残留。从句星系中「定语从句的简化」节点直接对接本节。公式：which is/was doing → 去掉 which is/was → 留 doing；which is/was done → 去掉 which is/was → 留 done。"},{"h":"前置 vs 后置的规律","t":"单个分词前置：falling leaves（正在落的叶）；the broken vase（碎了的花瓶）。短语必须后置：the boy sitting in the corner（坐在角落的男孩）；the evidence collected by scientists（科学家收集的证据）。前置分词简洁，后置分词信息量大，考研长难句里几乎全是后置。"},{"h":"核心判断：主动 doing vs 被动 done","t":"看被修饰名词与分词动作的关系：名词自己在「做」这个动作 → doing（主动）；名词是动作的承受者 → done（被动）。例：the developing countries（自己在发展，主动）vs the developed countries（已经被发展完成，被动/完成）；a rising star（自己在上升）vs a risen price（价格已被推高）。"},{"h":"考研高频：与谓语混淆","t":"长难句里，名词 + 分词短语很容易被误读为「主语 + 谓语」。关键：分词前没有助动词，也没有时态变化。例：The measures adopted by the government（政府采纳的措施）——adopted 是分词定语，整体是名词短语，不是句子。找到唯一有时态的谓语动词，才算找到主干。"},{"h":"与「定语从句的简化」「定语」的联系","t":"分词定语充当句子成分中的「定语」；它的展开形式是「定语从句」；简化路径由从句星系的「定语从句的简化」节点解释。三者形成一个三角关系。"}],"examples":[{"en":"The theory proposed by the physicist revolutionized our understanding of time.","zh":"这位物理学家提出的理论彻底改变了我们对时间的认识。","note":"proposed 过去分词后置定语，等于 which was proposed；theory 是 propose 的受事，被动 → done。"},{"en":"Students wishing to apply for the scholarship must submit their portfolios by Friday.","zh":"希望申请奖学金的学生必须在周五前提交作品集。","note":"wishing 现在分词后置定语，等于 who wish；students 自己在 wish，主动 → doing。"},{"en":"The data collected over twenty years painted a sobering picture.","zh":"二十年来收集的数据描绘了一幅令人警醒的画面。","note":"collected 过去分词后置定语；painted 才是谓语（有时态变化）——注意区分。"}],"hardcase":{"sentence":"The data collected from sensors embedded in the city's aging infrastructure revealed patterns suggesting a far more severe deterioration than that projected by models relying solely on surface inspections.","zh":"从嵌入城市老化基础设施中的传感器收集的数据揭示了一些规律，这些规律表明，其恶化程度远比仅依赖表面检查的模型所预测的严重得多。","marks":[{"text":"collected from sensors embedded in the city's aging infrastructure","role":"过去分词短语作后置定语，修饰 The data，逻辑主语为 the data，被动式"},{"text":"embedded in the city's aging infrastructure","role":"过去分词短语作后置定语，修饰 sensors，逻辑主语为 sensors，被动式"},{"text":"suggesting a far more severe deterioration","role":"现在分词短语作后置定语，修饰 patterns，逻辑主语为 patterns，主动式"},{"text":"projected by models relying solely on surface inspections","role":"过去分词短语作后置定语，修饰 deterioration（than that...），被动式；relying 为现在分词修饰 models，主动式"}],"tip":"分词定语层层嵌套：data [collected...] revealed patterns [suggesting...] than that [projected by models [relying...]]——剥洋葱：每个分词找它修饰的那个名词。"}},{"id":"participle-adverbial","title":"分词作状语","en":"Participle as Adverbial","domain":"nonfinite","tier":5,"summary":"句首/句尾的分词短语表时间、原因、条件、结果、伴随，等于状语从句省略。","level":5,"prereq":["present-participle"],"parent":"present-participle","detail":[{"h":"分词状语 = 状语从句的省略","t":"分词作状语（participle as adverbial）是考研英语一长难句中最核心的非谓语用法。它本质上是状语从句(adverbial clause)省略从属连词和主语（当从句主语与主句主语一致时才可省略）的结果。省略后，动词用分词形式：主动进行 → doing；被动/完成 → done/having done。"},{"h":"能表达的状语语义","t":"时间：Having finished his work, he went home（= After he had finished）。原因：Being short of funds, the project was suspended（= Because it was short of funds）。条件：Handled carefully, the chemicals are safe（= If they are handled）。让步：Acknowledging the difficulty, he refused to give up（= Although he acknowledged）。伴随（同时发生）：She walked down the street, humming a tune。结果（常句末）：The storm lasted three days, destroying the crops（结果）。"},{"h":"逻辑主语必须与主句主语一致","t":"这是分词状语的铁律，也是「垂悬分词」错误的成因。正确：Walking along the river, I noticed a strange boat（I 既是 walking 的逻辑主语，也是主句主语）。错误：Walking along the river, a strange boat appeared（boat 不能 walk，垂悬）。"},{"h":"判断用 doing 还是 done 的方法","t":"主句主语对分词动作是「主动」→ doing；是「被动」→ done。例：Inspired by the speech（= after the audience was inspired），the audience applauded enthusiastically——audience 被 inspire，被动，用 done（Inspired）。Hearing the news（= after he heard），he turned pale——he 主动 hear，用 doing。"},{"h":"与状语从句、状语成分的联系","t":"分词状语是从句星系「状语从句」的简化形式；它充当句子成分中的「状语」。三者形成：状语从句 → 省略 → 分词状语 → 充当状语成分。独立主格（absolute construction）是分词状语主语不同于主句主语时的解决方案，见专节。"}],"examples":[{"en":"Having studied the subject for years, she was well qualified to lead the team.","zh":"研究这门学科多年后，她完全有资格领导这个团队。","note":"Having studied = 完成主动分词，表先于主句动作完成；逻辑主语 = she，主动。"},{"en":"Pressed for time, the editors cut several chapters from the final manuscript.","zh":"由于时间紧迫，编辑从最终手稿中删去了几个章节。","note":"Pressed（= being pressed）过去分词作原因状语；editors 是被动承受方 → done。"},{"en":"The researchers sat in silence, reviewing the disappointing results.","zh":"研究人员静静地坐着，审视着令人失望的结果。","note":"reviewing 现在分词作伴随状语；主动进行，逻辑主语 = the researchers。"}],"hardcase":{"sentence":"Having exhausted every legal avenue open to them, the plaintiffs turned to international arbitration, accepting that the process would be slow and costly, yet believing it to be the only mechanism capable of delivering a binding resolution.","zh":"在穷尽了向他们开放的每一条法律途径之后，原告们转向国际仲裁，接受了这一过程将会缓慢且代价高昂的现实，但相信它是唯一能够作出具有约束力裁决的机制。","marks":[{"text":"Having exhausted every legal avenue open to them","role":"完成式现在分词短语作时间/原因状语（先于主句动作），逻辑主语与主句 the plaintiffs 一致，主动式"},{"text":"accepting that the process would be slow and costly","role":"现在分词短语作伴随状语，逻辑主语为 the plaintiffs，主动式"},{"text":"yet believing it to be the only mechanism capable of delivering a binding resolution","role":"现在分词短语作转折伴随状语，逻辑主语为 the plaintiffs，主动式；capable of delivering 为形容词短语修饰 mechanism"}],"tip":"having done 表先于主句完成的动作（已穷尽法律途径之后才转向仲裁）；句末两个并列现在分词（accepting...yet believing...）表伴随，逻辑主语均为主句主语。"}},{"id":"dangling-participle","title":"垂悬分词","en":"Dangling Participle","domain":"nonfinite","tier":3,"summary":"分词的逻辑主语须与主句主语一致，否则'垂悬'——写作大忌、阅读陷阱。","level":5,"prereq":["participle-adverbial"],"parent":"participle-adverbial","detail":[{"h":"什么是垂悬分词","t":"垂悬分词(dangling participle)是写作大忌、阅读陷阱：分词短语的逻辑主语与主句的语法主语不同，导致分词「悬空」失依，读者会错误地把分词的动作安到主句主语头上，造成荒谬。"},{"h":"典型错误示例与修正","t":"错：Walking down the street, the rain began to pour（分词逻辑主语应是人，但主句主语是 rain，rain 不能 walk）。改：Walking down the street, I was caught in a downpour；或 As I was walking down the street, the rain began to pour。错：Considering the evidence, the verdict seems unjust（如果 considering 的主语应是人，但 verdict 不会 consider）。此处 considering 已习惯化为独立用法（= if we consider），是例外。"},{"h":"惯用独立分词短语（固定例外）","t":"英语里有一批分词短语已固定成副词用法，不受垂悬规则约束：considering（考虑到）、assuming（假设）、given（鉴于）、judging from（从…判断）、generally speaking（一般来说）、strictly speaking（严格来说）、frankly speaking。这些在阅读中大量出现，不需要寻找逻辑主语，直接作全句的评注状语。"},{"h":"考研写作防错要领","t":"每写一个句首分词短语，立刻问：这个动作的逻辑主语是什么？主句的主语是什么？两者是否一致？不一致则：①把主句主语改为正确的；②改用独立主格（名词 + 分词）；③展开为完整从句。"},{"h":"与「非谓语的逻辑主语」「分词作状语」的关系","t":"垂悬分词是「逻辑主语判断失误」的直接后果，所以它直接依赖「非谓语的逻辑主语」节点；它的正确形式是「分词作状语」；其修正路径之一是「独立主格」。三节点紧密相连。"}],"examples":[{"en":"Judging from the available evidence, the hypothesis appears to be well-founded.","zh":"从现有证据判断，这个假说似乎有充分根据。","note":"Judging from 是惯用独立分词，无需追究逻辑主语，作全句评注，合法用法。"},{"en":"Having been kept in storage for decades, the documents were fragile and yellowed.","zh":"在仓库中封存数十年后，这些文件变得脆弱而泛黄。","note":"Having been kept：逻辑主语 = the documents，被动完成，正确的非谓语形式。"},{"en":"Strictly speaking, the term 'theory' in science means something very different from its everyday usage.","zh":"严格来说，科学中「理论」一词的含义与日常用法截然不同。","note":"Strictly speaking 惯用独立分词，作全句的评注，不指定逻辑主语。"}],"hardcase":{"sentence":"Considered in isolation, the statistics appear reassuring; however, when examined alongside the trend data compiled over the preceding decade, a starkly different picture emerges, forcing analysts to question assumptions that had long been taken for granted.","zh":"孤立来看，这些统计数据令人放心；然而，当与过去十年汇编的趋势数据一并审视时，一幅截然不同的图景浮现出来，迫使分析人士质疑长期以来被视为理所当然的假设。","marks":[{"text":"Considered in isolation","role":"过去分词短语作条件状语，逻辑主语须与主句主语 the statistics 一致——正确用法：statistics 被孤立考量，主动/被动匹配正确，被动式"},{"text":"when examined alongside the trend data compiled over the preceding decade","role":"省略式状语从句（when they are examined...）中的过去分词，逻辑主语仍为 a starkly different picture 的背景主语 the statistics，被动式；compiled 修饰 trend data，被动式"},{"text":"forcing analysts to question assumptions that had long been taken for granted","role":"现在分词短语作结果状语，逻辑主语为整个主句（a picture emerges），主动式——若改写成 Forcing analysts...a picture emerges 则逻辑主语错位，构成垂悬分词"}],"tip":"垂悬分词的测试：把句首分词的隐含主语与主句主语对照——不一致即垂悬；本句 Considered in isolation 的主语正确为 the statistics，而非 forcing 的主语，两处形成对比。"}},{"id":"absolute-construction","title":"独立主格","en":"Absolute Construction","domain":"nonfinite","tier":4,"summary":"名词/代词 + 分词/形容词/介词短语，自带逻辑主语，作整句状语。","level":5,"prereq":["participle-adverbial"],"parent":"participle-adverbial","detail":[{"h":"本质：自带逻辑主语的分词状语","t":"独立主格(absolute construction)是分词状语的升级版。普通分词状语的逻辑主语必须与主句主语一致；当分词短语有「自己的」逻辑主语、与主句主语不同时，把这个专属逻辑主语写进来，形成「名词/代词 + 分词/形容词/介词短语」的独立主格结构，整体作主句的状语。"},{"h":"结构类型","t":"名词 + doing：The sun setting, the workers packed up and went home（太阳落山，工人们收拾回家）。名词 + done：The task completed, the team celebrated（任务完成后，团队庆祝了一番）。名词 + 形容词/副词：Weather permitting（如果天气允许）；Everything ready（一切准备就绪）。名词 + 介词短语：He entered, hat in hand（他帽子拿在手里走了进来）。名词 + be（有时保留）：There being no objection, the motion was passed（无人反对，动议通过）。"},{"h":"doing 还是 done 的判断","t":"独立主格内的逻辑主语与分词的关系同样遵循「主动 → doing，被动 → done」：The problem solved（问题被解决了，problem 被 solve，被动 → solved）；The students laughing（学生们在笑，students 主动 → laughing）。"},{"h":"考研出现场景","t":"考研英语一阅读中，独立主格多见于学术、报告类语篇，位于句首或句末作时间/原因/条件/伴随状语。析句时若在一个分句里找到两个主语（一个属于分词短语，一个属于主句），即疑似独立主格。关键：独立主格内有自己的逻辑主语，而「垂悬分词」恰恰是没有自己的逻辑主语但又与主句主语不同——两者对立参照。"},{"h":"与「with 复合结构」「分词作状语」的联系","t":"独立主格可加 with 引导，变为「with 复合结构」（见专节）。与「分词状语」是对比关系：分词状语无自己的主语，独立主格有；两者加在一起覆盖了全部分词状语用法。"}],"examples":[{"en":"All things considered, the project was a remarkable success.","zh":"综合考量，这个项目取得了非凡的成功。","note":"All things considered = absolute construction；things 是 considered 的逻辑主语，被动 → considered（done 形式）。"},{"en":"The negotiations having broken down, both sides prepared for a lengthy dispute.","zh":"谈判破裂后，双方都为旷日持久的争论做好了准备。","note":"The negotiations having broken down：完成主动；negotiations 自己 break down，主动 → having + done（不规则：broken）。"},{"en":"There being no direct evidence, the jury had to rely on circumstantial testimony.","zh":"由于没有直接证据，陪审团不得不依赖间接证词。","note":"There being no direct evidence = 独立主格，There 是形式主语，整体作原因状语。"}],"hardcase":{"sentence":"The negotiations having collapsed entirely, all parties returned to their capitals, their credibility damaged and their domestic audiences increasingly skeptical, with little prospect of resuming talks remaining.","zh":"谈判彻底破裂之后，各方返回各自首都，其公信力受损，国内民众的怀疑日益加深，重启谈判的前景几乎为零。","marks":[{"text":"The negotiations having collapsed entirely","role":"独立主格结构作时间/原因状语，自带逻辑主语 The negotiations（与主句主语 all parties 不同），主动式完成分词"},{"text":"their credibility damaged","role":"独立主格结构（名词 + 过去分词）作伴随状语，逻辑主语 their credibility 独立于主句，被动式"},{"text":"their domestic audiences increasingly skeptical","role":"独立主格结构（名词 + 形容词）作伴随状语，自带逻辑主语 their domestic audiences，无分词但结构相同"},{"text":"with little prospect of resuming talks remaining","role":"with 复合结构作伴随状语：prospect 为名词，remaining 为现在分词作补足语，主动式"}],"tip":"独立主格的标志：名词/代词 + 分词/形容词，且该名词不充当主句任何成分——它自己就是分词的逻辑主语，与主句主语无关。"}},{"id":"with-structure","title":"with 复合结构","en":"With + Complement","domain":"nonfinite","tier":3,"summary":"with + 宾语 + 分词/形容词/介词短语，表伴随状态，是独立主格的 with 版。","level":5,"prereq":["absolute-construction"],"parent":"absolute-construction","detail":[{"h":"本质：有引导词的独立主格","t":"with 复合结构(with + complement) = with + 宾语 + 补足成分，补足成分可以是：分词（doing/done）、形容词、副词或介词短语。它是独立主格的「显式引导版」——with 是明确的引导词，让读者一眼识别，无需从句法里猜逻辑主语。主要作状语，表伴随情况或背景条件。"},{"h":"补足成分的类型","t":"with + 宾语 + doing（主动/进行）：He sat there with his fingers drumming on the desk（手指在桌上敲击）。with + 宾语 + done（被动/完成）：She spoke with her eyes closed（闭着眼睛）。with + 宾语 + 形容词：He walked in with his hands full（双手满满的）。with + 宾语 + 副词/介词短语：He slept with the window open；She sat with her back to the wall。"},{"h":"doing 还是 done 的判断","t":"依然是主线：宾语对补足动作是「主动」→ doing；「被动」→ done。eyes closed（眼睛被闭上，被动 → closed）；fingers drumming（手指主动在敲，主动 → drumming）；arms folded（手臂被折叠，被动 → folded）。"},{"h":"与独立主格的关系","t":"with 复合结构 = with + 独立主格的实质内容。去掉 with：His eyes closed, he rested（独立主格）= With his eyes closed, he rested（with 复合结构）。两者可相互转化，with 复合结构更常见于现代书面英语。"},{"h":"考研出现形式","t":"考研阅读里，with 复合结构频繁作伴随状语，描述一个背景动作同时发生于主句动作：The economy grew, with unemployment falling to record lows（随着失业率降至历史低点）。析句时，with 后的名词是宾语（with 的宾语），再看补足成分的性质，即可判断 doing/done。"}],"examples":[{"en":"With so much work left unfinished, she could not afford to take a holiday.","zh":"还有那么多工作尚未完成，她无法去度假。","note":"with + work（宾语）+ left unfinished（过去分词补足语）；work 被动「被留下未完成」→ done 形式。"},{"en":"He gave a lengthy speech, with the audience growing visibly restless.","zh":"他发表了冗长的演讲，听众们明显越来越坐立不安。","note":"with + the audience（宾语）+ growing（现在分词）；audience 主动地 grow restless → doing。"},{"en":"The surgeon operated for six hours, with the patient's condition stabilising towards the end.","zh":"外科医生手术了六个小时，患者的状况在后段逐渐趋于平稳。","note":"with + condition（宾语）+ stabilising（现在分词）；condition 主动地稳定 → doing。"}],"hardcase":{"sentence":"She delivered her testimony calmly, with her hands clasped tightly in her lap, with every detail corroborated by documentary evidence already submitted to the court, and with opposing counsel visibly struggling to find grounds for objection.","zh":"她平静地作证，双手在膝上紧握，每一个细节都有已提交法庭的书面证据佐证，而对方律师明显在努力寻找反对的依据。","marks":[{"text":"with her hands clasped tightly in her lap","role":"with 复合结构：her hands 为宾语，clasped 为过去分词作补足语，表双手被握（被动状态），伴随状语"},{"text":"with every detail corroborated by documentary evidence already submitted to the court","role":"with 复合结构：every detail 为宾语，corroborated 为过去分词作补足语（被动状态），submitted 为过去分词作后置定语修饰 evidence（被动），伴随状语"},{"text":"with opposing counsel visibly struggling to find grounds for objection","role":"with 复合结构：opposing counsel 为宾语，struggling 为现在分词作补足语（主动进行），伴随状语；opposing 本身为现在分词作定语修饰 counsel"}],"tip":"with 复合结构中：宾语 + 过去分词 = 被动/完成状态（clasped, corroborated）；宾语 + 现在分词 = 主动进行状态（struggling）——同一句三个 with 展示全部变体。"}},{"id":"nonfinite-logical-subject","title":"非谓语的逻辑主语","en":"Logical Subject","domain":"nonfinite","tier":4,"summary":"判断非谓语形式的钥匙：动作由谁发出、是主动还是被动。","level":4,"prereq":["nonfinite-overview"],"parent":"nonfinite-overview","detail":[{"h":"全局核心：这是判断一切非谓语形式的钥匙","t":"逻辑主语(logical subject)是指「发出非谓语动作的那个人或物」。判断非谓语用 to do、doing 还是 done，只需两步：第一步，找出逻辑主语是谁；第二步，判断逻辑主语对该动作是「主动做」还是「被动承受」。主动 → to do 或 doing；被动 → done 或 to be done / being done。这条主线在不定式、动名词、分词各节点均适用。"},{"h":"不同结构中逻辑主语的位置","t":"分词状语：无显式主语，默认与主句主语相同。若不同 → 独立主格或 with 结构。不定式宾补：逻辑主语 = 动词的直接宾语（ask him to go，him 是 go 的逻辑主语）。动名词：一般与句子主语相同，若不同用「所有格/宾格 + doing」（his leaving）。独立主格：逻辑主语明写在分词之前。"},{"h":"主动 vs 被动：核心判断表","t":"逻辑主语「做」动作 → 主动：to do / doing / having done。逻辑主语「被做」 → 被动：to be done / being done / done / having been done。时间关系：先于主句 → to have done / having done（完成式）。与主句同时 → to do / doing（一般式）。"},{"h":"典型错误模式","t":"错误1：The report written by scientists surprised everyone — 有人以为 written 是谓语，实为过去分词定语（report 被写，被动）。错误2：Having been discussed the proposal was rejected — Having been discussed 的逻辑主语应是 proposal，正确（proposal 被讨论，被动 → having been discussed）；但若误写 Having discussed，则逻辑主语变成了隐含的「人」，与 proposal 不符，造成垂悬。错误3：The door was heard to open = 感官动词被动时 to 重现，而非 was heard opening（意义也略有不同）。"},{"h":"与「垂悬分词」「独立主格」「非谓语时态语态」的关系","t":"本节点是「垂悬分词」的前提（垂悬 = 逻辑主语判断失误）；是「独立主格」的依据（不同主语时另设主语）；是「非谓语时态语态」的选择基础（主动被动先定，再看时间前后）。"}],"examples":[{"en":"I want this article proofread before submission.","zh":"我希望这篇文章在提交前被校对过。","note":"want + 宾语(this article) + 补足语(proofread)；article 被校对，被动 → done（过去分词）。"},{"en":"She felt her confidence growing with every successful presentation.","zh":"每次成功演讲，她都感觉自信心在增长。","note":"feel + 宾语(her confidence) + 补足语(growing)；confidence 主动地增长 → doing（进行）。"},{"en":"The manager had the contract reviewed by a lawyer before signing.","zh":"经理在签字前让律师审查了合同。","note":"have + 宾语(the contract) + 补足语(reviewed)；contract 被审查，被动 → done。与 have sb do（主动使役）对比。"}],"hardcase":{"sentence":"For the proposed merger to be approved without triggering antitrust scrutiny, it was deemed essential for both companies to demonstrate, convincingly and with documented evidence, their commitment to preserving competitive market conditions.","zh":"为使拟议中的合并在不触发反垄断审查的情况下获得批准，两家公司被认为有必要令人信服地以有据可查的证据证明其维护竞争性市场条件的承诺。","marks":[{"text":"For the proposed merger to be approved","role":"for + 名词 + 不定式，逻辑主语为 the proposed merger（被批准），被动不定式，作目的/条件状语"},{"text":"without triggering antitrust scrutiny","role":"动名词作介词 without 的宾语，逻辑主语与上文 the merger 一致，主动式"},{"text":"for both companies to demonstrate","role":"for + 名词 + 不定式，显式逻辑主语为 both companies（区别于句子形式主语 it），主动式，作形式主语 it 的真实主语"},{"text":"preserving competitive market conditions","role":"动名词作介词 to（commitment to）的宾语，逻辑主语为 both companies，主动式"}],"tip":"for + 名词 + to do 是不定式逻辑主语的显式标注法——for the merger to be approved 的逻辑主语是 the merger（非句子主语），for both companies to demonstrate 的逻辑主语是 both companies，二者各异。"}},{"id":"nonfinite-perfect-passive","title":"非谓语的时态语态","en":"Tense & Voice of Non-finites","domain":"nonfinite","tier":3,"summary":"to have done / having done(先于主句)、to be done / being done / done(被动)。","level":4,"prereq":["past-participle","passive-voice"],"parent":"past-participle","detail":[{"h":"非谓语自有时态和语态","t":"非谓语动词虽然不作谓语，仍有「自己的」时态和语态信息。时间关系靠完成式表达，语态靠被动式表达。两者可叠加。这是许多学习者的盲区——以为非谓语是「光秃秃」的 to do/doing/done，实则有完整的形式体系。"},{"h":"不定式的完成与被动","t":"一般主动：to do（与主句同时或之后）。完成主动：to have done（先于主句）：He is said to have written this poem（据说他写了这首诗，写在被说之前）。一般被动：to be done（与主句同时承受）：The work is expected to be completed by Friday。完成被动：to have been done（先于主句且被动）：She appears to have been misled（看来她是被误导了，被动在先）。"},{"h":"分词的完成与被动","t":"一般主动：doing（同时进行）。完成主动：having done（先于主句）：Having read the report, he made his decision。一般被动：being done（同时被动）：Being examined by a doctor, he remained calm。完成主动（done 本身含完成/被动意）：done = having been done 的简化（Examined by a doctor = Having been examined / Being examined，视语境取其一）。完成被动：having been done：Having been delayed repeatedly, the project was finally cancelled。"},{"h":"动名词的完成与被动","t":"一般主动：doing。完成主动：having done：He denied having read the document。被动：being done：She resented being treated unfairly。完成被动：having been done：He is proud of having been selected。"},{"h":"与「被动语态」「非谓语的逻辑主语」的联系","t":"非谓语的被动形式（to be done / being done / done）是「被动语态」在非谓语领域的延伸，核心仍是 be + 过去分词；选择依据仍是「逻辑主语对动作是主动还是被动」。"}],"examples":[{"en":"The ancient manuscript is believed to have been written in the 12th century.","zh":"这份古代手稿据信写于12世纪。","note":"to have been written = 不定式完成被动；writing 先于 believe 且 manuscript 被动承受 → to have been done。"},{"en":"Having been overlooked for promotion three times, she decided to seek opportunities elsewhere.","zh":"三次晋升机会都被忽视后，她决定去别处寻求发展。","note":"Having been overlooked = 完成被动分词；逻辑主语 = she，被动承受（被忽视），先于 decided。"},{"en":"He regretted not having spoken up at the meeting when he had the chance.","zh":"他后悔在会议上有机会时没有发声。","note":"not having spoken up = 完成主动动名词（否定在 having 前）；动作先于 regret，且主动。"}],"hardcase":{"sentence":"The manuscript, believed to have been written in the early fifteenth century and long thought to have been destroyed in the library fire, turned out to have been preserved in a private collection, its existence having been concealed for decades to protect the original owner's heirs.","zh":"这份手稿被认为写于十五世纪初期，且长期以来被认为在图书馆火灾中被销毁，结果发现它一直被保存在私人收藏中，其存在被隐瞒了数十年，以保护原主人的继承人。","marks":[{"text":"believed to have been written in the early fifteenth century","role":"过去分词 believed 作状语（省略 being believed = as it was believed）；to have been written 为不定式完成被动式，逻辑主语为 The manuscript，被动且先于主句"},{"text":"long thought to have been destroyed in the library fire","role":"过去分词 thought 作并列状语；to have been destroyed 为不定式完成被动式，逻辑主语为 The manuscript，被动且先于主句"},{"text":"to have been preserved in a private collection","role":"不定式完成被动式作 turned out 的宾语（表语），逻辑主语为 The manuscript，表先于主句的被动动作"},{"text":"its existence having been concealed for decades","role":"独立主格结构：its existence 为自带逻辑主语，having been concealed 为完成被动式分词，作原因/伴随状语，被动且先于主句"}],"tip":"to have been done = 不定式完成被动（先于主句且被动）；having been done = 完成分词被动（独立主格中用法相同）——时间层次：concealment > preservation > discovery，三层先后一句道尽。"}},{"id":"clause-overview","title":"从句总览","en":"Subordinate Clauses","domain":"clause","tier":6,"summary":"三大从句：名词性、定语、状语——按它在主句里充当什么成分来归类。","level":4,"prereq":["complex-sentence"],"parent":"complex-sentence","detail":[{"h":"从句是什么","t":"从句（subordinate clause）是嵌入主句中的一个完整小句——有自己的主语和谓语，却不能独立成句，要从属于主句。英语里几乎所有复杂思想都靠从句实现，考研英一长难句的核心正是从句叠加。"},{"h":"三大类型：按成分分","t":"全部从句按它在主句里充当什么成分归为三类：①名词性从句——整体当一个名词用，可作主语、宾语、表语、同位语；②定语从句——当形容词用，修饰前面的名词（先行词）；③状语从句——当副词用，修饰动词或全句，交代时间、原因、条件、结果、让步等。这条主线贯穿全部从句知识。"},{"h":"引导词总体逻辑","t":"引导词有两个任务：①连接从句与主句；②在从句内部充当某个成分（或不充当）。名词性从句引导词：that（不作成分）、what/which/who（作主宾）、when/where/how/why（作状语）、whether/if（表是否）。定语从句引导词：关系代词 who/whom/which/that/whose/as（在从句作主宾定）、关系副词 when/where/why（作状语）。状语从句引导词：纯粹是连词（because/although/if/when 等），不在从句内充当成分。"},{"h":"考研长难句中的挑战","t":"长难句往往是从句嵌套：定语从句套状语从句、名词从句内含定语从句……分析步骤：①先找主句谓语（唯一限定性动词）；②找引导词，划出各从句边界；③辨认每个从句充当什么成分；④还原分词、介词+关系代词等'浓缩版'从句。与非谓语动词（分词作定语=定语从句简化、分词作状语=状语从句简化）打通理解。"},{"h":"与其他知识点的联系","t":"从句与非谓语动词（非谓语动词总览）互为展开/浓缩关系；强调句型（强调句型）外形像定语从句但不是；倒装（倒装）可出现在让步、结果从句里；比较结构（比较结构）的核心就是比较从句；时态呼应（时态呼应）在宾语从句中体现得最集中。"}],"examples":[{"en":"What she said surprised everyone who heard it.","zh":"她说的话让所有听到的人都感到惊讶。","note":"What she said 是名词性从句作主语；who heard it 是定语从句修饰 everyone。"},{"en":"Although the experiment failed, the results provided data that could not be ignored.","zh":"尽管实验失败了，结果仍提供了不可忽视的数据。","note":"Although 引导让步状语从句；that could not be ignored 是定语从句修饰 data。"},{"en":"The reason why he left was that the project had been completed.","zh":"他离开的原因是该项目已经完成了。","note":"why he left 是定语从句；that the project had been completed 是表语从句。"}],"hardcase":{"sentence":"What surprised the economists most was not that wages had stagnated, but that the productivity gains which companies had achieved through automation were distributed so unevenly that many workers found themselves worse off than before.","zh":"最令经济学家惊讶的，不是工资停滞，而是企业通过自动化实现的生产率提升分配如此不均，以致许多工人发现自己的处境反而比以前更糟。","marks":[{"text":"What surprised the economists most","role":"名词性从句（what引导主语从句，what在从句中作主语）"},{"text":"that wages had stagnated","role":"名词性从句（that引导表语从句，与not that…but that并列）"},{"text":"that the productivity gains which companies had achieved through automation were distributed so unevenly","role":"名词性从句（but that引导并列表语从句）"},{"text":"which companies had achieved through automation","role":"定语从句，修饰先行词the productivity gains，which作宾语"},{"text":"that many workers found themselves worse off than before","role":"结果状语从句，由so…that引出"}],"tip":"先定位主谓（was），再识别三大从句类型——名词性作主语、表语，定语从句嵌其中，so…that收尾，层次立现。"}},{"id":"noun-clause","title":"名词性从句","en":"Noun Clauses","domain":"clause","tier":6,"summary":"整体当一个名词用，可作主语、宾语、表语、同位语。","level":4,"prereq":["clause-overview"],"parent":"clause-overview","detail":[{"h":"本质：从句当名词用","t":"名词性从句（noun clause）整体充当名词的角色，放在任何名词能出现的位置：主语、宾语（动词/介词的宾语）、表语、同位语。记住这四个位置，名词从句就不再混乱。"},{"h":"四类引导词及其选择规则","t":"①that——引导词在从句中不作任何成分，从句内部完整，用于陈述事实：I know that he left.②what/which/who/whom/whose——疑问代词转化为引导词，自身在从句里作主语或宾语：What matters is attitude（what 作主语）；I don't know what she wants（what 作宾语）。③when/where/how/why——疑问副词转化，在从句里作状语：How it happened remains unclear。④whether/if——表'是否'：I wonder whether he will come（whether 可用于所有位置；if 只用于宾语从句且不能紧跟 or not）。"},{"h":"四个句法位置","t":"作主语：That honesty is valued is obvious / It is obvious that honesty is valued（常用 it 形式主语后置）。作宾语：She believes what he says（省略 that 最常见）。作表语：The truth is that no one knows（系动词后）。作同位语：The fact that he lied shocked us（紧接抽象名词解释其内容，见同位语从句条目）。"},{"h":"考研高频陷阱","t":"①that vs what：从句内部是否缺成分——缺成分（主宾）用 what，不缺用 that。②whether vs if：主语/表语/介词后从句只用 whether；or not 紧跟引导词时只用 whether（whether or not vs *if or not）。③时态呼应：主句为过去时，从句中的 will→would、can→could（普遍真理例外）。④it 形式主语：主语从句长时几乎必须用 It is ... that... 句式，考研原文大量使用。"},{"h":"与相邻知识点的联系","t":"名词性从句与同位语（同位语）的区别：同位语是短语，同位语从句是句子。与定语从句区分：定从引导词在从句作成分且修饰先行词，名词从句整体才是名词。与时态呼应（时态呼应）、建议要求虚拟（建议要求虚拟）紧密关联——宾语从句是这两大规则的舞台。"}],"examples":[{"en":"It is well known that practice makes perfect.","zh":"众所周知，熟能生巧。","note":"it 作形式主语，that 引导的从句是真正主语，that 在从句中不作成分。"},{"en":"Nobody could explain how the ancient structure had been built.","zh":"没人能解释那座古老建筑是如何建造的。","note":"how 引导宾语从句，how 在从句中作方式状语，注意从句用陈述语序（非疑问语序）。"},{"en":"The question remains whether the policy will achieve its goals.","zh":"这项政策能否实现目标，仍是个问题。","note":"whether 引导表语从句，不可换 if（表语位置只用 whether）。"}],"hardcase":{"sentence":"The panel concluded that whether the findings could be replicated in other populations remained uncertain, and that what the data actually demonstrated was far more limited than what the researchers had initially claimed.","zh":"专家组得出结论：研究结果能否在其他人群中得到重复仍不确定，数据实际证明的内容远比研究人员最初声称的更为有限。","marks":[{"text":"that whether the findings could be replicated in other populations remained uncertain","role":"名词性从句，作concluded的宾语（宾语从句）；内嵌whether引导的主语从句"},{"text":"whether the findings could be replicated in other populations","role":"名词性从句（whether引导主语从句，作remained的主语）"},{"text":"that what the data actually demonstrated was far more limited than what the researchers had initially claimed","role":"名词性从句，与第一个that从句并列，共同作concluded的宾语"},{"text":"what the data actually demonstrated","role":"名词性从句（what引导主语从句，what作宾语，缺宾语）"},{"text":"what the researchers had initially claimed","role":"名词性从句（what引导，作than后的比较基准，what作宾语）"}],"tip":"名词性从句可层层嵌套：宾语从句里套主语从句，than后再套一个what从句——每层都当一个名词用，抓住引导词和它在从句里的成分即可拆解。"}},{"id":"subject-clause","title":"主语从句","en":"Subject Clause","domain":"clause","tier":4,"summary":"从句作主语，常用 it 作形式主语后置：It is obvious that...。","level":4,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"什么是主语从句","t":"主语从句（subject clause）就是用一整个从句充当主句的主语。英语中名词能出现在主语位置，从句整体也能。引导词有：that（不作成分）、what/who/which（作主宾）、when/where/how/why（作状语）、whether（表是否）。"},{"h":"形式主语 it 的使用","t":"主语从句往往较长，英语倾向于把它推到句尾，用 it 占住主语位：It is clear that climate change is accelerating。这是考研阅读中最常见的句式之一。去掉 it，that 从句放句首在语法上也正确，但书面上少见。"},{"h":"引导词选择与从句内部语序","t":"①用 that：从句内部是完整陈述句（无缺失成分）；②用 what/who：从句内部缺主语或宾语；③用 whether：表'是否'，主语位不可换 if；④引导词后一律用陈述语序（主+谓），不可用疑问语序（Why did he leave→why he left）。"},{"h":"考研考点","t":"长难句中的 it 出现时，必须判断它是：指代词（指前文）、形式主语（代替后面的 that 从句）、还是强调句型 It is...that...。三者区别：形式主语后的 that 从句去掉 it 句子主语缺失；强调句去掉 it is...that 框架后剩下的仍是完整句子。另：主语从句谓语常用单数（形式上的'it'和语法上'整件事'都视为单数）。"},{"h":"与相邻知识点","t":"与 it 的用法（it 的用法）紧密相连；与建议要求虚拟（建议要求虚拟）关联：It is necessary that he (should) do...——这里 it 代替了句首主语从句，that 从句又含虚拟语气。"}],"examples":[{"en":"That the earth is round is a fact.","zh":"地球是圆的，这是一个事实。","note":"that 引导主语从句，作主语；正式书面语中可放句首，但口语和学术写作偏好 It is a fact that...。"},{"en":"It remains unclear how the virus mutated so rapidly.","zh":"病毒如何如此迅速地变异，目前仍不清楚。","note":"it 形式主语，how 引导真正主语从句，how 在从句中作方式状语。"},{"en":"Whether the project will succeed depends on funding.","zh":"该项目能否成功取决于资金。","note":"whether 引导主语从句，表是否；这里不用 if，因为位于主语位置。"}],"hardcase":{"sentence":"It remains deeply controversial whether the benefits that accrue to society from unrestricted access to information outweigh the harms that inevitably follow when private data falls into the wrong hands.","zh":"不受限制地获取信息给社会带来的好处，是否超过个人数据落入不法之手时不可避免地造成的危害，这一问题至今仍存在极大争议。","marks":[{"text":"It","role":"形式主语，代替后置的whether主语从句"},{"text":"whether the benefits that accrue to society from unrestricted access to information outweigh the harms that inevitably follow when private data falls into the wrong hands","role":"主语从句（whether引导，整体作remains的真正主语，后置）"},{"text":"that accrue to society from unrestricted access to information","role":"定语从句，修饰先行词the benefits，that作主语"},{"text":"that inevitably follow","role":"定语从句，修饰先行词the harms，that作主语"},{"text":"when private data falls into the wrong hands","role":"时间状语从句，修饰follow，说明危害发生的时机"}],"tip":"主语从句过长时英语习惯用it作形式主语后置；找到it对应的真正从句（whether…），剩余部分全是从句内部的修饰层。"}},{"id":"object-clause","title":"宾语从句","en":"Object Clause","domain":"clause","tier":4,"summary":"从句作动词或介词的宾语；that 常可省，须遵时态呼应。","level":4,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"什么是宾语从句","t":"宾语从句（object clause）是用从句充当动词或介词的宾语。它是名词性从句中最高频的一类，考研阅读每篇必现。常用引导词：that（可省略）、what/who/which、whether/if、when/where/how/why 等。"},{"h":"that 的省略规律","t":"宾语从句的 that 在口语和非正式书面中常省略：I think (that) he is right。但以下情况不宜省：①从句放句首强调时；②动词与从句间有插入语时；③多个从句并列时（第一个可省，后续须加以保持清晰）；④介词后面（介词宾语从句只能用 whether，不接 that）。"},{"h":"时态呼应与例外","t":"主句为过去时 → 宾语从句时态相应后移（will→would，can→could，may→might，is→was）。例外：从句内容是普遍真理或客观事实，仍用现在时：They discovered that the earth moves around the sun（科学事实不随时改变）。这是考研语法经典考点。"},{"h":"引导词为 whether/if 时的规则","t":"表'是否'时，宾语位置 whether 和 if 均可，但：①or not 紧跟引导词时只用 whether（whether or not，not if or not）；②正式书面中 whether 优先；③介词后的从句只用 whether，不用 if；④if 后不可接 to do，whether 可：I don't know whether to go。"},{"h":"考研陷阱与相邻知识点","t":"①否定转移（否定转移）：think/believe/suppose 的否定习惯性放在主句：I don't think he is right = I think he is not right。②建议要求类动词（建议要求虚拟）后宾语从句用虚拟语气：suggest that he (should) do。③时态呼应（时态呼应）在宾语从句里体现最集中。"}],"examples":[{"en":"Scientists believe that the discovery will change medicine.","zh":"科学家们相信这一发现将改变医学。","note":"that 可省略；主句 believe 为现在时，从句用将来时 will，时态一致。"},{"en":"She asked whether the meeting had been postponed.","zh":"她询问会议是否已经推迟。","note":"asked 是过去时，whether 引导宾语从句，从句里 had been postponed 用过去完成时呼应。"},{"en":"He insisted that the report be submitted by Friday.","zh":"他坚持认为报告必须在周五前提交。","note":"insist 后宾语从句用虚拟语气，be submitted 是 (should) be submitted 的省略形式。"}],"hardcase":{"sentence":"Critics argue that the government has never fully acknowledged how deeply entrenched structural inequality had become before the reforms were introduced, nor has it explained why the remedies it chose were expected to succeed where earlier efforts had so conspicuously failed.","zh":"批评人士认为，政府从未充分承认结构性不平等在改革推出之前已变得多么根深蒂固，也没有解释为什么它所选择的补救措施，会在早期努力如此明显失败的地方取得成功。","marks":[{"text":"that the government has never fully acknowledged how deeply entrenched structural inequality had become before the reforms were introduced, nor has it explained why the remedies it chose were expected to succeed where earlier efforts had so conspicuously failed","role":"宾语从句，作argue的宾语；内含多个嵌套从句"},{"text":"how deeply entrenched structural inequality had become before the reforms were introduced","role":"宾语从句（how引导），作acknowledged的宾语"},{"text":"before the reforms were introduced","role":"时间状语从句，修饰had become"},{"text":"why the remedies it chose were expected to succeed where earlier efforts had so conspicuously failed","role":"宾语从句（why引导），作explained的宾语"},{"text":"it chose","role":"定语从句（省略that），修饰先行词the remedies，it作主语，chose缺宾语"},{"text":"where earlier efforts had so conspicuously failed","role":"地点状语从句，修饰succeed"}],"tip":"宾语从句可用并列连词连接两个（acknowledged…nor explained…），每个宾语从句内部再套更深的从句——nor触发部分倒装（nor has it）是额外难点。"}},{"id":"predicative-clause","title":"表语从句","en":"Predicative Clause","domain":"clause","tier":3,"summary":"从句作表语，置于系动词之后：The question is whether...。","level":4,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"什么是表语从句","t":"表语从句（predicative clause）是充当表语的从句，紧接系动词（be/seem/remain/appear/look 等）之后，说明主语的身份、状态或内容。基本结构：主语 + 系动词 + 引导词 + 从句。"},{"h":"常用引导词","t":"that（不作成分，引导陈述内容）：The truth is that she never came back。whether（表是否，不可换 if）：The question is whether we can afford it。what/when/where/how/why 等（在从句中作成分）：The problem is how we solve it。as/as if（方式，含虚拟）：It looks as if it is going to rain。"},{"h":"与主语从句的对称","t":"表语从句和主语从句互为'镜像'：[主语从句] + 系动词 + 表语 → 比较 → 主语 + 系动词 + [表语从句]。有时可以翻转：What worries me is that he lied（主语从句 + 系动词 + 表语从句混合结构，这种句子前后都是从句）。"},{"h":"考研注意点","t":"①表语从句不可用 if，主语/表语/同位语/介词后只用 whether；②系动词 is/was 后面直接接引导词，不加 that 之外的过渡词；③句子倒过来分析：The reason is why he left（错！reason 后应用 that，而非 why；why 作关系副词是在定语从句里）——注意 The reason why... 是定语从句而非表语从句；④主语为 reason/fact/idea/news 时，后面跟的 that 从句要分辨是表语从句（系动词存在）还是同位语从句（同位语位置无系动词）。"},{"h":"与相邻知识点","t":"与系动词（系动词）构成搭配；与同位语从句（同位语从句）易混：两者都解释主语的名词内容，但表语从句在系动词后，同位语从句直接接在名词后（中间无系动词）。"}],"examples":[{"en":"The real danger is that we have become dependent on technology.","zh":"真正的危险在于我们已经依赖于科技。","note":"that 引导表语从句，紧接系动词 is，that 在从句中不作成分。"},{"en":"The question is whether investing in renewable energy can solve the crisis.","zh":"问题在于投资可再生能源能否解决这场危机。","note":"whether 不可换 if；from 引导的介词短语位于表语位置时同样只用 whether。"},{"en":"It seemed as though the entire audience had been holding their breath.","zh":"整个观众席好像都屏住了呼吸。","note":"as though 后接虚拟语气（had been holding），表与实际不符的感觉。"}],"hardcase":{"sentence":"The central paradox is that the very technologies which were designed to connect people have, in many documented cases, left individuals more isolated than they would have been had those technologies never existed.","zh":"核心悖论在于：那些旨在连接人们的技术，在许多有据可查的案例中，使个体比那些技术从未存在时更加孤立。","marks":[{"text":"that the very technologies which were designed to connect people have, in many documented cases
