, left individuals more isolated than they would have been had those technologies never existed","role":"表语从句，作is后的表语，说明The central paradox的内容"},{"text":"which were designed to connect people","role":"定语从句，修饰先行词the very technologies，which作主语"},{"text":"than they would have been had those technologies never existed","role":"比较状语从句，than引导；had those technologies never existed为省略if的虚拟条件句倒装"}],"tip":"表语从句置于系动词is之后，说明主语「是什么」；注意从句末尾的had…never existed是虚拟条件句省略if后的倒装，与表语从句叠加构成双重难点。"}},{"id":"appositive-clause","title":"同位语从句","en":"Appositive Clause","domain":"clause","tier":4,"summary":"解释抽象名词(fact/idea/news)内容的从句；that 不作成分，区别于定从。","level":4,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"什么是同位语从句","t":"同位语从句（appositive clause）紧接在某些抽象名词后，用整个从句来解释该名词的具体内容。它回答'这个名词的内容是什么'，是名词性从句中最容易与定语从句混淆的一类。"},{"h":"触发同位语从句的名词","t":"能带同位语从句的通常是抽象概念名词：fact（事实）、idea（想法）、news（消息）、belief（信念）、suggestion（建议）、hope（希望）、question（问题）、possibility（可能性）、conclusion（结论）、evidence（证据）等。这些名词'需要解释内容'。"},{"h":"引导词与从句结构","t":"最常用 that（不在从句中作任何成分，从句内部完整）：The fact that he survived is remarkable（that 不是成分，不能用 which 替换）。也可用 whether（内容是'是否'问题）：The question whether it is ethical has not been resolved。"},{"h":"与定语从句的核心区别","t":"这是考研最重要辨析之一。定语从句：①修饰先行词，限定'是哪个'；②引导词（who/which/that）在从句中作主语或宾语；③the book that I read——that 作 read 的宾语，从句内部缺宾语。同位语从句：①解释名词内容，回答'是什么'；②that 不在从句中作任何成分，从句内部成分完整；③the fact that he lied——that 不作任何成分，从句完整。判断公式：把 that 换成 which——如果语义通顺且 which 能作成分，是定从；如果换不通，是同位语从句。"},{"h":"考研长难句应用","t":"同位语从句常被插入语、介词短语等分隔，形成远距离同位：The belief, widely held in the 19th century, that the universe is static has been overturned——belief 与 that 从句之间插入了 widely held in the 19th century。看到抽象名词后远处有 that，要回头找名词配对。相关知识点：同位语（同位语）、定语从句（定语从句）、连接代词与副词（连接代词与副词）。"}],"examples":[{"en":"The news that the company had gone bankrupt shocked investors.","zh":"该公司已经破产的消息令投资者震惊。","note":"that 引导同位语从句解释 news 的内容；that 不作成分，从句完整——若改为 the news which shocked investors，which 作主语，就是定语从句了。"},{"en":"There is growing evidence that social media affects mental health.","zh":"越来越多的证据表明社交媒体影响心理健康。","note":"evidence + that 从句，that 在从句中不作成分（从句内部完整：social media affects mental health）。"},{"en":"The possibility that he might have been mistaken was never considered.","zh":"他可能出错这一可能性从未被考虑过。","note":"possibility 后接 that 从句解释内容；注意被动语态 was never considered 是主句谓语。"}],"hardcase":{"sentence":"The assumption that individuals who are exposed to diverse perspectives will inevitably become more tolerant has been challenged by evidence suggesting that repeated exposure can, under certain conditions, entrench existing biases rather than diminish them.","zh":"「接触多元观点的个体必然变得更加宽容」这一假设，受到了证据的挑战——该证据表明，在某些条件下，反复接触反而可能巩固既有偏见，而非削弱它们。","marks":[{"text":"that individuals who are exposed to diverse perspectives will inevitably become more tolerant","role":"同位语从句，解释先行名词The assumption的内容；that不作成分，只起引导作用"},{"text":"who are exposed to diverse perspectives","role":"定语从句，修饰先行词individuals，who作主语"},{"text":"suggesting that repeated exposure can, under certain conditions, entrench existing biases rather than diminish them","role":"现在分词短语作定语，修饰evidence；内含that引导的宾语从句"},{"text":"that repeated exposure can, under certain conditions, entrench existing biases rather than diminish them","role":"宾语从句，作suggesting的宾语"}],"tip":"同位语从句中that不替代任何成分（不像定语从句的that可作主/宾语）——这是与定语从句最关键的区分标准；抽象名词（assumption/fact/idea/news）后的that从句优先考虑同位语从句。"}},{"id":"that-vs-what-clause","title":"that vs what 引导名词从句","en":"That vs What","domain":"clause","tier":4,"summary":"引导词在从句里不作成分用 that，作主/宾且'缺成分'用 what。","level":5,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"核心判断标准：从句内部是否缺成分","t":"that 和 what 都是名词从句引导词，但选择依据只有一条：看从句内部是否缺少主语或宾语成分。不缺成分（从句是完整陈述句）→ 用 that；缺主语或宾语 → 用 what（what 本身充当那个缺失的成分）。"},{"h":"that 的用法","t":"that 只是连接词，进入从句后立刻'消失'，从句内部照常完整：I know that he left（he left 完整）；It is clear that the plan failed（the plan failed 完整）。that 不指代任何东西，不作成分。在宾语从句中可省略；在主语、表语、同位语从句中不可省。"},{"h":"what 的用法","t":"what = the thing(s) that，既是引导词又是从句中缺失成分的替身。What he said was wrong（what 作 said 的宾语，从句缺宾语）；What matters most is attitude（what 作 matters 的主语，从句缺主语）；I'll give you what you need（what 作 need 的宾语）。what 可以出现在从句中任何名词能出现的位置，且 what 本身也作整个名词从句的引导词。"},{"h":"常见错误与辨析","t":"错误①：*The fact what he said is wrong（应用 that，因为 the fact 后是同位语从句，that 不作成分，what 不正确）。正确：The fact that he said was wrong——不对！此句 that 若要引定从，that 是 said 的宾语，但 the fact 不对。正确表达：What he said was wrong（名词从句作主语）。错误②：混淆 what 与 that+it/everything：Everything that he said is true（everything 是先行词，that 引导定语从句，that 作 said 的宾语）≠ What he said is true（what 引导名词从句）。两者意思相近，但结构不同。"},{"h":"与其他引导词对比","t":"who/which/whose 也可引导名词从句且自身作成分，逻辑同 what：I don't know who did it（who 作主语）；I'll take whichever you offer（whichever 作宾语）。区别在于 what 指'物/事'，who 指'人'，which 表'哪个'（有限选项中选择）。参见连接代词与副词（连接代词与副词）。"}],"examples":[{"en":"What the researcher discovered changed our understanding of the brain.","zh":"这位研究者的发现改变了我们对大脑的认知。","note":"what 作 discovered 的宾语（从句缺宾语）；整个 what 从句作主句主语。"},{"en":"The report confirmed that the experiment had been successful.","zh":"报告证实实验已经成功。","note":"that 后从句完整（the experiment had been successful 无成分缺失），用 that；that 可省略。"},{"en":"I could not understand what he meant by 'sustainable development'.","zh":"我无法理解他所说的'可持续发展'是什么意思。","note":"what 作 meant 的宾语；从句内部：he meant [what]——宾语位缺失。"}],"hardcase":{"sentence":"What the commission failed to appreciate was that the distinction between what constitutes legitimate protest and what amounts to civil disorder is not fixed but depends on the social and political context in which such actions occur.","zh":"委员会未能理解的是：合法抗议与扰乱公共秩序之间的界限并非固定不变，而是取决于此类行为发生的社会和政治背景。","marks":[{"text":"What the commission failed to appreciate","role":"名词性从句（what引导主语从句，what在从句中作appreciate的宾语——从句缺宾语）"},{"text":"that the distinction between what constitutes legitimate protest and what amounts to civil disorder is not fixed but depends on the social and political context in which such actions occur","role":"名词性从句（that引导表语从句，that不作成分，从句结构完整）"},{"text":"what constitutes legitimate protest","role":"名词性从句（what引导，作between的介词宾语，what在从句中作主语——从句缺主语）"},{"text":"what amounts to civil disorder","role":"名词性从句（what引导，与前者并列作between的宾语，what作主语）"},{"text":"in which such actions occur","role":"定语从句（介词+关系代词），修饰先行词the social and political context"}],"tip":"that引导从句时从句本身结构完整（that不充当任何成分）；what引导时从句必然缺一个主语或宾语由what填补——这是判断用that还是what的唯一标准。"}},{"id":"whether-vs-if","title":"whether vs if","en":"Whether vs If","domain":"clause","tier":2,"summary":"都表'是否'；主语/表语/介词后及 or not 紧跟时只能用 whether。","level":4,"prereq":["object-clause"],"parent":"object-clause","detail":[{"h":"共同点：都表'是否'","t":"whether 和 if 都可以引导表达'是否（or not）'含义的名词性从句，在宾语从句中最为常见：I don't know whether/if he will come。这是两者的交集地带，也是最基础用法。"},{"h":"只能用 whether 的五种情况","t":"①作主语从句：Whether he is qualified is debatable（主语位不可用 if）。②作表语从句：The question is whether we should proceed（表语位不可用 if）。③作介词宾语：It depends on whether the weather permits（介词后不可用 if）。④or not 紧跟引导词时：whether or not we agree（不可说 *if or not）——or not 放句末时两者均可。⑤引导词后接 to do 不定式：I don't know whether to stay or leave（不可说 *if to stay）。"},{"h":"if 使用的限制","t":"if 引导名词从句时：①只能用于宾语从句；②不能紧跟 or not；③不能后接 to do；④正式书面语通常避免用 if 引导名词从句（容易与条件状语从句的 if 混淆）。条件从句的 if 与宾语从句的 if 语义不同：I will go if he comes（条件）vs I wonder if he will come（是否）。"},{"h":"考研应用","t":"选词填空题：看引导词所在位置——主/表/同位/介词后 → 只填 whether；宾语位且无 or not 紧随 → whether/if 皆可。改错题：if 出现在主语/表语/介词后 → 改为 whether。阅读：whether or not 往往表强调，翻译时注意'无论是否'与'是否'的细微差异。"},{"h":"与相邻知识点","t":"与宾语从句（宾语从句）、主语从句（主语从句）配套学习；与条件状语从句（条件状语从句）中的 if 注意区分语义——名词从句 if 表'是否'，条件从句 if 表'如果'。"}],"examples":[{"en":"Whether the new law will reduce crime remains to be seen.","zh":"新法律是否会降低犯罪率，还有待观察。","note":"主语位，只用 whether，不可换 if。"},{"en":"The outcome depends on whether both parties can reach a compromise.","zh":"结果取决于双方能否达成妥协。","note":"介词 on 后，只用 whether。"},{"en":"I'm not sure if/whether the deadline has been extended.","zh":"我不确定截止日期是否已经延期。","note":"动词 sure 后的宾语从句，whether 和 if 均可；正式文体选 whether。"}],"hardcase":{"sentence":"The board has not yet decided whether to disclose the findings publicly or whether the confidentiality agreement it signed precludes any announcement, and it is uncertain whether or not a legal opinion will clarify the matter before the deadline.","zh":"董事会尚未决定是否公开披露调查结果，也未确定所签署的保密协议是否排除任何公告，且在截止日期前法律意见能否厘清此事，亦不确定。","marks":[{"text":"whether to disclose the findings publicly","role":"whether引导宾语从句（whether后接不定式；若用if则需接完整从句，此处不定式形式只能用whether）"},{"text":"whether the confidentiality agreement it signed precludes any announcement","role":"whether引导并列宾语从句；it signed为省略that的定语从句修饰the confidentiality agreement"},{"text":"it signed","role":"定语从句（省略关系代词that），修饰先行词the confidentiality agreement，it作主语，signed缺宾语"},{"text":"whether or not a legal opinion will clarify the matter before the deadline","role":"whether or not引导主语从句（or not紧随whether后，不可换成if or not）"}],"tip":"whether可接不定式（whether to do）、可置句首作主语、可跟or not紧贴——这三种场合if均不可替换；只有作动词宾语且无上述限制时，whether与if才可互换。"}},{"id":"connective-words","title":"连接代词与副词","en":"Connectives","domain":"clause","tier":3,"summary":"who/what/which/when/where/how/why 引导名词从句，自身在从句中担成分。","level":4,"prereq":["noun-clause"],"parent":"noun-clause","detail":[{"h":"什么是连接代词和连接副词","t":"连接代词（connective pronouns）和连接副词（connective adverbs）是由疑问词演化而来的从句引导词，它们身兼两职：①引导名词从句；②在从句内部充当成分（代词充当主/宾/定语，副词充当状语）。这是它们与 that 的根本区别——that 不充当成分。"},{"h":"连接代词清单及其在从句中的成分","t":"who（指人，作主语）：I know who took it（who 作 took 的主语）。whom（指人，作宾语）：She told me whom to contact（whom 作 contact 的宾语）。what（指物/事，作主宾）：Tell me what you need（what 作 need 的宾语）。which（哪个，作主宾定）：I'll take whichever you prefer（whichever 作 prefer 的宾语）。whose（谁的，作定语）：I don't know whose idea this was（whose 修饰 idea，作定语）。"},{"h":"连接副词清单及其在从句中的成分","t":"when（时间状语）：Do you remember when she arrived?。where（地点状语）：I don't know where he went。how（方式状语）：Explain how the machine works。why（原因状语）：No one understands why it failed。这四个连接副词与关系副词（关系副词）同形，但后者引导定语从句、前者引导名词从句。"},{"h":"从句语序：陈述语序","t":"引导词后一律用陈述语序（主语在前，谓语在后），不用疑问句语序。错误：*I don't know where does he live。正确：I don't know where he lives。这是考研选词填空的高频错误点——从句内部永远是'平静的陈述句'，把疑问词的倒装语序带进去即犯错。"},{"h":"与相邻知识点","t":"连接副词（when/where）与关系副词（关系副词）同形，区分靠语境：引导名词从句（整体作名词用）→ 连接副词；修饰先行词（紧跟名词）→ 关系副词。与 that vs what（that vs what 引导名词从句）对比：that 不作成分，连接代词/副词必须在从句里担成分。"}],"examples":[{"en":"The committee will decide who gets the research grant.","zh":"委员会将决定谁获得研究经费。","note":"who 引导宾语从句，who 在从句中作 gets 的主语。"},{"en":"How the ancient Romans built such durable roads is still debated.","zh":"古罗马人如何建造如此耐久的道路，至今仍有争论。","note":"how 引导主语从句，how 在从句中作方式状语；陈述语序 the ancient Romans built，非疑问语序。"},{"en":"She explained why the experiment had produced unexpected results.","zh":"她解释了实验为何产生了意外结果。","note":"why 作宾语从句引导词，在从句中作原因状语。"}],"hardcase":{"sentence":"Researchers have long debated how the brain encodes memories of events that were emotionally charged, why some traumatic experiences are recalled with extraordinary vividness while others fade almost entirely, and what neurological mechanisms determine which details survive the process of consolidation.","zh":"研究人员长期争论：大脑如何对情绪强烈的事件记忆进行编码；为何某些创伤性经历被以异乎寻常的清晰度回忆起，而另一些却几乎完全消退；以及哪些神经机制决定了哪些细节能在记忆巩固过程中留存下来。","marks":[{"text":"how the brain encodes memories of events that were emotionally charged","role":"连接副词how引导宾语从句，how在从句中作方式状语；内含定语从句that were emotionally charged修饰events"},{"text":"that were emotionally charged","role":"定语从句，修饰先行词events，that作主语"},{"text":"why some traumatic experiences are recalled with extraordinary vividness while others fade almost entirely","role":"连接副词why引导并列宾语从句，why作原因状语；内含while引导的对比状语从句"},{"text":"while others fade almost entirely","role":"让步/对比状语从句，由while引导"},{"text":"what neurological mechanisms determine which details survive the process of consolidation","role":"连接代词what引导并列宾语从句，what作determine的宾语（从句缺宾语）；内含which引导的宾语从句"}],"tip":"how/why/what/which等连接词引导名词从句时，必须在从句中充当成分（状语/宾语/主语）——这是它们区别于that的根本：从句「缺」什么成分，就选对应的连接词填上。"}},{"id":"relative-clause","title":"定语从句","en":"Relative Clauses","domain":"clause","tier":6,"summary":"修饰名词(先行词)的从句；分清先行词、关系词、它在从句中的成分是关键。","level":4,"prereq":["clause-overview"],"parent":"clause-overview","detail":[{"h":"本质","t":"定语从句是一个完整的句子，却干着形容词的活——修饰前面一个名词。被修饰的名词叫先行词（antecedent），从句紧跟其后。唯一钥匙：先行词在从句里其实充当某个成分（主语/宾语/状语），关系词就是它派进从句的替身。"},{"h":"三步分析法","t":"①找先行词（关系词前的名词）；②把关系词还原成先行词代回从句；③看它在从句作什么成分——作主语/宾语 → 关系代词（who/whom/which/that），作定语 → whose，作状语 → 关系副词（when/where/why）或介词 + which。"},{"h":"限制性与非限制性","t":"限制性（无逗号）：限定先行词的范围，说明'是哪个'——The student who works hardest will win。非限制性（有逗号）：对先行词补充说明，去掉不影响主句核心意思——The student, who works hardest, will win（已知唯一学生，只是补充）。非限制性不可用 that，which 可指代整个主句事件。"},{"h":"考研高频","t":"长难句里定从常被介词 + 关系代词（in which）、省略（the book I read）、非限制性（…, which…）伪装。which 非限制性中可指代整个主句。与同位语从句易混：定从关系词在从句中作成分，同位语从句 that 不作成分。"},{"h":"与相邻知识点","t":"定语从句可简化为分词作定语（分词作定语）——关系词 + be 省略后留下分词；强调句型（强调句型）外形相似但 that 不作成分且去框架后原句仍完整；as 引导的定语从句（as 引导定语从句）和非限制性 which 都可指代整个主句。"}],"examples":[{"en":"The scientist who discovered penicillin saved millions of lives.","zh":"发现青霉素的那位科学家拯救了千百万人的生命。","note":"who 还原为 the scientist，在从句中作主语。"},{"en":"This is the lab in which we conduct experiments.","zh":"这就是我们做实验的实验室。","note":"in which = where；介词提到关系代词前。"},{"en":"He failed the exam, which surprised everyone.","zh":"他考试不及格，这让所有人意外。","note":"非限制性，which 指代前面整件事。"}],"hardcase":{"sentence":"The report highlighted several systemic failures, chief among which was the absence of an independent oversight body that had the authority to compel disclosure from agencies whose records had consistently fallen below the standards which the legislation required.","zh":"报告强调了若干系统性失误，其中最主要的是缺乏一个独立监督机构——该机构有权要求各机构披露信息，而这些机构的记录始终未能达到立法所要求的标准。","marks":[{"text":"chief among which was the absence of an independent oversight body","role":"非限制性定语从句，修饰先行词several systemic failures；介词短语among which提前，which指代先行词，从句完全倒装"},{"text":"that had the authority to compel disclosure from agencies","role":"限制性定语从句，修饰先行词an independent oversight body，that作主语"},{"text":"whose records had consistently fallen below the standards","role":"定语从句，修饰先行词agencies，whose作定语（表所属）"},{"text":"which the legislation required","role":"定语从句，修饰先行词the standards，which作required的宾语（从句缺宾语）"}],"tip":"定语从句三要素：先行词（被修饰名词）、关系词（连接并在从句中充当成分）、从句（句子结构完整减去关系词所代替的成分）；先行词在哪里，定语从句紧跟其后。"}},{"id":"restrictive-nonrestrictive","title":"限制性与非限制性","en":"Restrictive vs Non-restrictive","domain":"clause","tier":5,"summary":"有无逗号天差地别：非限制性加逗号、不可用 that、which 可指代整个主句。","level":5,"prereq":["relative-clause"],"parent":"relative-clause","detail":[{"h":"逗号定乾坤","t":"限制性定语从句（restrictive relative clause）和非限制性定语从句（non-restrictive relative clause）的唯一外在标志是逗号。有逗号 = 非限制性；无逗号 = 限制性。这一差别带来语义和语法上的双重差异。"},{"h":"语义差异","t":"限制性：从句必不可少，限定先行词的范围，去掉后意思改变或主句残缺。例：Students who study hard pass exams（限定是哪些学生，去掉后变成'所有学生都通过'，意思改变）。非限制性：从句只是补充信息，去掉主句意思完整。例：My brother, who lives in Beijing, is a doctor（已知只有一个兄弟，who 从句只是附带信息）。"},{"h":"语法差异：that 的限制","t":"非限制性定语从句不可用 that，只能用 who/whom/which/whose/when/where。限制性则 that 与 who/which 多数情况下可互换（但介词后的关系代词不用 that，见介词+关系代词条目）。另：非限制性中 which 可指代整个主句，表示'这件事'，而限制性中的 which 只指代先行词名词。"},{"h":"which 指代整个主句","t":"这是考研阅读的高频难点：She passed the exam, which made her mother proud（which 指代'她通过考试'这件事，不指代 exam）。判断：看 which 还原后应该是先行词名词还是前面整件事——若是整件事则是非限制性 which 的特殊用法。"},{"h":"翻译与阅读策略","t":"限制性定语从句翻译为'…的…'放在名词前：the report that was submitted yesterday → 昨天提交的报告。非限制性通常翻译为独立分句，用'，它/这…'或破折号分隔：The report, which had been reviewed three times, was finally approved → 这份报告（已被审核三次）最终获批。阅读中看到逗号 + which/who 时，立刻判断是非限制性，找 which 真正指代的内容。"}],"examples":[{"en":"The researchers who used the new method got better results.","zh":"使用新方法的研究人员获得了更好的结果（暗含：只有用了新方法的那部分人）。","note":"限制性，无逗号，限定'哪些研究人员'；去掉从句后意思改变。"},{"en":"Einstein, who was born in Germany, later became an American citizen.","zh":"爱因斯坦出生于德国，后来成为美国公民。","note":"非限制性，有逗号；爱因斯坦是唯一指代，who 从句是补充信息，不可用 that。"},{"en":"The company cut costs, which allowed it to survive the recession.","zh":"公司削减了成本，这使它得以在经济衰退中存活。","note":"which 指代前面整个主句事件（切削成本这件事），非限制性；不可换 that。"}],"hardcase":{"sentence":"The legislation, which had been drafted hastily in response to public pressure, contained several provisions that legal scholars considered incompatible with constitutional principles, which inevitably led to a series of court challenges that delayed its implementation for nearly a decade.","zh":"这部立法是在公众压力下仓促起草的，其中包含若干法律学者认为与宪法原则不相符的条款，这不可避免地引发了一系列法庭挑战，使其实施推迟了近十年。","marks":[{"text":"which had been drafted hastily in response to public pressure","role":"非限制性定语从句（逗号隔开），补充说明The legislation的背景，which指代The legislation；不可换用that"},{"text":"that legal scholars considered incompatible with constitutional principles","role":"限制性定语从句（无逗号），修饰先行词provisions，that作considered的宾语（从句缺宾语）；可换用which"},{"text":"which inevitably led to a series of court challenges","role":"非限制性定语从句（逗号隔开），which指代前面整个主句所表达的情况，不指单一名词"},{"text":"that delayed its implementation for nearly a decade","role":"限制性定语从句，修饰先行词court challenges，that作主语"}],"tip":"有逗号=非限制性：补充信息、不可用that、which还可指代整个句子；无逗号=限制性：缩小先行词范围、that与which多可互换——逗号是区分两者的第一信号。"}},{"id":"relative-pronoun","title":"关系代词","en":"Relative Pronouns","domain":"clause","tier":5,"summary":"who/whom/whose/which/that/as，在从句中作主、宾、定语成分。","level":4,"prereq":["relative-clause"],"parent":"relative-clause","detail":[{"h":"关系代词的双重身份","t":"关系代词（relative pronoun）同时做两件事：①引导定语从句；②在从句内部充当主语、宾语或定语（whose）。它是先行词的'替身'，把先行词带入从句参与句子的逻辑关系。"},{"h":"五个关系代词及其用法","t":"who——指人，作从句主语：the woman who called。whom——指人，作从句宾语（正式文体）：the man whom I met；口语中常省略或换 that。which——指物（或整件事，非限制性），作主语或宾语：the book which/that I read。that——指人或物，限制性从句主宾均可；不用于非限制性、不跟在介词后。whose——指人或物的所有格，作从句定语：the student whose paper won（whose 修饰 paper，作定语）。"},{"h":"关系代词作宾语时的省略","t":"关系代词作从句宾语（而非主语）时，在限制性定语从句中可省略：the report (that/which) I submitted yesterday。判断是否可省：把关系词还原成先行词代入从句，若充当宾语则可省；充当主语则不可省（去掉主语从句不完整）。"},{"h":"whose 的特殊性","t":"whose 是唯一作定语的关系代词，等于 of which（物）或 of whom（人）的所属意义：a country whose economy is growing = a country the economy of which is growing。考研长难句中 whose 频繁出现，还原时想：这个名词'属于'先行词。"},{"h":"与相邻知识点","t":"关系代词与关系副词（关系副词）的选择：从句缺主语/宾语用代词，缺状语用副词。与介词+关系代词（介词+关系代词）：whom/which 可与介词搭配前置。与 that vs which（that vs which）：限制性中多通用，区别在非限制性和介词后。"}],"examples":[{"en":"The engineer whose design won the award will present at the conference.","zh":"设计获奖的那位工程师将在会议上发言。","note":"whose 作 design 的定语（the engineer's design），whose 不可省略。"},{"en":"The argument (that/which) she made was persuasive.","zh":"她提出的论点很有说服力。","note":"关系代词作 made 的宾语，可省略；that 和 which 均可。"},{"en":"There is no one who can solve this problem overnight.","zh":"没有人能在一夜之间解决这个问题。","note":"who 作 can solve 的主语，不可省略（主语不可省）。"}],"hardcase":{"sentence":"The scientist whose groundbreaking research had overturned a consensus that held for nearly a century acknowledged that the methodology on which her conclusions rested had been questioned by colleagues whom she respected enormously.","zh":"那位推翻了近一个世纪共识的科学家承认，支撑她结论的方法论受到了她极为尊重的同事的质疑。","marks":[{"text":"whose groundbreaking research had overturned a consensus that held for nearly a century","role":"定语从句，修饰先行词The scientist，whose作定语表所属（=The scientist's research）"},{"text":"that held for nearly a century","role":"定语从句，修饰先行词a consensus，that作主语"},{"text":"on which her conclusions rested","role":"定语从句（介词+which），修饰先行词the methodology，which作介词on的宾语；即her conclusions rested on the methodology"},{"text":"whom she respected enormously","role":"定语从句，修饰先行词colleagues，whom作respected的宾语（宾格，正式书面语中用whom而非who）"}],"tip":"关系代词的格由它在从句中的句法功能决定：作主语用who/that/which，作宾语可用whom/who/that/which，作定语（所属）用whose——与主句的先行词是人还是物无关。"}},{"id":"relative-adverb","title":"关系副词","en":"Relative Adverbs","domain":"clause","tier":4,"summary":"when/where/why = 介词 + which；当从句缺的是状语而非主宾时用它。","level":4,"prereq":["relative-clause"],"parent":"relative-clause","detail":[{"h":"关系副词的本质","t":"关系副词（relative adverb）当 when、where、why 引导定语从句时，它们在从句中充当时间/地点/原因状语，而非主语或宾语。记住：从句里缺的是'状语'而不是'主宾'时，用关系副词。"},{"h":"三个关系副词","t":"when——先行词是时间名词（time/day/year/moment 等），当从句中缺时间状语：the year when I graduated（= the year in which I graduated）。where——先行词是地点名词（place/city/country/situation 等），当从句中缺地点状语：the city where I was born（= the city in which I was born）。why——先行词通常是 reason，当从句中缺原因状语：the reason why he left（= the reason for which he left）。"},{"h":"关系副词 = 介词 + which","t":"这个等式是理解的钥匙：when = at/in/on which，where = in/at which，why = for which。考研中介词 + which（见介词+关系代词）是关系副词的展开形式，两种写法可互换：the moment when it happened = the moment at which it happened。"},{"h":"与关系代词的辨析","t":"判断用关系代词还是关系副词：把关系词还原成先行词代入从句。若代入后从句缺主语/宾语 → 关系代词；若从句主宾都在、只缺状语 → 关系副词。例：The place [where/which] I visited——I visited the place（place 作 visited 宾语，缺宾语）→ 用 which，不用 where。The place [where/which] I lived——I lived in the place（place 作介词宾语）→ 可用 where 或 in which。"},{"h":"与连接副词的区分","t":"when/where/why 作连接副词时引导名词从句（整体当名词用）；作关系副词时引导定语从句（修饰先行词）。区分：修饰前面一个名词 → 关系副词；整体作主/宾/表 → 连接副词。参见连接代词与副词（连接代词与副词）。"}],"examples":[{"en":"I still remember the day when I first arrived in Beijing.","zh":"我仍然记得我第一次抵达北京的那天。","note":"when 修饰先行词 day，在从句中作时间状语，= the day on which I first arrived。"},{"en":"This is the region where the earthquake caused the most damage.","zh":"这就是地震造成破坏最严重的地区。","note":"where 修饰 region，在从句中作地点状语，= the region in which...。"},{"en":"The reason why the experiment failed was never fully explained.","zh":"实验失败的原因从未得到充分解释。","note":"why 修饰 reason，在从句中作原因状语，= the reason for which...；注意 reason + why 有时也可直接接 that。"}],"hardcase":{"sentence":"She revisited the city where she had spent the years when her understanding of the world was still being formed, hoping to recapture a sense of the time when possibilities had seemed limitless and the reasons why she had left no longer seemed so compelling.","zh":"她重返那座城市——她在那里度过了自己对世界认知尚在形成中的那些年，希望重拾那个可能性似乎无穷无尽的年代的感觉，以及她当年离开的那些理由似乎也不再那么令人信服了。","marks":[{"text":"where she had spent the years when her understanding of the world was still being formed","role":"定语从句，修饰先行词the city，where=in which（关系副词，在从句中作地点状语）"},{"text":"when her understanding of the world was still being formed","role":"定语从句，修饰先行词the years，when=at/during which（关系副词，在从句中作时间状语）"},{"text":"when possibilities had seemed limitless","role":"定语从句，修饰先行词the time，when作时间状语"},{"text":"why she had left no longer seemed so compelling","role":"定语从句，修饰先行词the reasons，why作原因状语（关系副词）；注意no longer是状语修饰seemed，非否定关系词"}],"tip":"关系副词when/where/why等于「介词+which」：当从句里缺的是状语（时间/地点/原因）而非主语或宾语时，用关系副词——这是它们与关系代词的核心区别。"}},{"id":"prep-plus-relative","title":"介词 + 关系代词","en":"Preposition + Relative","domain":"clause","tier":4,"summary":"in which/of whom/for which——把从句里的介词提到关系词前，长难句标志。","level":5,"prereq":["relative-pronoun"],"parent":"relative-pronoun","detail":[{"h":"什么是介词+关系代词","t":"介词 + 关系代词（preposition + relative pronoun）是将原本在从句末尾（或其他位置）的介词提到关系代词前面的结构。例：the city in which she lives（= the city which she lives in = the city where she lives）。这是考研长难句的典型标志之一。"},{"h":"为什么要提前介词","t":"英语书面语（尤其是正式文体）中介词不宜放句末，提前到关系代词前既正式又清晰。the issue about which we are debating 比 the issue which we are debating about 更正式。考研阅读原文大量使用这一结构，读懂它是长难句分析的基本功。"},{"h":"使用规则","t":"①介词后的关系代词只能用 which（指物）或 whom（指人），不可用 that：the tool with which（不可 *with that）；the person to whom（不可 *to who）。②介词的选择由从句中的动词/形容词搭配决定：depend on → on which；talk to → to whom；be responsible for → for which。③whose 前不置介词（whose 本身已含所属义）。"},{"h":"还原分析法","t":"看到介词 + which/whom 结构，拆解步骤：①去掉介词和关系代词，把先行词代回从句末尾：the era in which we live → we live in the era；②确认先行词在从句里作什么成分（宾语 of 介词）；③理解整个修饰关系。"},{"h":"与相邻知识点","t":"介词 + which 等价于关系副词（关系副词）：in which = where，on which = when，for which = why。定语从句简化（定语从句的简化）省略关系词 + be 后若剩下介词短语，可作后置定语。that vs which（that vs which）：介词后只能用 which 不用 that。"}],"examples":[{"en":"The framework within which the policy operates is complex.","zh":"该政策运行所在的框架非常复杂。","note":"within which = in which；还原：the policy operates within the framework。先行词 framework 作介词宾语。"},{"en":"She is a researcher for whom accuracy is paramount.","zh":"她是一位把准确性放在首位的研究者。","note":"for whom 不可换 for who/for that；还原：accuracy is paramount for the researcher。"},{"en":"The conditions under which the experiment was conducted were carefully controlled.","zh":"实验进行时的条件受到了严格控制。","note":"under which 放句首修饰 conditions；还原：the experiment was conducted under the conditions。"}],"hardcase":{"sentence":"The conditions under which the agreement was negotiated, the parties by whom it was endorsed, and the mechanisms through which compliance would be monitored were all subjects about which the opposition demanded full parliamentary disclosure.","zh":"协议谈判的条件、批准协议的各方、监督合规的机制，以及反对派要求向议会完全披露的所有事项，都是争议焦点。","marks":[{"text":"under which the agreement was negotiated","role":"定语从句，介词under提前+关系代词which，修饰先行词The conditions；即the agreement was negotiated under the conditions"},{"text":"by whom it was endorsed","role":"定语从句，介词by提前+关系代词whom，修饰先行词the parties；即it was endorsed by the parties"},{"text":"through which compliance would be monitored","role":"定语从句，介词through提前+关系代词which，修饰先行词the mechanisms"},{"text":"about which the opposition demanded full parliamentary disclosure","role":"定语从句，介词about提前+关系代词which，修饰先行词subjects；which指代前文所有名词"}],"tip":"「介词+which/whom」是长难句的典型标志：把从句末尾的介词提到关系词前，显得更正式也更难识别；还原时把介词放回原处：under which…→…under the conditions。"}},{"id":"that-vs-which","title":"that vs which","en":"That vs Which","domain":"clause","tier":3,"summary":"限制性中两者多通用，但 that 不用于非限制性、不跟在介词后。","level":4,"prereq":["relative-pronoun"],"parent":"relative-pronoun","detail":[{"h":"在限制性从句中：大多数情况通用","t":"在限制性定语从句（无逗号）中，that 和 which 修饰物时大多可互换：the car that/which I drove、the problem that/which we face。修饰人时 that 可用（the student that wins），但 who 更自然。"},{"h":"只能用 that、不能用 which 的情况","t":"①先行词是 all/everything/nothing/something/anything/little 等不定代词：All that glitters is not gold。②先行词被最高级、序数词、only/very/first/last 修饰时：the best book that I've read、the only chance that we have。③先行词同时包括人和物：people and things that...。④主句本身以 who/which 引导疑问时，避免重复，改用 that：Which is the book that you mentioned?"},{"h":"只能用 which、不能用 that 的情况","t":"①非限制性定语从句（有逗号）：The report, which was submitted on time, impressed everyone（不可用 *that）。②介词后：the issue on which we agree（不可用 *on that）。③引导词位于句首（少数倒装句）。"},{"h":"实战辨别","t":"读到 which 时，先判断：有逗号 → 非限制性，确认是定语从句还是 which 指整个主句；无逗号且 which 前有介词 → 介词 + 关系代词；无逗号、无介词 → 限制性定语从句，that 可换 which（反之亦然）。考研选填题：见逗号或介词 → 填 which；见'最高级/only/all'先行词 → 填 that。"},{"h":"与相邻知识点","t":"限制性与非限制性（限制性与非限制性）：that 不进非限制性是铁律。介词+关系代词（介词+关系代词）：介词后用 which 不用 that。as 引导定语从句（as 引导定语从句）：as 也可替代 which 在某些非限制性场合，两者有细微差异。"}],"examples":[{"en":"This is the only solution that can work in this context.","zh":"这是在这一语境下唯一可行的解决方案。","note":"only 修饰先行词 solution，限制性从句强制用 that，不可换 which。"},{"en":"The new regulation, which was passed last month, will take effect in January.","zh":"上月通过的新法规将于一月生效。","note":"非限制性（有逗号），只能用 which，不可用 that。"},{"en":"He mentioned everything that had happened during the meeting.","zh":"他提到了会议期间发生的一切。","note":"先行词 everything 是不定代词，用 that 而非 which。"}],"hardcase":{"sentence":"The committee approved all the measures that the subcommittee had recommended, including the one which, according to several legal advisors, risked setting a precedent that could undermine the protections that the original legislation had been designed to guarantee.","zh":"委员会批准了小组委员会建议的所有措施，包括据若干法律顾问称、有可能开创先例的那项措施——该先例可能动摇原始立法旨在保障的各项保护。","marks":[{"text":"that the subcommittee had recommended","role":"限制性定语从句，修饰先行词all the measures，that作宾语（从句缺宾语）；可换用which"},{"text":"which, according to several legal advisors, risked setting a precedent","role":"限制性定语从句，修饰先行词the one；此处用which而非that，是因为从句中插入了插入语according to…，that引导的从句不允许夹带这类插入语（书面语偏好which）"},{"text":"that could undermine the protections","role":"限制性定语从句，修饰先行词a precedent，that作主语"},{"text":"that the original legislation had been designed to guarantee","role":"限制性定语从句，修饰先行词the protections，that作宾语（从句缺宾语）"}],"tip":"限制性从句中that与which多可互换，但以下场合只能用which：①先行词是整个句子；②从句有插入语；③前面已有that；④介词之后——掌握这四条例外，that/which辨析即无盲区。"}},{"id":"as-relative-clause","title":"as 引导定语从句","en":"'As' Relative","domain":"clause","tier":3,"summary":"as is known/as is often the case，as 可指代整句且能前置，与 which 呼应。","level":5,"prereq":["relative-pronoun"],"parent":"relative-pronoun","detail":[{"h":"as 作关系代词的特殊性","t":"as 可以作关系代词引导非限制性定语从句，指代前面整个主句（或主句的一部分）。这是它与 which 的重叠地带，但 as 有 which 没有的独特用法：as 引导的从句可以放在主句之前。"},{"h":"固定搭配：as is known / as is often the case","t":"as is known to all（众所周知）= as everybody knows；as is often the case（情况往往如此）；as has been mentioned above（如上所述）；as was expected（如预期一样）。这类结构中 as 在从句里作主语（is known 的主语 as 指代'下面所说的这件事'），从句放在主句前或后均可。"},{"h":"as vs which：两个核心区别","t":"①位置：which 只能放主句后（She was late, which annoyed everyone）；as 可放主句前、后或中间（As is often the case, he arrived late / He arrived late, as is often the case）。②语义：as 常带有'正如''按照'的比照含义；which 较中性。在'被人预料/已知'语境中 as 比 which 更自然：As/Which was expected, the results were positive（as 更常用）。"},{"h":"as 在比较句式中的关系从句用法","t":"such...as 和 the same...as 结构中，as 引导限制性定语从句：such problems as we face today（as 作 face 的宾语，等于 that）；the same method as that used before（as 作 used 的主语）。这类 as 与连词 as（如，像）相近但作用是定语从句引导词。"},{"h":"与相邻知识点","t":"与非限制性定语从句（限制性与非限制性）关联：as 只能非限制性；与方式状语从句的 as（方式与比较状语从句）区分——方式从句 as 引导的是状语从句而非定语从句；与 as if 虚拟（as if 虚拟）同形不同义。"}],"examples":[{"en":"As is well known, the speed of light is constant.","zh":"众所周知，光速是恒定的。","note":"as 作关系代词置于句首，指代后面整个主句的内容；is well known 的主语是 as。"},{"en":"He passed the exam with distinction, as his teachers had expected.","zh":"他以优异成绩通过了考试，正如他的老师们所预期的那样。","note":"as 放主句后，指代前面整件事；as 在从句中作 expected 的宾语。"},{"en":"Avoid such mistakes as are commonly made by beginners.","zh":"避免初学者常犯的那些错误。","note":"such...as 结构，as 引导限制性定语从句，在从句中作主语（are made 的主语）。"}],"hardcase":{"sentence":"As is so often the case with sweeping reforms, the unintended consequences proved far more disruptive than the architects of the policy had anticipated, which is precisely what critics who had urged a more incremental approach had warned would happen.","zh":"正如大刀阔斧的改革中屡见不鲜的情形一样，意外后果被证明远比政策设计者预期的更具破坏性，而这恰恰正是那些曾敦促采取更渐进做法的批评者所警告将会发生的事情。","marks":[{"text":"As is so often the case with sweeping reforms","role":"as引导定语从句，as在从句中作表语（=which is so often the case），可置于句首；修饰整个主句"},{"text":"which is precisely what critics who had urged a more incremental approach had warned would happen","role":"非限制性定语从句，which指代前面整个主句的内容；从句内含what引导的表语从句"},{"text":"what critics who had urged a more incremental approach had warned would happen","role":"名词性从句（what引导表语从句），what在从句中作happen的主语（从句缺主语）"},{"text":"who had urged a more incremental approach","role":"定语从句，修饰先行词critics，who作主语"}],"tip":"as引导定语从句时，as可作从句主语、宾语或表语，且可前置于主句——「As is known」「As was expected」都是此用法；与which引导的非限制性定从相比，as更强调「正如」的呼应感。"}},{"id":"relative-reduction","title":"定语从句的简化","en":"Reduced Relative","domain":"clause","tier":4,"summary":"关系词 + be 可省 → 留下分词或介词短语：等于分词作定语，长难句高频。","level":5,"prereq":["relative-clause","present-participle","past-participle"],"parent":"relative-clause","detail":[{"h":"什么是定语从句的简化","t":"定语从句的简化（reduced relative clause）是指省略定语从句中的关系代词 + be 动词，只留下余下的分词短语、形容词短语或介词短语作后置定语。这是长难句中分词后置定语的来源。"},{"h":"简化规则：省关系词 + be","t":"省略条件：①关系代词（who/which/that）+ be 可被省略；②省后剩下的成分必须能独立修饰先行词。主动进行 → 现在分词：the man who is reading → the man reading；被动/完成 → 过去分词：the report that was published → the report published；形容词短语：the solution that is best → the solution best；介词短语：the room that is on the left → the room on the left。"},{"h":"简化后的辨认","t":"读到名词后跟着 doing/done/介词短语，先考虑：这是简化的定语从句吗？还原步骤：在 doing/done 前加 which/that is/are/was/were——若加入后语义通顺，就是简化定从。例：findings suggesting a new trend → findings that suggest a new trend（这里省了 that，suggest 无 be，是另一种省略：只省关系词，从句主语与从句谓语仍完整，注意此时从句谓语为一般时态非 be + 分词，主动关系直接省 that）。"},{"h":"两种省略的区分","t":"类型①：省 关系词 + be → 剩分词/形容词/介词短语（最常见）；类型②：只省关系词（宾语位）→ 剩完整从句（the book I read = the book that I read，that 作宾语可省）。长难句中两种同时出现，要分别识别。"},{"h":"与相邻知识点","t":"简化后变成分词作定语（分词作定语）——是同一现象从两端看；介词短语简化后作后置定语与介词+关系代词（介词+关系代词）也有关联。理解简化机制后，分词作定语和定语从句就打通成一个知识系统。"}],"examples":[{"en":"The data collected from the survey revealed unexpected patterns.","zh":"从调查中收集的数据揭示了意料之外的规律。","note":"collected 是 that were collected 的简化；过去分词表被动，先行词 data 是被收集的对象。"},{"en":"Scientists studying climate change have issued a new warning.","zh":"研究气候变化的科学家们发出了新的警告。","note":"studying 是 who are studying 的简化；现在分词表主动进行，scientists 是主动研究者。"},{"en":"The policies adopted by the government did not achieve the desired effect.","zh":"政府采取的政策并未达到预期效果。","note":"adopted 简化自 that were adopted；注意 by the government 是短语的一部分，不是单词的句法省略。"}],"hardcase":{"sentence":"Documents obtained through a freedom-of-information request revealed internal communications suggesting that officials aware of the risks involved had deliberately withheld information considered likely to damage the agency's credibility.","zh":"通过信息自由申请获得的文件揭示了内部通讯，显示知晓相关风险的官员蓄意隐瞒了被认为可能损害机构公信力的信息。","marks":[{"text":"obtained through a freedom-of-information request","role":"定语从句简化（关系词+be省略）：原为which were obtained…，简化后留下过去分词短语作后置定语，修饰Documents"},{"text":"suggesting that officials aware of the risks involved had deliberately withheld information considered likely to damage the agency's credibility","role":"现在分词短语，简化自which suggested…，作定语修饰internal communications"},{"text":"aware of the risks involved","role":"形容词短语，简化自who were aware…，作定语修饰officials；involved简化自that were involved"},{"text":"considered likely to damage the agency's credibility","role":"过去分词短语，简化自which was considered…，作定语修饰information"}],"tip":"定语从句简化的核心规则：关系词+be可省略，留下分词/形容词/介词短语；主动用现在分词（doing），被动用过去分词（done）——简化后的短语等于原从句，还原时把关系词+be补回去。"}},{"id":"adverbial-clause","title":"状语从句","en":"Adverbial Clauses","domain":"clause","tier":6,"summary":"由从属连词引导，表时间/地点/原因/结果/目的/条件/让步/方式/比较九类。","level":4,"prereq":["clause-overview"],"parent":"clause-overview","detail":[{"h":"本质：从句当状语用","t":"状语从句（adverbial clause）由从属连词引导，整体充当主句的状语，修饰主句的动词或整个主句，交代时间、地点、原因、结果、目的、条件、让步、方式、比较等逻辑关系。它和主句的关系是'附属'，放句首或句末都可以，但逻辑含义不变。"},{"h":"九类状语从句与核心连词","t":"①时间：when/while/as/before/after/since/until/as soon as/once/by the time。②地点：where/wherever。③原因：because/since/as/now that/seeing that。④结果：so...that/such...that。⑤目的：so that/in order that(+情态)/lest/in case。⑥条件：if/unless/as long as/provided (that)/suppose/on condition that。⑦让步：although/though/even if/even though/while/no matter/as（倒装）/however/whatever。⑧方式：as/as if/as though。⑨比较：than/as...as。"},{"h":"从属连词 vs 关系词","t":"状语从句的引导词是纯粹的连词，它们不在从句内部充当任何成分（unlike 关系词在定语从句里充当成分，unlike 连接词/副词在名词从句里充当成分）。although/because/when 等进入从句后消失，从句内部是完整的主谓结构。"},{"h":"状语从句的简化","t":"当状语从句的主语与主句主语相同时，可简化为分词短语（= 分词作状语，见分词作状语）：When he arrived, he saw the result → Arriving, he saw the result；Because she was tired, she left → Being tired, she left / Tired, she left。这是考研长难句高频现象，要能正向简化和反向还原。"},{"h":"与相邻知识点","t":"与分词作状语（分词作状语）互为展开/简化关系；条件从句（条件状语从句）与虚拟条件句（虚拟条件句）对比：真实条件 vs 非真实；让步从句（让步状语从句）可触发倒装（倒装）；结果从句（结果状语从句）中 so + 形容词前置可触发部分倒装；主将从现（主将从现）规则在时间、条件从句中严格执行。"}],"examples":[{"en":"Although the findings were surprising, they were widely accepted.","zh":"尽管这些发现出人意料，它们还是被广泛接受了。","note":"although 引导让步从句，放句首时后面逗号，主句不加 but（although 和 but 不同时用）。"},{"en":"The temperature dropped so sharply that the pipes froze overnight.","zh":"气温骤降得如此剧烈，以至于管道一夜之间冻住了。","note":"so + 副词 + that 结果从句；比较：such + 名词 + that。"},{"en":"Provided that all parties agree, the contract will be signed tomorrow.","zh":"只要所有各方同意，合同明天就会签署。","note":"provided that 引导条件从句，语气较正式；主句用将来时，从句用现在时（主将从现）。"}],"hardcase":{"sentence":"Although the company had consistently reported strong quarterly earnings, analysts grew increasingly skeptical because the figures, as they scrutinized them more carefully, seemed to depend on accounting practices that, unless independently audited, could mask a far more precarious underlying position.","zh":"尽管该公司持续报告强劲的季度业绩，但分析师愈发持怀疑态度，因为随着他们更仔细地审查这些数字，这些数字似乎依赖于某些会计做法——除非经过独立审计，这些做法可能掩盖一个危险得多的潜在状况。","marks":[{"text":"Although the company had consistently reported strong quarterly earnings","role":"让步状语从句，although引导，修饰主句grew increasingly skeptical"},{"text":"because the figures, as they scrutinized them more carefully, seemed to depend on accounting practices","role":"原因状语从句，because引导，说明分析师持怀疑态度的原因"},{"text":"as they scrutinized them more carefully","role":"时间/方式状语从句，as引导，插入主句中间（逗号隔开）"},{"text":"that, unless independently audited, could mask a far more precarious underlying position","role":"定语从句，修饰先行词accounting practices，that作主语；内含unless引导的条件状语从句"},{"text":"unless independently audited","role":"条件状语从句（省略主语和be动词：unless they were independently audited），修饰could mask"}],"tip":"状语从句按语义关系分九类，靠引导词识别：although/though/even if（让步）、because/since/as（原因）、when/while/as（时间）、if/unless/provided（条件）——一句可嵌套多类状语从句。"}},{"id":"time-clause","title":"时间状语从句","en":"Time Clauses","domain":"clause","tier":4,"summary":"when/while/as/before/after/until/since/as soon as/by the time 引导。","level":4,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"时间状语从句的连词","t":"引导时间从句的连词很多，含义各有侧重：when（当…时）、while（在…期间，强调同时进行）、as（随着/正当，表同步变化或动作）、before（在…之前）、after（在…之后）、since（自从）、until/till（直到）、as soon as（一…就）、once（一旦）、by the time（到…时为止）、no sooner...than / hardly...when（一…就，倒装结构）。"},{"h":"when / while / as 的细微差别","t":"when：点动作时间（When he entered, she left）或状态背景（When I was young...）；while：强调从句动作的持续性，从句谓语多为进行时（While she was reading...）；as：表两件事同时平行发展或随着（As time passes...；As he got older, he became wiser）。考研中 as 作'随着'时翻译需注意。"},{"h":"主将从现规则","t":"时间状语从句（和条件从句）中，用一般现在时代替将来时。这是铁律：I will call you when I arrive（不可 *when I will arrive）。更复杂情况：I will have finished by the time you arrive（主句将来完成 + 从句现在时）。"},{"h":"since 的时态搭配","t":"since 表'自从'时，主句通常用现在完成时（或过去完成时），since 从句用一般过去时：I have lived here since I graduated（since + 过去时，主句完成时）。考研语法题常考此搭配。"},{"h":"no sooner / hardly 倒装","t":"No sooner had he left than she arrived（一...就...）；Hardly had she spoken when he interrupted（= As soon as she spoke...）。这两个结构触发部分倒装（否定词前置倒装），是时间连词与倒装（否定词前置倒装）的交叉考点。"}],"examples":[{"en":"As technology advances, our daily lives become increasingly interconnected.","zh":"随着科技进步，我们的日常生活变得日益相互联通。","note":"as 表随着/伴随，两件事同步发展，主从句同为一般现在时表习惯性规律。"},{"en":"I had hardly sat down when the phone rang.","zh":"我刚坐下，电话就响了。","note":"hardly...when 引发倒装：Had I hardly sat down... → Hardly had I sat down when...；主句过去完成，when 从句过去时。"},{"en":"The economy had been growing for a decade before the crisis hit.","zh":"在危机爆发之前，经济已经增长了十年。","note":"before 时间从句，主句用过去完成进行时强调持续；before 从句用一般过去时。"}],"hardcase":{"sentence":"Not until the committee had reviewed all the submitted evidence and exhausted every procedural avenue available to it did the chair announce a verdict, by which time so many of the original witnesses had retracted their testimony that the findings were largely inconclusive.","zh":"直到委员会审查了所有提交的证据并穷尽了所有可用的程序途径之后，主席才宣布裁决——而此时距最初有许多证人撤回证词已过去太久，调查结果大体上难以确认。","marks":[{"text":"Not until the committee had reviewed all the submitted evidence and exhausted every procedural avenue available to it","role":"时间状语从句，not until引导，置句首触发主句部分倒装（did the chair announce）"},{"text":"by which time so many of the original witnesses had retracted their testimony","role":"非限制性定语从句，by which time=by that time，修饰前文时间点；内含结果状语从句that the findings…"},{"text":"that the findings were largely inconclusive","role":"结果状语从句，so many…that结构，说明结果"}],"tip":"not until置句首时，主句须部分倒装；by which time=介词短语+关系词，是时间状语从句的关系副词变体——先还原为by that time再分析更清晰。"}},{"id":"reason-clause","title":"原因状语从句","en":"Reason Clauses","domain":"clause","tier":3,"summary":"because/since/as/now that/seeing that，because 语气最强、答 why。","level":4,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"原因从句的四个连词","t":"because / since / as / now that（既然）都表原因，但语气和使用场景不同。because 语气最强，直接给出原因，是回答 why 问题的唯一选择；since 和 as 语气较弱，表'由于/既然'，引出已知或明显的原因，常置于句首；now that 表'既然（现在情况已变）'，语气含新情况。"},{"h":"because 的使用规则","t":"①只有 because 能回答 why 问题：Why did she leave? Because she was tired。②not because...but because...（不是因为…而是因为…）结构中只用 because。③because 引导从句时，主句不加 so（because 和 so 不能同时用于表达同一因果：*Because he was tired, so he left → Because he was tired, he left / He was tired, so he left）。"},{"h":"since / as 的位置","t":"since 和 as 引导原因从句时多置于句首，后接逗号：Since the data is incomplete, we cannot draw conclusions；As everyone knows, practice makes perfect。注意 since 还可表时间（自从），as 还可表方式、让步等，须根据语境判断含义。"},{"h":"原因从句 vs 结果从句","t":"原因从句解释为什么（why），是从句给主句提供理由：He stayed because it was raining。结果从句（结果状语从句）表因而产生的结果，用 so...that/such...that：It was raining so heavily that he stayed。两者因果方向一致，但句法结构不同——注意不要把 so that（目的/结果）与 so...that（程度+结果）混淆。"},{"h":"与相邻知识点","t":"与目的状语从句（目的状语从句）区分：目的从句表意图（so that + 情态动词），原因从句表已有的原因（无情态）。与让步从句（让步状语从句）语义对立：虽然 vs 因为。"}],"examples":[{"en":"Because the experiment yielded unexpected results, the team had to reconsider their hypothesis.","zh":"由于实验产生了意料之外的结果，团队不得不重新审视假说。","note":"because 语气最强，直接给出理由；注意主句不加 so。"},{"en":"Since both candidates have similar qualifications, the decision will be based on personality.","zh":"既然两位候选人资历相近，决定将基于个人品质来作出。","note":"since 置句首表'既然（已知情况）'，语气弱于 because。"},{"en":"Now that the research has been completed, we can publish the findings.","zh":"既然研究已经完成，我们可以发表研究成果了。","note":"now that 强调'情况已变，既然如今…'，有新近变化的含义。"}],"hardcase":{"sentence":"The proposal was rejected not because the underlying science was flawed, but because the panel, which had been assembled under considerable political pressure, was reluctant to endorse conclusions that, since they challenged decades of established policy, would have required a wholesale rethinking of the regulatory framework.","zh":"该提案被否决，不是因为基础科学存在缺陷，而是因为在相当大的政治压力下组建的专家组不愿认可那些结论——这些结论由于挑战了数十年的既定政策，本会要求对监管框架进行全面重思。","marks":[{"text":"not because the underlying science was flawed","role":"原因状语从句（because引导），作否定项（not because…but because并列）"},{"text":"but because the panel, which had been assembled under considerable political pressure, was reluctant to endorse conclusions","role":"原因状语从句（because引导），作肯定项，说明真正原因"},{"text":"which had been assembled under considerable political pressure","role":"非限制性定语从句，修饰先行词the panel，which作主语"},{"text":"since they challenged decades of established policy","role":"原因状语从句，since引导，修饰would have required，解释那些结论为何带来问题"},{"text":"that, since they challenged decades of established policy, would have required a wholesale rethinking of the regulatory framework","role":"限制性定语从句，修饰先行词conclusions，that作主语；内嵌since引导的原因从句"}],"tip":"because语气最强、可回答why问句，since/as语气较弱且多置句首；not because…but because是常见对比句式，否定的是一个原因同时肯定另一个，注意不要误读为全盘否定。"}},{"id":"result-clause","title":"结果状语从句","en":"Result Clauses","domain":"clause","tier":4,"summary":"so + 形/副 + that、such + 名 + that，'如此…以致…'，可触发倒装。","level":5,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"结果从句的两大句式","t":"结果状语从句（result clause）表示'如此…以致于…'，有两种固定结构：①so + 形容词/副词 + that + 从句：She spoke so clearly that everyone understood。②such + a/an + 形容词 + 名词 + that + 从句（或 such + 形容词 + 不可数/复数名词 + that）：It was such a difficult problem that no one could solve it。"},{"h":"so...that 与 such...that 的选择","t":"简单规则：中心词是形容词/副词 → so；中心词是名词（或形容词 + 名词）→ such。注意 such a/an 后接单数可数名词（such a great success），such 后可接不可数（such courage）或复数（such beautiful flowers）。常见错误：*so a great success → such a great success；*such clearly → so clearly。"},{"h":"so + 形容词/副词前置引发的倒装","t":"当 so + 形容词放在句首强调时，触发部分倒装：So complicated was the issue that no one understood it（正常语序：The issue was so complicated that...）。这是结果从句与倒装（部分倒装）的交叉考点，考研真题中出现过。"},{"h":"结果 vs 目的：that 从句的区分","t":"so that 引导目的从句：She studied hard so that she could pass（so that + 情态动词，表意图）。so...that 引导结果从句：She studied so hard that she passed（so + 副词 + that，无情态，表自然结果）。两者看似相似，区分靠：①有无情态动词；②so 后有无形容词/副词。"},{"h":"与相邻知识点","t":"与目的从句（目的状语从句）共享 so that，注意区分；与部分倒装（部分倒装）关联（前置触发倒装）；与比较结构（比较结构）的 than/as...as 都有程度比较，但结果从句侧重'因程度引起的结果'。"}],"examples":[{"en":"The argument was so compelling that it changed the minds of even the most skeptical reviewers.","zh":"这个论点如此有说服力，以至于连最持怀疑态度的评审员都改变了看法。","note":"so + 形容词（compelling）+ that 结果从句；compelling 作 argument 的表语。"},{"en":"It was such an innovative approach that the journal accepted it immediately.","zh":"这是如此具有创新性的方法，以至于期刊立即接受了它。","note":"such + a + 形容词 + 名词（an innovative approach）+ that；注意冠词 an 在 such 之后。"},{"en":"So rapidly did the disease spread that authorities declared a public health emergency.","zh":"疾病蔓延得如此迅速，以至于当局宣布了公共卫生紧急状态。","note":"so + 副词（rapidly）前置，触发部分倒装：did the disease spread（助动词 did 提前）。"}],"hardcase":{"sentence":"The interdependence of global financial markets had become so intricate and so opaque by the late 2000s that when confidence collapsed in one sector, the shock propagated through interconnected institutions with such speed and force that regulators in even the most stable economies found themselves powerless to contain it.","zh":"到2000年代末，全球金融市场的相互依存变得如此错综复杂、如此不透明，以至于当信心在某一部门崩溃时，冲击以如此之快的速度和力度通过相互关联的机构蔓延，连最稳定经济体的监管机构也发现自己无力遏制。","marks":[{"text":"so intricate and so opaque by the late 2000s that when confidence collapsed in one sector, the shock propagated through interconnected institutions with such speed and force that regulators in even the most stable economies found themselves powerless to contain it","role":"so…that引导结果状语从句，说明相互依存程度导致的结果"},{"text":"when confidence collapsed in one sector","role":"时间状语从句，when引导，内嵌于结果从句中，修饰propagated"},{"text":"such speed and force that regulators in even the most stable economies found themselves powerless to contain it","role":"such…that引导嵌套的结果状语从句，说明蔓延速度和力度的结果"}],"tip":"结果状语从句用so+形/副+that或such+名+that引导；两者可嵌套（so…that内再套such…that），表达程度递进的双重结果——还原时先找最外层so/such，再逐层剥内层。"}},{"id":"purpose-clause","title":"目的状语从句","en":"Purpose Clauses","domain":"clause","tier":3,"summary":"so that/in order that + 情态动词、lest/in case '以防'，表意图。","level":5,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"目的从句的核心连词","t":"目的状语从句（purpose clause）表示做某件事的目的或意图，核心连词是 so that 和 in order that，从句中必须含情态动词（can/could/may/might/will/would）表达'为了能够…'。例：She left early so that she could catch the train。"},{"h":"so that vs in order that","t":"两者均表目的，意思相同。so that 更口语化，更常见；in order that 更正式，多见于书面语。两者后面的从句均需情态动词：She saved money so that/in order that she could travel abroad。注意：目的从句的情态动词时态须与主句呼应（主句过去时 → could/might/would；主句现在/将来 → can/may/will）。"},{"h":"lest 和 in case 表消极目的","t":"lest（以免，唯恐）和 in case（以防）引导的目的从句表示'为了防止某事发生'，是消极目的。lest 后接 (should) do（虚拟语气的一种）：She whispered lest she (should) wake the baby。in case 后接 might/should 或一般时：Take an umbrella in case it rains（in case 也可引导预防性条件，不完全是虚拟）。"},{"h":"目的从句 vs 结果从句","t":"核心区别：①目的从句有情态动词（can/may/will 等），表意图；结果从句无情态，表自然发生的结果。②目的从句用 so that/in order that；结果从句用 so...that/such...that。③语义：目的 = 有意为之；结果 = 事实发生。例对比：She studied hard so that she might pass（目的，为了能及格）vs She studied so hard that she passed（结果，以至于及格了）。"},{"h":"与相邻知识点","t":"lest + (should) do 与建议要求虚拟（建议要求虚拟）同属原形动词的虚拟用法；与结果从句（结果状语从句）辨析是考研高频；目的也可以用不定式表达（她去了 to catch the train = so that she could catch the train），见不定式的功能（不定式的功能）。"}],"examples":[{"en":"The instructions were written in simple language so that non-specialists could understand them.","zh":"说明书用简单的语言写成，以便非专业人士也能理解。","note":"so that + 情态动词 could 表目的；主句过去时，从句情态用 could（非 can）。"},{"en":"In order that the results might be accurate, three independent researchers reviewed the data.","zh":"为了确保结果准确，三位独立研究人员对数据进行了审核。","note":"in order that 较正式；might 与主句过去式时态呼应。"},{"en":"He kept his voice low lest he should disturb the sleeping child.","zh":"他压低声音，以免惊醒熟睡的孩子。","note":"lest 表消极目的（以免），后接 (should) do 虚拟形式；should 可省略（he disturb）。"}],"hardcase":{"sentence":"The architects of the policy deliberately kept the criteria vague so that administrators would retain the flexibility to respond to unforeseen circumstances, while also including a sunset clause lest the temporary measures, should they prove ineffective, become entrenched in the regulatory system in perpetuity.","zh":"政策设计者刻意将标准保持模糊，以便行政人员在回应不可预见情况时保有灵活性；同时加入了日落条款，以防临时措施万一被证明无效，却永久嵌入监管体系。","marks":[{"text":"so that administrators would retain the flexibility to respond to unforeseen circumstances","role":"目的状语从句，so that引导，含情态动词would；说明保持标准模糊的目的"},{"text":"lest the temporary measures, should they prove ineffective, become entrenched in the regulatory system in perpetuity","role":"目的状语从句（以防），lest引导，从句用(should) do虚拟形式"},{"text":"should they prove ineffective","role":"虚拟条件从句（省略if的倒装：if they should prove ineffective），插入lest从句中间"}],"tip":"so that表正向目的（为了），in order that同义但更正式；lest/for fear that/in case表反向目的（以防），后接(should) do虚拟——三者语义方向相反，引导词是辨别关键。"}},{"id":"condition-clause","title":"条件状语从句","en":"Conditional Clauses","domain":"clause","tier":4,"summary":"if/unless/as long as/provided/suppose；真实条件遵'主将从现'。","level":4,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"条件从句的连词","t":"条件状语从句（conditional clause）表示'在…条件下'。主要连词：if（如果）、unless（除非 = if...not）、as long as / so long as（只要）、provided (that)（假设，条件是）、suppose/supposing（假设）、on condition that（条件是）、in the event that（万一）。"},{"h":"真实条件与主将从现","t":"真实条件句（real conditional）谈论现实可能发生的情况，遵'主将从现'规则：主句用将来时（will/can/may + 动词原形），条件从句用一般现在时（不用 will）：If it rains tomorrow, we will cancel the event。这是时态规则，不是语法偏好——条件从句中 *if it will rain 是错误的。"},{"h":"unless 的使用","t":"unless = if...not，表'除非'。Unless you study, you will fail = If you don't study, you will fail。注意：unless 通常接肯定从句（unless 本身含否定）；不能把 unless 用在虚拟条件句中来替换 if（虚拟语气用 if...not，不用 unless...not）。"},{"h":"真实条件 vs 虚拟条件","t":"真实条件句谈论真实可能性，用正常时态；虚拟条件句（虚拟条件句）谈论反事实或极不可能的情况，时态退一步（现在→过去时，过去→过去完成时）：If I were you, I would leave（虚拟，与现在事实相反）。两者通过时态区分，是考研语法的核心难点之一。"},{"h":"与相邻知识点","t":"主将从现（主将从现）规则在条件从句和时间从句中均有效；虚拟条件句（虚拟条件句）与真实条件形成对比；省略 if 的倒装（虚拟的省略与倒装）：Had I known → If I had known；让步从句（让步状语从句）中 even if 含条件含义。"}],"examples":[{"en":"Provided that the funding is secured, the project will begin next quarter.","zh":"只要资金到位，项目将于下季度启动。","note":"provided that 条件从句，较正式；主句将来时，从句现在时（主将从现）。"},{"en":"Unless the government takes immediate action, the situation will worsen.","zh":"除非政府立即采取行动，否则形势将会恶化。","note":"unless = if not，从句用肯定形式（takes），主句将来时。"},{"en":"As long as you keep practicing, you will see improvement.","zh":"只要你坚持练习，就会看到进步。","note":"as long as 表'只要'，条件从句现在时，主句将来时。"}],"hardcase":{"sentence":"Provided that all parties honor the terms of the agreement as they currently stand, and assuming that no unforeseen geopolitical developments intervene, the framework should remain viable, though its long-term success is contingent on whether the implementing agencies are given the resources they need.","zh":"如果各方均遵守协议的现行条款，且假设没有不可预见的地缘政治事件介入，该框架应该能够维持下去——尽管其长期成功与否取决于执行机构是否获得所需资源。","marks":[{"text":"Provided that all parties honor the terms of the agreement as they currently stand","role":"条件状语从句，provided that引导（=if），真实条件故主句用should（推测将来）"},{"text":"as they currently stand","role":"方式/时间状语从句，as引导，修饰the terms，表「就目前情形而言」"},{"text":"assuming that no unforeseen geopolitical developments intervene","role":"条件状语从句（分词短语化的条件：assuming that=if we assume that），并列于provided that从句"},{"text":"whether the implementing agencies are given the resources they need","role":"名词性从句（whether引导），作介词on的宾语"},{"text":"they need","role":"定语从句（省略that），修饰先行词the resources，they作主语，need缺宾语"}],"tip":"条件状语从句引导词不止if：provided/providing that（前提是）、as long as（只要）、suppose/assuming that（假设）语气各有侧重——真实条件从句谓语用一般现在时或过去时，主句常用will/should/can。"}},{"id":"concession-clause","title":"让步状语从句","en":"Concessive Clauses","domain":"clause","tier":4,"summary":"although/though/even if/while/no matter/as(倒装让步)，'尽管…仍…'。","level":5,"prereq":["adverbial-clause"],"parent":"adverbial-clause","detail":[{"h":"让步从句的核心连词","t":"让步状语从句（concessive clause）表示'尽管/虽然…，但仍…'，表达对比与转折。主要连词：although/though（虽然，最常用）、even though/even if（即使，语气更强）、while/whereas（虽然，对比意味，多用于书面语）、no matter + 疑问词（no matter how/what/when/where/who）、as（倒装让步，正式）、however/whatever/whoever/whenever（复合连词）。"},{"h":"although/though 与 but 不同时用","t":"虽然在中文里'虽然…但是…'两个词并用，但英语中 although/though 已表示让步关系，主句不再加 but：正确：Although it was cold, he went out。错误：*Although it was cold, but he went out。同理，because 和 so 不同时用（原因已由 because 引出，主句不加 so）。"},{"h":"as 引导的倒装让步从句","t":"as 引导让步从句时，从句须前置表语/副词/宾语并倒装，是正式书面语结构：Much as I respect him, I disagree（= Although I respect him very much...）；Tired as he was, he kept working（= Although he was tired...）；Try as he might, he could not solve it（try 作谓语放句首）。注意：倒装后 as 前的词可以是形容词/副词/名词（名词前不加冠词）。"},{"h":"no matter + 疑问词 = 复合连词","t":"no matter how（无论多么）= however；no matter what（无论什么）= whatever；no matter when/where/who/which 同理。两种写法可互换：No matter how hard she tried... = However hard she tried...。这类从句表示让步，常见于考研阅读。"},{"h":"even if vs even though","t":"even though 表事实让步（就算是事实也……）：Even though he was rich, he lived simply（他确实富有）。even if 表假设让步（即使万一……）：Even if it rains, we will proceed（降雨未必会发生）。考研阅读须区分：even if 语义接近条件，even though 语义接近原因（转折）。"}],"examples":[{"en":"Although the report was critical of existing policies, it offered no concrete alternatives.","zh":"尽管这份报告对现行政策提出了批评，但它没有提供任何具体的替代方案。","note":"although 置句首，主句不加 but；典型让步结构。"},{"en":"Difficult as the task was, the team completed it ahead of schedule.","zh":"尽管任务艰巨，团队还是提前完成了它。","note":"as 倒装让步：形容词 difficult 前置，as 后面是倒装的系动词 was + 主语 the task。"},{"en":"No matter how much evidence is presented, some people refuse to change their views.","zh":"无论提出多少证据，有些人都拒绝改变自己的观点。","note":"no matter how = however；how much 修饰 evidence，从句主谓完整。"}],"hardcase":{"sentence":"Challenging as the evidence against the prevailing theory appeared, and compelling as the alternative explanation seemed to those who encountered it for the first time, most established researchers were unwilling to abandon a framework that, however imperfect, had proved extraordinarily productive for the better part of a century.","zh":"尽管反对主流理论的证据看起来令人信服，尽管替代性解释对于初次接触它的人来说似乎很有说服力，但大多数已建立声誉的研究人员不愿放弃一个框架——尽管这个框架并不完美，但在近一个世纪里却被证明异常富有成效。","marks":[{"text":"Challenging as the evidence against the prevailing theory appeared","role":"让步状语从句（as引导的倒装让步：形容词/副词+as+主谓），意为although the evidence appeared challenging"},{"text":"compelling as the alternative explanation seemed to those who encountered it for the first time","role":"让步状语从句（同上，as倒装让步），与前一个并列"},{"text":"who encountered it for the first time","role":"定语从句，修饰先行词those，who作主语"},{"text":"however imperfect","role":"让步状语从句（省略主语和系动词：however imperfect it was），修饰had proved，however+形容词亦可触发让步"}],"tip":"让步从句的四大引导词：although/though（常规）、even if/even though（即使事实或假设）、no matter+疑问词、as（倒装让步，形/副提前+as+主谓）——as倒装让步是考研阅读的高频难点。"}},{"id":"manner-comparison-clause","title":"方式与比较状语从句","en":"Manner & Comparison","domain":"clause","tier":3,"summary":"as/as if(方式)，than/as...as/the more...the more(比较)，连通比较结构。","level":5,"prereq":["adverbial-clause","comparative-structures"],"parent":"adverbial-clause","detail":[{"h":"方式从句","t":"方式状语从句（manner clause）说明主句动作以何种方式进行，由 as（如同/像）、as if/as though（好像/仿佛）引导。Do as I say（照我说的做）；He looked as if he had seen a ghost（他看起来好像见到了鬼）。方式从句中的 as if/as though 常含虚拟语气，表与事实相反的'看起来像'。"},{"h":"比较从句","t":"比较状语从句（comparison clause）通过从句建立参照。核心结构：①as...as（同等比较）：She works as hard as he does（她和他一样努力）；②than（不等比较）：He is taller than she is / than her（省略 is）；③the more...the more（递进比较）：The harder you work, the luckier you get；④no sooner...than（等同'一…就'，时间比较）。"},{"h":"比较从句中的省略","t":"比较从句中常省略与主句重复的部分：He is taller than she is（is 可保留）；He runs faster than she（省略动词）；I earn more than he does（保留助动词避免歧义）。正式书面语：than she / than he（主格，补全被省略主语）；口语中 than her / than him（宾格）。考研写作用主格，更规范。"},{"h":"as if / as though + 虚拟","t":"as if/as though 表'看起来像但实际不是'时用虚拟：He talks as if he knew everything（现在虚拟：他其实不知道）；She looked as though she had been crying（过去虚拟：她好像哭过，但现在无从判断真实性）。若事实确实如此，用陈述语气：It looks as if it is going to rain（可能真会下雨）。这是 as if 与虚拟语气（as if 虚拟）的交叉。"},{"h":"与相邻知识点","t":"比较从句是比较结构（比较结构）的句法实现，两者须一起学；the more...the more 结构与部分倒装（部分倒装）有关联；方式从句中的 as if 与 as if 虚拟（as if 虚拟）连接；as 同时还引导原因从句、时间从句、让步从句（倒装），注意多义词辨析。"}],"examples":[{"en":"The child spoke as if he were an adult.","zh":"那个孩子说话好像是个大人。","note":"as if 后虚拟语气，were（不是 was）表与事实相反；现在虚拟时态退一步用过去式。"},{"en":"The more information we have, the better decisions we can make.","zh":"我们掌握的信息越多，就能做出越好的决策。","note":"the more...the better 相关比较级；两个分句各含一个比较级形式。"},{"en":"He performed better than anyone had expected.","zh":"他的表现比任何人预期的都要好。","note":"than 引导比较从句，anyone had expected 是完整从句（省略了 he would perform）；过去完成时表过去的预期。"}],"hardcase":{"sentence":"The recovery proceeded much more slowly than economists had predicted it would, and the distribution of gains was far less equitable than the models had suggested would be the case, almost as if the market forces that were supposed to self-correct had instead amplified the very disparities they were meant to reduce.","zh":"复苏进展比经济学家预测的慢得多，收益分配也远不如模型所显示的那般公平，几乎就好像那些本应自我纠正的市场力量，反而放大了它们本该减少的差距。","marks":[{"text":"than economists had predicted it would","role":"比较状语从句，than引导，省略了后半部分（proceed）；it=the recovery，would后省略proceed slowly"},{"text":"than the models had suggested would be the case","role":"比较状语从句，than引导；would be the case为省略主语的嵌套宾语从句（the models had suggested [that the distribution] would be the case）"},{"text":"almost as if the market forces that were supposed to self-correct had instead amplified the very disparities they were meant to reduce","role":"方式状语从句，as if引导，表「好像」；从句用过去完成时had amplified表与过去事实相反的虚拟"},{"text":"that were supposed to self-correct","role":"定语从句，修饰先行词the market forces，that作主语"},{"text":"they were meant to reduce","role":"定语从句（省略that），修饰先行词the very disparities，they作主语，reduce缺宾语"}],"tip":"比较从句（than/as）常省略与主句重复的成分，还原时从主句找对称结构补入；as if/as though引导方式从句，若与现实相反则用虚拟语气（现在←过去时，过去←过去完成时）。"}},{"id":"future-in-clause","title":"主将从现","en":"Future in Sub-clauses","domain":"clause","tier":3,"summary":"时间、条件状语从句中用一般现在时代替将来时：I'll go when he comes。","level":4,"prereq":["time-clause"],"parent":"time-clause","detail":[{"h":"规则：主将从现","t":"'主将从现'（future in sub-clauses）是指在时间状语从句和条件状语从句中，即使表达的是将来的事，也要用一般现在时，而不能用 will + 动词原形。主句可以用将来时，从句必须用现在时：I will call you when he arrives（不是 *when he will arrive）。"},{"h":"适用范围","t":"该规则适用于：①时间状语从句（when/while/as/before/after/until/as soon as/once 等引导）；②条件状语从句（if/unless/as long as/provided 等引导）。注意：名词性宾语从句（I wonder when he will come）不受此规则限制，因为那是名词从句而非状语从句。"},{"h":"时态选择的进阶","t":"主句用将来完成时时，从句依然用现在时（或现在完成时，强调从句动作须在主句时间点前完成）：I will have finished the report by the time you arrive（by the time + 现在时，主句将来完成时）。I will have left before he comes（comes 现在时代替将来）。"},{"h":"常见考试错误","t":"错误①：*If it will be sunny tomorrow, we will go hiking → 改：If it is sunny tomorrow...。错误②：把规则扩展到其他从句——让步/原因/结果/方式从句不受'主将从现'限制，可正常用将来时：Although it will be cold, we will go out（although 让步从句可用 will）。"},{"h":"与相邻知识点","t":"与时间从句（时间状语从句）、条件从句（条件状语从句）配套；与一般将来时（一般将来时）对比：将来时在状语从句中'消失'，换成现在时；与时态呼应（时态呼应）区别：时态呼应是主句过去时引发从句时态后移，'主将从现'是时间/条件从句的特殊规则。"}],"examples":[{"en":"We will start the meeting as soon as the director arrives.","zh":"主任一到，我们就开始会议。","note":"as soon as 引导时间从句，arrives 用现在时代替将来；主句用 will start。"},{"en":"Please submit the form before the deadline passes.","zh":"请在截止日期到来之前提交表格。","note":"before 时间从句，passes 现在时；祈使句主句无 will 但含将来意义。"},{"en":"Even if the proposal is rejected, we will revise and resubmit it.","zh":"即使提案被拒，我们也会修改后重新提交。","note":"even if 条件从句，is rejected 现在时（被动）；主句用 will revise。"}],"hardcase":{"sentence":"The treaty will not take effect until all signatory states have ratified it through their respective domestic legislatures, and once that process is complete, any amendments proposed in the future must be submitted for renewed ratification before they become binding on member states.","zh":"该条约在所有签署国通过各自国内立法机构批准之前不会生效；一旦该程序完成，未来提出的任何修正案在对成员国具有约束力之前，都必须重新提交批准。","marks":[{"text":"until all signatory states have ratified it through their respective domestic legislatures","role":"时间状语从句，until引导；从句用现在完成时have ratified代替将来完成时（主将从现规则在时间从句中生效）"},{"text":"once that process is complete","role":"时间/条件状语从句，once引导（一旦）；从句用一般现在时is complete代替将来时（主将从现）"},{"text":"before they become binding on member states","role":"时间状语从句，before引导；从句用一般现在时become代替将来时（主将从现）"}],"tip":"「主将从现」是英语语法铁律：时间（when/before/after/until/once/as soon as）和条件（if/unless/provided）状语从句中，无论主句是将来时还是情态，从句一律用现在时代替将来时。"}},{"id":"special-overview","title":"特殊句式总览","en":"Special Patterns","domain":"special","tier":5,"summary":"打破自然语序与常规的变奏：倒装、强调、省略、否定、比较，多为亮点与陷阱。","level":5,"prereq":["complex-sentence"],"parent":"complex-sentence","detail":[{"h":"本质","t":"特殊句式(special sentence patterns)是英语在常规「主+谓+宾/表」之外，出于强调、修辞或信息结构需求而做出的结构变形。考研阅读、翻译、写作三大题型均大量出现。"},{"h":"五大族群","t":"本星系包含五个族群：①倒装(inversion)——改变主谓语序；②强调(emphasis)——凸显信息；③省略(ellipsis)——删除冗余；④否定(negation)——包括部分否定与转移；⑤比较结构(comparative structures)——等级对比。各族群内部还有细分节点。"},{"h":"考研出题规律","t":"翻译题最喜长难句中的倒装与省略；写作中平行结构与连接副词是得分手段；阅读理解常借否定词误导选项。熟悉各节点的形式特征，是快速识别结构的前提。"},{"h":"与其他星系的衔接","t":"特殊句式不孤立：倒装常发生在状语从句(adverbial clauses)条件句中；强调句型的 that 常被误认为定语从句(relative clause)的关系词；省略多出现在并列句与从句节点；长难句分析法(long-sentence)是整合全部结构的实战工具。"}],"examples":[{"en":"Not until he arrived did we start the meeting.","zh":"直到他到来，我们才开始会议。","note":"否定词前置引发部分倒装，是倒装族群的典型代表。"},{"en":"It is perseverance that separates the successful from the unsuccessful.","zh":"正是坚持，将成功者与失败者区分开来。","note":"强调句型 It is...that 结构，强调主语 perseverance。"},{"en":"She said she would come, and so she did.","zh":"她说她会来，她确实来了。","note":"do 强调谓语，省略了重复的动词短语。"}],"hardcase":{"sentence":"Only when the final results had been carefully scrutinized by an independent panel did the committee acknowledge that not every assumption underlying its original model was valid.","zh":"只有当最终结果经过独立小组仔细审查之后，委员会才承认，其原始模型所依赖的并非每一条假设都是有效的。","marks":[{"text":"Only when the final results had been carefully scrutinized by an independent panel","role":"only when 引导的时间状语置于句首，触发后续主句部分倒装"},{"text":"did the committee acknowledge","role":"部分倒装：助动词 did 提至主语 the committee 之前"},{"text":"not every assumption underlying its original model was valid","role":"宾语从句，含部分否定（not every = 并非每一个）"}],"tip":"特殊句式常叠用：only 状语倒装 + 部分否定，分层剥离才不乱。"}},{"id":"inversion","title":"倒装","en":"Inversion","domain":"special","tier":6,"summary":"谓语(部分)或全部提到主语前；分完全倒装与部分倒装，受特定词语触发。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质与分类","t":"倒装(inversion)是将谓语（或其一部分）移到主语之前的语序变形。核心目的：①凸显某成分（信息焦点前移）；②满足句法要求（疑问句、固定结构）。倒装分两类：完全倒装(full inversion)——谓语整体移到主语前；部分倒装(partial inversion)——只有助动词/情态动词/be 移到主语前，主谓语序局部对调。"},{"h":"完全倒装的触发条件","t":"完全倒装(full inversion)主要触发场景：①表地点、方向的副词/介词短语置句首(There/Here+be；Out/In/Up/Down/Away+不及物动词)；②表语置句首(Such was...；So + 形容词/副词+be)。公式：地点/方向/表语成分 + 谓语 + 主语。注意：主语若为代词，仍用正常语序(Here he comes.)。"},{"h":"部分倒装的触发条件","t":"部分倒装(partial inversion)触发词族极广，考研必须逐类掌握：①否定/半否定词首：Never/Seldom/Rarely/Hardly/No sooner...than/Not until/Not only...but also；②Only + 状语置首；③So/Such...that 结构中 so/such 置首；④条件句省略 if：Were.../ Had.../ Should...；⑤比较结构 than/as 引导的从句中偶发倒装。公式：触发词 + 助动词/情态词/be + 主语 + 主动词。"},{"h":"条件句省略 if 的倒装","t":"虚拟条件句省略 if 后，需将 were/had/should 提至句首，形成部分倒装。与虚拟语气(subjunctive-mood)紧密关联。三种形式：Were I you(=If I were you)；Had she known(=If she had known)；Should it rain(=If it should rain)。这是高级书面语标志，翻译题常考。"},{"h":"考研陷阱与识别要点","t":"①看到 Not until 立即判断：主句用部分倒装，时间从句本身不倒装；②Only 置首只有后接状语才倒装，接主语不倒装(Only Tom passed. 不倒装)；③So + adj./adv. 置首，后接完整倒装子句(So beautiful was the view that...——注意 view 是主语)；④Nor/Neither 置句首接部分倒装，表示前句的否定延续；⑤完全倒装中主谓一致以真实主语为准(There are many reasons.)。"},{"h":"与相邻节点的关系","t":"倒装是本星系的枢纽节点(tier 6)：完全倒装与部分倒装是它的两个子节点；否定词前置倒装(negative-fronting)、so/neither 倒装(so-neither-inversion)均属部分倒装的细分；条件句倒装延伸到虚拟语气(subjunctive-mood)；长难句分析法(long-sentence)必须先识别倒装才能还原主干。"}],"examples":[{"en":"Not only did he finish the task, but he also helped his colleagues.","zh":"他不仅完成了任务，还帮助了同事。","note":"Not only 置首触发部分倒装：did he finish；but also 后主句语序正常。"},{"en":"Had the scientists understood the mechanism earlier, they could have prevented the disaster.","zh":"若科学家们早些理解该机制，本可以避免这场灾难。","note":"省略 if 的虚拟条件句：Had=If...had，谓语 had 提前，是部分倒装+虚拟语气的组合。"},{"en":"So rapid was the development of technology that no single discipline could keep pace with it.","zh":"技术的发展如此迅猛，以至于没有任何单一学科能与之并进。","note":"So + adj. 置首，完全倒装：was the development；so...that 引出结果从句。"}],"hardcase":{"sentence":"So profound was the influence of the Enlightenment on subsequent political thought that even its fiercest critics could not entirely escape the conceptual vocabulary it had bequeathed to them.","zh":"启蒙运动对后来政治思想的影响如此深远，以至于即便是其最激烈的批评者也无法完全摆脱它留给他们的概念词汇。","marks":[{"text":"So profound was the influence of the Enlightenment on subsequent political thought","role":"so + 形容词 + was + 主语，完全倒装触发：表语前置引发主谓倒置"},{"text":"was the influence","role":"倒装后主谓顺序：be 动词提至主语前"},{"text":"that even its fiercest critics could not entirely escape","role":"so...that 结果状语从句，呼应前置的 so profound"}],"tip":"so/such 置首即触发倒装，先复原 The influence was so profound 再读 that 从句。"}},{"id":"full-inversion","title":"完全倒装","en":"Full Inversion","domain":"special","tier":3,"summary":"地点状语/方位副词置首时全谓语前置：Here comes the bus；In the room sat a man。","level":5,"prereq":["inversion"],"parent":"inversion","detail":[{"h":"本质与结构","t":"完全倒装(full inversion)指谓语动词整体移至主语之前，公式为：前置成分 + 谓语 + 主语。有别于部分倒装只移助动词。触发源头：地点副词/介词短语或表语置句首，用以凸显场景或状态，多见于叙述文。"},{"h":"主要触发模式","t":"①副词/介词短语 + 不及物动词 + 名词主语：Here comes the bus. / Out rushed the children. / On the table lay a letter. ②There/Here + be + 名词：There is a problem. ③表语置首(Adj./Such)：Such is the irony of fate. / Present at the ceremony were all the senior officials. "},{"h":"代词主语例外","t":"当主语是人称代词时，即使成分前置也不做完全倒装，仍保持正常语序。如：Here he is.（不说 Here is he.）；Away they went.（不说 Away went they.）这是考研填空常见陷阱。"},{"h":"考研出题点","t":"完全倒装在翻译中出现较多：先找真实主语（在谓语后），再还原为正常语序做翻译。阅读中出现 such/so 引导的完全倒装，需注意主谓一致以真实主语为准。"}],"examples":[{"en":"On the outskirts of the city stands a centuries-old temple.","zh":"在城市郊区，矗立着一座百年古庙。","note":"介词短语置首，完全倒装：stands 是谓语，a temple 是真实主语。"},{"en":"Such was the complexity of the problem that even experts were baffled.","zh":"问题的复杂程度如此之高，连专家都感到困惑。","note":"Such 表语置首，was 整体前移；注意主谓一致以 complexity 为准。"},{"en":"Here comes the evidence that challenges the conventional theory.","zh":"这就是挑战传统理论的证据来了。","note":"Here + 不及物动词 comes + 主语 evidence；后接定语从句修饰 evidence。"}],"hardcase":{"sentence":"Embedded within the dense theoretical framework of the report lay a single empirical claim upon which the entire argument depended.","zh":"在这份报告密集的理论框架之内，藏着一个经验性断言，整个论证都依赖于它。","marks":[{"text":"Embedded within the dense theoretical framework of the report","role":"过去分词短语作状语置于句首，触发完全倒装"},{"text":"lay a single empirical claim","role":"完全倒装：动词 lay 提至真正主语 a single empirical claim 之前"},{"text":"upon which the entire argument depended","role":"介词 + 关系代词引导限制性定语从句，修饰 claim"}],"tip":"地点/分词状语置首触发完全倒装，先找动词再往后找真主语。"}},{"id":"partial-inversion","title":"部分倒装","en":"Partial Inversion","domain":"special","tier":5,"summary":"只把助动词/情态/be 提前；由否定词首、only 状语、so/neither 等触发。","level":5,"prereq":["inversion"],"parent":"inversion","detail":[{"h":"本质与结构","t":"部分倒装(partial inversion)只将助动词、情态动词或 be 动词移至主语之前，主动词留在主语后，公式：触发成分 + 助/情/be + 主语 + 主动词(如有)。英语中疑问句是部分倒装的原型；特殊句式中的部分倒装则由特定词汇触发，语气更书面。"},{"h":"触发词完整清单","t":"①否定/半否定副词首位：Never, Seldom, Rarely, Hardly(ever), Scarcely, Barely, Little, No sooner...than, Nor, Neither, Not only, Not until, In no way, At no time, Under no circumstances, By no means；②Only + 状语(介词短语/副词/从句)置首；③So/Such 表程度置首(so...that/such...that)；④条件句省略 if：Were/Had/Should 置首；⑤比较从句 than/as 中偶发省略式倒装（高级语境）。"},{"h":"Only 置首的精细规则","t":"Only + 状语 → 主句部分倒装；Only + 主语 → 不倒装。对比：Only in this way can we solve the problem.（倒装，only 接状语 in this way）vs. Only she knows the truth.（不倒装，only 直接修饰主语 she）。考研写作常用 only 倒装提升句式档次。"},{"h":"No sooner...than 与 Hardly...when","t":"两个固定句型均表「刚…就…」：No sooner had he left than it began to rain. / Hardly had she arrived when the phone rang. 结构：No sooner/Hardly + had + 主语 + V-pp + than/when + 从句（正常语序，一般过去时或过去完成时）。陷阱：than/when 之后不倒装；主句时态用过去完成时。"},{"h":"考研写作应用","t":"部分倒装是提升写作分的常用手段。几个高频模板：①Not until 句型强调时间；②Only by/through 句型强调方法；③Never before has...表示历史性判断；④Under no circumstances should/can... 表绝对禁止。注意每次使用都需严格按「触发词 + 助动词 + 主语」顺序。"},{"h":"与全局的联系","t":"部分倒装是倒装(inversion)节点的核心子类；否定词前置倒装(negative-fronting)和 so/neither 倒装(so-neither-inversion)都是其具体场景；条件句倒装与虚拟语气(subjunctive-mood)高度重叠，翻译时需还原为 if 从句。"}],"examples":[{"en":"Only by working collaboratively can researchers tackle such complex problems.","zh":"只有通过合作，研究者们才能解决如此复杂的问题。","note":"Only + 介词短语置首，部分倒装：can researchers tackle。写作模板直接套用。"},{"en":"No sooner had the government announced the policy than businesses began to adjust their strategies.","zh":"政府刚宣布这一政策，企业便开始调整策略。","note":"No sooner...than 句型，主句 had...announced 倒装，than 从句正常语序。"},{"en":"Under no circumstances should personal data be disclosed to unauthorized parties.","zh":"在任何情况下，个人数据都不应向未经授权的方透露。","note":"否定短语置首，should 提前；被动语态 be disclosed 保持不变，主语为 personal data。"}],"hardcase":{"sentence":"Not until the publication of the landmark study in 2003 did researchers fully appreciate how deeply ingrained cultural biases can distort the interpretation of empirical data.","zh":"直到2003年这项里程碑式研究发表之后，研究者们才充分认识到，根深蒂固的文化偏见能在多大程度上扭曲对实证数据的解读。","marks":[{"text":"Not until the publication of the landmark study in 2003","role":"not until 短语置首，触发主句部分倒装"},{"text":"did researchers fully appreciate","role":"部分倒装：助动词 did 提至主语 researchers 之前"},{"text":"how deeply ingrained cultural biases can distort the interpretation of empirical data","role":"how 引导的宾语从句，作 appreciate 的宾语"}],"tip":"not until 置首必倒装，主句用 did/does/do + 主语 + 动词原形。"}},{"id":"negative-fronting","title":"否定词前置倒装","en":"Negative Fronting","domain":"special","tier":4,"summary":"Never/Hardly/Not only/No sooner/Little 等置句首，主句须部分倒装。","level":5,"prereq":["partial-inversion"],"parent":"partial-inversion","detail":[{"h":"本质","t":"否定词前置倒装(negative fronting inversion)是部分倒装的最大子类：将否定或半否定副词/短语移至句首，主句随即做部分倒装。作用：强调否定语义，制造书面/正式语气。"},{"h":"高频否定词一览","t":"完全否定：Never, Nor, Neither, Not, In no way, At no time, By no means, Under no circumstances, On no account。半否定（限制）：Seldom, Rarely, Hardly, Scarcely, Barely, Little（=not much），Nowhere。固定搭配前置：Not only...but also, Not until, No sooner...than, Hardly/Scarcely...when。"},{"h":"结构公式与时态配套","t":"公式：否定词 + 助/情/be + 主语 + 余下成分。时态选择：①一般现在/将来用 do/does/will；②一般过去用 did；③完成体用 have/has/had；④be 动词直接移位；⑤No sooner...than 主句用过去完成时。Not until 句型：Not until + 时间从句/短语, + 倒装主句——时间从句本身不倒装。"},{"h":"与条件句倒装的边界","t":"否定词前置是「副词性」触发，句子本身仍是陈述句或强调句；条件句倒装(省略 if)是虚拟语气(subjunctive-mood)的结构变体，表假设。两者同属部分倒装但语义不同，翻译时须分辨：Never did I imagine...（陈述否定）vs. Were I to try...（假设条件）。"},{"h":"考研出题点","t":"否定词前置是翻译题最常见的倒装类型。步骤：①识别句首否定词；②还原为正常语序（把助动词移回主语后）；③翻译。陷阱：Hardly 等半否定词翻译为「几乎不」，不是「根本不」；Little did he know 译为「他几乎不知道/殊不知」，带感叹色彩。"}],"examples":[{"en":"Never before has the world witnessed such rapid transformation in communications technology.","zh":"世界从未见证过通信技术如此迅猛的变革。","note":"Never before 置首，has 提前；强调历史最高频，翻译时「从未…如此」对应该结构。"},{"en":"Little did the early researchers suspect that their discovery would reshape entire industries.","zh":"早期的研究者们几乎没有料到，他们的发现将重塑整个行业。","note":"Little（半否定）置首，did 提前；suspect 后接 that 宾语从句，注意从句语序正常。"},{"en":"Not until the data were independently verified did the journal agree to publish the findings.","zh":"直到数据经过独立核实，该期刊才同意发表研究成果。","note":"Not until + 被动从句，主句倒装；Not until 句型是否定词前置与时间强调的典型交叉。"}],"hardcase":{"sentence":"Hardly had the ink dried on the peace agreement before renewed hostilities broke out along the disputed border, rendering the diplomatic efforts of the preceding decade largely futile.","zh":"和平协议的墨迹几乎未干，争议边境沿线便再度爆发了冲突，令过去十年的外交努力几乎付诸东流。","marks":[{"text":"Hardly had the ink dried on the peace agreement","role":"hardly 置句首，触发部分倒装：had 提至主语 the ink 之前"},{"text":"had the ink dried","role":"倒装后结构：助动词 had 前置"},{"text":"before renewed hostilities broke out","role":"before 引导时间从句，与 hardly 呼应，表'几乎刚…就…'"},{"text":"rendering the diplomatic efforts of the preceding decade largely futile","role":"现在分词短语作结果状语"}],"tip":"Hardly/Scarcely...before/when 是固定句式：否定词首→倒装主句→before/when 从句。"}},{"id":"so-neither-inversion","title":"so / neither 倒装","en":"So / Neither + Inversion","domain":"special","tier":3,"summary":"So do I（我也是）/ Neither do I（我也不），表'同样如此'。","level":5,"prereq":["partial-inversion"],"parent":"partial-inversion","detail":[{"h":"本质与功能","t":"So / Neither 倒装(so-neither inversion)是部分倒装的固定场景：用于将前句的肯定或否定情况延伸至另一主语，表示「也一样」。结构紧凑，口语与书面均常见，考研完形填空中频繁出现。"},{"h":"结构对比","t":"①肯定延伸：So + 助/情/be + 主语（So do I. / So has she. / So will they.）= ...也是如此；②否定延伸：Neither/Nor + 助/情/be + 主语（Neither do I. / Nor has he.）= ...也不是如此。关键：助动词要与前句保持时态一致，且必须倒装（不能说 So I do.）。"},{"h":"与 so that 的区分","t":"So + 倒装 表「也一样」；So + 正常语序 表「确实如此（重申）」。对比：A: He passed the exam. B: So did Mary.（Mary 也通过了）vs. B: So he did.（他确实通过了）。后者不倒装，意义完全不同，是完形填空的经典陷阱。"},{"h":"考研考查形式","t":"①完形：给出前句，填 So/Neither + 正确助动词（时态选择）；②翻译：出现此结构时还原为「同样地，…也…」；③写作：用 so do/does/did 避免重复，体现连贯性(cohesion)。"}],"examples":[{"en":"Developed countries have experienced a sharp decline in manufacturing; so have many developing economies.","zh":"发达国家经历了制造业的急剧萎缩，许多发展中经济体也是如此。","note":"so have...是肯定延伸，have 与前句 have experienced 时态对应；是衔接与连贯的替代手段。"},{"en":"The experiment did not support the hypothesis, nor did subsequent studies.","zh":"该实验未能支持假说，后续研究也同样如此。","note":"Nor 置首，did 倒装；nor 与 neither 可互换，but nor 用于句首时更多见于书面。"},{"en":"She could not accept the compromise, and neither could her partner.","zh":"她无法接受妥协，她的搭档也同样无法接受。","note":"and neither 常接在前句否定之后；could 与前句对应，主语 her partner 在后。"}],"hardcase":{"sentence":"The early industrialists showed little concern for the welfare of their workers, and neither did the legislators who were supposed to hold them accountable.","zh":"早期工业家对工人福祉几乎漠不关心，那些本应追究其责任的立法者也同样如此。","marks":[{"text":"neither did the legislators","role":"neither + 部分倒装：表'立法者也同样不关心'，呼应前句否定"},{"text":"did the legislators","role":"倒装结构：助动词 did 提至主语 the legislators 之前"},{"text":"who were supposed to hold them accountable","role":"定语从句修饰 the legislators，who 作从句主语"}],"tip":"neither/nor + 助动词 + 主语 = 前句的否定内容对另一方同样成立。"}},{"id":"emphasis","title":"强调","en":"Emphasis","domain":"special","tier":4,"summary":"凸显信息焦点的手段：强调句型、do 强调、词序前置、重复。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质","t":"强调(emphasis)是通过结构或词汇手段，将信息焦点突出呈现的语法行为。英语中强调不像汉语靠重音，而靠明显的句法变形或特定词汇，读者/评卷人能通过结构本身识别意图。"},{"h":"两大结构手段","t":"①强调句型(cleft sentence)：It is/was + 被强调成分 + that/who + 余下成分——可强调主语、宾语、状语，但不能强调谓语；②do/does/did 强调谓语(do emphasis)：在肯定陈述句中在动词前加 do/does/did，强调该动作真实发生——只能强调谓语动词。两者功能互补，不可混用。"},{"h":"词汇强调手段","t":"副词类：indeed, certainly, definitely, absolutely, of all things/people/places（惯用短语）；数量词类：every single, the very（the very day=就在那一天）；最高级+否定：nothing but, none other than, anything but（=绝不是）。考研翻译中这些词往往是「情感色彩」的载体，译文须体现语气。"},{"h":"考研出题点","t":"①强调句 vs. 定语从句(relative clause)的辨别是高频考点；②do 强调的时态要正确（did + 动词原形）；③写作中适度用强调句提升表达层次——避免全文平铺直叙。"}],"examples":[{"en":"It is the quality of thinking, not the quantity of information, that determines the value of research.","zh":"决定研究价值的，是思维的质量，而非信息的数量。","note":"It is...that 强调主语 the quality of thinking；非强调句则不含 it is/that 框架。"},{"en":"The critics did acknowledge the film's technical achievements, even as they questioned its narrative.","zh":"批评家们确实承认了这部电影在技术上的成就，尽管他们对叙事提出了质疑。","note":"did acknowledge 是 do 强调谓语，强调「确实承认」，区别于一般陈述。"},{"en":"Of all the challenges facing modern cities, none is more pressing than the housing crisis.","zh":"在现代城市面临的所有挑战中，没有什么比住房危机更紧迫。","note":"of all...强调范围+最高级否定，双重强调；写作中可模仿此结构。"}],"hardcase":{"sentence":"It was precisely the ambiguity of the constitutional clause, and not any deliberate malfeasance on the part of the administration, that allowed the controversy to persist for so long.","zh":"正是宪法条款的模糊性——而非行政当局任何蓄意的渎职行为——使得这场争议得以长久持续。","marks":[{"text":"It was precisely the ambiguity of the constitutional clause","role":"强调句型 It was...that，被强调成分为主语 the ambiguity"},{"text":"and not any deliberate malfeasance on the part of the administration","role":"插入对比结构，通过否定排除另一因素，加强强调焦点"},{"text":"that allowed the controversy to persist for so long","role":"强调句 that 从句，与句首 It was 构成强调框架"}],"tip":"强调句框架 It is/was...that 中，去掉 It was 和 that 后句子依然成立——此为辨别标志。"}},{"id":"cleft-sentence","title":"强调句型","en":"Cleft Sentence","domain":"special","tier":5,"summary":"It is/was + 被强调部分 + that/who...；去掉框架句子仍成立，区别于定从。","level":5,"prereq":["emphasis","it-usage"],"parent":"emphasis","detail":[{"h":"本质与识别","t":"强调句型(cleft sentence)，即「分裂句」：用 It is/was...that/who... 把一个简单句「劈开」，将某成分抽出放在 It is 与 that 之间加以凸显。分裂后原句的余下部分由 that/who 连接。辨别要诀：去掉 It is/was 和 that/who，剩余部分能拼回一个完整、语义不变的正常句——这是强调句型。若不能拼回完整句，则是其他结构。"},{"h":"可强调的成分范围","t":"强调句型能强调：①主语（被强调成分是人时用 who，其他用 that）；②宾语；③状语（时间、地点、原因、方式等）。不能强调谓语动词——谓语强调须用 do emphasis。例：It is persistence that leads to success.（强调主语）/ It was in Paris that they first met.（强调地点状语）/ It was carelessness that caused the accident.（强调原因）。"},{"h":"与定语从句的辨别（核心考点）","t":"强调句型与定语从句(relative clause)外形相近，关键差异：①强调句中 that 不是真正的关系代词，仅是连接词，可以省掉而余下部分仍为完整句；②定语从句中的 that/which/who 在从句中充当某语法成分，删掉后从句不完整；③测试法：将 It is/was 和 that 去掉，若能拼回正常句=强调句，否则=定语从句；④强调句中 that 后的从句谓语时态要与被强调成分的实际情况匹配，不受先行词限制。"},{"h":"否定与疑问形式","t":"强调句型可变否定和疑问：否定：It is not...that...；疑问：Is it...that...? / Who is it that...? / When was it that...?。考研翻译中常见否定强调句，需先还原正常语序再翻译，避免误译被强调成分。"},{"h":"时态选择规律","t":"It is/was 的时态取决于所强调事件发生的时间，而非从句时态：强调现在/一般真理用 is；强调过去事件用 was。从句本身的时态独立判断。例：It was not until 1969 that humans first landed on the moon.（was 指历史事件，landed 也是过去）。Not until 与强调句结合是翻译重灾区。"}],"examples":[{"en":"It is the interaction between genes and environment that shapes human personality.","zh":"正是基因与环境之间的相互作用，塑造了人类的性格。","note":"强调主语；验证：The interaction between genes and environment shapes human personality. 句子完整。"},{"en":"It was not until the late twentieth century that scientists began to understand the human genome.","zh":"直到二十世纪末，科学家们才开始理解人类基因组。","note":"Not until + 强调句型组合；it was...that 框架，Not until the late twentieth century 是被强调的状语。"},{"en":"Is it the content of a message or its delivery that matters most in communication?","zh":"在沟通中，最重要的是信息的内容还是其表达方式？","note":"强调句变疑问形式；or 连接两个被强调成分供选择，是议论文常见的设问句式。"}],"hardcase":{"sentence":"It was not the shortage of raw materials but the collapse of consumer confidence that ultimately brought the once-thriving manufacturing sector to its knees.","zh":"最终使这个曾经繁荣的制造业部门陷入困境的，不是原材料短缺，而是消费者信心的崩溃。","marks":[{"text":"It was not the shortage of raw materials but the collapse of consumer confidence","role":"强调句型 It was...that，被强调成分为 not A but B 对比结构"},{"text":"not the shortage of raw materials but the collapse of consumer confidence","role":"not...but 并列结构作被强调主语，强调真正原因"},{"text":"that ultimately brought the once-thriving manufacturing sector to its knees","role":"强调句 that 从句，还原后为主句谓语"}],"tip":"强调句可强调 not A but B 整体，拆框后 not A but B 即为原句主语。"}},{"id":"do-emphasis","title":"do 强调谓语","en":"Emphatic 'do'","domain":"special","tier":2,"summary":"在谓语动词原形前加 do/does/did 强调'的确、确实'：I do love it。","level":5,"prereq":["emphasis"],"parent":"emphasis","detail":[{"h":"本质与结构","t":"do/does/did 强调谓语(do emphasis)在肯定陈述句中，于行为动词前加 do/does/did，强调该动作确实发生或确有其事。结构：主语 + do/does/did + 动词原形。时态由 do/does/did 承担，主动词还原为原形。"},{"h":"时态与数的配合","t":"一般现在时：第三人称单数用 does，其余用 do；一般过去时：一律用 did；语气词 do 不用于完成时和进行时（这些时态本身已有助动词，用 indeed 等副词强调即可）。"},{"h":"考研考查形式","t":"①翻译：读到 do/does/did + 原形动词组合，须在译文中体现「确实/的确/着实」等语气；②完形：上下文暗示转折/让步，填 do 系列；③写作：让步段落「虽然...但...」可用 do acknowledge/do recognize 提升语气：Critics do recognize the merits..."}],"examples":[{"en":"Research does suggest that moderate exercise significantly improves cognitive function.","zh":"研究确实表明，适度锻炼能显著改善认知功能。","note":"does suggest，第三人称单数；强调研究结论的真实性，常出现在让步或反驳语境。"},{"en":"Despite the criticism, the author did incorporate feedback from reviewers in the final version.","zh":"尽管受到批评，该作者在最终版本中确实采纳了审稿人的反馈。","note":"did incorporate，过去时强调；despite 引出让步，do 强调体现转折落脚点。"},{"en":"The policy does carry significant risks, but the potential benefits outweigh them.","zh":"该政策确实存在重大风险，但潜在收益超过了这些风险。","note":"does carry 强调风险存在，为 but 之后的肯定论述铺垫，是议论文常见的「承认-转折」结构。"}],"hardcase":{"sentence":"Critics may question the methodology, but the findings do suggest that prolonged exposure to economic inequality does produce measurable changes in cognitive development among children.","zh":"批评者或许会质疑研究方法，但这些发现确实表明，长期暴露于经济不平等之中确实会在儿童认知发展方面产生可测量的变化。","marks":[{"text":"the findings do suggest","role":"do + 动词原形，强调谓语'确实表明'，反驳前文质疑"},{"text":"does produce measurable changes","role":"does + 动词原形，再度强调从句谓语，加强肯定语气"},{"text":"prolonged exposure to economic inequality","role":"that 从句的主语，动名词短语作名词用"}],"tip":"do/does/did 强调谓语时，后接动词原形，语气为'的确、确实'，常出现在反驳语境。"}},{"id":"ellipsis","title":"省略","en":"Ellipsis","domain":"special","tier":4,"summary":"省去可由上下文复原的成分，避免重复；状语从句主谓一致时常省。","level":5,"prereq":["special-overview"],"parent":"special-overview","detail":[{"h":"本质","t":"省略(ellipsis)是在不影响理解的前提下，删去可以从语境推断的成分，使表达简洁。省略的前提是「可恢复性(recoverability)」——读者能从上下文还原被省略的部分。省略是衔接与连贯(cohesion)的重要手段之一。"},{"h":"主要省略类型","t":"①并列句中的省略：共享主语或谓语时，后一分句省去重复部分（She studied hard and [she] passed the exam.）；②从句中的省略：状语从句(adverbial clauses)中省略「主语+be」，常见于 when/while/if/though 引
